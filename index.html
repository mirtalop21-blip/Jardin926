<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA J926 - GESTIÓN ESTRATÉGICA PROFESIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff; text-transform: uppercase; }
        .card-pro { background: #fff; color: #000; border: 4px solid #facc15; padding: 15px; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .input-pro { width: 100%; border: 2px solid #cbd5e1; padding: 8px; font-weight: 700; background: #f8fafc; font-size: 11px; margin-bottom: 5px; border-radius: 4px; transition: border 0.3s; }
        .input-pro:focus { border-color: #facc15; outline: none; }
        .nav-link { flex: 1; text-align: center; padding: 12px; font-weight: 800; cursor: pointer; border-bottom: 4px solid transparent; transition: 0.3s; font-size: 10px; }
        .nav-link.active { background: #1e293b; border-bottom: 4px solid #facc15; color: #facc15; }
        th { background: #1e293b; color: #facc15; padding: 10px; font-size: 10px; text-align: center; border: 1px solid #334155; }
        td { border: 1px solid #e2e8f0; padding: 8px; font-size: 10px; color: #1e293b; font-weight: 600; text-align: center; }
        .btn-save { background: #facc15; color: #000; padding: 15px; font-weight: 900; width: 100%; border-radius: 6px; box-shadow: 0 4px 0 #ca8a04; transition: transform 0.1s; }
        .btn-save:active { transform: translateY(4px); box-shadow: none; }
        .stat-box { background: #000; border: 1px solid #facc15; padding: 4px; text-align: center; border-radius: 4px; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex bg-slate-900 border-b-2 border-slate-700 sticky top-0 z-50">
    <div onclick="ver(1)" id="t1" class="nav-link active">💎 MATRÍCULA ESTRATÉGICA</div>
    <div onclick="ver(2)" id="t2" class="nav-link">📋 ASISTENCIA Y VISTA RÁPIDA</div>
    <div onclick="ver(3)" id="t3" class="nav-link">📊 MAPA DE SUPERVISIÓN PRO</div>
</nav>

<main class="p-4 max-w-7xl mx-auto">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-2">
                <p class="bg-blue-700 text-white p-2 text-center font-bold rounded italic">ALUMNO/A</p>
                <input id="n" placeholder="NOMBRE COMPLETO" class="input-pro">
                <input id="d" placeholder="DNI" class="input-pro">
                <div class="grid grid-cols-2 gap-2">
                    <input id="f" type="date" class="input-pro" onchange="autoSala(this.value)">
                    <input id="e" placeholder="EDAD AL 30/6" class="input-pro" readonly>
                </div>
                <select id="sala" class="input-pro bg-yellow-50">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA VERDE TM</option><option>SALA VERDE TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option><option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option>
                </select>
                <input id="adom" placeholder="DOMICILIO" class="input-pro">
                <input id="salud" placeholder="OBSERVACIONES SALUD" class="input-pro">
            </div>

            <div class="space-y-2">
                <p class="bg-rose-700 text-white p-2 text-center font-bold rounded italic">MADRE</p>
                <input id="mn" placeholder="APELLIDO Y NOMBRE" class="input-pro">
                <input id="mdni" placeholder="DNI MADRE" class="input-pro">
                <select id="m_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIO COMPLETO</option><option>TERCIARIO INCOMPLETO</option>
                    <option>UNIVERSITARIO COMPLETO</option><option>UNIVERSITARIO INCOMPLETO</option>
                </select>
                <div class="grid grid-cols-2 gap-2">
                    <input id="mtel" placeholder="TELÉFONO" class="input-pro">
                    <select id="auh" class="input-pro bg-blue-50"><option>SÍ AUH</option><option>NO AUH</option></select>
                </div>
                <input id="m_ocu" placeholder="OCUPACIÓN" class="input-pro">
            </div>

            <div class="space-y-2">
                <p class="bg-emerald-700 text-white p-2 text-center font-bold rounded italic">PADRE</p>
                <input id="pn" placeholder="APELLIDO Y NOMBRE" class="input-pro">
                <input id="pdni" placeholder="DNI PADRE" class="input-pro">
                <select id="p_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIO COMPLETO</option><option>TERCIARIO INCOMPLETO</option>
                    <option>UNIVERSITARIO COMPLETO</option><option>UNIVERSITARIO INCOMPLETO</option>
                </select>
                <input id="ptel" placeholder="TELÉFONO" class="input-pro">
                <input id="p_ocu" placeholder="OCUPACIÓN" class="input-pro">
                <button onclick="guardar()" class="btn-save mt-4">💾 GUARDAR Y LIMPIAR PARA SIGUIENTE</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="hidden">
        <div id="asisBar" class="bg-slate-800 p-4 text-center font-bold border-b-2 border-yellow-400 rounded-t-lg"></div>
        <div class="bg-white p-4">
            <select id="filtroSalaAsis" onchange="renderAsis()" class="w-full p-3 border-2 border-black mb-4 font-bold text-black">
                <option value="TODAS">VER TODA LA MATRÍCULA</option>
                <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                <option>SALA VERDE TM</option><option>SALA VERDE TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                <option>SALA AZUL TM</option><option>SALA AZUL TT</option><option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option>
            </select>
            <div id="asisGrid" class="grid grid-cols-2 md:grid-cols-6 gap-3 text-black"></div>
        </div>
    </section>

    <section id="sec3" class="hidden space-y-4">
        <div id="statsGrid" class="grid grid-cols-4 md:grid-cols-8 gap-1"></div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card-pro bg-slate-50 border-blue-200">
                <p class="text-[9px] font-black text-blue-800">📤 EXPORTAR REPORTE OFICIAL</p>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-white w-full p-4 font-bold rounded shadow-lg hover:bg-emerald-700">DESCARGAR EXCEL PROFESIONAL</button>
            </div>
            <div class="card-pro border-red-200">
                <p class="text-[9px] font-black text-red-700">🔄 SEGURIDAD DE DATOS (BACKUP)</p>
                <div class="flex gap-1">
                    <button onclick="descargarJSON()" class="bg-blue-600 text-white p-2 text-[9px] font-bold rounded flex-1">GUARDAR BACKUP</button>
                    <input type="file" onchange="subirJSON(event)" class="text-[8px] flex-1 border">
                </div>
            </div>
            <div class="card-pro border-yellow-500">
                <p class="text-[9px] font-black">⚡ CARGA RÁPIDA (EXCEL)</p>
                <textarea id="masivo" placeholder="PEGAR AQUÍ FILAS DE EXCEL" class="w-full h-12 text-[8px] p-1 border mb-1"></textarea>
                <button onclick="procesarExcel()" class="bg-black text-white w-full p-1 text-[9px] font-bold">CARGAR LISTADO</button>
            </div>
        </div>

        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR APELLIDO, NOMBRE O DNI PARA EDITAR O DAR BAJA..." class="w-full p-4 rounded-lg text-black font-bold border-4 border-slate-900 shadow-inner">

        <div class="bg-white rounded-lg overflow-hidden shadow-2xl">
            <table class="w-full border-collapse">
                <thead><tr><th>ALUMNO / DNI</th><th>SALA</th><th>TELÉFONOS</th><th>ESTADO</th><th>ACCIONES</th></tr></thead>
                <tbody id="cuerpo" class="bg-white"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let db = [];
    let editIdx = null;
    const salasDisp = ["SALA ROSA TM","SALA ROSA TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA CELESTE TM","SALA CELESTE TT","SALA VERDE TM","SALA VERDE TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT","SALA VIOLETA TM","SALA VIOLETA TT"];

    function inicializar() {
        const local = localStorage.getItem('J926_SISTEMA_TOTAL_V3');
        if(local) db = JSON.parse(local);
        actualizarTodo();
    }

    function autoSala(fecha) {
        if(!fecha) return;
        const hoy = new Date("2026-06-30");
        const cumple = new Date(fecha);
        let edad = hoy.getFullYear() - cumple.getFullYear();
        if (hoy.getMonth() < cumple.getMonth() || (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
        
        document.getElementById('e').value = edad + " AÑOS";
        const s = document.getElementById('sala');
        if(edad == 2) s.value = "SALA ROSA TM";
        else if(edad == 3) s.value = "SALA VERDE TM";
        else if(edad == 4) s.value = "SALA NARANJA TM";
        else if(edad == 5) s.value = "SALA AZUL TM";
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
    }

    function guardar() {
        const ids = ['n','d','f','e','sala','adom','salud','mn','mdni','m_est','mtel','auh','m_ocu','pn','pdni','p_est','ptel','p_ocu'];
        const obj = { activo: true, motivoBaja: "", presente: true };
        ids.forEach(id => obj[id] = document.getElementById(id).value.toUpperCase());
        
        if(editIdx !== null) db[editIdx] = obj; else db.push(obj);
        
        ids.forEach(id => { if(!['m_est','p_est','auh','sala','nac'].includes(id)) document.getElementById(id).value = ""; });
        editIdx = null; actualizarTodo(); alert("✅ GUARDADO EXITOSO");
    }

    function toggleBaja(i) {
        if(db[i].activo) {
            const m = prompt("INGRESE MOTIVO DE LA BAJA (Ej: Pase a otro Jardín):");
            if(m) { db[i].activo = false; db[i].motivoBaja = m.toUpperCase(); }
        } else {
            db[i].activo = true; db[i].motivoBaja = "";
        }
        actualizarTodo();
    }

    function editar(i) {
        const a = db[i]; editIdx = i;
        const ids = ['n','d','f','e','sala','adom','salud','mn','mdni','m_est','mtel','auh','m_ocu','pn','pdni','p_est','ptel','p_ocu'];
        ids.forEach(id => document.getElementById(id).value = a[id] || "");
        ver(1);
    }

    function renderTabla() {
        const b = document.getElementById('bus').value.toUpperCase();
        const c = document.getElementById('cuerpo'); c.innerHTML = "";
        db.forEach((a, i) => {
            if(a.n.includes(b) || a.d.includes(b)) {
                c.innerHTML += `<tr>
                    <td>${a.n}<br><span class="text-[8px] text-slate-500">DNI: ${a.d}</span></td>
                    <td>${a.sala}</td>
                    <td>M:${a.mtel}<br>P:${a.ptel}</td>
                    <td><span class="${a.activo ? 'text-green-600' : 'text-red-600'} font-bold">● ${a.activo ? 'ALTA' : 'BAJA'}</span><br><span class="text-[7px]">${a.motivoBaja}</span></td>
                    <td class="flex gap-1 justify-center">
                        <button onclick="editar(${i})" class="bg-blue-600 text-white px-2 py-1 rounded text-[8px] font-bold">VER/EDITAR</button>
                        <button onclick="toggleBaja(${i})" class="bg-slate-900 text-white px-2 py-1 rounded text-[8px] font-bold">${a.activo ? 'BAJA' : 'ALTA'}</button>
                    </td>
                </tr>`;
            }
        });
    }

    function renderStats() {
        const g = document.getElementById('statsGrid'); g.innerHTML = "";
        salasDisp.forEach(s => {
            const cant = db.filter(a => a.sala === s && a.activo).length;
            g.innerHTML += `<div class="stat-box">
                <p class="text-[7px] text-yellow-400">${s.replace("SALA ","")}</p>
                <p class="text-xs font-bold">${cant}</p>
            </div>`;
        });
    }

    function renderAsis() {
        const f = document.getElementById('filtroSalaAsis').value;
        const g = document.getElementById('asisGrid'); g.innerHTML = "";
        let p = 0; let t = 0;
        db.forEach((a, i) => {
            if(a.activo && (f === "TODAS" || a.sala === f)) {
                t++; if(a.presente) p++;
                g.innerHTML += `<div onclick="db[${i}].presente=!db[${i}].presente;actualizarTodo();" 
                    class="p-2 border-2 cursor-pointer rounded text-[8px] font-bold text-center ${a.presente ? 'bg-green-500 text-white border-green-700' : 'bg-red-500 text-white border-red-700'}">
                    ${a.n.split(' ')[0]}<br>${a.sala.replace("SALA ","")}</div>`;
            }
        });
        document.getElementById('asisBar').innerText = `📊 RESUMEN: ${p} PRESENTES DE ${t} ALUMNOS CARGADOS`;
    }

    function actualizarTodo() {
        localStorage.setItem('J926_SISTEMA_TOTAL_V3', JSON.stringify(db));
        renderTabla(); renderStats(); renderAsis();
    }

    function descargarJSON() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="BACKUP_J926_MATRICULA.json"; a.click();
    }

    function subirJSON(e) {
        const r = new FileReader();
        r.onload = (ev) => { db = JSON.parse(ev.target.result); actualizarTodo(); alert("✅ MATRÍCULA RECUPERADA EXITOSAMENTE"); };
        r.readAsText(e.target.files[0]);
    }

    function exportarExcel() {
        let csv = "\ufeffALUMNO;DNI;SALA;EDAD;FECHA NAC;ESTADO;MOTIVO BAJA;DOMICILIO;SALUD;MADRE;DNI M;ESTUDIOS M;TEL M;AUH;OCUPACION M;PADRE;DNI P;ESTUDIOS P;TEL P;OCUPACION P\n";
        db.forEach(a => {
            csv += `${a.n};${a.d};${a.sala};${a.e};${a.f};${a.activo?'ALTA':'BAJA'};${a.motivoBaja};${a.adom};${a.salud};${a.mn};${a.mdni};${a.m_est};${a.mtel};${a.auh};${a.m_ocu};${a.pn};${a.pdni};${a.p_est};${a.ptel};${a.p_ocu}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="MATRICULA_PROFESIONAL_J926.csv"; a.click();
    }

    function procesarExcel() {
        const t = document.getElementById('masivo').value.split('\n');
        t.forEach(f => {
            const c = f.split('\t');
            if(c.length >= 2) db.push({ n: c[0].toUpperCase(), d: c[1], sala: c[2] || "SALA ROSA TM", activo: true, presente: true, motivoBaja: "" });
        });
        actualizarTodo(); alert("✅ LISTADO IMPACTADO");
    }
</script>
</body>
</html>
