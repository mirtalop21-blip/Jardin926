<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V22 | MASTER INSTITUCIONAL J926</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --accent: #facc15; --bg: #0d1117; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; }
        .glass { background: rgba(22, 27, 34, 0.95); border: 1px solid #30363d; border-radius: 12px; }
        .input-titan { background: #010409; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: #f0f6fc; width: 100%; }
        .input-titan:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px rgba(250, 204, 21, 0.1); }
        .tab-active { border-bottom: 4px solid var(--accent); color: var(--accent); font-weight: 900; background: rgba(250,204,21,0.05); }
        .sala-card { transition: 0.3s; cursor: pointer; border-bottom: 8px solid; position: relative; }
        .sala-card:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .color-ROSA { border-color: #ff69b4; } .color-ROJA { border-color: #ef4444; }
        .color-NARANJA { border-color: #f97316; } .color-CELESTE { border-color: #3b82f6; }
        .color-VIOLETA { border-color: #8b5cf6; } .color-AMARILLA { border-color: #eab308; }
        .color-AZUL { border-color: #1e3a8a; }
        .btn-asis { padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .p-active { background: #16a34a; color: white; }
        .a-active { background: #dc2626; color: white; }
    </style>
</head>
<body onload="init()">

<header class="glass rounded-none border-b border-yellow-500/30 p-4 flex justify-between items-center sticky top-0 z-[1000] bg-[#0d1117]">
    <div class="flex items-center gap-4">
        <h1 class="text-yellow-500 font-black text-2xl italic tracking-tighter">TITANIUM V22</h1>
        <div id="reloj" class="text-[10px] font-mono text-emerald-400"></div>
    </div>
    <div class="flex gap-3">
        <button onclick="exportarJson()" class="bg-blue-600 px-4 py-2 rounded font-bold shadow-lg">OMNI BACKUP (.JSON)</button>
    </div>
</header>

<nav class="flex glass rounded-none border-b border-white/5 sticky top-[73px] z-[900] bg-[#0d1117]">
    <button onclick="setTab(1)" id="t1" class="flex-1 p-4 tab-active font-black">LEGAJO 360°</button>
    <button onclick="setTab(2)" id="t2" class="flex-1 p-4 opacity-50 font-black">FOTO INSTITUCIONAL</button>
    <button onclick="setTab(3)" id="t3" class="flex-1 p-4 opacity-50 font-black">LISTA ESPERA (SCAN)</button>
    <button onclick="setTab(4)" id="t4" class="flex-1 p-4 opacity-50 font-black">SUPERVISIÓN EFICIENTE</button>
</nav>

<main class="p-4 space-y-6">
    <section id="s1" class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="glass p-5 border-t-4 border-yellow-500 space-y-4">
            <h3 class="text-yellow-500 font-black flex justify-between">MATRÍCULA <i class="bi bi-upc-scan cursor-pointer" onclick="alert('Escaneo de DNI activado...')"></i></h3>
            <div class="relative"><input id="a_nom" class="input-titan" placeholder="NOMBRE ALUMNO"><i class="bi bi-mic-fill absolute right-3 top-3 text-red-500 cursor-pointer" onclick="dictar('a_nom')"></i></div>
            <div class="flex gap-2">
                <input id="a_dni" class="input-titan" placeholder="DNI">
                <input id="a_nac" class="input-titan" placeholder="NACIONALIDAD" value="ARGENTINA">
            </div>
            <div class="flex gap-2">
                <input id="a_fec" type="date" class="input-titan" onchange="calcEdad(this.value)">
                <input id="a_edad" class="input-titan" readonly placeholder="EDAD 30/6">
            </div>
            <select id="a_sala" class="input-titan font-bold"></select>
            <input id="a_dom" class="input-titan" placeholder="DOMICILIO REAL">
            <button onclick="guardar(false)" class="w-full bg-emerald-600 py-4 rounded font-black text-[11px] shadow-xl hover:bg-emerald-500 transition">GRABAR EN MATRÍCULA</button>
        </div>

        <div class="glass p-5 border-t-4 border-cyan-500 space-y-4">
            <h3 class="text-cyan-500 font-black italic">RELEVAMIENTO FAMILIAR</h3>
            <div class="space-y-2">
                <p class="text-[7px] text-cyan-400">DATOS MATERNOS</p>
                <input id="m_nom" class="input-titan" placeholder="NOMBRE MADRE">
                <input id="m_ocu" class="input-titan" placeholder="OCUPACIÓN (EJ: DESEMPLEADO)">
                <select id="m_edu" class="input-titan"></select>
                <div class="flex gap-2 p-2 bg-white/5 rounded text-[7px] items-center">
                    <input type="checkbox" id="m_auh"> AUH
                    <input type="checkbox" id="m_dom_check" onchange="syncDom('m')"> MISMO DOMICILIO
                </div>
            </div>
            <hr class="opacity-10">
            <div class="space-y-2">
                <p class="text-[7px] text-pink-400">DATOS PATERNOS</p>
                <input id="p_nom" class="input-titan" placeholder="NOMBRE PADRE">
                <input id="p_ocu" class="input-titan" placeholder="OCUPACIÓN">
                <select id="p_edu" class="input-titan"></select>
            </div>
        </div>

        <div class="lg:col-span-2 glass p-5 flex flex-col">
            <input type="text" id="find" onkeyup="buscar()" class="input-titan border-yellow-500 mb-4" placeholder="🔍 BUSCAR POR DNI O APELLIDO...">
            <div id="lista_recientes" class="space-y-2 overflow-y-auto max-h-[400px]"></div>
        </div>
    </section>

    <section id="s2" class="hidden space-y-4">
        <div id="grid-salas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 text-center"></div>
        <div id="panel-asis" class="glass p-6 hidden border-l-8 border-yellow-500">
            <div class="flex justify-between items-center mb-6">
                <h2 id="sala_tit" class="text-3xl font-black italic"></h2>
                <input type="date" id="fecha_asis" class="input-titan w-48" value="2026-04-24">
            </div>
            <div id="lista_asis" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </div>
    </section>

    <section id="s4" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass p-6 text-center border-b-4 border-yellow-500"><p class="opacity-50">MATRÍCULA TOTAL</p><h3 id="m_total" class="text-4xl font-black italic">0</h3></div>
            <div class="glass p-6 text-center border-b-4 border-red-500"><p class="opacity-50">PADRES DESEMPLEADOS</p><h3 id="m_desempleo" class="text-4xl font-black text-red-500">0</h3></div>
            <div class="glass p-6 text-center border-b-4 border-cyan-500"><p class="opacity-50">COBERTURA AUH</p><h3 id="m_auh" class="text-4xl font-black text-cyan-500">0</h3></div>
            <div class="glass p-6 text-center border-b-4 border-purple-500"><p class="opacity-50">NACIONALIDAD EXTRAJERA</p><h3 id="m_ext" class="text-4xl font-black text-purple-500">0</h3></div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="glass p-6"><canvas id="chartLaboral"></canvas></div>
            <div class="glass p-6 text-center">
                <button onclick="exportarExcel()" class="bg-emerald-700 w-full py-10 rounded-xl font-black text-2xl shadow-2xl hover:scale-105 transition">📥 GENERAR EXCEL DE EXCELENCIA DGCE</button>
                <label class="block mt-4 bg-blue-600 p-4 rounded font-black cursor-pointer">IMPORTAR 357 ALUMNOS <input type="file" class="hidden" onchange="importar(event)"></label>
            </div>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('T22_MASTER_DB')) || [];
    let asis = JSON.parse(localStorage.getItem('T22_MASTER_ASIS')) || {};
    const SALAS = ["ROSA","ROJA","NARANJA","CELESTE","VIOLETA","AMARILLA","AZUL"];
    const ESTUDIOS = ["PRIMARIA INCOMPLETA","PRIMARIA COMPLETA","SECUNDARIA INCOMPLETA","SECUNDARIA COMPLETA","TERCIARIA","UNIVERSITARIA"];

    function init() {
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleString(); }, 1000);
        const sel = document.getElementById('a_sala');
        SALAS.forEach(s => { 
            sel.innerHTML += `<option value="${s} TM">${s} TM</option>`;
            sel.innerHTML += `<option value="${s} TT">${s} TT</option>`;
        });
        const m_ed = document.getElementById('m_edu'), p_ed = document.getElementById('p_edu');
        ESTUDIOS.forEach(e => { m_ed.innerHTML += `<option value="${e}">${e}</option>`; p_ed.innerHTML += `<option value="${e}">${e}</option>`; });
        renderRecientes();
    }

    function setTab(n) {
        [1,2,3,4].forEach(i => {
            document.getElementById('s'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('tab-active', i === n);
        });
        if(n === 2) renderSalas();
        if(n === 4) runSupervisor();
    }

    function renderSalas() {
        const grid = document.getElementById('grid-salas'); grid.innerHTML = "";
        ["TM","TT"].forEach(turno => {
            SALAS.forEach(s => {
                const nom = `${s} ${turno}`, cant = db.filter(x => x.al.sala === nom).length;
                grid.innerHTML += `<div class="glass p-4 sala-card color-${s}" onclick="abrirSala('${nom}')">
                    <p class="text-[7px] opacity-40">${turno}</p><h4 class="font-black">${s}</h4>
                    <div class="text-2xl font-black mt-1">${cant}</div></div>`;
            });
        });
    }

    function abrirSala(nom) {
        document.getElementById('panel-asis').classList.remove('hidden');
        document.getElementById('sala_tit').innerText = "SALA: " + nom;
        const filtrados = db.filter(x => x.al.sala === nom);
        document.getElementById('lista_asis').innerHTML = filtrados.map(a => `
            <div class="glass p-3 flex justify-between items-center">
                <span>${a.al.nom}</span>
                <div class="flex gap-2">
                    <button class="btn-asis bg-white/10" onclick="marcar('${a.id}','P',this)">P</button>
                    <button class="btn-asis bg-white/10" onclick="marcar('${a.id}','A',this)">A</button>
                </div>
            </div>
        `).join('');
    }

    function runSupervisor() {
        document.getElementById('m_total').innerText = db.length;
        const desempleados = db.filter(x => x.ma.ocu.includes("DESEMPLEADO") || x.pa.ocu.includes("DESEMPLEADO")).length;
        document.getElementById('m_desempleo').innerText = desempleados;
        document.getElementById('m_auh').innerText = db.filter(x => x.ma.auh).length;
        document.getElementById('m_ext').innerText = db.filter(x => x.al.nac !== "ARGENTINA").length;
        
        const ctx = document.getElementById('chartLaboral').getContext('2d');
        new Chart(ctx, { type: 'bar', data: { labels: ['Matrícula', 'Desempleo', 'AUH'], datasets: [{ label: 'Estadística DGCE', data: [db.length, desempleados, db.filter(x=>x.ma.auh).length], backgroundColor: ['#facc15','#ef4444','#3b82f6'] }] }});
    }

    function guardar(isWait) {
        const item = {
            id: Date.now(),
            al: { nom: v('a_nom'), dni: v('a_dni'), nac: v('a_nac'), sala: v('a_sala'), dom: v('a_dom') },
            ma: { ocu: v('m_nom') + " - " + v('m_ocu'), auh: document.getElementById('m_auh').checked },
            pa: { ocu: v('p_nom') + " - " + v('p_ocu') }
        };
        db.push(item); save(); location.reload();
    }

    function v(id) { return document.getElementById(id).value.toUpperCase(); }
    function save() { localStorage.setItem('T22_MASTER_DB', JSON.stringify(db)); }
    function dictar(id) {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang='es-AR'; r.onresult=(e)=>{ document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); }; r.start();
    }
    function importar(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { db = JSON.parse(ev.target.result); save(); location.reload(); };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
