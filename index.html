<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DIAMANTE J926 - GESTIÓN 14 SALAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #0f172a; color: #fff; }
        .card-pro { background: white; color: #000; border: 6px solid #000; box-shadow: 10px 10px 0px #facc15; padding: 20px; }
        .input-master { width: 100%; border: 2px solid #000; padding: 6px; font-weight: 900; background: #fff; font-size: 11px; margin-bottom: 3px; }
        .nav-tab { flex: 1; text-align: center; padding: 12px; font-weight: 900; cursor: pointer; border: 1px solid #fff; }
        .nav-tab.active { background: #facc15; color: #000; border-bottom: 6px solid #000; }
        .btn-mic { background: #ef4444; color: white; border: 2px solid #000; padding: 2px 6px; font-size: 11px; }
        th { background: #000; color: #fff; padding: 8px; font-size: 10px; }
        td { border: 1px solid #000; padding: 4px; font-size: 10px; font-weight: 900; }
        .presente { background: #4ade80 !important; border: 3px solid #166534 !important; }
        .ausente { background: #f87171 !important; border: 3px solid #991b1b !important; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-4 border-yellow-400">
    <div onclick="ver(1)" id="t1" class="nav-tab active">1. CARGA COMPLETA 🎤</div>
    <div onclick="ver(2)" id="t2" class="nav-tab bg-emerald-700">2. ASISTENCIA RÁPIDA 📋</div>
    <div onclick="ver(3)" id="t3" class="nav-tab bg-blue-700">3. SUPERVISIÓN / EXCEL 📊</div>
</nav>

<main class="p-4">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="border-r-2 border-black pr-4">
                <p class="bg-blue-800 text-white p-1 text-center text-xs mb-2">DATOS ALUMNO/A</p>
                <label class="text-[9px]">NOMBRE</label><div class="flex gap-1"><input id="n" class="input-master"><button onclick="voz('n')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-1">
                    <div><label class="text-[9px]">DNI</label><input id="d" class="input-master"></div>
                    <div><label class="text-[9px]">NACIONALIDAD</label><input id="nac" value="ARGENTINA" class="input-master"></div>
                </div>
                <label class="text-[9px]">SALA (14 DISPONIBLES)</label>
                <select id="sala" class="input-master bg-yellow-50">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option>
                    <option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option>
                    <option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA VERDE TM</option><option>SALA VERDE TT</option>
                    <option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
                </select>
                <label class="text-[9px]">DOMICILIO</label><div class="flex gap-1"><input id="dom" class="input-master"><button onclick="voz('dom')" class="btn-mic">🎤</button></div>
                <label class="text-[9px]">SALUD / ALERGIAS</label><div class="flex gap-1"><input id="salud" class="input-master"><button onclick="voz('salud')" class="btn-mic">🎤</button></div>
            </div>

            <div class="border-r-2 border-black pr-4">
                <p class="bg-rose-700 text-white p-1 text-center text-xs mb-2">DATOS MADRE</p>
                <label class="text-[9px]">NOMBRE</label><div class="flex gap-1"><input id="mn" class="input-master"><button onclick="voz('mn')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-1">
                    <div><label class="text-[9px]">DNI</label><input id="mdni" class="input-master"></div>
                    <div><label class="text-[9px]">AUH</label><select id="auh" class="input-master bg-blue-50"><option>SÍ</option><option>NO</option></select></div>
                </div>
                <label class="text-[9px]">OCUPACIÓN</label><div class="flex gap-1"><input id="m_ocu" class="input-master"><button onclick="voz('m_ocu')" class="btn-mic">🎤</button></div>
                <label class="text-[9px]">TELÉFONO</label><div class="flex gap-1"><input id="mtel" class="input-master"><button onclick="voz('mtel')" class="btn-mic">🎤</button></div>
            </div>

            <div>
                <p class="bg-emerald-800 text-white p-1 text-center text-xs mb-2">DATOS PADRE</p>
                <label class="text-[9px]">NOMBRE</label><div class="flex gap-1"><input id="pn" class="input-master"><button onclick="voz('pn')" class="btn-mic">🎤</button></div>
                <label class="text-[9px]">DNI PADRE</label><input id="pdni" class="input-master">
                <label class="text-[9px]">OCUPACIÓN</label><div class="flex gap-1"><input id="p_ocu" class="input-master"><button onclick="voz('p_ocu')" class="btn-mic">🎤</button></div>
                <label class="text-[9px]">TELÉFONO</label><div class="flex gap-1"><input id="ptel" class="input-master"><button onclick="voz('ptel')" class="btn-mic">🎤</button></div>
                <button onclick="vistaPrevia()" class="w-full mt-4 bg-yellow-400 p-4 border-4 border-black font-black text-lg shadow-[5px_5px_0px_#000]">💾 GUARDAR LEGAJO</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="card-pro hidden">
        <div id="statsAsistencia" class="bg-black text-yellow-400 p-2 text-center font-black mb-4"></div>
        <div id="grillaAsistencia" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2"></div>
    </section>

    <section id="sec3" class="card-pro hidden">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div class="bg-black text-white p-4 text-center border-4 border-yellow-400">
                <p class="text-xs">MATRÍCULA TOTAL</p>
                <p id="totalLabel" class="text-5xl font-black">0</p>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="exportarExcel()" class="bg-green-700 text-white p-3 border-2 border-black font-black text-xs">📊 EXCEL OFICIAL</button>
                <button onclick="descargarRespaldo()" class="bg-blue-700 text-white p-3 border-2 border-black font-black text-xs">💾 GENERAR RESPALDO</button>
            </div>
            <div class="bg-slate-100 p-2 border-2 border-black">
                <p class="text-[9px] font-bold">IMPORTAR DATOS:</p>
                <input type="file" onchange="importarRespaldo(event)" class="text-[9px]">
            </div>
        </div>

        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR DNI O APELLIDO..." class="w-full p-3 border-4 border-black mb-4 text-lg font-black">
        
        <div class="overflow-x-auto max-h-[500px]">
            <table class="w-full">
                <thead><tr><th>ALUMNO / DNI</th><th>SALA</th><th>TELÉFONOS</th><th>AUH</th><th>ACCIONES</th></tr></thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="modalRev" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white border-[8px] border-black p-6 w-full max-w-4xl">
        <h2 class="text-2xl font-black mb-4 underline">VERIFICAR DATOS</h2>
        <div id="contRev" class="grid grid-cols-1 md:grid-cols-3 gap-4 text-[10px] font-bold"></div>
        <div class="flex gap-4 mt-6">
            <button onclick="cerrarModal()" class="flex-1 bg-gray-500 text-white p-3 font-black border-2 border-black">CORREGIR</button>
            <button onclick="confirmarGuardado()" class="flex-1 bg-green-600 text-white p-3 font-black border-2 border-black">CONFIRMAR Y GUARDAR</button>
        </div>
    </div>
</div>

<script>
    let db = [];
    let editIdx = null;

    function inicializar() {
        const data = localStorage.getItem('J926_MASTER_PRO_V16');
        if (data) db = JSON.parse(data);
        renderTabla();
        renderAsistencia();
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
    }

    function voz(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR';
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.start();
    }

    function vistaPrevia() {
        const c = document.getElementById('contRev');
        c.innerHTML = `
            <div>ALUMNO: ${document.getElementById('n').value}<br>DNI: ${document.getElementById('d').value}</div>
            <div>SALA: ${document.getElementById('sala').value}<br>AUH: ${document.getElementById('auh').value}</div>
            <div>MADRE: ${document.getElementById('mn').value}<br>PADRE: ${document.getElementById('pn').value}</div>
        `;
        document.getElementById('modalRev').classList.remove('hidden');
    }

    function confirmarGuardado() {
        const fields = ['n','d','nac','sala','dom','salud','mn','mdni','auh','m_ocu','mtel','pn','pdni','p_ocu','ptel'];
        const obj = { presente: true };
        fields.forEach(f => obj[f] = document.getElementById(f).value.toUpperCase());

        if(editIdx !== null) db[editIdx] = obj;
        else db.push(obj);

        localStorage.setItem('J926_MASTER_PRO_V16', JSON.stringify(db));
        editIdx = null; cerrarModal(); renderTabla(); renderAsistencia();
        alert("GUARDADO");
    }

    function editar(i) {
        const a = db[i]; editIdx = i;
        const fields = ['n','d','nac','sala','dom','salud','mn','mdni','auh','m_ocu','mtel','pn','pdni','p_ocu','ptel'];
        fields.forEach(f => document.getElementById(f).value = a[f]);
        ver(1);
    }

    function renderTabla() {
        const bus = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('cuerpo'); t.innerHTML = "";
        db.forEach((a, i) => {
            if(a.n.includes(bus) || a.d.includes(bus)) {
                t.innerHTML += `<tr>
                    <td>${a.n}<br><small>${a.d}</small></td>
                    <td>${a.s || a.sala}</td>
                    <td>M: ${a.mtel}<br>P: ${a.ptel}</td>
                    <td>${a.auh}</td>
                    <td><button onclick="editar(${i})" class="bg-yellow-400 p-1 border border-black font-black w-full">EDITAR</button></td>
                </tr>`;
            }
        });
        document.getElementById('totalLabel').innerText = db.length;
    }

    function renderAsistencia() {
        const g = document.getElementById('grillaAsistencia'); g.innerHTML = "";
        let pres = 0;
        db.forEach((a, i) => {
            if(a.presente) pres++;
            g.innerHTML += `<div onclick="togglePres(${i})" class="p-2 border-2 font-black cursor-pointer text-center text-[9px] ${a.presente ? 'presente' : 'ausente'}">
                ${a.n.split(' ')[0]}<br>${a.presente ? 'P' : 'A'}
            </div>`;
        });
        document.getElementById('statsAsistencia').innerText = `PRESENTES: ${pres} / TOTAL: ${db.length}`;
    }

    function togglePres(i) {
        db[i].presente = !db[i].presente;
        localStorage.setItem('J926_MASTER_PRO_V16', JSON.stringify(db));
        renderAsistencia();
    }

    function exportarExcel() {
        let csv = "ALUMNO;DNI;SALA;DOMICILIO;SALUD;MADRE;DNI_M;AUH;TEL_M;PADRE;DNI_P;TEL_P\n";
        db.forEach(a => csv += `${a.n};${a.d};${a.sala};${a.dom};${a.salud};${a.mn};${a.mdni};${a.auh};${a.mtel};${a.pn};${a.pdni};${a.ptel}\n`);
        const b = new Blob(["\ufeff" + csv], {type: 'text/csv;charset=utf-8;'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'MATRICULA_OFICIAL_J926.csv'; a.click();
    }

    function descargarRespaldo() {
        const b = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'RESPALDO_J926.json'; a.click();
    }

    function importarRespaldo(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem('J926_MASTER_PRO_V16', JSON.stringify(db));
            renderTabla(); renderAsistencia(); alert("IMPORTADO");
        };
        reader.readAsText(e.target.files[0]);
    }

    function cerrarModal() { document.getElementById('modalRev').classList.add('hidden'); }
</script>
</body>
</html>
