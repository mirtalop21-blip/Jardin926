                <input id="m_nom" class="input-bionic" placeholder="NOMBRE COMPLETO">
                <input id="m_tel" class="input-bionic" placeholder="TELÉFONO">
                <input id="m_ocu" class="input-bionic" placeholder="TRABAJO / ACTIVIDAD">
                <select id="m_edu" class="input-bionic"></select>
            </div>

            <div class="glass p-4 border-t-4 border-pink-500 space-y-2">
                <h3 class="text-pink-500 font-black text-[9px] italic">PADRE / TUTOR</h3>
                <input id="p_nom" class="input-bionic" placeholder="NOMBRE COMPLETO">
                <input id="p_tel" class="input-bionic" placeholder="TELÉFONO">
                <input id="p_ocu" class="input-bionic" placeholder="TRABAJO / ACTIVIDAD">
                <select id="p_edu" class="input-bionic"></select>
            </div>
        </div>
        <button onclick="guardarLegajo()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-lg italic hover:bg-emerald-500 transition shadow-[0_0_20px_rgba(16,185,129,0.2)]">GRABAR E IMPACTAR MATRÍCULA MASTER</button>
    </section>

    <section id="s2" class="hidden space-y-6">
        <div id="grid-salas-asis" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3"></div>
        <div id="panel-lista" class="glass p-6 hidden">
            <h3 id="sala_activa_tit" class="text-xl font-black italic text-yellow-500 mb-4"></h3>
            <div id="lista-alumnos" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
        </div>
    </section>

    <section id="s3" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 border-b-4 border-yellow-500 text-center">
                <p class="text-[9px] opacity-50">MATRÍCULA TOTAL</p>
                <h3 id="m_total" class="text-5xl font-black italic">0</h3>
            </div>
            <div class="glass p-6 border-b-4 border-blue-500 text-center">
                <p class="text-[9px] opacity-50">ALUMNOS CON CUD</p>
                <h3 id="m_cud" class="text-5xl font-black italic">0</h3>
            </div>
            <div class="glass p-6 border-b-4 border-purple-500 text-center">
                <p class="text-[9px] opacity-50">PROMEDIO ASISTENCIA</p>
                <h3 id="m_prom" class="text-5xl font-black italic text-yellow-500">0%</h3>
            </div>
        </div>
        <div class="glass p-8 min-h-[400px]">
            <canvas id="chartMaster"></canvas>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('TITANIUM_DB')) || [];
    let streamActual = null;
    let fotoActual = "";

    const SALAS = ["ROSA","ROJA","NARANJA","CELESTE","VIOLETA","AMARILLA","AZUL"];
    const NIVELES = ["PRIMARIA INCOMP.", "PRIMARIA COMP.", "SECUNDARIA INCOMP.", "SECUNDARIA COMP.", "TERCIARIO", "UNIVERSITARIO"];

    function initSystem() {
        const sSala = document.getElementById('a_sala');
        SALAS.forEach(s => {
            sSala.innerHTML += `<option value="${s} TM">${s} TM</option><option value="${s} TT">${s} TT</option>`;
        });
        const mEd = document.getElementById('m_edu'), pEd = document.getElementById('p_edu');
        NIVELES.forEach(n => {
            const opt = `<option value="${n}">${n}</option>`;
            mEd.innerHTML += opt; pEd.innerHTML += opt;
        });
    }

    // --- MOTOR DE BUSQUEDA RADAR ---
    function radarSearch() {
        const q = document.getElementById('global_search').value.toUpperCase();
        const res = document.getElementById('search-results');
        if(q.length < 2) { res.classList.add('hidden'); return; }
        
        const filtered = db.filter(a => a.al.nom.includes(q) || a.al.dni.includes(q));
        res.innerHTML = filtered.map(a => `
            <div class="p-3 border-b border-white/5 hover:bg-yellow-500/10 cursor-pointer" onclick="cargarLegajo(${a.id})">
                <div class="flex justify-between items-center">
                    <span class="font-black text-[10px]">${a.al.nom}</span>
                    <span class="bg-yellow-500 text-black px-2 py-0.5 rounded text-[8px] font-bold">${a.al.sala}</span>
                </div>
            </div>
        `).join('');
        res.classList.remove('hidden');
    }

    function cargarLegajo(id) {
        const a = db.find(x => x.id === id);
        if(!a) return;
        document.getElementById('a_nom').value = a.al.nom;
        document.getElementById('a_dni').value = a.al.dni;
        document.getElementById('a_dom').value = a.al.dom || '';
        document.getElementById('a_sala').value = a.al.sala;
        document.getElementById('m_nom').value = a.ma.nom;
        document.getElementById('m_tel').value = a.ma.tel;
        document.getElementById('p_nom').value = a.pa.nom;
        document.getElementById('foto_preview').src = a.foto || '';
        if(a.foto) {
            document.getElementById('foto_preview').classList.remove('hidden');
            document.getElementById('cam_icon').classList.add('hidden');
        }
        document.getElementById('search-results').classList.add('hidden');
        setTab(1);
    }

    // --- GESTIÓN DE DATOS MASTER ---
    async function importarBackups(e) {
        const files = e.target.files;
        let count = 0;
        for (let file of files) {
            const text = await file.text();
            const data = JSON.parse(text);
            data.forEach(item => {
                if(!db.some(x => x.al.dni === item.al.dni)) {
                    db.push(item);
                    count++;
                }
            });
        }
        localStorage.setItem('TITANIUM_DB', JSON.stringify(db));
        alert(`SISTEMA SINCRONIZADO: ${count} nuevos registros integrados.`);
        location.reload();
    }

    function guardarLegajo() {
        const dni = document.getElementById('a_dni').value;
        const exists = db.findIndex(x => x.al.dni === dni);
        
        const data = {
            id: exists >= 0 ? db[exists].id : Date.now(),
            al: { nom: v('a_nom'), dni: dni, dom: v('a_dom'), sala: v('a_sala'), fec: v('a_fec') },
            ma: { nom: v('m_nom'), tel: v('m_tel'), ocu: v('m_ocu'), edu: v('m_edu') },
            pa: { nom: v('p_nom'), tel: v('p_tel'), ocu: v('p_ocu'), edu: v('p_edu') },
            foto: fotoActual
        };

        if(exists >= 0) db[exists] = data; else db.push(data);
        localStorage.setItem('TITANIUM_DB', JSON.stringify(db));
        alert("BASE DE DATOS ACTUALIZADA");
        location.reload();
    }

    function descargarDataMaster() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "MASTER_MATRICULA_357.json");
        dl.click();
    }

    // --- UI & TAB MANAGEMENT ---
    function setTab(n) {
        [1,2,3].forEach(i => {
            document.getElementById('s'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('tab-active', i === n);
            document.getElementById('t'+i).style.opacity = (i === n) ? "1" : "0.5";
        });
        if(n === 2) renderSalasAsis();
        if(n === 3) runAnalysis();
    }

    function renderSalasAsis() {
        const grid = document.getElementById('grid-salas-asis');
        grid.innerHTML = "";
        ["TM", "TT"].forEach(turno => {
            SALAS.forEach(color => {
                const salaNom = `${color} ${turno}`;
                const cant = db.filter(x => x.al.sala === salaNom).length;
                grid.innerHTML += `
                    <div class="glass p-4 color-${color} cursor-pointer hover:bg-yellow-500/5" onclick="abrirLista('${salaNom}')">
                        <p class="text-[7px] opacity-50 font-black">${turno}</p>
                        <p class="font-black text-[10px] text-yellow-500">${color}</p>
                        <p class="text-xl font-black">${cant}</p>
                    </div>`;
            });
        });
    }

    function runAnalysis() {
        document.getElementById('m_total').innerText = db.length;
        // Gráficos biónicos aquí
    }

    // --- CAMARA ---
    async function iniciarCamara() {
        streamActual = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('video_legajo').srcObject = streamActual;
        document.getElementById('video_legajo').classList.remove('hidden');
        document.getElementById('cam_icon').classList.add('hidden');
    }

    function capturarFoto() {
        const canvas = document.createElement('canvas');
        const video = document.getElementById('video_legajo');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        fotoActual = canvas.toDataURL('image/jpeg');
        document.getElementById('foto_preview').src = fotoActual;
        document.getElementById('foto_preview').classList.remove('hidden');
        video.classList.add('hidden');
        if(streamActual) streamActual.getTracks().forEach(t => t.stop());
    }

    function v(id) { return document.getElementById(id).value.toUpperCase(); }
</script>
</body>
</html>
