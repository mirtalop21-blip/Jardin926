 type="number" id="fnEdad" placeholder="Edad" class="w-full p-4 rounded-2xl border border-slate-200 outline-none font-bold">
                </div>
                <div class="md:col-span-2 relative">
                    <input type="text" id="fnDomi" placeholder="Domicilio Real" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 ring-indigo-500 font-bold pr-12">
                    <button onclick="startVoiceDictation('fnDomi')" class="absolute right-4 top-4 text-slate-300 hover:text-red-500 transition-colors"><i class="fas fa-microphone"></i></button>
                </div>

                <div class="md:col-span-2 text-[10px] font-black text-indigo-500 uppercase border-b border-indigo-100 pb-2 mt-4">Responsables Adultos</div>
                <input type="text" id="fnPadre" placeholder="Tutor 1 (Nombre)" class="w-full p-4 rounded-2xl border border-slate-200 font-bold">
                <input type="text" id="fnPadreTel" placeholder="WhatsApp 1 (549...)" class="w-full p-4 rounded-2xl border border-slate-200 font-bold">
                <input type="text" id="fnMadre" placeholder="Tutor 2 (Nombre)" class="w-full p-4 rounded-2xl border border-slate-200 font-bold">
                <input type="text" id="fnMadreTel" placeholder="WhatsApp 2 (549...)" class="w-full p-4 rounded-2xl border border-slate-200 font-bold">
            </div>
            <div class="p-8 bg-white flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-50 rounded-2xl transition-all">DESCARTAR</button>
                <button onclick="processAlumno()" class="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-black tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700">GRABAR FICHA</button>
            </div>
        </div>
    </div>

    <script>
        // CORE DEL SISTEMA - J926 V3
        let DB = JSON.parse(localStorage.getItem('J926_SGE_CORE_V3')) || {
            config: { dire: "", secre: "" },
            salas: { "Rosa TM": [], "Rosa TT": [], "Roja TM": [], "Roja TT": [], "Naranja TM": [], "Naranja TT": [], "Celeste TM": [], "Celeste TT": [], "Violeta TM": [], "Violeta TT": [], "Amarilla TM": [], "Amarilla TT": [], "Azul TM": [], "Azul TT": [] },
            asistencia: {}
        };
        let salaActual = "Rosa TM";
        let chart;

        // DICTADO POR VOZ PRO
        function startVoiceDictation(id) {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return alert("Dictado no soportado.");
            const reco = new Speech();
            reco.lang = 'es-AR';
            const btn = event.currentTarget;
            btn.classList.add('mic-active');
            reco.onresult = (e) => {
                document.getElementById(id).value = e.results[0][0].transcript.toUpperCase();
                btn.classList.remove('mic-active');
            };
            reco.onerror = () => btn.classList.remove('mic-active');
            reco.start();
        }

        // GESTIÓN DE SALAS
        function cambiarSala() {
            salaActual = document.getElementById('salaActiva').value;
            document.querySelectorAll('.sala-display').forEach(e => e.innerText = salaActual);
            updateDashboard(); renderMatricula(); loadAsistencia();
        }

        // TABS
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            const titles = { dashboard: "Dashboard Institucional", matricula: "Control de Matrícula", asistencia: "Libro de Asistencia", config: "Ajustes de Red" };
            document.getElementById('mainTitle').innerText = titles[id];
            if(id === 'dashboard') updateDashboard();
        }

        // OPERACIONES DE MATRÍCULA
        function openModal() { document.getElementById('regModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('regModal').classList.add('hidden'); }

        function processAlumno() {
            const alumno = {
                id: Date.now(),
                nombre: document.getElementById('fnNombre').value.trim(),
                dni: document.getElementById('fnDni').value.trim(),
                nac: document.getElementById('fnNac').value,
                edad: document.getElementById('fnEdad').value,
                domi: document.getElementById('fnDomi').value,
                p1: document.getElementById('fnPadre').value, t1: document.getElementById('fnPadreTel').value,
                p2: document.getElementById('fnMadre').value, t2: document.getElementById('fnMadreTel').value,
                status: 'ALTA', faltas: 0, fechaAlta: new Date().toLocaleDateString()
            };

            if(!alumno.nombre || !alumno.dni) return alert("Nombre y DNI son campos obligatorios.");
            
            // Verificación de duplicados
            if(DB.salas[salaActual].some(a => a.dni === alumno.dni)) return alert("Error: Este DNI ya está registrado en esta sala.");

            DB.salas[salaActual].push(alumno);
            saveData(); closeModal(); renderMatricula();
            ['fnNombre','fnDni','fnNac','fnEdad','fnDomi','fnPadre','fnPadreTel','fnMadre','fnMadreTel'].forEach(i => document.getElementById(i).value = "");
        }

        function renderMatricula() {
            const list = document.getElementById('matriculaList');
            list.innerHTML = DB.salas[salaActual].map((a, i) => `
                <tr class="${a.status === 'BAJA' ? 'bg-red-50 text-slate-400' : 'hover:bg-slate-50 transition-colors'}">
                    <td class="p-5 font-bold"><span class="text-indigo-400 mr-2">#${i+1}</span> ${a.nombre}</td>
                    <td class="p-5 text-xs font-bold">${a.dni}<br><span class="text-[9px] text-slate-400 font-normal italic">${a.nac}</span></td>
                    <td class="p-5 text-[10px] font-bold">📍 ${a.domi}<br><span class="text-indigo-500">Tutor: ${a.p1} (${a.t1})</span></td>
                    <td class="p-5 text-center"><span class="px-3 py-1 rounded-full text-[9px] font-black ${a.status === 'ALTA' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}">${a.status}</span></td>
                    <td class="p-5 text-center">
                        ${a.status === 'ALTA' ? `<button onclick="confirmBaja(${i})" class="text-red-400 hover:text-red-600"><i class="fas fa-user-minus"></i></button>` : '<i class="fas fa-lock text-slate-300"></i>'}
                    </td>
                </tr>
            `).join('');
        }

        function confirmBaja(idx) {
            const mot = prompt("Indique motivo de la baja institucional:");
            if(mot) {
                DB.salas[salaActual][idx].status = 'BAJA';
                DB.salas[salaActual][idx].motivoBaja = mot;
                notifyAdmin(`🚨 ALERTA BAJA: Alumno ${DB.salas[salaActual][idx].nombre} - Sala ${salaActual}.`);
                saveData(); renderMatricula();
            }
        }

        // GESTIÓN ASISTENCIA
        function loadAsistencia() {
            const date = document.getElementById('asistenciaDate').value;
            const list = document.getElementById('asistenciaList');
            if(!date) { list.innerHTML = '<tr><td colspan="4" class="p-20 text-center text-slate-300 italic">Seleccione fecha de apertura del libro...</td></tr>'; return; }
            
            const activos = DB.salas[salaActual].filter(a => a.status === 'ALTA');
            const key = `${salaActual}_${date}`;
            const hoy = DB.asistencia[key] || {};

            list.innerHTML = activos.map(a => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-5 font-black text-slate-700 uppercase text-xs">${a.nombre}</td>
                    <td class="p-5 text-center"><input type="radio" name="as_${a.id}" value="P" class="w-5 h-5 accent-green-600" ${hoy[a.id] === 'P' ? 'checked' : ''}></td>
                    <td class="p-5 text-center"><input type="radio" name="as_${a.id}" value="A" class="w-5 h-5 accent-red-600" ${hoy[a.id] === 'A' ? 'checked' : ''}></td>
                    <td class="p-5 text-center font-black ${a.faltas >= 10 ? 'text-red-600 animate-pulse' : 'text-slate-300'}">${a.faltas}</td>
                </tr>
            `).join('');
        }

        function saveAsistencia() {
            const date = document.getElementById('asistenciaDate').value;
            if(!date) return alert("Debe seleccionar una fecha.");
            const key = `${salaActual}_${date}`;
            const regs = {};
            DB.salas[salaActual].forEach(a => {
                if(a.status === 'ALTA') {
                    const v = document.querySelector(`input[name="as_${a.id}"]:checked`)?.value;
                    if(v) {
                        regs[a.id] = v;
                        if(v === 'A') {
                            a.faltas++;
                            if(a.faltas === 10) notifyFamily(a);
                        }
                    }
                }
            });
            DB.asistencia[key] = regs;
            saveData(); alert("Libro de asistencia actualizado y guardado."); loadAsistencia();
        }

        // UTILIDADES Y EXPORTACIÓN
        function exportToExcel() {
            const data = DB.salas[salaActual].map((a, i) => ({
                Folio: i+1, Apellido_Nombre: a.nombre, DNI: a.dni, Nacimiento: a.nac, Edad: a.edad,
                Domicilio: a.domi, Tutor1: a.p1, Tel1: a.t1, Tutor2: a.p2, Tel2: a.t2,
                Fecha_Alta: a.fechaAlta, Estado: a.status, Inasistencias: a.faltas
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "MATRICULA");
            XLSX.writeFile(wb, `J926_MATRICULA_${salaActual.replace(" ", "_")}.xlsx`);
        }

        function notifyFamily(a) {
            const m = `Jardín 926: El alumno ${a.nombre} alcanzó 10 inasistencias. Solicitamos comunicación con sala ${salaActual}.`;
            if(a.t1) window.open(`https://wa.me/${a.t1}?text=${encodeURIComponent(m)}`, '_blank');
        }

        function notifyAdmin(m) {
            if(DB.config.dire) window.open(`https://wa.me/${DB.config.dire}?text=${encodeURIComponent(m)}`, '_blank');
        }

        function saveGlobalConfig() {
            DB.config.dire = document.getElementById('cfgDire').value;
            DB.config.secre = document.getElementById('cfgSecre').value;
            saveData(); alert("Configuración guardada.");
        }

        function updateDashboard() {
            const s = DB.salas[salaActual];
            const ini = s.length;
            const act = s.filter(a => a.status === 'ALTA').length;
            const baj = s.filter(a => a.status === 'BAJA').length;
            document.getElementById('stat-inicial').innerText = ini;
            document.getElementById('stat-actual').innerText = act;
            document.getElementById('stat-bajas').innerText = baj;

            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['INICIAL', 'MATRÍCULA ACTIVA', 'BAJAS'],
                    datasets: [{
                        label: 'Cant. Alumnos',
                        data: [ini, act, baj],
                        backgroundColor: ['#6366f1', '#10b981', '#ef4444'],
                        borderRadius: 15
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function saveData() { localStorage.setItem('J926_SGE_CORE_V3', JSON.stringify(DB)); }

        window.onload = () => {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('cfgDire').value = DB.config.dire;
            document.getElementById('cfgSecre').value = DB.config.secre;
            cambiarSala();
        };
    </script>
</body>
</html>
