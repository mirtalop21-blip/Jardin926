<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V23 | SUPERVISIÓN TOTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --nuclear: #dfff00; --alert: #ff003c; --bionic-blue: #00d4ff; }
        body { background: #010409; color: #f0f6fc; font-family: 'Orbitron', sans-serif; font-size: 10px; text-transform: uppercase; overflow-x: hidden; }
        .glass-panel { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(223, 255, 0, 0.2); border-radius: 20px; }
        .input-bionic { background: rgba(0,0,0,0.5); border: 1px solid #30363d; padding: 10px; border-radius: 8px; color: var(--nuclear); width: 100%; font-weight: bold; transition: 0.3s; border-left: 3px solid transparent; }
        .input-bionic:focus { border-left-color: var(--nuclear); outline: none; background: rgba(223, 255, 0, 0.05); }
        .sala-card { cursor: pointer; transition: 0.4s; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .sala-card:hover { transform: translateY(-5px); border-color: var(--nuclear); box-shadow: 0 0 20px rgba(223, 255, 0, 0.2); }
        .tab-active { border-bottom: 4px solid var(--nuclear); color: var(--nuclear); background: rgba(223, 255, 0, 0.1); }
        .scan-line { width: 100%; height: 2px; background: var(--nuclear); position: absolute; animation: move-scan 2s infinite; z-index: 10; }
        @keyframes move-scan { 0% { top: 0; } 100% { top: 100%; } }
        .stats-badge { background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; font-size: 8px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body onload="initSystem()">

<header class="h-20 glass-panel m-4 flex justify-between items-center px-10 sticky top-0 z-[1000] border-b border-nuclear/30">
    <div class="flex items-center gap-6">
        <div class="bg-nuclear text-black px-4 py-1 rounded font-black italic shadow-[0_0_20px_rgba(223,255,0,0.5)] text-xs">V23 SATELITAL</div>
        <h1 class="text-xl font-black tracking-tighter">ARCHITECT <span class="text-nuclear">SUPREMO</span></h1>
    </div>
    <div class="flex gap-3">
        <label class="bg-blue-600 px-4 py-2 rounded-lg font-black italic cursor-pointer hover:bg-blue-400 transition text-[9px] flex items-center">
            <i class="bi bi-upload mr-2"></i> IMPORTAR EXCEL/JSON
            <input type="file" id="importFile" class="hidden" onchange="importData(this)">
        </label>
        <button onclick="exportToExcel()" class="bg-emerald-600 px-4 py-2 rounded-lg font-black italic text-[9px]"><i class="bi bi-file-earmark-excel mr-1"></i> EXCEL</button>
        <button onclick="downloadJSON()" class="bg-slate-700 px-4 py-2 rounded-lg font-black italic text-[9px]"><i class="bi bi-database-fill-down mr-1"></i> BACKUP</button>
    </div>
</header>

<main class="p-4 space-y-6">
    <nav class="flex gap-2 overflow-x-auto pb-2 border-b border-white/10 no-scrollbar">
        <button onclick="nav(1)" id="n1" class="px-8 py-4 tab-active font-black">CENTRAL DE CARGA</button>
        <button onclick="nav(2)" id="n2" class="px-8 py-4 opacity-50 font-black">RADIOGRAFÍA DE SALAS (14)</button>
        <button onclick="nav(3)" id="n3" class="px-8 py-4 opacity-50 font-black text-blue-400">ESCÁNER IA</button>
        <button onclick="nav(4)" id="n4" class="px-8 py-4 opacity-50 font-black text-orange-400">LISTA ESPERA</button>
        <button onclick="nav(5)" id="n5" class="px-8 py-4 opacity-50 font-black text-nuclear">SUPERVISIÓN 360°</button>
    </nav>

    <section id="view1" class="space-y-6">
        <div class="glass-panel p-8">
            <div class="relative mb-8">
                <input type="text" id="radar" onkeyup="radarSearch()" class="w-full bg-black/60 border-2 border-nuclear/30 p-5 rounded-2xl text-2xl font-black text-nuclear placeholder:opacity-30" placeholder="RADAR: DNI O APELLIDO DEL ALUMNO...">
                <button onclick="startVoiceAction()" id="voiceBtn" class="absolute right-6 top-4 text-3xl text-nuclear/50 hover:text-nuclear"><i class="bi bi-mic-fill"></i></button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-3 bg-white/5 p-5 rounded-2xl border border-white/10">
                    <h3 class="text-nuclear font-black italic border-l-4 border-nuclear pl-2 mb-4">I. ALUMNO (NÚCLEO)</h3>
                    <input id="a_nom" class="input-bionic" placeholder="APELLIDO Y NOMBRE">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="a_dni" class="input-bionic" placeholder="DNI">
                        <input id="a_nac" class="input-bionic" placeholder="NACIONALIDAD (P Ej: ARGENTINA)">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="a_f_nac" class="input-bionic" onchange="calcEdad()">
                        <div id="a_edad" class="bg-black/40 p-2 rounded text-center font-black border border-white/10 text-nuclear text-[9px]">EDAD 30/6: --</div>
                    </div>
                    <select id="a_sala" class="input-bionic"></select>
                    <input id="a_dom" class="input-bionic" placeholder="DOMICILIO">
                    <div class="bg-red-900/20 p-4 rounded-xl border border-red-500/30">
                        <textarea id="s_aler" class="input-bionic text-[9px] h-14" placeholder="ALERGIAS / MEDICACIÓN..."></textarea>
                        <label class="flex justify-between mt-2 font-bold cursor-pointer text-[9px]"><span>APTO FÍSICO OK</span><input type="checkbox" id="s_apto"></label>
                    </div>
                </div>

                <div class="space-y-3 bg-blue-500/5 p-5 rounded-2xl border border-blue-500/20">
                    <h3 class="text-blue-400 font-black italic border-l-4 border-blue-400 pl-2 mb-4">II. DATOS MATERNOS</h3>
                    <input id="p1_nom" class="input-bionic" placeholder="NOMBRE COMPLETO">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="p1_dni" class="input-bionic" placeholder="DNI">
                        <input id="p1_tel" class="input-bionic" placeholder="CELULAR / WHATSAPP">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="p1_auh" class="input-bionic"><option value="NO">AUH: NO</option><option value="SI">AUH: SI</option></select>
                        <select id="p1_tra" class="input-bionic"><option value="SI">TRABAJA: SI</option><option value="NO">TRABAJA: NO</option></select>
                    </div>
                    <select id="p1_edu" class="input-bionic edu-list"></select>
                    <input id="p1_dom" class="input-bionic text-[9px]" placeholder="DOMICILIO">
                </div>

                <div class="space-y-3 bg-emerald-500/5 p-5 rounded-2xl border border-emerald-500/20">
                    <h3 class="text-emerald-400 font-black italic border-l-4 border-emerald-400 pl-2 mb-4">III. DATOS PATERNOS</h3>
                    <input id="p2_nom" class="input-bionic" placeholder="NOMBRE COMPLETO">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="p2_dni" class="input-bionic" placeholder="DNI">
                        <input id="p2_tel" class="input-bionic" placeholder="CELULAR / WHATSAPP">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="p2_tra" class="input-bionic"><option value="SI">TRABAJA: SI</option><option value="NO">TRABAJA: NO</option></select>
                        <select id="p2_edu" class="input-bionic edu-list"></select>
                    </div>
                    <input id="p2_dom" class="input-bionic text-[9px]" placeholder="DOMICILIO">
                </div>
            </div>
            <button onclick="saveData()" class="w-full mt-8 bg-nuclear text-black py-6 rounded-2xl font-black text-2xl shadow-2xl hover:scale-[1.01] transition-all">CONSOLIDAR MATRÍCULA</button>
        </div>
    </section>

    <section id="view2" class="hidden space-y-6">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4" id="gridSalas"></div>
        <div id="salaDetalle" class="glass-panel p-8 hidden border-t-4 border-nuclear">
            <div id="detContenido"></div>
        </div>
    </section>

    <section id="view5" class="hidden space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-panel p-6 border-l-8 border-nuclear text-center">
                <p class="opacity-50 text-[10px]">TOTAL POBLACIÓN</p>
                <h2 id="supTotal" class="text-6xl font-black">0</h2>
            </div>
            <div class="glass-panel p-6 border-l-8 border-red-500 text-center">
                <p class="opacity-50 text-[10px]">ALERTAS SALUD</p>
                <h2 id="supSalud" class="text-6xl font-black text-red-500">0</h2>
            </div>
            <div class="glass-panel p-6 border-l-8 border-blue-400 text-center">
                <p class="opacity-50 text-[10px]">BENEFICIARIOS AUH</p>
                <h2 id="supAuh" class="text-6xl font-black text-blue-400">0</h2>
            </div>
            <div class="glass-panel p-6 border-l-8 border-emerald-500 text-center">
                <p class="opacity-50 text-[10px]">PADRES DESOCUPADOS</p>
                <h2 id="supDeso" class="text-6xl font-black text-emerald-500">0</h2>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-panel p-10 h-[500px]">
                <h3 class="text-nuclear font-black mb-4">DISTRIBUCIÓN POR SALA</h3>
                <canvas id="chartNuclear"></canvas>
            </div>
            <div class="glass-panel p-10 overflow-y-auto max-h-[500px]">
                <h3 class="text-red-500 font-black mb-4"><i class="bi bi- megaphone-fill mr-2"></i>ALERTAS CRÍTICAS DIRECTIVAS</h3>
                <div id="alertList" class="space-y-4 text-[9px]"></div>
            </div>
        </div>
    </section>
</main>

<script>
    let DB = JSON.parse(localStorage.getItem('TITANIUM_CORE')) || [];
    const SALAS_NOMBRES = ['ROSA', 'ROJA', 'NARANJA', 'CELESTE', 'VIOLETA', 'AMARILLA', 'AZUL'];
    const TURNOS = ['TM', 'TT'];
    const ESTUDIOS = ["SIN ESTUDIOS", "PRIMARIA C/I", "SECUNDARIA INC", "SECUNDARIA COMP", "TERCIARIA/UNIV"];

    function initSystem() {
        const sSel = document.getElementById('a_sala');
        SALAS_NOMBRES.forEach(c => {
            TURNOS.forEach(t => {
                let opt = `${c} ${t}`;
                sSel.innerHTML += `<option value="${opt}">${opt}</option>`;
            });
        });

        document.querySelectorAll('.edu-list').forEach(select => {
            ESTUDIOS.forEach(est => select.innerHTML += `<option value="${est}">${est}</option>`);
        });
        actualizarMétricas();
    }

    function nav(n) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => b.className = "px-8 py-4 opacity-50 font-black");
        document.getElementById('view'+n).classList.remove('hidden');
        document.getElementById('n'+n).classList.add('tab-active');
        if(n === 2) renderSalasCards();
        if(n === 5) { runCharts(); renderAlertas(); }
    }

    function saveData() {
        const alu = {
            nom: v('a_nom'), dni: v('a_dni'), nac: v('a_nac').toUpperCase(), f_nac: v('a_f_nac'),
            dom: v('a_dom'), sala: v('a_sala'), s_aler: v('s_aler'), s_apto: document.getElementById('s_apto').checked,
            p1_nom: v('p1_nom'), p1_dni: v('p1_dni'), p1_tel: v('p1_tel'), p1_auh: v('p1_auh'), p1_tra: v('p1_tra'), p1_edu: v('p1_edu'), p1_dom: v('p1_dom'),
            p2_nom: v('p2_nom'), p2_dni: v('p2_dni'), p2_tel: v('p2_tel'), p2_tra: v('p2_tra'), p2_edu: v('p2_edu'), p2_dom: v('p2_dom')
        };
        if(!alu.dni || !alu.nom) return alert("ERROR: DATOS INCOMPLETOS");
        const idx = DB.findIndex(x => x.dni === alu.dni);
        if(idx > -1) DB[idx] = alu; else DB.push(alu);
        localStorage.setItem('TITANIUM_CORE', JSON.stringify(DB));
        actualizarMétricas();
        alert("DATOS SINCRONIZADOS");
    }

    function renderSalasCards() {
        const grid = document.getElementById('gridSalas');
        grid.innerHTML = '';
        SALAS_NOMBRES.forEach(color => {
            TURNOS.forEach(turno => {
                const nombre = `${color} ${turno}`;
                const alumnos = DB.filter(x => x.sala === nombre);
                const extranjeros = alumnos.filter(x => x.nac !== 'ARGENTINA' && x.nac !== 'ARGENTINO').length;
                const sinEstudios = alumnos.filter(x => x.p1_edu === 'SIN ESTUDIOS' || x.p2_edu === 'SIN ESTUDIOS').length;

                grid.innerHTML += `
                    <div onclick="verDetalleSala('${nombre}')" class="sala-card p-4 glass-panel border-l-4" style="border-left-color: ${color}">
                        <p class="font-black text-[8px] opacity-70">${nombre}</p>
                        <h4 class="text-3xl font-black">${alumnos.length}</h4>
                        <div class="mt-2 space-y-1">
                            <div class="stats-badge text-blue-400">EXT: ${extranjeros}</div>
                            <div class="stats-badge text-red-400">S/APTO: ${alumnos.filter(x=>!x.s_apto).length}</div>
                        </div>
                    </div>
                `;
            });
        });
    }

    function verDetalleSala(nombre) {
        const det = document.getElementById('salaDetalle');
        det.classList.remove('hidden');
        const filtrados = DB.filter(x => x.sala === nombre);
        
        // Radiografía poblacional
        const nacs = [...new Set(filtrados.map(a => a.nac))];
        const radiografia = nacs.map(n => `${n}: ${filtrados.filter(x=>x.nac===n).length}`).join(' | ');

        document.getElementById('detContenido').innerHTML = `
            <div class="flex justify-between items-end mb-6 border-b border-white/10 pb-4">
                <div>
                    <h2 class="text-4xl font-black text-nuclear">${nombre}</h2>
                    <p class="text-blue-400 font-bold text-[10px]">RADIOGRAFÍA: ${radiografia}</p>
                </div>
                <div class="text-right">
                    <p class="text-[8px] opacity-50">MATRÍCULA TOTAL</p>
                    <p class="text-4xl font-black">${filtrados.length}</p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                ${filtrados.map(a => `
                    <div class="bg-black/40 p-4 rounded-xl border border-white/5">
                        <p class="text-nuclear font-bold">${a.nom}</p>
                        <p class="opacity-40 text-[8px]">DNI: ${a.dni}</p>
                        <div class="mt-2 grid grid-cols-1 gap-1">
                            <a href="tel:${a.p1_tel}" class="text-blue-400"><i class="bi bi-telephone"></i> M: ${a.p1_tel}</a>
                            <a href="tel:${a.p2_tel}" class="text-emerald-400"><i class="bi bi-telephone"></i> P: ${a.p2_tel}</a>
                        </div>
                        <div class="mt-2 ${a.s_apto ? 'text-emerald-500' : 'text-red-600 animate-pulse'} font-black text-[7px]">
                            ${a.s_apto ? '● APTO FÍSICO OK' : '● SIN APTO FÍSICO'}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        det.scrollIntoView({behavior: 'smooth'});
    }

    function renderAlertas() {
        const list = document.getElementById('alertList');
        const criticos = DB.filter(x => !x.s_apto || x.p1_tra === 'NO' || x.p2_tra === 'NO');
        list.innerHTML = criticos.map(a => `
            <div class="flex justify-between items-center p-3 bg-white/5 rounded border-l-2 ${!a.s_apto ? 'border-red-500':'border-orange-500'}">
                <div>
                    <p class="font-black">${a.nom} (${a.sala})</p>
                    <p class="opacity-50">${!a.s_apto ? 'FALTA APTO MÉDICO' : 'PADRES DESOCUPADOS'}</p>
                </div>
                <div class="flex gap-2">
                    <a href="https://wa.me/${a.p1_tel}" target="_blank" class="bg-emerald-600 p-2 rounded text-black font-bold">WHATSAPP</a>
                </div>
            </div>
        `).join('');
    }

    function importData(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                if(file.name.endsWith('.json')) {
                    DB = JSON.parse(e.target.result);
                } else {
                    const workbook = XLSX.read(e.target.result, {type: 'binary'});
                    DB = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                }
                localStorage.setItem('TITANIUM_CORE', JSON.stringify(DB));
                alert("SISTEMA ACTUALIZADO CON ÉXITO");
                location.reload();
            } catch(err) { alert("ERROR EN ARCHIVO"); }
        };
        if(file.name.endsWith('.json')) reader.readAsText(file);
        else reader.readAsBinaryString(file);
    }

    function radarSearch() {
        const q = document.getElementById('radar').value.toUpperCase();
        if(q.length < 3) return;
        const a = DB.find(x => x.dni.includes(q) || x.nom.includes(q));
        if(a) {
            Object.keys(a).forEach(k => {
                const el = document.getElementById(`a_${k}`) || document.getElementById(`p1_${k}`) || document.getElementById(`p2_${k}`) || document.getElementById(`s_${k}`);
                if(el) { if(el.type==='checkbox') el.checked=a[k]; else el.value=a[k]; }
            });
            calcEdad();
        }
    }

    function runCharts() {
        const ctx = document.getElementById('chartNuclear').getContext('2d');
        const dataSalas = [];
        SALAS_NOMBRES.forEach(c => TURNOS.forEach(t => dataSalas.push(DB.filter(x=>x.sala===`${c} ${t}`).length)));
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: SALAS_NOMBRES.flatMap(c => TURNOS.map(t => `${c} ${t}`)),
                datasets: [{ label: 'MATRÍCULA', data: dataSalas, borderColor: '#dfff00', tension: 0.4, fill: true, backgroundColor: 'rgba(223, 255, 0, 0.1)' }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#333' } } } }
        });
    }

    function actualizarMétricas() {
        document.getElementById('supTotal').innerText = DB.length;
        document.getElementById('supSalud').innerText = DB.filter(x => !x.s_apto).length;
        document.getElementById('supAuh').innerText = DB.filter(x => x.p1_auh === 'SI').length;
        document.getElementById('supDeso').innerText = DB.filter(x => x.p1_tra === 'NO' && x.p2_tra === 'NO').length;
    }

    function v(id) { return document.getElementById(id) ? document.getElementById(id).value : ""; }
    function exportToExcel() { 
        const ws = XLSX.utils.json_to_sheet(DB); 
        const wb = XLSX.utils.book_new(); 
        XLSX.utils.book_append_sheet(wb, ws, "TITANIUM"); 
        XLSX.writeFile(wb, "TITANIUM_V23_FULL.xlsx"); 
    }
    function downloadJSON() {
        const blob = new Blob([JSON.stringify(DB)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "TITANIUM_BACKUP.json"; a.click();
    }
    function calcEdad() {
        const f = new Date(v('a_f_nac'));
        if(!f) return;
        let e = 2026 - f.getFullYear();
        if(f.getMonth() > 5 || (f.getMonth()===5 && f.getDate()>30)) e--;
        document.getElementById('a_edad').innerText = `EDAD 30/6: ${e} AÑOS`;
    }
</script>
</body>
</html>
