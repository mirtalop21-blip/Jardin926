<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Integral - Jardín 926</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        .absent-critical { color: #dc2626; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .voice-btn { cursor: pointer; color: #2563eb; transition: transform 0.2s; }
        .voice-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body class="p-4 bg-slate-100">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-blue-900 p-6 rounded-xl text-white shadow-2xl">
            <div>
                <h1 class="text-2xl font-black tracking-tight">JARDÍN N° 926 - GESTIÓN TOTAL</h1>
                <p class="text-blue-200 text-sm">Panel de Control: Inscripción, Asistencia y Supervisión</p>
            </div>
            <div class="flex gap-2 mt-4 md:mt-0">
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg text-xs font-bold transition">
                    <i class="fas fa-file-excel mr-2"></i> EXCEL
                </button>
                <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold transition">
                    <i class="fas fa-print mr-2"></i> IMPRIMIR
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="card">
                    <h2 class="text-blue-800 font-bold mb-4 uppercase text-sm border-b pb-2"><i class="fas fa-user-plus mr-2"></i> Matriculación</h2>
                    <form id="studentForm" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">Nombre Completo</label>
                                <div class="relative">
                                    <input type="text" id="name" class="w-full border p-2 rounded bg-gray-50" required>
                                    <i class="fas fa-microphone voice-btn absolute right-3 top-3" onclick="startVoice('name')"></i>
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">DNI Alumno</label>
                                <input type="number" id="dni" class="w-full border p-2 rounded bg-gray-50" required>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">Fecha Nacimiento</label>
                                <input type="date" id="birth" class="w-full border p-2 rounded bg-gray-50" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">Sala</label>
                                <select id="section" class="w-full border p-2 rounded bg-gray-50">
                                    <option>Sala Rosa (3)</option><option>Sala Roja (4)</option><option>Sala Azul (5)</option><option>Sala Verde (Multi)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">WhatsApp Familia</label>
                                <input type="text" id="phone" placeholder="54911..." class="w-full border p-2 rounded bg-gray-50">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg">GUARDAR LEGAJO</button>
                    </form>
                </div>

                <div class="card">
                    <h2 class="text-blue-800 font-bold mb-4 uppercase text-sm border-b pb-2">Control de Asistencia</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead>
                                <tr class="bg-slate-100">
                                    <th class="p-3">Alumno</th><th class="p-3">Faltas</th><th class="p-3">Acción</th><th class="p-3">Informar</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="card">
                    <h2 class="text-blue-800 font-bold mb-4 uppercase text-[10px]">Informe Inspección</h2>
                    <canvas id="attendanceChart" height="200"></canvas>
                </div>
                <div class="card">
                    <h2 class="text-blue-800 font-bold mb-4 uppercase text-[10px]">Alertas Críticas</h2>
                    <div id="alertSummary" class="space-y-2 text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let students = [];
        let chart;

        function initChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Presentes', 'Ausentes'], datasets: [{ data: [0, 0], backgroundColor: ['#10b981', '#ef4444'] }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function startVoice(id) {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-AR'; recognition.start();
            recognition.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; };
        }

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            students.push({
                name: document.getElementById('name').value,
                dni: document.getElementById('dni').value,
                section: document.getElementById('section').value,
                phone: document.getElementById('phone').value,
                absences: 0,
                status: 'Presente'
            });
            renderAll(); e.target.reset();
        });

        function renderAll() {
            const body = document.getElementById('attendanceBody');
            body.innerHTML = '';
            let pres = 0; let abs = 0;
            const alertBox = document.getElementById('alertSummary');
            alertBox.innerHTML = '';

            students.forEach((s, i) => {
                if(s.status === 'Presente') pres++; else abs++;
                const isCritical = s.absences >= 10;
                if(isCritical) alertBox.innerHTML += `<div class="p-2 bg-red-50 text-red-700"><b>${s.name}</b>: 10 FALTAS</div>`;

                body.innerHTML += `
                    <tr class="border-b">
                        <td class="p-3 ${isCritical ? 'absent-critical' : ''}">${s.name}</td>
                        <td class="p-3 font-bold">${s.absences}</td>
                        <td class="p-3">
                            <button onclick="markAbsent(${i})" class="bg-red-100 text-red-600 px-2 py-1 rounded text-[10px]">FALTA</button>
                            ${isCritical ? `<button onclick="sendWA(${i}, 'family')" class="bg-green-500 text-white px-2 py-1 rounded text-[10px] ml-1">AVISO WA</button>` : ''}
                        </td>
                        <td class="p-3">
                            <button onclick="sendWA(${i}, 'staff')" class="text-blue-600 border px-2 py-1 rounded text-[10px]">DIRECTIVO</button>
                        </td>
                    </tr>`;
            });
            chart.data.datasets[0].data = [pres, abs]; chart.update();
        }

        function markAbsent(i) { students[i].absences++; students[i].status = 'Ausente'; renderAll(); }

        function sendWA(i, type) {
            const s = students[i];
            let msg = type === 'family' 
                ? `Jardín 926: ${s.name} alcanzó las ${s.absences} inasistencias. Por favor acercarse.`
                : `ALERTA DIRECTIVO: Alumno ${s.name} (${s.section}) con ${s.absences} faltas.`;
            let phone = type === 'family' ? s.phone : "5491166860054"; // Tu número de gestión
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(students);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Alumnos");
            XLSX.writeFile(wb, "Reporte_Jardin926.xlsx");
        }
        initChart();
    </script>
</body>
</html>
