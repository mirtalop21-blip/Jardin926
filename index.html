<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA J926 - GESTIÓN INTEGRAL ESTRATÉGICA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #0f172a; color: #fff; }
        .card-pro { background: #fff; color: #000; border: 6px solid #000; box-shadow: 12px 12px 0px #facc15; padding: 20px; }
        .input-pro { width: 100%; border: 2px solid #000; padding: 5px; font-weight: 900; background: #fff; font-size: 11px; margin-bottom: 2px; }
        .nav-link { flex: 1; text-align: center; padding: 15px; font-weight: 900; cursor: pointer; border: 2px solid #fff; }
        .nav-link.active { background: #facc15; color: #000; border-bottom: 8px solid #000; }
        th { background: #000; color: #facc15; padding: 8px; font-size: 10px; border: 1px solid #444; }
        td { border: 1px solid #000; padding: 4px; font-size: 10px; font-weight: 900; background: #fff; color: #000; text-align: center; }
        .presente { background: #22c55e !important; color: white !important; border: 2px solid #14532d !important; }
        .ausente { background: #ef4444 !important; color: white !important; border: 2px solid #7f1d1d !important; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-4 border-yellow-400">
    <div onclick="ver(1)" id="t1" class="nav-link active">1. MATRÍCULA ESTRATÉGICA 🎤</div>
    <div onclick="ver(2)" id="t2" class="nav-link bg-emerald-700">2. ASISTENCIA MÁXIMA 📋</div>
    <div onclick="ver(3)" id="t3" class="nav-link bg-blue-700">3. SUPERVISIÓN Y CARGA MASIVA 📊</div>
</nav>

<main class="p-4">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="border-r-4 border-black pr-4">
                <p class="bg-blue-800 text-white p-1 text-center font-black mb-2 italic">DATOS ALUMNO/A</p>
                <label class="text-[9px]">NOMBRE COMPLETO</label><input id="n" class="input-pro">
                <div class="grid grid-cols-2 gap-1">
                    <input id="d" placeholder="DNI" class="input-pro">
                    <input id="nac" value="ARGENTINA" class="input-pro">
                </div>
                <div class="grid grid-cols-2 gap-1">
                    <input id="f" type="date" class="input-pro">
                    <input id="e" placeholder="EDAD AL 30/6" class="input-pro">
                </div>
                <label class="text-[9px]">SALA (14 DISPONIBLES)</label>
                <select id="sala" class="input-pro bg-yellow-50 font-black">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA VERDE TM</option><option>SALA VERDE TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
                </select>
                <div class="grid grid-cols-2 gap-1">
                    <input id="her" placeholder="HERMANOS (CANT.)" class="input-pro">
                    <select id="her_j" class="input-pro"><option>HERM. JARDÍN: NO</option><option>HERM. JARDÍN: SÍ</option></select>
                </div>
                <input id="adom" placeholder="DOMICILIO" class="input-pro">
                <input id="salud" placeholder="OBSERVACIONES DE SALUD" class="input-pro">
            </div>

            <div class="border-r-4 border-black pr-4">
                <p class="bg-rose-700 text-white p-1 text-center font-black mb-2 italic">DATOS MADRE</p>
                <input id="mn" placeholder="APELLIDO Y NOMBRE" class="input-pro">
                <div class="grid grid-cols-2 gap-1"><input id="mdni" placeholder="DNI" class="input-pro"><input id="mnac" value="ARGENTINA" class="input-pro"></div>
                <input id="m_ocu" placeholder="OCUPACIÓN / TRABAJO" class="input-pro">
                <select id="m_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option><option>UNIV/TERC COMPLETO</option>
                </select>
                <div class="grid grid-cols-2 gap-1">
                    <input id="mtel" placeholder="TELÉFONO" class="input-pro">
                    <select id="auh" class="input-pro bg-blue-100 font-black"><option>SÍ AUH</option><option>NO AUH</option></select>
                </div>
                <input id="mdom" placeholder="DOMICILIO MADRE" class="input-pro">
            </div>

            <div>
                <p class="bg-emerald-800 text-white p-1 text-center font-black mb-2 italic">DATOS PADRE</p>
                <input id="pn" placeholder="APELLIDO Y NOMBRE" class="input-pro">
                <div class="grid grid-cols-2 gap-1"><input id="pdni" placeholder="DNI" class="input-pro"><input id="pnac" value="ARGENTINA" class="input-pro"></div>
                <input id="p_ocu" placeholder="OCUPACIÓN / TRABAJO" class="input-pro">
                <select id="p_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option><option>UNIV/TERC COMPLETO</option>
                </select>
                <input id="ptel" placeholder="TELÉFONO" class="input-pro">
                <input id="pdom" placeholder="DOMICILIO PADRE" class="input-pro">
                <button onclick="guardar()" class="w-full mt-4 bg-yellow-400 p-6 border-4 border-black font-black text-xl shadow-[8px_8px_0px_#000]">💾 GUARDAR MATRÍCULA</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="card-pro hidden">
        <div id="asisBar" class="bg-black text-yellow-400 p-3 text-center font-black mb-4 border-2 border-white italic text-lg shadow-lg"></div>
        <div id="asisGrid" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-7 gap-3"></div>
    </section>

    <section id="sec3" class="card-pro hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-slate-900 text-white p-5 border-4 border-red-600 shadow-xl">
                <p class="text-red-500 font-black mb-2 italic underline">⚠️ CARGA MASIVA (PEGA DESDE TU EXCEL)</p>
                <p class="text-[9px] mb-2 text-slate-300">Copia columnas de Excel (Nombre y DNI) y pega aquí:</p>
                <textarea id="masivoInput" placeholder="NOMBRE [TAB] DNI" class="w-full h-32 text-black p-2 text-[10px] font-mono border-4 border-black"></textarea>
                <button onclick="procesarMasivo()" class="w-full mt-2 bg-red-600 text-white p-3 font-black text-sm hover:bg-red-500 border-2 border-black">🚀 IMPACTAR DATOS EN MATRÍCULA</button>
            </div>
            
            <div class="flex flex-col gap-4">
                <div class="bg-black text-white p-4 border-4 border-yellow-400 text-center">
                    <p class="text-[10px]">MATRÍCULA TOTAL J926</p>
                    <p id="countMat" class="text-7xl font-black text-yellow-400">0</p>
                </div>
                <button onclick="descargarExcelEstrategico()" class="bg-green-700 text-white p-4 border-2 border-black font-black hover:scale-95 transition-transform">📊 EXCEL FORMATO SUPERVISIÓN</button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="respaldo()" class="bg-blue-700 text-white p-2 border-2 border-black font-black text-xs">💾 EXPORTAR RESPALDO (JSON)</button>
                    <div class="bg-slate-100 p-1 border-2 border-black text-center">
                        <p class="text-[8px] text-black font-bold">IMPORTAR RESPALDO:</p>
                        <input type="file" onchange="importar(event)" class="text-[8px] text-black w-full">
                    </div>
                </div>
            </div>
        </div>
        
        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR DNI O APELLIDO..." class="w-full p-4 border-4 border-black mb-4 text-2xl font-black italic bg-yellow-50 text-black">
        
        <div class="overflow-x-auto border-2 border-black">
            <table class="w-full">
                <thead><tr><th>ALUMNO / DNI</th><th>SALA</th><th>CONTACTOS</th><th>AUH</th><th>ACCIÓN</th></tr></thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let db = [];
    let editIdx = null;

    const iniciales = ["AGUILAR CURTIDO BELINDA ABIGAIL", "AMARILLA SUAREZ YAMIR JORGE", "BAGLIETTO THIAN ELIEL", "BARBERIS SANTILLAN JUAN PABLO", "BENITEZ CIELO ELUNEY", "BENITEZ LUISANA VALENTINA", "BOGDANOFF NAHOMI ANGELA", "CABALLERO ABREGO RONALDO DANIEL", "CACERES ISABELLA VALERIA", "CARRILLO QUISPE AARIA DAINERIS", "CENTURION RIOS LIAM CIRO", "CHOQUE MARA O MICAELA BRIANA", "ESCOBAR NICOLAS MAEL", "FARIAS BLANCO FRANCESCO", "FIGUEROA CATALEYA ANAHI", "GARCIA ROMA MARTINA", "GAUNA RAMIRO NAHUEL", "GOMEZ SANTIAGO ENZO", "JIMENEZ ROJAS JAZMIN", "LOZA ELISEO VALENTIN", "MONTES MAIRANA ADA ABIGAIL", "OJEDA ISABELLA GABRIELA", "QUISPE GUARACHI DAYLIN", "RECALDE OVIEDO LUANA", "SALVATIERRA ROJAS ANA LIZ", "SANTALLA ROJAS GAEL", "SANTILLAN GAEL DARIO", "SAUCEDO VIDAL DESIDERIO", "SOSA AYNARA MAGALI", "TABOADA CAMILA MAITE", "TORRES COCA ANA LUJAN", "VALLEJOS HEREDIA AITANA", "VELAZQUEZ ARCIENAGA JULIETA", "ZARATE MATEO", "LOPEZ BENJAMIN"];

    function inicializar() {
        const data = localStorage.getItem('J926_MASTER_DATA');
        if (data) db = JSON.parse(data);
        else db = iniciales.map(n => ({ n, d: "", nac: "ARGENTINA", f: "", e: "", sala: "SALA ROSA TM", her: "0", her_j: "HERM. JARDÍN: NO", adom: "", salud: "", mn: "", mdni: "", mnac: "ARGENTINA", m_ocu: "", m_est: "SECUNDARIA COMPLETA", mtel: "", auh: "SÍ AUH", mdom: "", pn: "", pdni: "", pnac: "ARGENTINA", p_ocu: "", p_est: "SECUNDARIA COMPLETA", ptel: "", pdom: "", presente: true }));
        renderTabla(); renderAsistencia();
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
    }

    function procesarMasivo() {
        const texto = document.getElementById('masivoInput').value;
        const filas = texto.split('\n');
        let contador = 0;
        filas.forEach(fila => {
            const cols = fila.split('\t');
            if(cols.length >= 2) {
                const nomExcel = cols[0].trim().toUpperCase();
                const dniExcel = cols[1].trim();
                const idx = db.findIndex(a => a.n.includes(nomExcel) || nomExcel.includes(a.n));
                if(idx !== -1) { db[idx].d = dniExcel; contador++; }
            }
        });
        actualizarTodo(); alert("✅ SE ACTUALIZARON " + contador + " REGISTROS.");
    }

    function guardar() {
        const ids = ['n','d','nac','f','e','sala','her','her_j','adom','salud','mn','mdni','mnac','m_ocu','m_est','mtel','auh','mdom','pn','pdni','pnac','p_ocu','p_est','ptel','pdom'];
        const obj = { presente: true };
        ids.forEach(id => obj[id] = document.getElementById(id).value.toUpperCase());
        if(editIdx !== null) db[editIdx] = obj; else db.push(obj);
        actualizarTodo(); alert("✅ MATRÍCULA GUARDADA"); editIdx = null;
    }

    function editar(i) {
        const a = db[i]; editIdx = i;
        const ids = ['n','d','nac','f','e','sala','her','her_j','adom','salud','mn','mdni','mnac','m_ocu','m_est','mtel','auh','mdom','pn','pdni','pnac','p_ocu','p_est','ptel','pdom'];
        ids.forEach(id => document.getElementById(id).value = a[id] || "");
        ver(1);
    }

    function renderTabla() {
        const bus = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('tablaCuerpo'); t.innerHTML = "";
        db.forEach((a, i) => {
            if(a.n.includes(bus) || a.d.includes(bus)) {
                t.innerHTML += `<tr><td><b>${a.n}</b><br><small>DNI: ${a.d}</small></td><td>${a.sala}</td><td>M:${a.mtel}<br>P:${a.ptel}</td><td>${a.auh}</td>
                <td><button onclick="editar(${i})" class="bg-yellow-400 p-2 border-2 border-black font-black w-full text-[10px]">EDITAR</button></td></tr>`;
            }
        });
        document.getElementById('countMat').innerText = db.length;
    }

    function renderAsistencia() {
        const g = document.getElementById('asisGrid'); g.innerHTML = "";
        let p = 0;
        db.forEach((a, i) => {
            if(a.presente) p++;
            g.innerHTML += `<div onclick="toggleAsis(${i})" class="p-3 border-4 cursor-pointer text-[10px] font-black text-center shadow-md ${a.presente ? 'presente' : 'ausente'}">${a.n.split(' ')[0]}<br>${a.presente ? 'PRESENTE' : 'AUSENTE'}</div>`;
        });
        document.getElementById('asisBar').innerText = `INFORME DIARIO: ${p} PRESENTES DE ${db.length} ALUMNOS`;
    }

    function toggleAsis(i) { db[i].presente = !db[i].presente; renderAsistencia(); localStorage.setItem('J926_MASTER_DATA', JSON.stringify(db)); }

    function actualizarTodo() {
        localStorage.setItem('J926_MASTER_DATA', JSON.stringify(db));
        renderTabla(); renderAsistencia();
    }

    function descargarExcelEstrategico() {
        let csv = "\ufeffAPELLIDO Y NOMBRE;DNI;SALA;EDAD 30/6;FECHA NAC;SALUD;AUH;DOMICILIO;MADRE;TEL MADRE;ESTUDIOS M;PADRE;TEL PADRE;ESTUDIOS P\n";
        db.forEach(a => { csv += `${a.n};${a.d};${a.sala};${a.e};${a.f};${a.salud};${a.auh};${a.adom};${a.mn};${a.mtel};${a.m_est};${a.pn};${a.ptel};${a.p_est}\n`; });
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = "MATRICULA_SUPERVISION_J926.csv"; l.click();
    }

    function respaldo() {
        const b = new Blob([JSON.stringify(db)], {type:'application/json'});
        const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = "RESPALDO_J926.json"; l.click();
    }

    function importar(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            db = JSON.parse(ev.target.result); actualizarTodo(); alert("✅ RESPALDO CARGADO");
        };
        r.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
