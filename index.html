                </div>
            </div>
            <div>
                <label class="block font-black text-sm">DNI (SÓLO NÚMEROS)</label>
                <div class="flex gap-1">
                    <input type="number" id="d" class="input-heavy">
                    <button onclick="dictar('d')" class="btn-mic">🎤</button>
                </div>
            </div>
            <div>
                <label class="block font-black text-sm">FECHA NACIMIENTO (CALCULA EDAD AL 30/06)</label>
                <input type="date" id="f" class="input-heavy" onchange="calcularEdad()">
            </div>
            <div>
                <label class="block font-black text-sm">SALA / SECCIÓN</label>
                <select id="s" class="input-heavy">
                    <option>SALA ROSA TM</option>
                    <option>SALA NARANJA TT</option>
                    <option>SALA VERDE TM</option>
                    <option>SALA AZUL TT</option>
                </select>
            </div>
            <div>
                <label class="block font-black text-sm">DATOS PADRE / TUTOR</label>
                <div class="flex gap-1">
                    <input type="text" id="p" class="input-heavy">
                    <button onclick="dictar('p')" class="btn-mic">🎤</button>
                </div>
            </div>
            <div>
                <label class="block font-black text-sm">DATOS MADRE / TUTORA</label>
                <div class="flex gap-1">
                    <input type="text" id="m" class="input-heavy">
                    <button onclick="dictar('m')" class="btn-mic">🎤</button>
                </div>
            </div>
        </div>

        <div class="mt-8">
            <button onclick="agregar()" class="btn-save shadow-[8px_8px_0px_#000]">GUARDAR ALUMNO EN EL SISTEMA</button>
        </div>
    </section>

    <section class="seccion-card">
        <h2 class="text-2xl font-black mb-6 border-b-4 border-black">VISTA PREVIA PROFESIONAL PARA SUPERVISIÓN</h2>
        <div class="overflow-x-auto">
            <table class="w-full border-collapse bg-white">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border-2 border-black p-2">ALUMNO</th>
                        <th class="border-2 border-black p-2">DNI</th>
                        <th class="border-2 border-black p-2">SALA</th>
                        <th class="border-2 border-black p-2">EDAD 30/06</th>
                        <th class="border-2 border-black p-2">ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let db = [
        {n: "AMARILLA SUAREZ YAMIR JORGE", d: "39649663", s: "SALA ROSA TM", f: "2021-04-15", p: "-", m: "-"},
        {n: "BARBERIS SANTILLAN JUN PABLO", d: "39330738", s: "SALA ROSA TM", f: "2021-02-10", p: "-", m: "-"},
        {n: "BAGLIETTO THIAN ELIEL", d: "38929058", s: "SALA ROSA TM", f: "2021-08-20", p: "-", m: "-"}
        // ... (el sistema cargará el resto desde la memoria)
    ];

    function dictar(id) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-AR';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById(id).value = e.results[0][0].transcript.toUpperCase();
        };
    }

    function calcularEdadAl30DeJunio(fechaNac) {
        if(!fechaNac) return "-";
        const nac = new Date(fechaNac);
        const fechaCorte = new Date(2026, 5, 30); // 30 de Junio 2026
        let edad = fechaCorte.getFullYear() - nac.getFullYear();
        const m = fechaCorte.getMonth() - nac.getMonth();
        if (m < 0 || (m === 0 && fechaCorte.getDate() < nac.getDate())) {
            edad--;
        }
        return edad + " AÑOS";
    }

    function agregar() {
        const alu = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            s: document.getElementById('s').value,
            f: document.getElementById('f').value,
            p: document.getElementById('p').value.toUpperCase(),
            m: document.getElementById('m').value.toUpperCase()
        };
        if(alu.n && alu.d) {
            db.push(alu);
            guardarYRender();
            limpiarCampos();
        }
    }

    function guardarYRender() {
        localStorage.setItem('J926_SISTEMA_PRO', JSON.stringify(db));
        render();
    }

    function cargarMemoria() {
        const data = localStorage.getItem('J926_SISTEMA_PRO');
        if(data) db = JSON.parse(data);
        render();
    }

    function render() {
        const body = document.getElementById('tablaBody');
        body.innerHTML = "";
        db.sort((a,b) => a.s.localeCompare(b.s) || a.n.localeCompare(b.n)).forEach((alu, i) => {
            body.innerHTML += `
                <tr class="font-black text-sm">
                    <td class="border-2 border-black p-2">${alu.n}</td>
                    <td class="border-2 border-black p-2">${alu.d}</td>
                    <td class="border-2 border-black p-2 bg-blue-50">${alu.s}</td>
                    <td class="border-2 border-black p-2 text-center text-red-600">${calcularEdadAl30DeJunio(alu.f)}</td>
                    <td class="border-2 border-black p-2 text-center">
                        <button onclick="eliminar(${i})" class="text-xs bg-red-600 text-white p-1">X</button>
                    </td>
                </tr>`;
        });
    }

    function exportarExcelProfesional() {
        let contenido = "MATRICULA INSTITUCIONAL - JARDIN 926\n";
        contenido += "FECHA DE REPORTE: " + new Date().toLocaleDateString() + "\n\n";
        
        const salas = [...new Set(db.map(a => a.s))];
        salas.forEach(sala => {
            contenido += `--- SALA: ${sala} ---\n`;
            contenido += "NOMBRE Y APELLIDO, DNI, EDAD AL 30/06, PADRE, MADRE\n";
            db.filter(a => a.s === sala).forEach(a => {
                contenido += `${a.n}, ${a.d}, ${calcularEdadAl30DeJunio(a.f)}, ${a.p}, ${a.m}\n`;
            });
            contenido += "\n";
        });

        const blob = new Blob([contenido], {type: 'text/csv'});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'MATRICULA_INSPECCION_J926.csv';
        a.click();
    }

    function limpiarCampos() {
        ['n','d','f','p','m'].forEach(id => document.getElementById(id).value = "");
    }

    function eliminar(i) { if(confirm("¿ELIMINAR?")) { db.splice(i,1); guardarYRender(); } }
    function descargarBackup() {
        const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const dl = document.createElement('a');
        dl.setAttribute("href", data);
        dl.setAttribute("download", "BACKUP_PRO_J926.json");
        dl.click();
    }
</script>
</body>
</html>
