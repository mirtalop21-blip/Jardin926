<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA J926 - INGENIERÍA DE SUPERVISIÓN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #000; border: 1px solid #334155; padding: 10px; border-radius: 6px; color: #fff; width: 100%; font-size: 10px; }
        .nav-tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 900; opacity: 0.5; transition: 0.3s; border-bottom: 2px solid transparent; }
        .nav-tab.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); background: rgba(250,204,21,0.05); }
        
        /* Identidad Visual por Sala */
        .SALA-ROSA { border-left: 8px solid #f472b6; } .SALA-ROJA { border-left: 8px solid #ef4444; }
        .SALA-NARANJA { border-left: 8px solid #fb923c; } .SALA-CELESTE { border-left: 8px solid #38bdf8; }
        .SALA-VIOLETA { border-left: 8px solid #a855f7; } .SALA-AMARILLA { border-left: 8px solid #facc15; }
        .SALA-AZUL { border-left: 8px solid #2563eb; } .SALA-VERDE { border-left: 8px solid #22c55e; }

        .stat-fill { height: 100%; transition: width 1s ease-in-out; border-radius: 10px; }
    </style>
</head>
<body onload="init()">

<nav class="flex sticky top-0 z-50 glass">
    <div onclick="tab(1)" id="t1" class="nav-tab active"><i class="bi bi-person-plus"></i> CARGA IA</div>
    <div onclick="tab(2)" id="t2" class="nav-tab"><i class="bi bi-calendar-check"></i> ASISTENCIA</div>
    <div onclick="tab(3)" id="t3" class="nav-tab"><i class="bi bi-graph-up"></i> SUPERVISIÓN</div>
</nav>

<main class="p-4 space-y-6">
    <section id="sec1" class="space-y-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div class="glass p-5 rounded-xl border-t-2 border-blue-500 space-y-2">
                <h3 class="text-blue-400 font-bold mb-2">LEGAJO ALUMNO/A</h3>
                <input id="a_n" class="input-pro" placeholder="APELLIDO Y NOMBRE">
                <div class="flex gap-2"><input id="a_d" class="input-pro" placeholder="DNI"><input id="a_nac" class="input-pro" value="ARGENTINA"></div>
                <div class="flex gap-2"><input id="a_f" type="date" class="input-pro" onchange="calcAge(this.value)"><input id="a_e" class="input-pro" placeholder="EDAD AL 30/6" readonly></div>
                <select id="a_s" class="input-pro text-gold font-bold">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option><option>SALA VERDE TM</option><option>SALA VERDE TT</option>
                </select>
                <input id="a_dom" class="input-pro" placeholder="DOMICILIO">
                <textarea id="a_salud" class="input-pro h-16" placeholder="ANTECEDENTES DE SALUD / ALERGIAS"></textarea>
            </div>

            <div class="glass p-5 rounded-xl border-t-2 border-pink-500 space-y-2">
                <h3 class="text-pink-400 font-bold mb-2">DATOS MADRE</h3>
                <input id="m_n" class="input-pro" placeholder="APELLIDO Y NOMBRE">
                <div class="flex gap-2"><input id="m_d" class="input-pro" placeholder="DNI"><input id="m_nac" class="input-pro" placeholder="NACIONALIDAD"></div>
                <select id="m_edu" class="input-pro">
                    <option value="">NIVEL DE ESTUDIOS...</option>
                    <option>SIN ESTUDIOS</option><option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option><option>TERCIARIA COMPLETA</option>
                    <option>TERCIARIA INCOMPLETA</option><option>UNIVERSITARIA COMPLETA</option><option>UNIVERSITARIA INCOMPLETA</option>
                </select>
                <input id="m_ocu" class="input-pro" placeholder="TRABAJO / OCUPACIÓN">
                <input id="m_t" class="input-pro" placeholder="TELÉFONO DE CONTACTO">
            </div>

            <div class="glass p-5 rounded-xl border-t-2 border-emerald-500 space-y-2">
                <h3 class="text-emerald-400 font-bold mb-2">DATOS PADRE</h3>
                <input id="p_n" class="input-pro" placeholder="APELLIDO Y NOMBRE">
                <div class="flex gap-2"><input id="p_d" class="input-pro" placeholder="DNI"><input id="p_nac" class="input-pro" placeholder="NACIONALIDAD"></div>
                <select id="p_edu" class="input-pro">
                    <option value="">NIVEL DE ESTUDIOS...</option>
                    <option>SIN ESTUDIOS</option><option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option><option>TERCIARIA COMPLETA</option>
                    <option>TERCIARIA INCOMPLETA</option><option>UNIVERSITARIA COMPLETA</option><option>UNIVERSITARIA INCOMPLETA</option>
                </select>
                <input id="p_ocu" class="input-pro" placeholder="TRABAJO / OCUPACIÓN">
                <input id="p_t" class="input-pro" placeholder="TELÉFONO DE CONTACTO">
                <input type="hidden" id="edit_id">
                <button onclick="save()" class="w-full bg-gold text-black font-bold py-3 rounded-lg shadow-lg hover:brightness-110">💾 IMPACTAR EN BASE DE DATOS</button>
            </div>
        </div>

        <div class="glass p-4 rounded-xl border border-gold/20">
            <input type="text" id="search" onkeyup="renderTable()" class="input-pro border-gold/30" placeholder="🔎 BUSCADOR POR DNI O APELLIDO PARA EDITAR REGISTROS...">
            <div class="overflow-x-auto mt-4"><table class="w-full"><tbody id="mainTable"></tbody></table></div>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-4">
        <div class="flex justify-between items-center glass p-4 rounded-xl">
            <h2 class="text-gold font-bold">REGISTRO DIARIO POR SECCIÓN</h2>
            <input type="date" id="asisDate" class="bg-transparent text-white font-bold border-b border-gold" onchange="renderAsis()">
        </div>
        <div id="asisCards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3"></div>
        <div id="salaView" class="glass p-6 rounded-2xl hidden border-2 border-gold/30 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 id="currentSala" class="text-xl font-bold text-gold italic"></h3>
                <button onclick="closeSala()" class="text-red-500 font-bold border border-red-500 px-4 py-1 rounded-full hover:bg-red-500 hover:text-white transition">CERRAR VISTA</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="studentList"></div>
        </div>
    </section>

    <section id="sec3" class="hidden space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div class="glass p-6 rounded-xl border-l-4 border-gold text-center">
                <p class="opacity-50 text-[8px]">MATRÍCULA INSTITUCIONAL</p>
                <h4 id="statTotal" class="text-3xl font-black"></h4>
            </div>
            <div class="glass p-6 rounded-xl border-l-4 border-blue-500 text-center">
                <p class="opacity-50 text-[8px]">VACANTES DISPONIBLES (TOTAL 420)</p>
                <h4 id="statVac" class="text-3xl font-black text-blue-400"></h4>
            </div>
            <div class="glass p-6 rounded-xl border-l-4 border-emerald-500 text-center">
                <p class="opacity-50 text-[8px]">PROM. ASISTENCIA GLOBAL</p>
                <h4 id="statAvg" class="text-3xl font-black text-emerald-400"></h4>
            </div>
        </div>

        <div class="glass p-6 rounded-xl space-y-6">
            <h3 class="font-bold text-center italic">ANÁLISIS POBLACIONAL DE ASISTENCIA POR SALA</h3>
            <div id="chartsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div class="glass p-8 rounded-xl border-2 border-dashed border-white/10 text-center space-y-6">
            <h3 class="font-bold italic">SISTEMA DE RESPALDO Y EXPORTACIÓN DE SUPERVISIÓN</h3>
            <div class="flex flex-wrap gap-4 justify-center">
                <button onclick="exportJSON()" class="bg-blue-600 px-10 py-3 rounded-full font-bold shadow-lg">BAJAR RESPALDO (.JSON)</button>
                <button onclick="exportSupervision()" class="bg-emerald-600 px-10 py-3 rounded-full font-bold shadow-lg">INFORME EXCEL SUPERVISIÓN</button>
                <label class="bg-purple-600 px-10 py-3 rounded-full font-bold shadow-lg cursor-pointer">IMPORTAR EXCEL / BACKUP
                    <input type="file" class="hidden" onchange="importData(event)">
                </label>
            </div>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('PLATINUM_DB')) || [];
    let asis = JSON.parse(localStorage.getItem('PLATINUM_ASIS')) || {};
    const SALAS = ["SALA ROSA TM","SALA ROSA TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA CELESTE TM","SALA CELESTE TT","SALA VIOLETA TM","SALA VIOLETA TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT","SALA VERDE TM","SALA VERDE TT"];

    function init() { render(); document.getElementById('asisDate').value = new Date().toISOString().split('T')[0]; }

    function tab(n) { [1,2,3].forEach(i => { document.getElementById('sec'+i).classList.toggle('hidden', i !== n); document.getElementById('t'+i).classList.toggle('active', i === n); }); }

    function calcAge(f) {
        const limit = new Date("2026-06-30"), birth = new Date(f);
        let age = limit.getFullYear() - birth.getFullYear();
        if (limit.getMonth() < birth.getMonth() || (limit.getMonth() === birth.getMonth() && limit.getDate() < birth.getDate())) age--;
        document.getElementById('a_e').value = age + " AÑOS";
    }

    function save() {
        const id = document.getElementById('edit_id').value || Date.now();
        const data = {
            id: Number(id),
            a: { n: v('a_n'), d: v('a_d'), nac: v('a_nac'), f: v('a_f'), e: v('a_e'), s: v('a_s'), dom: v('a_dom'), salud: v('a_salud') },
            m: { n: v('m_n'), d: v('m_d'), nac: v('m_nac'), dom: v('m_dom'), edu: v('m_edu'), ocu: v('m_ocu'), t: v('m_t') },
            p: { n: v('p_n'), d: v('p_d'), nac: v('p_nac'), dom: v('p_dom'), edu: v('p_edu'), ocu: v('p_ocu'), t: v('p_t') }
        };
        db = db.filter(x => x.id !== data.id); db.push(data);
        localStorage.setItem('PLATINUM_DB', JSON.stringify(db));
        alert("REGISTRO GUARDADO Y AUDITADO CON ÉXITO"); clear(); render();
    }

    function render() {
        // Render Asistencia Cards (Interactivo por Color)
        document.getElementById('asisCards').innerHTML = SALAS.map(s => {
            const count = db.filter(x => x.a.s === s).length;
            const colorClass = s.split(' ')[1];
            return `<div onclick="openSala('${s}')" class="glass p-4 rounded-xl SALA-${colorClass} cursor-pointer hover:scale-105 transition">
                <p class="text-[8px] font-bold opacity-60">${s}</p>
                <div class="flex justify-between items-end mt-2"><h4 class="text-sm font-black">${count}/30</h4><span class="text-gold text-[7px] font-bold">VER SALA</span></div>
            </div>`;
        }).join('');

        // Supervisión Stats
        document.getElementById('statTotal').innerText = db.length;
        document.getElementById('statVac').innerText = 420 - db.length;
        
        // Gráficos de Análisis
        const date = document.getElementById('asisDate').value;
        document.getElementById('chartsContainer').innerHTML = SALAS.map(s => {
            const salaData = db.filter(x => x.a.s === s);
            if(salaData.length === 0) return "";
            const pres = salaData.filter(x => asis[date] && asis[date][x.id] === 'P').length;
            const perc = ((pres / salaData.length) * 100).toFixed(0);
            return `<div><div class="flex justify-between text-[8px] mb-1 font-bold"><span>${s}</span><span>${perc}% ASIS.</span></div>
                    <div class="h-2 bg-white/5 rounded-full overflow-hidden"><div class="stat-fill bg-gold" style="width:${perc}%"></div></div></div>`;
        }).join('');
        renderTable();
    }

    function openSala(sala) {
        document.getElementById('salaView').classList.remove('hidden');
        document.getElementById('currentSala').innerText = "VISTA PREVIA: " + sala;
        const students = db.filter(x => x.a.s === sala).sort((a,b) => a.a.n.localeCompare(b.a.n));
        const date = document.getElementById('asisDate').value;
        
        document.getElementById('studentList').innerHTML = students.map(x => {
            const state = (asis[date] && asis[date][x.id]) || '';
            return `<div class="glass p-4 rounded-xl border border-white/5">
                <div class="flex justify-between mb-2"><span class="font-black text-blue-300 text-[10px]">${x.a.n}</span><span class="opacity-40">${x.a.d}</span></div>
                <div class="flex gap-1">
                    <button onclick="mark('${date}',${x.id},'P')" class="flex-1 py-2 rounded-lg ${state==='P'?'bg-emerald-500 font-black':'bg-white/5'}">PRESENTE</button>
                    <button onclick="mark('${date}',${x.id},'A')" class="flex-1 py-2 rounded-lg ${state==='A'?'bg-red-500 font-black':'bg-white/5'}">AUSENTE</button>
                    <button onclick="edit(${x.id})" class="bg-gold/20 text-gold px-3 rounded-lg"><i class="bi bi-pencil"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    function mark(d, id, v) { if(!asis[d]) asis[d]={}; asis[d][id]=v; localStorage.setItem('PLATINUM_ASIS', JSON.stringify(asis)); openSala(document.getElementById('currentSala').innerText.replace("VISTA PREVIA: ","")); render(); }

    function renderTable() {
        const q = document.getElementById('search').value.toUpperCase();
        document.getElementById('mainTable').innerHTML = db.filter(x => x.a.d.includes(q) || x.a.n.includes(q)).map(x => `
            <tr class="border-b border-white/5 hover:bg-white/5 transition">
                <td class="p-3 font-bold">${x.a.n} <span class="text-gold opacity-60 ml-2">${x.a.s}</span></td>
                <td class="p-3 text-right text-blue-400 font-black cursor-pointer" onclick="edit(${x.id})">CARGAR / EDITAR</td>
            </tr>
        `).join('');
    }

    function edit(id) {
        const x = db.find(i => i.id === id); if(!x) return;
        document.getElementById('edit_id').value = x.id;
        ['a','m','p'].forEach(pref => { Object.keys(x[pref]).forEach(k => { if(document.getElementById(pref+'_'+k)) document.getElementById(pref+'_'+k).value = x[pref][k]; }); });
        tab(1); closeSala(); window.scrollTo(0,0);
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = "RESPALDO_PLATINUM_J926.json"; a.click();
    }

    function exportSupervision() {
        let csv = "\ufeffINFORME DE SUPERVISIÓN INSTITUCIONAL - J926\nSALA;ALUMNO;DNI;EDAD;ESTUDIOS MADRE;ESTUDIOS PADRE;CELULAR CONTACTO;SALUD\n";
        db.forEach(x => csv += `${x.a.s};${x.a.n};${x.a.d};${x.a.e};${x.m.edu};${x.p.edu};${x.p.t};${x.a.salud.replace(/\n/g," ")}\n`);
        const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        a.download="INFORME_SUPERVISION_J926.csv"; a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            try { db = JSON.parse(ev.target.result); localStorage.setItem('PLATINUM_DB', JSON.stringify(db)); render(); alert("IMPORTACIÓN EXITOSA"); }
            catch(err) { alert("ERROR EN ARCHIVO: ASEGURESE QUE SEA UN .JSON DE RESPALDO"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function v(id) { return document.getElementById(id).value.toUpperCase().trim(); }
    function clear() { document.querySelectorAll('input, textarea').forEach(i => { if(!['a_s','a_nac','m_nac','p_nac','m_edu','p_edu'].includes(i.id)) i.value=""; }); document.getElementById('edit_id').value=""; }
    function closeSala() { document.getElementById('salaView').classList.add('hidden'); }
</script>
</body>
</html>
