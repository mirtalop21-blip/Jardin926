<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA J926 PLATINUM - 14 SALAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #000; border: 1px solid #1e293b; padding: 10px; border-radius: 6px; color: #fff; width: 100%; transition: 0.3s; }
        .input-pro:focus { border-color: var(--gold); outline: none; }
        .nav-tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 900; border-bottom: 3px solid transparent; opacity: 0.5; }
        .nav-tab.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); background: linear-gradient(to top, rgba(250,204,21,0.05), transparent); }
        .mic-active { color: #ef4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .card-sala { cursor: pointer; transition: 0.2s; border-left-width: 4px; }
        .card-sala:hover { transform: translateY(-3px); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body onload="render()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10">
    <div onclick="tab(1)" id="t1" class="nav-tab active"><i class="bi bi-person-plus-fill"></i> CARGA</div>
    <div onclick="tab(2)" id="t2" class="nav-tab"><i class="bi bi-eye-fill"></i> SUPERVISIÓN</div>
    <div onclick="tab(3)" id="t3" class="nav-tab"><i class="bi bi-database-fill-gear"></i> SISTEMA</div>
</nav>

<main class="p-4 space-y-4">
    <section id="sec1" class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="glass p-5 rounded-2xl border-blue-500 space-y-2 border-t-4">
            <h3 class="text-blue-400 font-black mb-2 italic">DATOS DEL ALUMNO/A</h3>
            <div class="relative"><input id="a_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer" onclick="voice('a_n')"></i></div>
            <div class="flex gap-2"><input id="a_d" class="input-pro" placeholder="DNI"><input id="a_nac" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA"></div>
            <div class="flex gap-2">
                <div class="w-full"><label class="text-[8px] text-gold">FECHA NAC.</label><input id="a_f" type="date" class="input-pro" onchange="calcAge(this.value)"></div>
                <div class="w-full"><label class="text-[8px] text-gold">EDAD AL 30/6</label><input id="a_e" class="input-pro" readonly></div>
            </div>
            <select id="a_s" class="input-pro text-gold font-bold">
                <option>SALA ROSA TM</option><option>SALA ROSA TT</option>
                <option>SALA VERDE TM</option><option>SALA VERDE TT</option>
                <option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                <option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option>
                <option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                <option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option>
            </select>
            <div class="relative"><input id="a_dom" class="input-pro" placeholder="DOMICILIO"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer" onclick="voice('a_dom')"></i></div>
            <div class="flex gap-2"><input id="a_h" class="input-pro" placeholder="HERMANOS"><select id="a_hj" class="input-pro"><option value="NO">¿EN JARDÍN? NO</option><option value="SI">SI</option></select></div>
            <textarea id="a_sal" class="input-pro h-14" placeholder="SALUD / OBSERVACIONES"></textarea>
        </div>

        <div class="glass p-5 rounded-2xl border-rose-500 space-y-2 border-t-4">
            <h3 class="text-rose-400 font-black mb-2 italic">DATOS DE LA MADRE</h3>
            <div class="relative"><input id="m_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer" onclick="voice('m_n')"></i></div>
            <div class="flex gap-2"><input id="m_d" class="input-pro" placeholder="DNI"><input id="m_nac" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA"></div>
            <select id="m_edu" class="input-pro"><option>PRIMARIA C/I</option><option>SECUNDARIA C/I</option><option>TERCIARIO C/I</option><option>UNIVERSITARIO C/I</option></select>
            <div class="flex gap-2"><input id="m_t" class="input-pro" placeholder="TELÉFONO"><select id="m_auh" class="input-pro"><option value="NO">AUH: NO</option><option value="SI">AUH: SI</option></select></div>
            <input id="m_ocu" class="input-pro" placeholder="OCUPACIÓN">
            <input id="m_dom" class="input-pro" placeholder="DOMICILIO MADRE">
        </div>

        <div class="glass p-5 rounded-2xl border-emerald-500 space-y-2 border-t-4">
            <h3 class="text-emerald-400 font-black mb-2 italic">DATOS DEL PADRE</h3>
            <div class="relative"><input id="p_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer" onclick="voice('p_n')"></i></div>
            <div class="flex gap-2"><input id="p_d" class="input-pro" placeholder="DNI"><input id="p_nac" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA"></div>
            <select id="p_edu" class="input-pro"><option>PRIMARIA C/I</option><option>SECUNDARIA C/I</option><option>TERCIARIO C/I</option><option>UNIVERSITARIO C/I</option></select>
            <input id="p_t" class="input-pro" placeholder="TELÉFONO">
            <input id="p_ocu" class="input-pro" placeholder="OCUPACIÓN">
            <input id="p_dom" class="input-pro" placeholder="DOMICILIO PADRE">
            <input type="hidden" id="edit_id">
            <button onclick="save()" id="btnSave" class="w-full bg-gold text-black font-black py-4 rounded-xl mt-4 shadow-lg">💾 GUARDAR LEGAJO</button>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-4">
        <div id="gridSalas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2"></div>
        
        <div class="glass p-5 rounded-2xl">
            <div class="flex gap-2 mb-4">
                <input type="text" id="search" onkeyup="render()" class="input-pro" placeholder="🔎 BUSCAR ALUMNO O DNI...">
                <button onclick="render()" class="bg-white/10 px-4 rounded-lg"><i class="bi bi-arrow-clockwise"></i></button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="opacity-40 text-[7px] border-b border-white/10">
                        <tr><th class="p-2">ESTUDIANTE</th><th class="p-2">SALA</th><th class="p-2">INFO EXTRA</th><th class="p-2">CONTACTOS</th><th class="p-2 text-right">ACCIONES</th></tr>
                    </thead>
                    <tbody id="tableMain"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="sec3" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
            <h3 class="text-blue-400 font-black mb-4 italic">RECUPERAR DOCUMENTO (BACKUP)</h3>
            <input type="file" onchange="importJSON(event)" class="text-[8px] mb-4 w-full">
            <button onclick="exportJSON()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">DESCARGAR TODO (.JSON)</button>
        </div>
        <div class="glass p-6 rounded-2xl border-l-4 border-orange-500">
            <h3 class="text-orange-400 font-black mb-4 italic">CARGA RÁPIDA (BULK)</h3>
            <textarea id="bulkData" class="input-pro h-20 text-[8px]" placeholder="PEGA AQUÍ NOMBRE Y DNI DESDE EXCEL..."></textarea>
            <button onclick="processBulk()" class="w-full bg-orange-600/20 border border-orange-500 p-2 rounded mt-2 font-bold">PROCESAR LISTA</button>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('J926_PLATINUM_DB')) || [];
    const SALAS = ["SALA ROSA TM","SALA ROSA TT","SALA VERDE TM","SALA VERDE TT","SALA CELESTE TM","SALA CELESTE TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA VIOLETA TM","SALA VIOLETA TT"];

    function tab(n) { [1,2,3].forEach(i => { document.getElementById('sec'+i).classList.toggle('hidden', i !== n); document.getElementById('t'+i).classList.toggle('active', i === n); }); }

    function voice(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = "es-AR";
        rec.onstart = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.add('mic-active');
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.onend = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.remove('mic-active');
        rec.start();
    }

    function calcAge(f) {
        if(!f) return;
        const limit = new Date("2026-06-30"), nac = new Date(f);
        let e = limit.getFullYear() - nac.getFullYear();
        if (limit.getMonth() < nac.getMonth() || (limit.getMonth() === nac.getMonth() && limit.getDate() < nac.getDate())) e--;
        document.getElementById('a_e').value = e + " AÑOS";
    }

    function save() {
        const id = document.getElementById('edit_id').value || Date.now();
        const record = {
            id: Number(id),
            a: { n: v('a_n'), d: v('a_d'), nac: v('a_nac'), f: v('a_f'), e: v('a_e'), s: v('a_s'), dom: v('a_dom'), h: v('a_h'), hj: v('a_hj'), sal: v('a_sal') },
            m: { n: v('m_n'), d: v('m_d'), nac: v('m_nac'), edu: v('m_edu'), t: v('m_t'), auh: v('m_auh'), ocu: v('m_ocu'), dom: v('m_dom') },
            p: { n: v('p_n'), d: v('p_d'), nac: v('p_nac'), edu: v('p_edu'), t: v('p_t'), ocu: v('p_ocu'), dom: v('p_dom') }
        };
        if(!record.a.n) return alert("FALTA NOMBRE");
        db = db.filter(x => x.id !== record.id);
        db.push(record);
        sync(); clear(); alert("GUARDADO");
        document.getElementById('btnSave').innerText = "💾 GUARDAR LEGAJO";
        document.getElementById('edit_id').value = "";
    }

    function sync() { localStorage.setItem('J926_PLATINUM_DB', JSON.stringify(db)); render(); }

    function render(salaFilter = null) {
        // FOTOGRAFÍA DE SALAS
        document.getElementById('gridSalas').innerHTML = SALAS.map(s => {
            const n = db.filter(x => x.a.s === s).length;
            const color = s.split(' ')[1].toLowerCase();
            return `<div onclick="render('${s}')" class="card-sala glass p-2 rounded-lg border-slate-700 ${salaFilter===s?'border-gold bg-gold/5':''}">
                <p class="text-[6px] opacity-50">${s}</p>
                <h4 class="text-xs font-black">${n}/30</h4>
            </div>`;
        }).join('');

        const q = document.getElementById('search').value.toLowerCase();
        let f = db.filter(x => x.a.n.toLowerCase().includes(q) || x.a.d.includes(q));
        if(salaFilter) f = f.filter(x => x.a.s === salaFilter);

        document.getElementById('tableMain').innerHTML = f.map(x => `
            <tr class="border-b border-white/5 hover:bg-white/5 transition">
                <td class="p-2 font-bold text-blue-400 text-[9px]">${x.a.n}<br><span class="opacity-40 font-normal">${x.a.d}</span></td>
                <td class="p-2 text-gold font-bold">${x.a.s}</td>
                <td class="p-2 text-[7px] opacity-60">${x.a.dom}<br><span class="text-rose-400 italic">${x.a.sal || ''}</span></td>
                <td class="p-2 text-[7px]">M: ${x.m.t || '-'}<br>P: ${x.p.t || '-'}</td>
                <td class="p-2 text-right">
                    <button onclick="edit(${x.id})" class="text-blue-400 mr-2"><i class="bi bi-pencil-square"></i></button>
                    <button onclick="remove(${x.id})" class="text-rose-500"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function edit(id) {
        const x = db.find(i => i.id === id);
        if(!x) return;
        document.getElementById('edit_id').value = x.id;
        const f = ['a_n','a_d','a_nac','a_f','a_e','a_s','a_dom','a_h','a_hj','a_sal','m_n','m_d','m_nac','m_edu','m_t','m_auh','m_ocu','m_dom','p_n','p_d','p_nac','p_edu','p_t','p_ocu','p_dom'];
        f.forEach(field => {
            const [cat, key] = field.split('_');
            document.getElementById(field).value = x[cat][key] || "";
        });
        document.getElementById('btnSave').innerText = "💾 ACTUALIZAR LEGAJO";
        tab(1); window.scrollTo(0,0);
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                if(Array.isArray(data)) {
                    db = data.map(item => {
                        if (item.n && !item.a) { // Puente para legajos viejos
                            return { id: item.id || Date.now(), a: { n: item.n, d: item.d, nac: 'ARGENTINA', f: '', e: '', s: item.sala || 'SALA ROSA TM', dom: '', h: '0', hj: 'NO', sal: '' }, m: { n: '', d: '', nac: 'ARGENTINA', edu: 'SECUNDARIA C/I', t: '', auh: 'NO', ocu: '', dom: '' }, p: { n: '', d: '', nac: 'ARGENTINA', edu: 'SECUNDARIA C/I', t: '', ocu: '', dom: '' } };
                        }
                        return item;
                    });
                    sync(); alert("✅ SISTEMA RESTAURADO: " + db.length + " LEGAJOS.");
                    tab(2);
                }
            } catch(e) { alert("ERROR DE ARCHIVO"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function exportJSON() {
        const b = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "PLATINUM_J926_COMPLETO.json"; a.click();
    }

    function processBulk() {
        const lines = document.getElementById('bulkData').value.split('\n');
        lines.forEach(line => {
            const p = line.split('\t');
            if(p[0]) db.push({ id: Date.now()+Math.random(), a: { n: p[0].toUpperCase(), d: p[1] || "", nac: 'ARGENTINA', f: '', e: '', s: 'SALA ROSA TM', dom: '', h: '0', hj: 'NO', sal: '' }, m: {}, p: {} });
        });
        sync(); alert("PROCESADO"); document.getElementById('bulkData').value = "";
    }

    function v(id) { return document.getElementById(id).value.toUpperCase().trim(); }
    function clear() { document.querySelectorAll('input, textarea').forEach(i => { if(!['a_s','a_nac','m_nac','p_nac'].includes(i.id)) i.value=""; }); }
    function remove(id) { if(confirm("¿ELIMINAR?")) { db = db.filter(x => x.id !== id); sync(); } }
</script>
</body>
                </html>
