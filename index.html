<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA J926 - VARELA - GESTIÓN TOTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #cbd5e1; }
        .input-pro { width: 100%; border: 4px solid #000; padding: 10px; font-weight: 900; background: #fff; font-size: 12px; }
        .card-pro { border: 6px solid #000; background: white; padding: 20px; box-shadow: 10px 10px 0px #000; }
        .nav-btn { flex: 1; text-align: center; padding: 15px; font-weight: 900; cursor: pointer; border: 4px solid #000; margin: 2px; }
        .active { background: #facc15; box-shadow: inset 4px 4px 0px #000; }
        th { background: #000; color: #fff; padding: 10px; font-size: 11px; }
        td { border: 2px solid #000; padding: 8px; font-weight: 900; font-size: 11px; background: #fff; }
        .presente { background: #86efac !important; }
        .ausente { background: #fca5a5 !important; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex p-2 bg-slate-900 sticky top-0 z-50">
    <div onclick="ver(1)" id="t1" class="nav-btn bg-blue-500 text-white active">1. LEGAJO (CARGA 🎤)</div>
    <div onclick="ver(2)" id="t2" class="nav-btn bg-emerald-500 text-white">2. ASISTENCIA RÁPIDA 📋</div>
    <div onclick="ver(3)" id="t3" class="nav-btn bg-orange-500 text-white">3. SUPERVISIÓN / EXCEL 📊</div>
</nav>

<main class="p-4">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="border-r-4 border-black pr-4">
                <p class="bg-blue-800 text-white p-2 text-center mb-2">ALUMNO/A</p>
                <label class="text-[10px]">NOMBRE COMPLETO</label>
                <div class="flex gap-1"><input type="text" id="n" class="input-pro"><button onclick="voz('n')" class="bg-red-600 text-white px-2 border-2 border-black">🎤</button></div>
                <label class="text-[10px]">DNI (BÚSQUEDA RÁPIDA)</label><input type="number" id="d" class="input-pro">
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <div><label class="text-[10px]">SALA</label>
                        <select id="sala" class="input-pro">
                            <option>SALA ROSA TM</option><option>SALA NARANJA TT</option>
                            <option>SALA ROJA TM</option><option>SALA CELESTE TT</option>
                        </select>
                    </div>
                    <div><label class="text-[10px]">EDAD (AL 30/06)</label><input type="text" id="e" class="input-pro"></div>
                </div>
                <label class="text-[10px]">SALUD / ALERGIAS</label><input type="text" id="salud" class="input-pro">
            </div>
            <div class="border-r-4 border-black pr-4">
                <p class="bg-rose-600 text-white p-2 text-center mb-2">MADRE</p>
                <input type="text" id="mn" placeholder="NOMBRE" class="input-pro mb-1">
                <input type="text" id="m_ocu" placeholder="OCUPACIÓN" class="input-pro mb-1">
                <input type="text" id="mtel" placeholder="TELÉFONO" class="input-pro mb-1">
                <select id="auh" class="input-pro"><option>PERCIBE AUH: SÍ</option><option>PERCIBE AUH: NO</option></select>
            </div>
            <div>
                <p class="bg-emerald-700 text-white p-2 text-center mb-2">PADRE</p>
                <input type="text" id="pn" placeholder="NOMBRE" class="input-pro mb-1">
                <input type="text" id="p_ocu" placeholder="OCUPACIÓN" class="input-pro mb-1">
                <input type="text" id="ptel" placeholder="TELÉFONO" class="input-pro mb-1">
                <button onclick="guardar()" class="w-full mt-4 bg-yellow-400 p-6 border-4 border-black font-black text-xl shadow-[5px_5px_0px_#000]">💾 GUARDAR DATOS</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="card-pro hidden">
        <h2 class="bg-black text-white p-2 mb-4">ASISTENCIA DIARIA (TOCAR PARA CAMBIAR)</h2>
        <div id="grillaAsistencia" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-2"></div>
    </section>

    <section id="sec3" class="card-pro hidden">
        <div class="flex flex-wrap gap-4 mb-6">
            <div class="bg-black text-white p-4 border-4 border-black">
                <p class="text-xs">MATRÍCULA ACTIVA</p>
                <p id="totalLabel" class="text-4xl font-black">0</p>
            </div>
            <button onclick="exportarExcel()" class="bg-green-600 text-white p-4 border-4 border-black font-black">📊 DESCARGAR EXCEL SUPERVISIÓN</button>
            <button onclick="respaldar()" class="bg-blue-600 text-white p-4 border-4 border-black font-black">💾 RESPALDO OTRA COMPU</button>
            <label class="bg-white p-4 border-4 border-black font-black cursor-pointer">📂 CARGAR RESPALDO<input type="file" id="fileIn" class="hidden" onchange="importar(event)"></label>
        </div>

        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR DNI O APELLIDO..." class="w-full p-4 border-4 border-black mb-4 text-xl">
        
        <table class="w-full border-collapse">
            <thead>
                <tr>
                    <th>ALUMNO / DNI</th><th>SALA</th><th>CONTACTOS</th><th>GESTIÓN</th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
    </section>
</main>

<script>
    let db = [];
    let editIdx = null;

    function inicializar() {
        const data = localStorage.getItem('J926_SISTEMA');
        if (data) db = JSON.parse(data);
        renderTabla();
        renderAsistencia();
    }

    function ver(n) {
        document.getElementById('sec1').classList.toggle('hidden', n !== 1);
        document.getElementById('sec2').classList.toggle('hidden', n !== 2);
        document.getElementById('sec3').classList.toggle('hidden', n !== 3);
        [1,2,3].forEach(i => document.getElementById('t'+i).classList.toggle('active', i === n));
    }

    function guardar() {
        const obj = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            s: document.getElementById('sala').value,
            e: document.getElementById('e').value,
            salud: document.getElementById('salud').value.toUpperCase(),
            mn: document.getElementById('mn').value.toUpperCase(),
            m_ocu: document.getElementById('m_ocu').value.toUpperCase(),
            mtel: document.getElementById('mtel').value,
            auh: document.getElementById('auh').value,
            pn: document.getElementById('pn').value.toUpperCase(),
            p_ocu: document.getElementById('p_ocu').value.toUpperCase(),
            ptel: document.getElementById('ptel').value,
            presencia: true
        };

        if(editIdx !== null) db[editIdx] = obj;
        else db.push(obj);

        localStorage.setItem('J926_SISTEMA', JSON.stringify(db));
        editIdx = null;
        limpiar();
        renderTabla();
        renderAsistencia();
        alert("DATOS ACTUALIZADOS");
    }

    function editar(i) {
        const a = db[i];
        editIdx = i;
        document.getElementById('n').value = a.n;
        document.getElementById('d').value = a.d;
        document.getElementById('sala').value = a.s;
        document.getElementById('e').value = a.e;
        document.getElementById('salud').value = a.salud;
        document.getElementById('mn').value = a.mn;
        document.getElementById('m_ocu').value = a.m_ocu;
        document.getElementById('mtel').value = a.mtel;
        document.getElementById('auh').value = a.auh;
        document.getElementById('pn').value = a.pn;
        document.getElementById('p_ocu').value = a.p_ocu;
        document.getElementById('ptel').value = a.ptel;
        ver(1);
    }

    function renderTabla() {
        const bus = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('cuerpo');
        t.innerHTML = "";
        db.forEach((a, i) => {
            if(a.n.includes(bus) || a.d.includes(bus)) {
                t.innerHTML += `<tr>
                    <td>${a.n}<br><small>DNI: ${a.d}</small></td>
                    <td>${a.s}</td>
                    <td>M: ${a.mtel}<br>P: ${a.ptel}</td>
                    <td>
                        <button onclick="editar(${i})" class="bg-yellow-400 p-2 border-2 border-black">EDITAR</button>
                        <button onclick="borrar(${i})" class="bg-red-500 text-white p-2 border-2 border-black">BORRAR</button>
                    </td>
                </tr>`;
            }
        });
        document.getElementById('totalLabel').innerText = db.length;
    }

    function renderAsistencia() {
        const g = document.getElementById('grillaAsistencia');
        g.innerHTML = "";
        db.forEach((a, i) => {
            const status = a.presencia ? 'presente' : 'ausente';
            const txt = a.presencia ? 'PRESENTE' : 'AUSENTE';
            g.innerHTML += `<div onclick="togglePresencia(${i})" class="p-3 border-4 border-black cursor-pointer font-bold text-[10px] ${status}">
                ${a.n}<br>${txt}
            </div>`;
        });
    }

    function togglePresencia(i) {
        db[i].presencia = !db[i].presencia;
        localStorage.setItem('J926_SISTEMA', JSON.stringify(db));
        renderAsistencia();
    }

    function voz(id) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-AR';
        recognition.onresult = (event) => {
            document.getElementById(id).value = event.results[0][0].transcript.toUpperCase();
        };
        recognition.start();
    }

    function respaldar() {
        const data = JSON.stringify(db);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'RESPALDO_J926.json'; a.click();
    }

    function importar(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem('J926_SISTEMA', JSON.stringify(db));
            renderTabla(); renderAsistencia();
            alert("RESPALDO CARGADO");
        };
        reader.readAsText(e.target.files[0]);
    }

    function exportarExcel() {
        let csv = "ALUMNO,DNI,SALA,EDAD,MADRE,TEL MADRE,PADRE,TEL PADRE,AUH,SALUD\n";
        db.forEach(a => {
            csv += `${a.n},${a.d},${a.s},${a.e},${a.mn},${a.mtel},${a.pn},${a.ptel},${a.auh},${a.salud}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'SUPERVISION_J926.csv'; a.click();
    }

    function borrar(i) { if(confirm("¿ELIMINAR ALUMNO?")) { db.splice(i,1); localStorage.setItem('J926_SISTEMA', JSON.stringify(db)); renderTabla(); } }
    function limpiar() { document.querySelectorAll('input').forEach(i => i.value = ""); }
</script>
</body>
</html>
