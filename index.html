<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM 360 SUPREMA | ENGINE DGCyE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --nuke: #dfff00; --alert: #ff003c; --bionic: #00d4ff; --bg: #0b0e14; }
        body { background: var(--bg); color: #f0f6fc; font-family: 'Orbitron', sans-serif; font-size: 10px; text-transform: uppercase; font-weight: 700; }
        .glass { background: rgba(22, 27, 34, 0.98); border: 1px solid rgba(223, 255, 0, 0.2); border-radius: 4px; }
        .input-bionic { background: #010409; border: 1px solid #30363d; padding: 10px; color: var(--nuke); width: 100%; border-left: 3px solid var(--nuke); font-size: 11px; margin-bottom: 4px; }
        .input-mirror { border-left: 3px solid var(--bionic); }
        .tab-active { border-bottom: 4px solid var(--nuke); color: var(--nuke); background: rgba(223, 255, 0, 0.1); }
        .card-sala { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .card-sala:hover { transform: translateY(-5px); border-color: var(--nuke); box-shadow: 0 0 15px rgba(223, 255, 0, 0.3); }
        .S-ROSA { border-left: 8px solid #ff69b4; } .S-ROJA { border-left: 8px solid #ff0000; }
        .S-NARANJA { border-left: 8px solid #ffa500; } .S-CELESTE { border-left: 8px solid #87ceeb; }
        .S-VIOLETA { border-left: 8px solid #8a2be2; } .S-AMARILLA { border-left: 8px solid #ffff00; }
        .S-AZUL { border-left: 8px solid #0000ff; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .baja-anim { animation: pulse-red 2s infinite; color: #ff003c; }
    </style>
</head>
<body onload="initApp()">

<header class="glass m-2 p-4 flex justify-between items-center sticky top-0 z-[1000] border-b-2 border-nuke">
    <div class="flex items-center gap-4">
        <div class="bg-nuke text-black px-4 py-2 rounded font-black">TITANIUM 360 SUPREMA</div>
        <div id="reloj" class="text-nuke text-xs"></div>
    </div>
    <div class="flex gap-2">
        <button onclick="exportExcel()" class="bg-emerald-800 px-4 py-2 rounded text-[9px]">EXCEL DGCyE</button>
        <button onclick="exportJSON()" class="bg-indigo-800 px-4 py-2 rounded text-[9px]">JSON BACKUP</button>
    </div>
</header>

<nav class="flex px-2 gap-1 overflow-x-auto mb-4 bg-black/80 sticky top-[80px] z-[999]">
    <button onclick="nav(1)" id="n1" class="px-6 py-4 tab-active min-w-fit">1. LEGAJO</button>
    <button onclick="nav(2)" id="n2" class="px-6 py-4 opacity-50 min-w-fit text-nuke">2. FOTO INTERACTIVA T14</button>
    <button onclick="nav(3)" id="n3" class="px-6 py-4 opacity-50 min-w-fit">3. ASISTENCIA</button>
    <button onclick="nav(4)" id="n4" class="px-6 py-4 opacity-50 min-w-fit">4. ESPERA</button>
    <button onclick="nav(5)" id="n5" class="px-6 py-4 opacity-50 min-w-fit text-red-500">5. HISTORIAL BAJAS</button>
</nav>

<main class="p-2">
    <section id="view1" class="space-y-4">
        <div class="glass p-6">
            <input type="text" id="radarMain" onkeyup="radarCore()" class="w-full bg-black border-2 border-nuke p-4 text-xl text-nuke mb-6" placeholder="BUSCAR POR APELLIDO O DNI...">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-2">
                    <h3 class="text-nuke border-b border-nuke/30 pb-1">I. ALUMNO</h3>
                    <input id="a_nom" class="input-bionic" placeholder="APELLIDO Y NOMBRE">
                    <input id="a_dni" class="input-bionic" placeholder="DNI (SÓLO NÚMEROS)">
                    <input type="date" id="a_f_nac" class="input-bionic" onchange="calcEdad()">
                    <div id="a_edad" class="bg-zinc-900 p-2 text-nuke text-center border border-zinc-700">EDAD: --</div>
                    <select id="a_sala" class="input-bionic"></select>
                    <textarea id="a_salud" class="input-bionic h-20" placeholder="SALUD / CUD / OBSERVACIONES"></textarea>
                </div>
                <div class="space-y-2">
                    <h3 class="text-bionic border-b border-bionic/30 pb-1">II. MADRE</h3>
                    <input id="m_nom" class="input-bionic input-mirror" placeholder="NOMBRE COMPLETO">
                    <input id="m_tel" class="input-bionic input-mirror" placeholder="TELÉFONO">
                    <select id="m_auh" class="input-bionic input-mirror"><option value="NO">AUH: NO</option><option value="SI">SI</option></select>
                </div>
                <div class="space-y-2">
                    <h3 class="text-bionic border-b border-bionic/30 pb-1">III. PADRE</h3>
                    <input id="p_nom" class="input-bionic input-mirror" placeholder="NOMBRE COMPLETO">
                    <input id="p_tel" class="input-bionic input-mirror" placeholder="TELÉFONO">
                    <select id="p_auh" class="input-bionic input-mirror"><option value="NO">AUH: NO</option><option value="SI">SI</option></select>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="commit('DB')" class="flex-1 bg-nuke text-black py-4 font-black">CONSOLIDAR MATRÍCULA</button>
                <button onclick="commit('ESPERA')" class="flex-1 bg-orange-600 text-white py-4 font-black">LISTA DE ESPERA</button>
            </div>
        </div>
    </section>

    <section id="view2" class="hidden">
        <div id="t14_grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 mb-6"></div>
        <div id="t14_detalle" class="glass p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 id="detalle_titulo" class="text-2xl text-nuke">SALA</h2>
                <button onclick="cerrarDetalle()" class="text-red-500">CERRAR [X]</button>
            </div>
            <div id="detalle_lista" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-2"></div>
        </div>
    </section>

    <section id="view3" class="hidden glass p-6">
        <h2 class="text-nuke mb-4">CONTROL DE PRESENTISMO DIARIO</h2>
        <div id="asis_container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </section>

    <section id="view4" class="hidden space-y-2" id="espera_lista"></section>

    <section id="view5" class="hidden space-y-2" id="bajas_lista"></section>
</main>

<script>
    let DB = JSON.parse(localStorage.getItem('T360_DB')) || [];
    let ESPERA = JSON.parse(localStorage.getItem('T360_ESPERA')) || [];
    let BAJAS = JSON.parse(localStorage.getItem('T360_BAJAS')) || [];
    const SALAS = ['ROSA', 'ROJA', 'NARANJA', 'CELESTE', 'VIOLETA', 'AMARILLA', 'AZUL'];

    function initApp() {
        const s = document.getElementById('a_sala');
        s.innerHTML = '<option value="">SELECCIONAR SALA</option>';
        SALAS.forEach(sala => {
            ['TM', 'TT'].forEach(turno => s.innerHTML += `<option value="${sala}-${turno}">${sala} ${turno}</option>`);
        });
        setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleString(), 1000);
        sync();
    }

    function sync() {
        localStorage.setItem('T360_DB', JSON.stringify(DB));
        localStorage.setItem('T360_ESPERA', JSON.stringify(ESPERA));
        localStorage.setItem('T360_BAJAS', JSON.stringify(BAJAS));
        renderT14();
    }

    // --- FOTOGRAFÍA INTERACTIVA T14 ---
    function renderT14() {
        const grid = document.getElementById('t14_grid');
        grid.innerHTML = '';
        SALAS.forEach(sala => {
            ['TM', 'TT'].forEach(turno => {
                const key = `${sala}-${turno}`;
                const count = DB.filter(x => x.a_sala === key).length;
                const auh = DB.filter(x => x.a_sala === key && (x.m_auh === 'SI' || x.p_auh === 'SI')).length;
                
                grid.innerHTML += `
                    <div class="glass p-3 card-sala S-${sala}" onclick="verDetalleSala('${key}')">
                        <p class="text-[8px] opacity-60">${turno}</p>
                        <h3 class="text-sm">${sala}</h3>
                        <div class="mt-2 flex justify-between items-end">
                            <span class="text-2xl font-black text-nuke">${count}</span>
                            <span class="text-[7px]">AUH: ${auh}</span>
                        </div>
                    </div>
                `;
            });
        });
    }

    function verDetalleSala(salaKey) {
        const detalle = document.getElementById('t14_detalle');
        const lista = document.getElementById('detalle_lista');
        const titulo = document.getElementById('detalle_titulo');
        
        titulo.innerText = `SALA: ${salaKey} - NÓMINA COMPLETA`;
        lista.innerHTML = '';
        
        const alumnos = DB.filter(x => x.a_sala === salaKey);
        alumnos.forEach(a => {
            lista.innerHTML += `
                <div class="bg-black/40 p-2 border border-zinc-800 text-[8px] flex flex-col">
                    <span class="text-nuke font-bold">${a.a_nom}</span>
                    <span>DNI: ${a.a_dni}</span>
                    <button onclick="darDeBaja('${a.a_dni}')" class="mt-2 text-red-500 border border-red-500/30 py-1">BAJA</button>
                </div>
            `;
        });
        detalle.classList.remove('hidden');
        window.scrollTo(0, document.body.scrollHeight);
    }

    function cerrarDetalle() { document.getElementById('t14_detalle').classList.add('hidden'); }

    // --- LOGICA DE DATOS ---
    function commit(target) {
        const data = {};
        document.querySelectorAll('input, select, textarea').forEach(el => {
            if(el.id && el.id !== 'radarMain') data[el.id] = el.value.toUpperCase();
        });
        
        if(!data.a_dni) return alert("ERROR: DNI REQUERIDO");

        if(target === 'DB') {
            const idx = DB.findIndex(x => x.a_dni === data.a_dni);
            if(idx > -1) DB[idx] = data; else DB.push(data);
        } else {
            ESPERA.push(data);
        }
        
        sync();
        alert("SISTEMA ACTUALIZADO");
        location.reload();
    }

    function darDeBaja(dni) {
        const motivo = prompt("MOTIVO DE BAJA:");
        if(!motivo) return;
        const idx = DB.findIndex(x => x.a_dni === dni);
        const alu = DB.splice(idx, 1)[0];
        alu.baja_fecha = new Date().toLocaleDateString();
        alu.baja_motivo = motivo;
        BAJAS.push(alu);
        sync();
        verDetalleSala(alu.a_sala);
    }

    function radarCore() {
        const q = document.getElementById('radarMain').value.toUpperCase();
        if(q.length < 3) return;
        const alu = DB.find(x => x.a_dni.includes(q) || x.a_nom.includes(q));
        if(alu) {
            Object.keys(alu).forEach(k => {
                const el = document.getElementById(k);
                if(el) el.value = alu[k];
            });
            calcEdad();
        }
    }

    function calcEdad() {
        const f = new Date(document.getElementById('a_f_nac').value);
        const edad = 2026 - f.getFullYear();
        document.getElementById('a_edad').innerText = `EDAD: ${edad} AÑOS`;
    }

    function nav(n) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-50'));
        document.getElementById('view'+n).classList.remove('hidden');
        document.getElementById('n'+n).classList.remove('opacity-50');
        document.getElementById('n'+n).classList.add('tab-active');
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(DB);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "MATRICULA");
        XLSX.writeFile(wb, `TITANIUM_FOTO_INSTITUCIONAL.xlsx`);
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify({DB, ESPERA, BAJAS})], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "TITANIUM_BACKUP.json"; a.click();
    }
</script>
</body>
</html>
