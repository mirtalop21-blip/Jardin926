<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA PROFESIONAL J926 - GESTIÓN INTEGRAL 14 SALAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #0f172a; color: #fff; }
        .card-pro { background: white; color: #000; border: 8px solid #000; box-shadow: 12px 12px 0px #facc15; padding: 25px; }
        .input-master { width: 100%; border: 3px solid #000; padding: 10px; font-weight: 900; background: #fff; font-size: 11px; margin-bottom: 5px; }
        .nav-tab { flex: 1; text-align: center; padding: 18px; font-weight: 900; cursor: pointer; border: 2px solid #fff; transition: 0.2s; }
        .nav-tab.active { background: #facc15; color: #000; border-bottom: 8px solid #000; transform: translateY(-3px); }
        .btn-mic { background: #ef4444; color: white; border: 2px solid #000; padding: 4px 10px; font-size: 14px; border-radius: 4px; }
        th { background: #000; color: #fff; padding: 12px; font-size: 11px; text-transform: uppercase; }
        td { border: 2px solid #000; padding: 8px; font-weight: 900; font-size: 11px; text-align: center; background: #fff; }
        .presente { background: #4ade80 !important; border: 5px solid #166534 !important; }
        .ausente { background: #f87171 !important; border: 5px solid #991b1b !important; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-8 border-yellow-400">
    <div onclick="ver(1)" id="t1" class="nav-tab active">1. LEGAJO COMPLETO (VOZ 🎤)</div>
    <div onclick="ver(2)" id="t2" class="nav-tab bg-emerald-600">2. ASISTENCIA RÁPIDA 📋</div>
    <div onclick="ver(3)" id="t3" class="nav-tab bg-blue-600">3. SUPERVISIÓN Y EXCEL 📊</div>
</nav>

<main class="p-6">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="border-r-4 border-black pr-6">
                <p class="bg-blue-800 text-white p-2 text-center font-black mb-4">DATOS DEL ALUMNO/A</p>
                <label class="text-[10px]">APELLIDO Y NOMBRE</label><div class="flex gap-1"><input id="n" class="input-master"><button onclick="voz('n')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[10px]">DNI</label><input id="d" class="input-master"></div>
                    <div><label class="text-[10px]">NACIONALIDAD</label><input id="nac" value="ARGENTINA" class="input-master"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[10px]">FECHA NAC.</label><input id="f" type="date" class="input-master"></div>
                    <div><label class="text-[10px]">EDAD (AL 30/06)</label><input id="e" class="input-master"></div>
                </div>
                <label class="text-[10px] text-red-600 font-black">SALA (SELECCIONE UNA DE LAS 14)</label>
                <select id="sala" class="input-master bg-yellow-100">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option>
                    <option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option>
                    <option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA VERDE TM</option><option>SALA VERDE TT</option>
                    <option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
                </select>
                <label class="text-[10px]">DOMICILIO</label><div class="flex gap-1"><input id="dom" class="input-master"><button onclick="voz('dom')" class="btn-mic">🎤</button></div>
                <label class="text-[10px]">SALUD / OBSERVACIONES</label><div class="flex gap-1"><input id="salud" class="input-master"><button onclick="voz('salud')" class="btn-mic">🎤</button></div>
            </div>

            <div class="border-r-4 border-black pr-6">
                <p class="bg-rose-700 text-white p-2 text-center font-black mb-4">DATOS DE LA MADRE</p>
                <label class="text-[10px]">NOMBRE COMPLETO</label><div class="flex gap-1"><input id="mn" class="input-master"><button onclick="voz('mn')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[10px]">DNI</label><input id="mdni" class="input-master"></div>
                    <div><label class="text-[10px] text-blue-700">¿PERCIBE AUH?</label><select id="auh" class="input-master bg-blue-50 font-black"><option>SÍ</option><option>NO</option></select></div>
                </div>
                <label class="text-[10px]">OCUPACIÓN</label><div class="flex gap-1"><input id="m_ocu" class="input-master"><button onclick="voz('m_ocu')" class="btn-mic">🎤</button></div>
                <label class="text-[10px]">TELÉFONO DE CONTACTO</label><div class="flex gap-1"><input id="mtel" class="input-master"><button onclick="voz('mtel')" class="btn-mic">🎤</button></div>
                <label class="text-[10px]">DOMICILIO MADRE</label><div class="flex gap-1"><input id="mdom" class="input-master"><button onclick="voz('mdom')" class="btn-mic">🎤</button></div>
            </div>

            <div>
                <p class="bg-emerald-800 text-white p-2 text-center font-black mb-4">DATOS DEL PADRE</p>
                <label class="text-[10px]">NOMBRE COMPLETO</label><div class="flex gap-1"><input id="pn" class="input-master"><button onclick="voz('pn')" class="btn-mic">🎤</button></div>
                <label class="text-[10px]">DNI</label><input id="pdni" class="input-master">
                <label class="text-[10px]">OCUPACIÓN</label><div class="flex gap-1"><input id="p_ocu" class="input-master"><button onclick="voz('p_ocu')" class="btn-mic">🎤</button></div>
                <label class="text-[10px]">TELÉFONO DE CONTACTO</label><div class="flex gap-1"><input id="ptel" class="input-master"><button onclick="voz('ptel')" class="btn-mic">🎤</button></div>
                
                <button onclick="previa()" class="w-full mt-10 bg-yellow-400 p-8 border-4 border-black font-black text-2xl shadow-[10px_10px_0px_#000] hover:translate-x-1 hover:translate-y-1 hover:shadow-none transition-all">💾 VISTA PREVIA Y GUARDAR</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="card-pro hidden">
        <div class="bg-black text-yellow-400 p-4 flex justify-between items-center mb-6 border-4 border-white">
            <h2 class="italic text-xl">CONTROL DIARIO DE ASISTENCIA</h2>
            <p id="totalPresencia" class="text-2xl font-black"></p>
        </div>
        <div id="grillaAsistencia" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
    </section>

    <section id="sec3" class="card-pro hidden">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-black text-white p-6 border-4 border-yellow-400 text-center">
                <p class="text-xs">TOTAL MATRÍCULA J926</p>
                <p id="labelMatricula" class="text-6xl font-black text-yellow-400">0</p>
            </div>
            <div class="md:col-span-2 bg-white border-4 border-black p-2 h-48"><canvas id="miGrafico"></canvas></div>
            <div class="flex flex-col gap-3">
                <button onclick="excelPro()" class="bg-green-700 text-white p-4 border-2 border-black font-black hover:bg-green-800">📊 DESCARGAR EXCEL OFICIAL</button>
                <button onclick="guardarJSON()" class="bg-blue-700 text-white p-4 border-2 border-black font-black hover:bg-blue-800 text-xs">💾 RESPALDO OTRA COMPU</button>
                <label class="bg-slate-800 text-white p-3 border-2 border-black font-black text-[10px] text-center cursor-pointer">📂 CARGAR RESPALDO<input type="file" class="hidden" onchange="cargarJSON(event)"></label>
            </div>
        </div>

        <div class="bg-yellow-50 p-4 border-4 border-black mb-6">
            <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR APELLIDO O DNI DEL ALUMNO..." class="w-full p-4 border-2 border-black text-2xl font-black italic">
        </div>
        
        <div class="overflow-x-auto max-h-[600px] border-4 border-black">
            <table class="w-full border-collapse">
                <thead class="sticky top-0 z-10">
                    <tr>
                        <th>ALUMNO / DNI</th><th>SALA (14)</th><th>TELÉFONOS</th><th>AUH</th><th>ACCIÓN</th>
                    </tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="modalRev" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white border-[10px] border-black p-8 w-full max-w-5xl">
        <h2 class="text-3xl font-black mb-6 underline text-red-700 italic">VERIFICACIÓN ESTRATÉGICA DE DATOS</h2>
        <div id="contRev" class="grid grid-cols-1 md:grid-cols-3 gap-6 text-[11px] font-bold bg-gray-100 p-6 border-2 border-black"></div>
        <div class="flex gap-6 mt-10">
            <button onclick="document.getElementById('modalRev').classList.add('hidden')" class="flex-1 bg-gray-500 text-white p-6 font-black border-4 border-black text-xl">CORREGIR ALGO</button>
            <button onclick="confirmar()" class="flex-1 bg-green-600 text-white p-6 font-black border-4 border-black text-2xl">GUARDAR EN EL SISTEMA</button>
        </div>
    </div>
</div>

<script>
    let db = [];
    let editIdx = null;
    let chartObj = null;

    function inicializar() {
        const local = localStorage.getItem('J926_V16_TOTAL');
        if (local) db = JSON.parse(local);
        renderTabla();
        renderAsistencia();
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
        if(n === 3) renderTabla();
    }

    function voz(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR';
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.start();
    }

    function previa() {
        const ids = ['n','d','nac','f','e','sala','dom','salud','mn','mdni','auh','m_ocu','mtel','mdom','pn','pdni','p_ocu','ptel'];
        const c = document.getElementById('contRev');
        let h = '<div class="col-span-1"><b>--- ALUMNO ---</b><br>';
        ids.slice(0,8).forEach(i => h += `${i.toUpperCase()}: ${document.getElementById(i).value}<br>`);
        h += '</div><div class="col-span-1"><b>--- MADRE ---</b><br>';
        ids.slice(8,14).forEach(i => h += `${i.toUpperCase()}: ${document.getElementById(i).value}<br>`);
        h += '</div><div class="col-span-1"><b>--- PADRE ---</b><br>';
        ids.slice(14).forEach(i => h += `${i.toUpperCase()}: ${document.getElementById(i).value}<br>`);
        h += '</div>';
        c.innerHTML = h;
        document.getElementById('modalRev').classList.remove('hidden');
    }

    function confirmar() {
        const ids = ['n','d','nac','f','e','sala','dom','salud','mn','mdni','auh','m_ocu','mtel','mdom','pn','pdni','p_ocu','ptel'];
        const obj = { presente: true };
        ids.forEach(i => obj[i] = document.getElementById(i).value.toUpperCase());

        if(editIdx !== null) db[editIdx] = obj;
        else db.push(obj);

        localStorage.setItem('J926_V16_TOTAL', JSON.stringify(db));
        editIdx = null;
        document.getElementById('modalRev').classList.add('hidden');
        limpiar(); renderTabla(); renderAsistencia();
        alert("¡LEGAJO GUARDADO EXITOSAMENTE!");
    }

    function editar(i) {
        const a = db[i]; editIdx = i;
        const ids = ['n','d','nac','f','e','sala','dom','salud','mn','mdni','auh','m_ocu','mtel','mdom','pn','pdni','p_ocu','ptel'];
        ids.forEach(id => {
            if(document.getElementById(id)) document.getElementById(id).value = a[id] || "";
        });
        ver(1);
    }

    function renderTabla() {
        const bus = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('cuerpo'); t.innerHTML = "";
        const salas = {};
        db.forEach((a, i) => {
            salas[a.sala] = (salas[a.sala] || 0) + 1;
            if(a.n.includes(bus) || a.d.includes(bus)) {
                t.innerHTML += `<tr>
                    <td><b>${a.n}</b><br><small class="text-blue-600">DNI: ${a.d}</small></td>
                    <td>${a.sala}</td><td>M: ${a.mtel}<br>P: ${a.ptel}</td><td>${a.auh}</td>
                    <td><button onclick="editar(${i})" class="bg-yellow-400 p-2 border-2 border-black font-black w-full shadow-[2px_2px_0px_#000]">EDITAR</button></td>
                </tr>`;
            }
        });
        document.getElementById('labelMatricula').innerText = db.length;
        updateChart(salas);
    }

    function renderAsistencia() {
        const g = document.getElementById('grillaAsistencia'); g.innerHTML = "";
        let pres = 0;
        db.forEach((a, i) => {
            if(a.presente) pres++;
            g.innerHTML += `<div onclick="togglePres(${i})" class="p-3 border-4 font-black cursor-pointer text-center text-[10px] ${a.presente ? 'presente' : 'ausente'}">
                ${a.n.split(' ')[0]} ${a.n.split(' ')[1] || ''}<br>${a.presente ? 'PRESENTE' : 'AUSENTE'}
            </div>`;
        });
        document.getElementById('totalPresencia').innerText = `PRESENTES: ${pres} / ${db.length}`;
    }

    function togglePres(i) {
        db[i].presente = !db[i].presente;
        localStorage.setItem('J926_V16_TOTAL', JSON.stringify(db));
        renderAsistencia();
    }

    function updateChart(data) {
        const ctx = document.getElementById('miGrafico').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.keys(data), datasets: [{ label: 'NIÑOS POR SALA', data: Object.values(data), backgroundColor: '#000' }] },
            options: { maintainAspectRatio: false }
        });
    }

    function excelPro() {
        let csv = "ALUMNO;DNI;SALA;DOMICILIO;SALUD;MADRE;DNI_M;AUH;TEL_M;DOM_M;PADRE;DNI_P;TEL_P\n";
        db.forEach(a => csv += `${a.n};${a.d};${a.sala};${a.dom};${a.salud};${a.mn};${a.mdni};${a.auh};${a.mtel};${a.mdom};${a.pn};${a.pdni};${a.ptel}\n`);
        const b = new Blob(["\ufeff" + csv], {type: 'text/csv;charset=utf-8;'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'SUPERVISION_J926_PROFESIONAL.csv'; a.click();
    }

    function guardarJSON() {
        const b = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'RESPALDO_SISTEMA_J926.json'; a.click();
    }

    function cargarJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem('J926_V16_TOTAL', JSON.stringify(db));
            renderTabla(); renderAsistencia(); alert("✅ BASE DE DATOS CARGADA");
        };
        reader.readAsText(e.target.files[0]);
    }

    function limpiar() { document.querySelectorAll('input').forEach(i => { if(i.id !== 'nac') i.value = ""; }); }
</script>
</body>
</html>
