<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V22 | NUCLEAR COMMAND FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --nuclear: #dfff00; --alert: #ff003c; --bionic-blue: #00d4ff; }
        body { background: #010409; color: #f0f6fc; font-family: 'Orbitron', sans-serif; font-size: 11px; text-transform: uppercase; }
        .glass-panel { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(223, 255, 0, 0.2); border-radius: 20px; }
        .input-bionic { background: rgba(0,0,0,0.5); border: 1px solid #30363d; padding: 12px; border-radius: 8px; color: var(--nuclear); width: 100%; font-weight: bold; }
        .input-bionic:focus { border-color: var(--nuclear); outline: none; box-shadow: 0 0 15px rgba(223, 255, 0, 0.3); }
        .sala-card { cursor: pointer; transition: 0.4s; border-radius: 15px; border: 2px solid transparent; overflow: hidden; position: relative; }
        .sala-card:hover { transform: scale(1.05); filter: brightness(1.3); }
        .tab-active { border-bottom: 4px solid var(--nuclear); color: var(--nuclear); background: rgba(223, 255, 0, 0.05); }
        .voice-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(223, 255, 0, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(223, 255, 0, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(223, 255, 0, 0); } }
        .scan-line { width: 100%; height: 2px; background: var(--nuclear); position: absolute; animation: move-scan 2s infinite; }
        @keyframes move-scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body onload="initSystem()">

<header class="h-20 glass-panel m-4 flex justify-between items-center px-10 sticky top-0 z-[1000] border-b border-nuclear/30">
    <div class="flex items-center gap-6">
        <div class="bg-nuclear text-black px-4 py-1 rounded font-black italic shadow-[0_0_20px_rgba(223,255,0,0.5)]">NIVEL NUCLEAR</div>
        <h1 class="text-2xl font-black tracking-tighter italic">TITANIUM <span class="text-nuclear">V22</span></h1>
    </div>
    <div class="flex gap-4">
        <button onclick="startVoiceAction()" id="voiceBtn" class="bg-slate-800 p-3 rounded-full border border-nuclear/50 hover:bg-nuclear hover:text-black transition-all">
            <i class="bi bi-mic-fill"></i>
        </button>
        <button onclick="document.getElementById('excelIn').click()" class="bg-blue-600 px-6 py-2 rounded-lg font-black italic">IMPORTAR MATRÍCULA</button>
        <input type="file" id="excelIn" class="hidden" onchange="importData(event)">
        <button onclick="exportSupervision()" class="bg-nuclear text-black px-6 py-2 rounded-lg font-black shadow-lg">EXPORTAR RELEVAMIENTO</button>
    </div>
</header>

<main class="p-4 space-y-6">
    <nav class="flex gap-2 overflow-x-auto pb-2 border-b border-white/10">
        <button onclick="nav(1)" id="n1" class="px-8 py-4 tab-active font-black whitespace-nowrap">LEGAJO + SALUD</button>
        <button onclick="nav(2)" id="n2" class="px-8 py-4 opacity-50 font-black whitespace-nowrap">FOTO INTERACTIVA (SALAS)</button>
        <button onclick="nav(3)" id="n3" class="px-8 py-4 opacity-50 font-black whitespace-nowrap">LISTA DE ESPERA</button>
        <button onclick="nav(4)" id="n4" class="px-8 py-4 opacity-50 font-black whitespace-nowrap text-blue-400">ESCÁNER ASISTENCIA</button>
        <button onclick="nav(5)" id="n5" class="px-8 py-4 opacity-50 font-black whitespace-nowrap text-nuclear">SUPERVISIÓN EFICIENTE</button>
    </nav>

    <section id="view1" class="space-y-6">
        <div class="glass-panel p-8">
            <div class="relative mb-8">
                <input type="text" id="radar" onkeyup="radarSearch()" class="w-full bg-black/60 border-2 border-nuclear/30 p-6 rounded-2xl text-2xl font-black text-nuclear shadow-inner" placeholder="RADAR: DNI O NOMBRE - CARGA POR VOZ ACTIVA...">
                <div class="absolute right-6 top-6 flex gap-3 text-nuclear opacity-50"><i class="bi bi-radar animate-pulse"></i></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-4">
                    <h3 class="text-nuclear font-black italic border-l-4 border-nuclear pl-2">I. INFANTE Y SALUD</h3>
                    <input id="a_nom" class="input-bionic" placeholder="NOMBRE COMPLETO">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="a_dni" class="input-bionic" placeholder="DNI">
                        <select id="a_sala" class="input-bionic"></select>
                    </div>
                    <div class="bg-red-900/20 p-4 rounded-xl border border-red-500/30">
                        <input id="s_grupo" class="input-bionic mb-2" placeholder="GRUPO SANGUÍNEO">
                        <textarea id="s_aler" class="input-bionic" placeholder="ALERGIAS / DATOS SALUD"></textarea>
                        <label class="flex justify-between mt-2 font-bold"><span>APTO FÍSICO</span><input type="checkbox" id="s_apto"></label>
                    </div>
                </div>
                <div class="space-y-4 bg-white/5 p-5 rounded-2xl border border-white/10">
                    <h3 class="text-blue-400 font-black italic">II. DATOS MADRE</h3>
                    <input id="p1_nom" class="input-bionic" placeholder="NOMBRE">
                    <input id="p1_dni" class="input-bionic" placeholder="DNI">
                    <input id="p1_tel" class="input-bionic" placeholder="TELÉFONO">
                    <input id="p1_dom" class="input-bionic" placeholder="DOMICILIO">
                </div>
                <div class="space-y-4 bg-white/5 p-5 rounded-2xl border border-white/10">
                    <h3 class="text-emerald-400 font-black italic">III. DATOS PADRE</h3>
                    <input id="p2_nom" class="input-bionic" placeholder="NOMBRE">
                    <input id="p2_dni" class="input-bionic" placeholder="DNI">
                    <input id="p2_tel" class="input-bionic" placeholder="TELÉFONO">
                    <input id="p2_dom" class="input-bionic" placeholder="DOMICILIO">
                </div>
            </div>
            <button onclick="saveData()" class="w-full mt-6 bg-nuclear text-black py-5 rounded-xl font-black text-xl hover:scale-95 transition">CONSOLIDAR MATRÍCULA</button>
        </div>
    </section>

    <section id="view2" class="hidden space-y-6">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4" id="gridSalas">
            </div>
        <div id="salaDetalle" class="glass-panel p-10 hidden border-t-8 border-nuclear">
            <div id="detContenido"></div>
        </div>
    </section>

    <section id="view3" class="hidden">
        <div class="glass-panel p-8">
            <h3 class="text-nuclear font-black mb-4 italic">LISTA DE ESPERA BIÓNICA</h3>
            <div class="grid grid-cols-4 gap-4 mb-6">
                <input id="e_nom" class="input-bionic" placeholder="NOMBRE">
                <input id="e_dni" class="input-bionic" placeholder="DNI">
                <input id="e_tel" class="input-bionic" placeholder="CONTACTO">
                <button onclick="addEspera()" class="bg-white text-black font-black rounded-lg">CARGAR</button>
            </div>
            <div id="esperaList" class="space-y-2"></div>
        </div>
    </section>

    <section id="view4" class="hidden">
        <div class="glass-panel p-10 text-center">
            <h3 class="text-blue-400 font-black text-2xl italic mb-6">INTELIGENCIA DE ASISTENCIA RELEVADA</h3>
            <div class="flex flex-col items-center justify-center border-2 border-dashed border-blue-500/50 p-20 rounded-3xl relative overflow-hidden">
                <div class="scan-line"></div>
                <i class="bi bi-camera text-6xl opacity-30 mb-4"></i>
                <button onclick="document.getElementById('asisImg').click()" class="bg-blue-600 px-10 py-4 rounded-full font-black">SUBIR FOTO DE REGISTRO</button>
                <input type="file" id="asisImg" class="hidden" accept="image/*" onchange="analizarAsistencia()">
                <p class="mt-4 opacity-50">EL SISTEMA ANALIZARÁ LA IMAGEN Y DETECTARÁ AUSENTES PARA EMITIR ALERTAS</p>
            </div>
            <div id="asisResult" class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <section id="view5" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel p-8 text-center"><p class="opacity-50">MATRÍCULA REAL</p><h2 id="supTotal" class="text-7xl font-black">0</h2></div>
            <div class="glass-panel p-8 text-center border-l-8 border-red-500"><p class="opacity-50">ALERTAS SALUD</p><h2 id="supSalud" class="text-7xl font-black">0</h2></div>
            <div class="glass-panel p-8 text-center border-l-8 border-blue-400"><p class="opacity-50">ASISTENCIA %</p><h2 id="supAsis" class="text-7xl font-black">0%</h2></div>
        </div>
        <div class="glass-panel p-10 h-[400px]">
            <canvas id="chartNuclear"></canvas>
        </div>
    </section>
</main>

<script>
    let DB = JSON.parse(localStorage.getItem('TITANIUM_CORE')) || [];
    let ESPERA = JSON.parse(localStorage.getItem('TITANIUM_WAIT')) || [];

    const SALAS_CONF = [
        {c: 'ROSA', hex: '#f472b6'}, {c: 'ROJA', hex: '#ef4444'}, {c: 'NARANJA', hex: '#fb923c'},
        {c: 'CELESTE', hex: '#38bdf8'}, {c: 'VIOLETA', hex: '#a855f7'}, {c: 'AMARILLA', hex: '#fde047'}, {c: 'AZUL', hex: '#3b82f6'}
    ];
    let SALAS = [];
    SALAS_CONF.forEach(s => { SALAS.push(`${s.c} TM`); SALAS.push(`${s.c} TT`); });

    function initSystem() {
        const sSel = document.getElementById('a_sala');
        SALAS.forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
        renderSalasCards();
        actualizarMétricas();
        renderEspera();
    }

    function nav(n) {
        for(let i=1; i<=5; i++) {
            document.getElementById('view'+i).classList.add('hidden');
            document.getElementById('n'+i).className = "px-8 py-4 opacity-50 font-black whitespace-nowrap";
        }
        document.getElementById('view'+n).classList.remove('hidden');
        document.getElementById('n'+n).className = "px-8 py-4 tab-active font-black whitespace-nowrap";
        if(n === 2) renderSalasCards();
        if(n === 5) runCharts();
    }

    function renderSalasCards() {
        const grid = document.getElementById('gridSalas');
        grid.innerHTML = '';
        SALAS_CONF.forEach(s => {
            ['TM', 'TT'].forEach(turno => {
                const nombre = `${s.c} ${turno}`;
                const count = DB.filter(x => x.sala === nombre).length;
                grid.innerHTML += `
                    <div onclick="verDetalleSala('${nombre}')" class="sala-card p-6 text-center" style="background: ${s.hex}33; border-color: ${s.hex}">
                        <p class="font-black text-xs text-white">${nombre}</p>
                        <h4 class="text-4xl font-black mt-2">${count}</h4>
                        <p class="text-[9px] opacity-70">INSCRIPTOS</p>
                    </div>
                `;
            });
        });
    }

    function verDetalleSala(nombre) {
        const det = document.getElementById('salaDetalle');
        det.classList.remove('hidden');
        const filtrados = DB.filter(x => x.sala === nombre);
        document.getElementById('detContenido').innerHTML = `
            <h2 class="text-4xl font-black text-nuclear mb-6">${nombre} - RELEVAMIENTO COMPLETO</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                ${filtrados.map(a => `
                    <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                        <p class="text-nuclear font-black">${a.nom}</p>
                        <p class="text-[10px]">DNI: ${a.dni} | SALUD: ${a.s_apto ? '✔️ APTO' : '❌ NO APTO'}</p>
                        <p class="text-[9px] opacity-50">TUTOR: ${a.p1_nom} - ${a.p1_tel}</p>
                    </div>
                `).join('')}
            </div>
        `;
        det.scrollIntoView({behavior: 'smooth'});
    }

    function startVoiceAction() {
        const btn = document.getElementById('voiceBtn');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-AR';
        recognition.start();
        btn.classList.add('voice-pulse', 'bg-red-600');
        recognition.onresult = (e) => {
            document.getElementById('radar').value = e.results[0][0].transcript.toUpperCase();
            radarSearch();
            btn.classList.remove('voice-pulse', 'bg-red-600');
        };
    }

    function radarSearch() {
        const q = document.getElementById('radar').value.toUpperCase();
        if(q.length < 3) return;
        const a = DB.find(x => x.dni.includes(q) || x.nom.includes(q));
        if(a) {
            document.getElementById('a_nom').value = a.nom;
            document.getElementById('a_dni').value = a.dni;
            document.getElementById('a_sala').value = a.sala;
            document.getElementById('s_grupo').value = a.s_grupo;
            document.getElementById('s_aler').value = a.s_aler;
            document.getElementById('s_apto').checked = a.s_apto;
            document.getElementById('p1_nom').value = a.p1_nom;
            document.getElementById('p2_nom').value = a.p2_nom;
            document.getElementById('p1_tel').value = a.p1_tel;
            document.getElementById('p1_dom').value = a.p1_dom;
        }
    }

    function analizarAsistencia() {
        // Simulación de análisis nuclear de imagen
        document.getElementById('asisResult').innerHTML = `
            <div class="glass-panel p-6 border-b-4 border-nuclear">
                <h4 class="font-black text-nuclear text-2xl">92%</h4>
                <p>ASISTENCIA DETECTADA</p>
            </div>
            <div class="glass-panel p-6 border-b-4 border-red-500">
                <h4 class="font-black text-red-500 text-2xl">4</h4>
                <p>AUSENCIAS CRÍTICAS</p>
            </div>
            <div class="glass-panel p-6 border-b-4 border-blue-400">
                <h4 class="font-black text-blue-400 text-xl">ALERTAS</h4>
                <p>AVISOS ENVIADOS</p>
            </div>
        `;
        document.getElementById('supAsis').innerText = "92%";
    }

    function saveData() {
        const alu = {
            nom: v('a_nom'), dni: v('a_dni'), sala: v('a_sala'),
            s_grupo: v('s_grupo'), s_aler: v('s_aler'), s_apto: document.getElementById('s_apto').checked,
            p1_nom: v('p1_nom'), p1_dni: v('p1_dni'), p1_tel: v('p1_tel'), p1_dom: v('p1_dom'),
            p2_nom: v('p2_nom'), p2_dni: v('p2_dni'), p2_tel: v('p2_tel'), p2_dom: v('p2_dom')
        };
        const idx = DB.findIndex(x => x.dni === alu.dni);
        if(idx > -1) DB[idx] = alu; else DB.push(alu);
        localStorage.setItem('TITANIUM_CORE', JSON.stringify(DB));
        actualizarMétricas();
        alert("NÚCLEO ACTUALIZADO");
    }

    function actualizarMétricas() {
        document.getElementById('supTotal').innerText = DB.length;
        document.getElementById('supSalud').innerText = DB.filter(x => !x.s_apto).length;
    }

    function v(id) { return document.getElementById(id).value.toUpperCase(); }

    function addEspera() {
        ESPERA.push({nom: v('e_nom'), dni: v('e_dni'), tel: v('e_tel')});
        localStorage.setItem('TITANIUM_WAIT', JSON.stringify(ESPERA));
        renderEspera();
    }

    function renderEspera() {
        document.getElementById('esperaList').innerHTML = ESPERA.map(e => `
            <div class="flex justify-between p-3 bg-white/5 border border-white/10 rounded">
                <span>${e.nom}</span><span>${e.tel}</span>
            </div>
        `).join('');
    }

    let chart;
    function runCharts() {
        const ctx = document.getElementById('chartNuclear').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: SALAS,
                datasets: [{ label: 'MATRÍCULA', data: SALAS.map(s => DB.filter(x => x.sala === s).length), backgroundColor: '#dfff00' }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>
