<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V23 | DGCyE ESTRATÉGICO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --nuclear: #dfff00; --alert: #ff003c; --bionic: #00d4ff; }
        body { background: #010409; color: #f0f6fc; font-family: 'Orbitron', sans-serif; font-size: 11px; text-transform: uppercase; font-weight: 900; }
        .glass-panel { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 2px solid rgba(223, 255, 0, 0.15); border-radius: 12px; }
        .input-bionic { background: rgba(0,0,0,0.8); border: 2px solid #30363d; padding: 10px; border-radius: 8px; color: var(--nuclear); width: 100%; font-weight: 900; border-left: 4px solid var(--nuclear); }
        .tab-active { border-bottom: 5px solid var(--nuclear); color: var(--nuclear); background: rgba(223, 255, 0, 0.1); }
        .sala-card { cursor: pointer; transition: 0.3s; border: 2px solid rgba(255,255,255,0.05); }
        .sala-card:hover { transform: scale(1.02); border-color: var(--nuclear); }
        #preview { width: 100%; border-radius: 12px; border: 2px solid var(--nuclear); background: #000; }
        .scan-overlay { position: absolute; border: 2px solid var(--alert); animation: scan 2s infinite; width: 100%; top: 50%; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body onload="initSystem()">

<header class="glass-panel m-4 p-4 flex flex-wrap justify-between items-center sticky top-0 z-[1000] border-b-4 border-nuclear">
    <div class="flex items-center gap-4">
        <div class="bg-nuclear text-black px-4 py-2 rounded font-black shadow-lg animate-pulse">TITANIUM V23 PRO</div>
        <h1 class="text-xl font-black italic">GESTIÓN <span class="text-nuclear">360° SECRETARÍA</span></h1>
    </div>
    <div class="flex gap-2">
        <button id="btnVoz" onclick="toggleVoz()" class="bg-red-600 px-3 py-2 rounded font-black text-[9px]"><i class="bi bi-mic-fill"></i> VOZ</button>
        <label class="bg-blue-600 px-3 py-2 rounded font-black cursor-pointer text-[9px]">IMPORTAR JSON <input type="file" class="hidden" onchange="importData(this)"></label>
        <button onclick="exportToExcel()" class="bg-emerald-600 px-3 py-2 rounded font-black text-[9px]">EXCEL DGCyE</button>
        <button onclick="configDirectivos()" class="bg-zinc-700 px-3 py-2 rounded font-black text-[9px]"><i class="bi bi-person-badge"></i> DIRECTIVOS</button>
    </div>
</header>

<nav class="flex px-4 gap-1 overflow-x-auto mb-4 bg-black/40">
    <button onclick="nav(1)" id="n1" class="px-6 py-4 tab-active font-black">1. LEGAJO 360</button>
    <button onclick="nav(2)" id="n2" class="px-6 py-4 opacity-50 font-black">2. MAPA SALAS</button>
    <button onclick="nav(3)" id="n3" class="px-6 py-4 opacity-50 font-black">3. ESCÁNER ASISTENCIA</button>
    <button onclick="nav(4)" id="n4" class="px-6 py-4 opacity-50 font-black text-orange-400">4. ESPERA/VACANTES</button>
    <button onclick="nav(5)" id="n5" class="px-6 py-4 opacity-50 font-black text-red-500">5. BAJAS/CALENDARIO</button>
    <button onclick="nav(6)" id="n6" class="px-6 py-4 opacity-50 font-black text-nuclear">6. SUPERVISIÓN ÉLITE</button>
</nav>

<main class="p-4">
    <section id="view1" class="space-y-6">
        <div class="glass-panel p-6">
            <input type="text" id="radar" onkeyup="radarSearch()" class="w-full bg-black border-2 border-nuclear p-5 rounded text-2xl font-black text-nuclear mb-6" placeholder="RADAR: ESCRIBA NOMBRE O DNI...">
            <div id="formAlu" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-3 bg-white/5 p-4 rounded border border-white/10">
                    <h3 class="text-nuclear font-black italic border-b border-nuclear pb-1">ORIGEN DATOS</h3>
                    <input id="a_nom" class="input-bionic" placeholder="APELLIDO Y NOMBRE">
                    <div class="grid grid-cols-2 gap-2"><input id="a_dni" class="input-bionic" placeholder="DNI"><input type="date" id="a_f_nac" class="input-bionic" onchange="calcEdad()"></div>
                    <select id="a_sala" class="input-bionic"></select>
                    <textarea id="s_aler" class="input-bionic h-12" placeholder="ALERGIAS / CRÓNICOS"></textarea>
                    <div class="flex justify-between bg-zinc-900 p-2 rounded"><span>APTO FÍSICO</span><input type="checkbox" id="s_apto"></div>
                </div>
                <div class="space-y-3 bg-blue-900/10 p-4 rounded border border-blue-500/30">
                    <h3 class="text-blue-400 font-black italic">TUTOR 1 (MADRE)</h3>
                    <input id="p1_nom" class="input-bionic" placeholder="NOMBRE">
                    <input id="p1_tel" class="input-bionic" placeholder="TELÉFONO (PARA ALERTAS)">
                    <select id="p1_edu" class="input-bionic edu-list"></select>
                </div>
                <div class="space-y-3 bg-emerald-900/10 p-4 rounded border border-emerald-500/30">
                    <h3 class="text-emerald-400 font-black italic">TUTOR 2 / EMERGENCIA</h3>
                    <input id="p2_nom" class="input-bionic" placeholder="NOMBRE">
                    <input id="p2_tel" class="input-bionic" placeholder="TELÉFONO">
                    <input id="p_tel_aux" class="input-bionic border-alert" placeholder="TEL. INSTITUCIONAL">
                </div>
            </div>
            <button onclick="saveData()" class="w-full mt-6 bg-nuclear text-black py-4 rounded font-black text-xl shadow-2xl">CONSOLIDAR EN BASE DE DATOS</button>
        </div>
    </section>

    <section id="view3" class="hidden space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-panel p-6 relative">
                <h3 class="text-nuclear font-black mb-4"><i class="bi bi-camera"></i> ESCÁNER ÓPTICO BIOMÉTRICO</h3>
                <div class="relative">
                    <video id="preview"></video>
                    <div class="scan-overlay"></div>
                </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="startScanner()" class="bg-blue-600 p-3 rounded w-full font-black">ENCENDER LENTE</button>
                    <button onclick="stopScanner()" class="bg-red-600 p-3 rounded w-full font-black">APAGAR</button>
                </div>
            </div>
            <div class="glass-panel p-6">
                <h3 class="text-white font-black mb-4">LOG DE ASISTENCIA DIARIA</h3>
                <div id="listaAsistencia" class="space-y-2 overflow-y-auto max-h-[400px]"></div>
            </div>
        </div>
    </section>

    <section id="view5" class="hidden space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-panel p-6">
                <h3 class="text-red-500 font-black mb-4 italic">PROCESAR BAJA (EGRESO)</h3>
                <input id="b_dni" class="input-bionic mb-2" placeholder="DNI ALUMNO">
                <select id="b_mes" class="input-bionic mb-2">
                    <option value="MARZO">MARZO</option><option value="ABRIL">ABRIL</option><option value="MAYO">MAYO</option>
                    <option value="JUNIO">JUNIO</option><option value="JULIO">JULIO</option><option value="AGOSTO">AGOSTO</option>
                    <option value="SEPTIEMBRE">SEPTIEMBRE</option><option value="OCTUBRE">OCTUBRE</option><option value="NOVIEMBRE">NOVIEMBRE</option><option value="DICIEMBRE">DICIEMBRE</option>
                </select>
                <textarea id="b_motivo" class="input-bionic h-24 mb-2" placeholder="MOTIVO DE LA BAJA (MUDANZA, PASE, ETC)"></textarea>
                <button onclick="procesarBaja()" class="w-full bg-red-600 py-4 font-black">EJECUTAR BAJA</button>
            </div>
            <div class="lg:col-span-2 glass-panel p-6">
                <h3 class="text-white font-black mb-4">HISTORIAL ANUAL DE DESGRANAMIENTO</h3>
                <div id="listaBajas" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
            </div>
        </div>
    </section>

    <section id="view6" class="hidden space-y-8">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <div class="glass-panel p-4 border-l-4 border-nuclear">
                <p class="text-[8px] opacity-60">MATRÍCULA ACTIVA</p><h2 id="supTotal" class="text-4xl font-black">0</h2>
            </div>
            <div class="glass-panel p-4 border-l-4 border-red-500">
                <p class="text-[8px] opacity-60">BAJAS ACUMULADAS</p><h2 id="supBajas" class="text-4xl font-black text-red-500">0</h2>
            </div>
            <div class="glass-panel p-4 border-l-4 border-blue-500">
                <p class="text-[8px] opacity-60">ASISTENCIA HOY</p><h2 id="supAsis" class="text-4xl font-black text-blue-500">0%</h2>
            </div>
        </div>
        <div class="glass-panel p-8">
            <canvas id="chartBajas" style="max-height: 300px;"></canvas>
        </div>
    </section>
</main>

<script>
    let DB = JSON.parse(localStorage.getItem('TIT_CORE')) || [];
    let BAJAS = JSON.parse(localStorage.getItem('TIT_BAJAS')) || [];
    let ASIS = JSON.parse(localStorage.getItem('TIT_ASIS')) || {};
    let CONFIG = JSON.parse(localStorage.getItem('TIT_CONFIG')) || { dir_tel: '', sec_tel: '' };

    const SALAS = ['ROSA', 'ROJA', 'NARANJA', 'CELESTE', 'VIOLETA', 'AMARILLA', 'AZUL'];
    const TURNOS = ['TM', 'TT'];
    
    let scanner = null;

    function initSystem() {
        // Cargar 357 alumnos si existen en localStorage
        actualizarMétricas();
        populateSalas();
        // Iniciar gráfico si estamos en supervisión
    }

    function populateSalas() {
        const selAlu = document.getElementById('a_sala');
        SALAS.forEach(c => TURNOS.forEach(t => {
            selAlu.innerHTML += `<option value="${c} ${t}">${c} ${t}</option>`;
        }));
    }

    // --- ESCÁNER REAL ---
    function startScanner() {
        scanner = new Instascan.Scanner({ video: document.getElementById('preview') });
        scanner.addListener('scan', function (content) {
            // El contenido esperado es el DNI
            marcarAsistencia(content);
            alert("DNI DETECTADO: " + content);
        });
        Instascan.Camera.getCameras().then(function (cameras) {
            if (cameras.length > 0) { scanner.start(cameras[0]); }
            else { alert('No se detectó cámara.'); }
        });
    }

    function stopScanner() { if(scanner) scanner.stop(); }

    function marcarAsistencia(dni) {
        ASIS[dni] = { status: 'P', hora: new Date().toLocaleTimeString() };
        localStorage.setItem('TIT_ASIS', JSON.stringify(ASIS));
        renderAsis();
    }

    // --- GESTIÓN DE BAJAS ---
    function procesarBaja() {
        const dni = document.getElementById('b_dni').value;
        const index = DB.findIndex(a => a.dni === dni);
        if(index === -1) return alert("ALUMNO NO ENCONTRADO EN MATRÍCULA");
        
        const baja = {
            ...DB[index],
            mes_baja: document.getElementById('b_mes').value,
            motivo: document.getElementById('b_motivo').value,
            fecha_proceso: new Date().toLocaleDateString()
        };
        
        BAJAS.push(baja);
        DB.splice(index, 1); // Quitar de matrícula activa
        
        localStorage.setItem('TIT_CORE', JSON.stringify(DB));
        localStorage.setItem('TIT_BAJAS', JSON.stringify(BAJAS));
        
        alert("BAJA CONSOLIDADA EXITOSAMENTE");
        location.reload();
    }

    // --- ALERTAS DIRECTIVAS ---
    function configDirectivos() {
        const tel = prompt("TELÉFONO DIRECTORA (Sin + ni espacios):", CONFIG.dir_tel);
        if(tel) {
            CONFIG.dir_tel = tel;
            localStorage.setItem('TIT_CONFIG', JSON.stringify(CONFIG));
        }
    }

    function enviarAlertaAusentismo(nom, telTutor) {
        const msg = `TITANIUM_V23_ALERTA: El alumno ${nom} ha faltado hoy. Tel Tutor: ${telTutor}`;
        const url = `https://wa.me/${CONFIG.dir_tel}?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank');
    }

    // --- NAVEGACIÓN ---
    function nav(n) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => b.className = "px-6 py-4 opacity-50 font-black");
        document.getElementById('view'+n).classList.remove('hidden');
        document.getElementById('n'+n).className = "px-6 py-4 tab-active font-black";
        if(n===5) renderBajas();
        if(n===6) renderGraficos();
    }

    function renderBajas() {
        const cont = document.getElementById('listaBajas');
        cont.innerHTML = BAJAS.map(b => `
            <div class="bg-red-900/20 p-3 rounded border border-red-500/30">
                <p class="text-red-500 font-black">${b.nom}</p>
                <p class="text-[9px]">SALA: ${b.sala} | MES: ${b.mes_baja}</p>
                <p class="text-[8px] italic opacity-70">${b.motivo}</p>
            </div>
        `).join('');
    }

    function renderGraficos() {
        const ctx = document.getElementById('chartBajas').getContext('2d');
        const meses = ['MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO'];
        const datos = meses.map(m => BAJAS.filter(b => b.mes_baja === m).length);

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: meses,
                datasets: [{
                    label: 'BAJAS POR MES',
                    data: datos,
                    borderColor: '#ff003c',
                    backgroundColor: 'rgba(255,0,60,0.2)',
                    fill: true
                }]
            },
            options: { responsive: true, color: '#fff' }
        });
    }

    // Funciones base del radar y guardado
    function radarSearch() {
        const q = document.getElementById('radar').value.toUpperCase();
        if(q.length < 3) return;
        const a = DB.find(x => x.dni.includes(q) || x.nom.includes(q));
        if(a) {
            document.getElementById('a_nom').value = a.nom;
            document.getElementById('a_dni').value = a.dni;
            document.getElementById('a_sala').value = a.sala;
        }
    }

    function saveData() {
        const alu = {
            nom: document.getElementById('a_nom').value,
            dni: document.getElementById('a_dni').value,
            sala: document.getElementById('a_sala').value,
            p1_tel: document.getElementById('p1_tel').value
        };
        const idx = DB.findIndex(x => x.dni === alu.dni);
        if(idx > -1) DB[idx] = alu; else DB.push(alu);
        localStorage.setItem('TIT_CORE', JSON.stringify(DB));
        actualizarMétricas();
        alert("LEGAGO ACTUALIZADO");
    }

    function actualizarMétricas() {
        document.getElementById('supTotal').innerText = DB.length;
        document.getElementById('supBajas').innerText = BAJAS.length;
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(DB);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "MATRICULA");
        XLSX.writeFile(wb, "INFORME_DGCYE_2026.xlsx");
    }

    function importData(i) {
        const r = new FileReader();
        r.onload = (e) => {
            DB = JSON.parse(e.target.result);
            localStorage.setItem('TIT_CORE', JSON.stringify(DB));
            alert("SISTEMA RECUPERADO: " + DB.length + " ALUMNOS");
            location.reload();
        };
        r.readAsText(i.files[0]);
    }
</script>
</body>
</html>
