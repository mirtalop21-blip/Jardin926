<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Integral - Jardín 926</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        .absent-critical { color: #dc2626; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .voice-btn { cursor: pointer; color: #2563eb; transition: transform 0.2s; }
        .voice-btn:hover { transform: scale(1.2); }
    </select>
</head>
<body class="p-4 bg-slate-100">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-blue-900 p-6 rounded-xl text-white shadow-2xl">
            <div>
                <h1 class="text-2xl font-black tracking-tight">JARDÍN N° 926 - GESTIÓN TOTAL</h1>
                <p class="text-blue-200 text-sm">Panel de Control: Inscripción, Asistencia y Supervisión</p>
            </div>
            <div class="flex gap-2 mt-4 md:mt-0">
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg text-xs font-bold transition">
                    <i class="fas fa-file-excel mr-2"></i> EXCEL
                </button>
                <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold transition">
                    <i class="fas fa-print mr-2"></i> IMPRIMIR REPORTE
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2">
                <div class="card">
                    <h2 class="text-blue-800 font-bold mb-4 uppercase text-sm border-b pb-2"><i class="fas fa-user-plus mr-2"></i> Nueva Matriculación</h2>
                    <form id="studentForm" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">Nombre Completo</label>
                                <div class="relative">
                                    <input type="text" id="name" class="w-full border p-2 rounded bg-gray-50 focus:ring-2 ring-blue-500 outline-none" required>
                                    <i class="fas fa-microphone voice-btn absolute right-3 top-3" onclick="startVoice('name')"></i>
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">DNI Alumno</label>
                                <input type="number" id="dni" class="w-full border p-2 rounded bg-gray-50" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">Fecha Nacimiento</label>
                                <input type="date" id="birth" onchange="checkAge()" class="w-full border p-2 rounded bg-gray-50" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">Sala</label>
                                <select id="section" class="w-full border p-2 rounded bg-gray-50">
                                    <option>Sala Rosa (3)</option>
                                    <option>Sala Roja (4)</option>
                                    <option>Sala Azul (5)</option>
                                    <option>Sala Verde (Multi)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase">WhatsApp Familia</label>
                                <input type="text" id="phone" placeholder="54911..." class="w-full border p-2 rounded bg-gray-50">
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase">Antecedentes de Salud / Situación Social</label>
                            <div class="relative">
                                <textarea id="obs" rows="2" class="w-full border p-2 rounded bg-gray-50 focus:ring-2 ring-blue-500 outline-none"></textarea>
                                <i class="fas fa-microphone voice-btn absolute right-3 top-3" onclick="startVoice('obs')"></i>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 shadow-lg transition">
                            GUARDAR EN LEGAJO DIGITAL
                        </button>
                    </form>
                </div>

                <div class="card">
                    <h2 class="text-blue-800 font-bold mb-4 uppercase text-sm border-b pb-2"><i class="fas fa-calendar-check mr-2"></i> Control de Asistencia y Alertas Críticas</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead>
                                <tr class="bg-slate-100 text-slate-600">
                                    <th class="p-3">Alumno</th>
                                    <th class="p-3">Sala</th>
                                    <th class="p-3">Faltas Totales</th>
                                    <th class="p-3">Acción</th>
                                    <th class="p-3">Informar a Directivo</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="card">
                    <h2 class="text-blue-800 font-bold mb-4 uppercase text-[10px] tracking-widest"><i class="fas fa-chart-pie mr-2"></i> Informe para Supervisión</h2>
                    <canvas id="attendanceChart" height="200"></canvas>
                    <div class="mt-4 p-3 bg-blue-50 rounded text-[10px] text-blue-700">
                        * Este gráfico se actualiza en tiempo real para reportar el porcentaje de presentismo por sala a inspección.
                    </div>
                </div>

                <div class="card">
                    <h2 class="text-blue-800 font-bold mb-4 uppercase text-[10px] tracking-widest"><i class="fas fa-bullhorn mr-2"></i> Resumen de Alertas</h2>
                    <div id="alertSummary" class="space-y-2">
                        <p class="text-xs text-gray-500 italic">No hay alertas críticas registradas.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let students = [];
        let chart;

        // INICIALIZAR GRÁFICO
        function initChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Presentes', 'Ausentes'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#10b981', '#ef4444']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // CARGA POR VOZ
        function startVoice(id) {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-AR';
            recognition.start();
            recognition.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; };
        }

        // AGREGAR ALUMNO
        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const student = {
                name: document.getElementById('name').value,
                dni: document.getElementById('dni').value,
                section: document.getElementById('section').value,
                phone: document.getElementById('phone').value,
                absences: 0,
                status: 'Presente'
            };
            students.push(student);
            renderAll();
            e.target.reset();
        });

        function renderAll() {
            const body = document.getElementById('attendanceBody');
            body.innerHTML = '';
            let totalPres = 0;
            let totalAbs = 0;
            const alertBox = document.getElementById('alertSummary');
            alertBox.innerHTML = '';

            students.forEach((s, i) => {
                if(s.status === 'Presente') totalPres++; else totalAbs++;
                
                const isCritical = s.absences >= 10;
                if(isCritical) {
                    alertBox.innerHTML += `<div class="p-2 bg-red-50 border-l-4 border-red-500 text-[10px] text-red-700"><b>${s.name}</b> alcanzó las 10 faltas.</div>`;
                }

                body.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 ${isCritical ? 'absent-critical' : ''}">${s.name}</td>
                        <td class="p-3">${s.section}</td>
                        <td class="p-3 font-bold">${s.absences}</td>
                        <td class="p-3">
                            <button onclick="markAbsent(${i})" class="bg-red-100 text-red-600 px-2 py-1 rounded text-[10px] font-bold">MARCAR FALTA</button>
                            ${isCritical ? `<button onclick="sendWA(${i}, 'family')" class="bg-green-500 text-white px-2 py-1 rounded text-[10px] ml-1"><i class="fab fa-whatsapp"></i> AVISO</button>` : ''}
                        </td>
                        <td class="p-3">
                            <button onclick="sendWA(${i}, 'staff')" class="text-blue-600 border border-blue-600 px-2 py-1 rounded text-[10px]">INFORMAR</button>
                        </td>
                    </tr>
                `;
            });

            // Actualizar Gráfico
            chart.data.datasets[0].data = [totalPres, totalAbs];
            chart.update();
        }

        function markAbsent(i) {
            students[i].absences++;
            students[i].status = 'Ausente';
            renderAll();
        }

        function sendWA(i, type) {
            const s = students[i];
            let msg = "";
            let targetPhone = s.phone;

            if(type === 'family') {
                msg = `Hola, familia de ${s.name}. Le informamos desde el Jardín 926 que el alumno ha alcanzado las ${s.absences} inasistencias. Solicitamos se acerque a la institución.`;
            } else {
                targetPhone = "5491100000000"; // PONER ACÁ EL CELU DE SECRETARÍA
                msg = `INFORME DIRECTIVO: El alumno ${s.name} de ${s.section} presenta un cuadro crítico de ${s.absences} inasistencias. Se requiere intervención de secretaría/dirección.`;
            }
            
            window.open(`https://wa.me/${targetPhone}?text=${encodeURIComponent(msg)}`);
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(students);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Alumnos");
            XLSX.writeFile(wb, "Reporte_Inspeccion_926.xlsx");
        }

        initChart();
    </script>
</body>
               </html>
