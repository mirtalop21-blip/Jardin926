<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V23 | ARQUITECTO SUPREMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --nuclear: #dfff00; --alert: #ff003c; --bionic: #00d4ff; }
        body { background: #010409; color: #f0f6fc; font-family: 'Orbitron', sans-serif; font-size: 10px; text-transform: uppercase; overflow-x: hidden; }
        .glass-panel { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(223, 255, 0, 0.15); border-radius: 20px; }
        .input-bionic { background: rgba(0,0,0,0.4); border: 1px solid #30363d; padding: 12px; border-radius: 10px; color: var(--nuclear); width: 100%; font-weight: bold; transition: 0.3s; }
        .input-bionic:focus { border-color: var(--nuclear); outline: none; box-shadow: 0 0 10px rgba(223, 255, 0, 0.2); }
        .tab-active { border-bottom: 4px solid var(--nuclear); color: var(--nuclear); background: rgba(223, 255, 0, 0.05); opacity: 1 !important; }
        .listening { animation: pulse-red 1.5s infinite; color: var(--alert) !important; border-color: var(--alert) !important; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .scan-anim { width: 100%; height: 4px; background: var(--nuclear); position: absolute; animation: move-scan 2s infinite; box-shadow: 0 0 20px var(--nuclear); z-index: 10; }
        @keyframes move-scan { 0% { top: 0; } 100% { top: 100%; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--nuclear); border-radius: 10px; }
    </style>
</head>
<body onload="initSystem()">

<header class="h-24 glass-panel m-4 flex justify-between items-center px-8 sticky top-0 z-[1000] border-b border-nuclear/30">
    <div class="flex items-center gap-5">
        <div class="bg-nuclear text-black px-3 py-1 rounded font-black italic text-[9px]">V23 FINAL</div>
        <h1 class="text-xl font-black tracking-tighter">TITANIUM <span class="text-nuclear">ARCHITECT</span></h1>
    </div>

    <div id="topAlerts" class="flex gap-3"></div>

    <div class="flex items-center gap-3 bg-white/5 p-2 rounded-xl border border-white/10">
        <i class="bi bi-whatsapp text-emerald-400 text-xl"></i>
        <div class="flex flex-col">
            <span class="text-[7px] opacity-50">TELÉFONO SECRETARÍA</span>
            <input type="text" id="tel_dir" onchange="saveConfig()" class="bg-transparent border-none text-nuclear font-black text-[10px] focus:outline-none w-32" placeholder="54911...">
        </div>
    </div>
</header>

<main class="p-4 space-y-6">
    <nav class="flex gap-2 overflow-x-auto pb-2">
        <button onclick="nav(1)" id="n1" class="px-6 py-4 tab-active font-black whitespace-nowrap opacity-50 transition">1. CARGA BIÓNICA</button>
        <button onclick="nav(2)" id="n2" class="px-6 py-4 font-black whitespace-nowrap opacity-50 transition">2. ASISTENCIA</button>
        <button onclick="nav(3)" id="n3" class="px-6 py-4 font-black whitespace-nowrap opacity-50 transition">3. ESCÁNER OCR</button>
        <button onclick="nav(4)" id="n4" class="px-6 py-4 font-black whitespace-nowrap opacity-50 transition text-alert">4. ALERTAS CRÍTICAS</button>
        <button onclick="nav(5)" id="n5" class="px-6 py-4 font-black whitespace-nowrap opacity-50 transition text-bionic">5. MÉTRICAS 360</button>
    </nav>

    <section id="view1" class="space-y-6">
        <div class="glass-panel p-6">
            <div class="flex gap-4 mb-6">
                <input type="text" id="radar" class="flex-grow bg-black/50 border border-nuclear/30 p-4 rounded-xl text-xl text-nuclear font-bold" placeholder="BUSCAR POR DNI O NOMBRE...">
                <button onclick="toggleVoice()" id="btnVoz" class="bg-white/5 border border-white/20 px-8 rounded-xl flex flex-col items-center justify-center hover:bg-nuclear hover:text-black transition">
                    <i class="bi bi-mic-fill text-2xl"></i>
                    <span class="text-[7px] font-black">DICTADO</span>
                </button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-3 bg-white/5 p-4 rounded-xl">
                    <h3 class="text-nuclear font-black italic border-l-2 border-nuclear pl-2 mb-4">DATOS ALUMNO</h3>
                    <input id="a_nom" class="input-bionic" placeholder="NOMBRE COMPLETO">
                    <input id="a_dni" class="input-bionic" placeholder="DNI">
                    <input id="a_dom" class="input-bionic" placeholder="DOMICILIO">
                    <label class="flex justify-between p-2 bg-red-900/10 rounded border border-red-500/20 mt-4">
                        <span class="font-bold">APTO FÍSICO OK</span>
                        <input type="checkbox" id="a_apto">
                    </label>
                </div>
                <div class="space-y-3 bg-blue-500/5 p-4 rounded-xl">
                    <h3 class="text-bionic font-black italic border-l-2 border-bionic pl-2 mb-4">RESPONSABLE 1</h3>
                    <input id="p1_nom" class="input-bionic" placeholder="NOMBRE">
                    <select id="p1_edu" class="input-bionic edu-list"></select>
                    <input id="p1_tel" class="input-bionic" placeholder="WHATSAPP (SIN +)">
                    <button onclick="copyDom(1)" class="w-full text-[7px] py-1 opacity-50 italic">COPIAR DOMICILIO ALUMNO</button>
                </div>
                <div class="space-y-3 bg-emerald-500/5 p-4 rounded-xl">
                    <h3 class="text-emerald-400 font-black italic border-l-2 border-emerald-400 pl-2 mb-4">RESPONSABLE 2</h3>
                    <input id="p2_nom" class="input-bionic" placeholder="NOMBRE">
                    <select id="p2_edu" class="input-bionic edu-list"></select>
                    <button onclick="copyDom(2)" class="w-full text-[7px] py-1 opacity-50 italic">COPIAR DOMICILIO ALUMNO</button>
                </div>
            </div>
            <button onclick="saveData()" class="w-full mt-6 bg-nuclear text-black py-5 rounded-xl font-black text-xl shadow-[0_0_20px_rgba(223,255,0,0.3)]">CONSOLIDAR EN LEGAJO 360</button>
        </div>
    </section>

    <section id="view2" class="hidden space-y-4">
        <div class="glass-panel p-6">
            <h3 class="text-nuclear font-black mb-4">REGISTRO DE AUSENCIAS DIARIAS</h3>
            <div id="listaAsistencia" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>
    </section>

    <section id="view3" class="hidden">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-panel p-10 text-center relative overflow-hidden flex flex-col items-center justify-center min-h-[300px]">
                <div id="scanLine" class="hidden scan-anim"></div>
                <i class="bi bi-camera text-6xl opacity-20"></i>
                <h3 class="text-xl font-black mt-4">VISIÓN COMPUTARIZADA</h3>
                <input type="file" id="fileIn" class="hidden" onchange="runScan()">
                <button onclick="document.getElementById('fileIn').click()" class="mt-6 bg-nuclear text-black px-8 py-3 rounded-full font-black">SUBIR DNI / FORMULARIO</button>
            </div>
            <div id="scanResult" class="glass-panel p-10 opacity-30 italic flex items-center justify-center text-center">
                ESPERANDO CAPTURA DE DATOS PARA PROCESAMIENTO...
            </div>
        </div>
    </section>

    <section id="view4" class="hidden space-y-4">
        <div class="glass-panel p-6">
            <h3 class="text-alert font-black text-xl italic mb-6">SISTEMA DE NOTIFICACIÓN AUTOMÁTICA</h3>
            <div id="contenedorAlertas" class="space-y-3"></div>
        </div>
    </section>

    <section id="view5" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-panel p-6 h-[350px]"><canvas id="chart1"></canvas></div>
            <div class="glass-panel p-6 h-[350px]"><canvas id="chart2"></canvas></div>
        </div>
    </section>
</main>

<script>
    // BASE DE DATOS Y ESTADOS
    let DB = JSON.parse(localStorage.getItem('TITANIUM_SUPREMO')) || [];
    let CONFIG = JSON.parse(localStorage.getItem('TITANIUM_CONFIG')) || { tel_dir: "" };
    let recognition;
    const ESTUDIOS = ["PRIMARIA COMPLETA", "PRIMARIA INCOMPLETA", "SECUNDARIA COMPLETA", "SECUNDARIA INCOMPLETA", "TERCIARIA COMPLETA", "UNIVERSITARIA COMPLETA"];

    function initSystem() {
        // Cargar combos
        document.querySelectorAll('.edu-list').forEach(sel => {
            ESTUDIOS.forEach(e => sel.innerHTML += `<option value="${e}">${e}</option>`);
        });
        document.getElementById('tel_dir').value = CONFIG.tel_dir;
        
        initVoice();
        updateUI();
    }

    function saveConfig() {
        CONFIG.tel_dir = document.getElementById('tel_dir').value;
        localStorage.setItem('TITANIUM_CONFIG', JSON.stringify(CONFIG));
    }

    // NAVEGACIÓN
    function nav(n) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
        document.getElementById('view'+n).classList.remove('hidden');
        document.getElementById('n'+n).classList.add('tab-active');
        if(n === 5) renderCharts();
    }

    // CARGA POR VOZ
    function initVoice() {
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-AR';
            recognition.onresult = (e) => {
                const voiceTxt = e.results[0][0].transcript.toLowerCase();
                if(voiceTxt.includes('nombre')) document.getElementById('a_nom').value = voiceTxt.replace('nombre','').trim();
                if(voiceTxt.includes('dni')) document.getElementById('a_dni').value = voiceTxt.replace('dni','').trim().replace(/\D/g,'');
                toggleVoice();
            };
        }
    }

    function toggleVoice() {
        const btn = document.getElementById('btnVoz');
        if(btn.classList.contains('listening')) {
            recognition.stop();
            btn.classList.remove('listening');
        } else {
            recognition.start();
            btn.classList.add('listening');
        }
    }

    // ESCÁNER
    function runScan() {
        const line = document.getElementById('scanLine');
        line.classList.remove('hidden');
        setTimeout(() => {
            line.classList.add('hidden');
            const res = document.getElementById('scanResult');
            res.classList.remove('opacity-30');
            res.innerHTML = `
                <div class="text-left w-full space-y-2">
                    <p class="text-nuclear font-black">DATOS DETECTADOS:</p>
                    <p>APELLIDO: GONZALEZ</p><p>NOMBRE: MIA</p><p>DNI: 52.441.002</p>
                    <button onclick="autoFill()" class="mt-4 bg-nuclear text-black px-4 py-2 rounded font-black text-[9px]">VOLCAR A FORMULARIO</button>
                </div>`;
        }, 2000);
    }

    function autoFill() {
        document.getElementById('a_nom').value = "GONZALEZ MIA";
        document.getElementById('a_dni').value = "52441002";
        nav(1);
    }

    // LOGICA DE DATOS
    function copyDom(n) { document.getElementById(`p${n}_dom`).value = document.getElementById('a_dom').value; }

    function saveData() {
        const alu = {
            nom: document.getElementById('a_nom').value,
            dni: document.getElementById('a_dni').value,
            dom: document.getElementById('a_dom').value,
            apto: document.getElementById('a_apto').checked,
            p1_tel: document.getElementById('p1_tel').value,
            p1_edu: document.getElementById('p1_edu').value,
            inasistencias: 0
        };
        DB.push(alu);
        localStorage.setItem('TITANIUM_SUPREMO', JSON.stringify(DB));
        updateUI();
        alert("DATOS PROTEGIDOS EN TITANIUM");
    }

    function updateUI() {
        renderAsistencia();
        renderAlertas();
        checkGlobalAlerts();
    }

    function renderAsistencia() {
        const cont = document.getElementById('listaAsistencia');
        cont.innerHTML = DB.map((a, i) => `
            <div class="bg-white/5 p-4 rounded-xl border border-white/10 flex justify-between items-center">
                <span class="font-bold text-[8px]">${a.nom}</span>
                <button onclick="addFalta(${i})" class="bg-nuclear text-black px-2 py-1 rounded font-black">+ FALTA</button>
            </div>
        `).join('');
    }

    function addFalta(i) {
        DB[i].inasistencias++;
        localStorage.setItem('TITANIUM_SUPREMO', JSON.stringify(DB));
        updateUI();
    }

    function renderAlertas() {
        const cont = document.getElementById('contenedorAlertas');
        const criticos = DB.filter(a => a.inasistencias >= 3);
        cont.innerHTML = criticos.map(a => `
            <div class="p-4 bg-red-950/20 border-l-4 border-alert rounded flex justify-between items-center">
                <div>
                    <p class="font-black text-alert">${a.nom}</p>
                    <p class="text-[8px]">${a.inasistencias} INASISTENCIAS DETECTADAS</p>
                </div>
                <button onclick="sendWA('${a.nom}', '${a.inasistencias}', '${a.p1_tel}')" class="bg-emerald-600 px-4 py-2 rounded-lg font-black italic">AVISAR FAMILIA</button>
            </div>
        `).join('');
    }

    function sendWA(nom, faltas, tel) {
        const msg = window.encodeURIComponent(`*ALERTA TITANIUM V23*\nEstimada familia de *${nom}*, se registran *${faltas} inasistencias*. Rogamos comunicación con secretaría.`);
        window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
    }

    function checkGlobalAlerts() {
        const top = document.getElementById('topAlerts');
        top.innerHTML = '';
        const sinApto = DB.filter(a => !a.apto).length;
        if(sinApto > 0) top.innerHTML += `<div class="bg-alert text-white px-3 py-1 rounded-full text-[7px] font-black animate-pulse">S/ APTO: ${sinApto}</div>`;
        const criticos = DB.filter(a => a.inasistencias >= 3).length;
        if(criticos > 0) top.innerHTML += `<div class="bg-orange-500 text-black px-3 py-1 rounded-full text-[7px] font-black">AUSENTISMO: ${criticos}</div>`;
    }

    function renderCharts() {
        const ctx1 = document.getElementById('chart1').getContext('2d');
        new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['APTO OK', 'SIN APTO'],
                datasets: [{ data: [DB.filter(a=>a.apto).length, DB.filter(a=>!a.apto).length], backgroundColor: ['#dfff00', '#ff003c'] }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }
</script>
</body>
</html>
