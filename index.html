<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA INTEGRAL JARDÍN 926</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #001f3f; --azul-claro: #1e40af; --amarillo: #facc15; --rojo: #dc2626; --gris: #f1f5f9; }
        body { font-family: 'Arial', sans-serif; text-transform: uppercase; background: var(--gris); margin: 0; font-weight: 900; }
        
        nav { background: var(--azul); display: flex; border-bottom: 5px solid black; position: sticky; top: 0; z-index: 100; }
        nav button { flex: 1; background: var(--azul); color: white; border: none; padding: 15px; cursor: pointer; border-right: 1px solid #1e3a8a; font-weight: 900; font-size: 11px; }
        nav button.active { background: var(--amarillo); color: black; }

        .container { max-width: 1200px; margin: 15px auto; padding: 0 10px; }
        .card { background: white; border: 4px solid #000; padding: 20px; box-shadow: 8px 8px 0px #000; margin-bottom: 25px; display: none; }
        .card.active { display: block; }
        
        .titulo-seccion { background: var(--amarillo); padding: 5px 15px; border: 3px solid #000; display: inline-block; margin-bottom: 15px; font-style: italic; }
        
        /* FORMULARIO DETALLADO */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .sub-header { grid-column: 1 / -1; background: #000; color: white; padding: 8px; margin-top: 15px; font-size: 13px; border-left: 10px solid var(--amarillo); }
        
        .campo { display: flex; flex-direction: column; }
        label { font-size: 10px; margin-bottom: 4px; color: #333; }
        .input-group { display: flex; gap: 5px; }
        input, select, textarea { border: 3px solid #000; padding: 10px; font-weight: 900; font-size: 14px; background: #fff; width: 100%; box-sizing: border-box; }
        
        .btn-mic { background: var(--rojo); color: white; border: 3px solid #000; padding: 0 15px; cursor: pointer; font-size: 20px; }
        .btn-action { background: var(--azul-claro); color: white; border: 4px solid #000; padding: 18px; width: 100%; font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 20px; box-shadow: 4px 4px 0px #000; }

        /* MODAL DE EDICIÓN */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal-body { background: white; border: 6px solid #000; width: 95%; max-width: 700px; margin: 10px auto; padding: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: #000; color: #fff; padding: 10px; font-size: 10px; }
        td { border: 2px solid #000; padding: 8px; font-size: 10px; vertical-align: top; }
    </style>
</head>
<body onload="iniciarSistema()">

<nav>
    <button id="btn1" class="active" onclick="cambiarPestaña(1)">1. MATRÍCULA</button>
    <button id="btn2" onclick="cambiarPestaña(2)">2. ASISTENCIA</button>
    <button id="btn3" onclick="cambiarPestaña(3)">3. SUPERVISIÓN</button>
</nav>

<div class="container">
    
    <section id="pestaña1" class="card active">
        <div class="titulo-seccion">CARGA DE LEGAJO COMPLETO 🎤</div>
        <div class="form-grid">
            <div class="sub-header">DATOS DEL NIÑO/A</div>
            <div class="campo"><label>APELLIDO Y NOMBRE</label><div class="input-group"><input type="text" id="n"><button onclick="dictar('n')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>DNI</label><input type="number" id="d"></div>
            <div class="campo"><label>FECHA NACIMIENTO</label><input type="date" id="f"></div>
            <div class="campo"><label>NACIONALIDAD</label><input type="text" id="nac_niño" value="ARGENTINA"></div>
            <div class="campo"><label>SALA</label><select id="s"><option>SALA ROSA TM</option><option>SALA NARANJA TT</option><option>SALA VERDE TM</option><option>SALA AZUL TT</option></select></div>
            <div class="campo"><label>DOMICILIO COMPLETO</label><div class="input-group"><input type="text" id="dom"><button onclick="dictar('dom')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>CANTIDAD DE HERMANOS</label><input type="number" id="her_cant"></div>
            <div class="campo"><label>¿TIENE HERMANOS EN EL JARDÍN?</label><select id="her_jar"><option>NO</option><option>SÍ</option></select></div>

            <div class="sub-header">DATOS DEL PADRE / TUTOR</div>
            <div class="campo"><label>NOMBRE Y DNI</label><div class="input-group"><input type="text" id="p_nom"><button onclick="dictar('p_nom')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>NACIONALIDAD Y ESTUDIOS</label><input type="text" id="p_est"></div>
            <div class="campo"><label>TRABAJO / OFICIO</label><input type="text" id="p_tra"></div>
            <div class="campo"><label>TELÉFONO</label><input type="text" id="p_tel"></div>

            <div class="sub-header">DATOS DE LA MADRE / TUTORA</div>
            <div class="campo"><label>NOMBRE Y DNI</label><div class="input-group"><input type="text" id="m_nom"><button onclick="dictar('m_nom')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>NACIONALIDAD Y ESTUDIOS</label><input type="text" id="m_est"></div>
            <div class="campo"><label>TRABAJO / OFICIO</label><input type="text" id="m_tra"></div>
            <div class="campo"><label>TELÉFONO</label><input type="text" id="m_tel"></div>

            <div class="sub-header">BENEFICIOS SOCIALES</div>
            <div class="campo"><label>¿RECIBE AUH?</label><select id="auh"><option>NO</option><option>SÍ</option></select></div>
        </div>
        <button onclick="previsualizar()" class="btn-action" style="background: #f59e0b; color: black;">👁️ REVISAR Y EDITAR ANTES DE GUARDAR</button>
    </section>

    <section id="pestaña2" class="card">
        <div class="titulo-seccion">LISTADO DE ASISTENCIA</div>
        <div id="bodyAsistencia"></div>
    </section>

    <section id="pestaña3" class="card">
        <div class="titulo-seccion">RESUMEN PARA INSPECCIÓN 📊</div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div style="text-align:center;"><canvas id="graficoSalas"></canvas></div>
            <div>
                <div id="resumenTexto"></div>
                <button onclick="exportarExcel()" class="btn-action" style="background:green;">📊 DESCARGAR EXCEL COMPLETO</button>
                <button onclick="borrarTodo()" style="margin-top:20px; font-size:10px; color:red; border:none; background:none; cursor:pointer;">BORRAR TODOS LOS DATOS (¡CUIDADO!)</button>
            </div>
        </div>
        <div style="overflow-x:auto; margin-top:30px;">
            <table id="tablaFinal">
                <thead><tr><th>ALUMNO</th><th>DNI</th><th>EDAD 30/06</th><th>SALA</th><th>DOMICILIO</th><th>FAMILIA</th><th>AUH</th></tr></thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </section>

</div>

<div id="modal">
    <div class="modal-body">
        <h2 style="background:black; color:white; padding:10px; margin:0;">VERIFICAR DATOS</h2>
        <div id="areaEdicion" class="form-grid" style="margin-top:15px;"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="document.getElementById('modal').style.display='none'" class="btn-action" style="background:gray; margin:0;">VOLVER</button>
            <button onclick="guardarFinal()" class="btn-action" style="background:green; margin:0;">✅ GUARDAR DEFINITIVO</button>
        </div>
    </div>
</div>

<script>
    let alumnos = JSON.parse(localStorage.getItem('J926_SISTEMA_V5')) || [];
    let myChart = null;

    function cambiarPestaña(n) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('pestaña' + n).classList.add('active');
        document.getElementById('btn' + n).classList.add('active');
        if(n === 3) { renderTabla(); actualizarGraficos(); }
    }

    function dictar(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR';
        rec.start();
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
    }

    function previsualizar() {
        const area = document.getElementById('areaEdicion');
        const ids = ['n','d','f','nac_niño','dom','p_nom','p_est','p_tra','p_tel','m_nom','m_est','m_tra','m_tel'];
        area.innerHTML = ids.map(id => `<div class="campo"><label>${id.toUpperCase()}</label><input type="text" id="e_${id}" value="${document.getElementById(id).value}"></div>`).join('');
        document.getElementById('modal').style.display = 'block';
    }

    function guardarFinal() {
        const alu = {
            n: document.getElementById('e_n').value.toUpperCase(),
            d: document.getElementById('e_d').value,
            f: document.getElementById('f').value,
            s: document.getElementById('s').value,
            nac: document.getElementById('e_nac_niño').value.toUpperCase(),
            dom: document.getElementById('e_dom').value.toUpperCase(),
            p: `NOM: ${document.getElementById('e_p_nom').value} | EST: ${document.getElementById('e_p_est').value} | TRAB: ${document.getElementById('e_p_tra').value} | TEL: ${document.getElementById('e_p_tel').value}`,
            m: `NOM: ${document.getElementById('e_m_nom').value} | EST: ${document.getElementById('e_m_est').value} | TRAB: ${document.getElementById('e_m_tra').value} | TEL: ${document.getElementById('e_m_tel').value}`,
            auh: document.getElementById('auh').value
        };
        alumnos.push(alu);
        localStorage.setItem('J926_SISTEMA_V5', JSON.stringify(alumnos));
        document.getElementById('modal').style.display = 'none';
        alert("ALUMNO GUARDADO CORRECTAMENTE");
        renderTabla();
    }

    function renderTabla() {
        const body = document.getElementById('tablaCuerpo');
        body.innerHTML = "";
        alumnos.sort((a,b) => a.s.localeCompare(b.s)).forEach(a => {
            body.innerHTML += `<tr>
                <td>${a.n}</td><td>${a.d}</td><td>${calcularEdad(a.f)}</td><td>${a.s}</td><td>${a.dom}</td>
                <td><small>PADRE: ${a.p}<br>MADRE: ${a.m}</small></td><td>${a.auh}</td>
            </tr>`;
        });
    }

    function calcularEdad(fecha) {
        if(!fecha) return "-";
        const nac = new Date(fecha);
        const corte = new Date(2026, 5, 30);
        let edad = corte.getFullYear() - nac.getFullYear();
        if (corte.getMonth() < nac.getMonth() || (corte.getMonth() === nac.getMonth() && corte.getDate() < nac.getDate())) edad--;
        return edad + " AÑOS";
    }

    function exportarExcel() {
        let csv = "\uFEFFINFORME MATRICULA JARDIN 926\n\nALUMNO,DNI,EDAD 30/06,SALA,DOMICILIO,PADRE,MADRE,AUH\n";
        alumnos.forEach(a => {
            csv += `"${a.n}","${a.d}","${calcularEdad(a.f)}","${a.s}","${a.dom}","${a.p}","${a.m}","${a.auh}"\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "MATRICULA_COMPLETA_926.csv";
        link.click();
    }

    function actualizarGraficos() {
        const ctx = document.getElementById('graficoSalas').getContext('2d');
        const conteo = {};
        alumnos.forEach(a => conteo[a.s] = (conteo[a.s] || 0) + 1);
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(conteo),
                datasets: [{ label: 'ALUMNOS POR SALA', data: Object.values(conteo), backgroundColor: '#1e40af' }]
            }
        });
        document.getElementById('resumenTexto').innerHTML = `<h3>TOTAL MATRÍCULA: ${alumnos.length}</h3>`;
    }

    function iniciarSistema() { renderTabla(); }
    function borrarTodo() { if(confirm("¿BORRAR TODA LA LISTA?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
