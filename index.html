<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA J926 - GESTIÓN PLATINUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #000; border: 1px solid #1e293b; padding: 10px; border-radius: 6px; color: #fff; width: 100%; font-size: 10px; }
        .nav-tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 900; border-bottom: 3px solid transparent; opacity: 0.5; }
        .nav-tab.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); }
        .section-title { font-weight: 900; margin-bottom: 10px; display: block; font-size: 11px; }
    </style>
</head>
<body onload="render()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10">
    <div onclick="tab(1)" id="t1" class="nav-tab active">💎 CARGA PLATINUM</div>
    <div onclick="tab(2)" id="t2" class="nav-tab">📊 SUPERVISIÓN</div>
    <div onclick="tab(3)" id="t3" class="nav-tab">⚙️ SISTEMA & EXCEL</div>
</nav>

<main class="p-4 space-y-4">
    <section id="sec1" class="max-w-4xl mx-auto space-y-4">
        <div class="glass p-5 rounded-2xl border-l-4 border-blue-500 shadow-xl">
            <span class="section-title text-blue-400">DATOS ALUMNO/A</span>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input id="a_n" class="input-pro" placeholder="NOMBRE COMPLETO">
                <div class="flex gap-2">
                    <input id="a_d" class="input-pro" placeholder="DNI">
                    <input id="a_e" class="input-pro" placeholder="EDAD AL 30/6">
                </div>
                <select id="a_s" class="input-pro text-gold font-bold">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA VERDE TM</option><option>SALA VERDE TT</option>
                    <option>SALA CELESTE TM</option><option>SALA CELESTE TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                </select>
                <input id="a_dom" class="input-pro" placeholder="DOMICILIO">
                <div class="flex gap-2">
                    <select id="a_her" class="input-pro"><option>HERMANOS: 0</option><option>HERMANOS: 1</option><option>HERMANOS: 2+</option></select>
                    <select id="a_jar" class="input-pro"><option>¿EN EL JARDÍN? NO</option><option>¿EN EL JARDÍN? SÍ</option></select>
                </div>
                <input id="a_med" class="input-pro col-span-full" placeholder="OBSERVACIONES MÉDICAS / SALUD">
            </div>
        </div>

        <div class="glass p-5 rounded-2xl border-l-4 border-rose-500 shadow-xl">
            <span class="section-title text-rose-400">DATOS DE LA MADRE</span>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input id="m_n" class="input-pro" placeholder="APELLIDO Y NOMBRE">
                <input id="m_d" class="input-pro" placeholder="DNI">
                <select id="m_e" class="input-pro"><option>PRIMARIA COMPLETA</option><option>SECUNDARIA COMPLETA</option><option>SUPERIOR</option></select>
                <input id="m_t" class="input-pro" placeholder="TELÉFONO CONTACTO">
                <input id="m_o" class="input-pro col-span-full" placeholder="OCUPACIÓN">
            </div>
        </div>

        <div class="glass p-5 rounded-2xl border-l-4 border-emerald-500 shadow-xl">
            <span class="section-title text-emerald-400">DATOS DEL PADRE</span>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input id="p_n" class="input-pro" placeholder="APELLIDO Y NOMBRE">
                <input id="p_d" class="input-pro" placeholder="DNI">
                <select id="p_e" class="input-pro"><option>PRIMARIA COMPLETA</option><option>SECUNDARIA COMPLETA</option><option>SUPERIOR</option></select>
                <input id="p_t" class="input-pro" placeholder="TELÉFONO CONTACTO">
                <input id="p_o" class="input-pro col-span-full" placeholder="OCUPACIÓN">
            </div>
            <button onclick="save()" class="w-full bg-gold text-black font-black py-4 rounded-xl mt-6 shadow-lg active:scale-95 transition-all">⚡ IMPACTAR EN BASE DE DATOS</button>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-4">
        <div id="gridSalas" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
        <div class="glass p-5 rounded-2xl">
            <input type="text" id="search" onkeyup="render()" class="input-pro mb-4" placeholder="🔎 BUSCAR POR NOMBRE O DNI...">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[9px] border-collapse">
                    <thead><tr class="text-gray-500 border-b border-white/10"><th class="p-2">ESTUDIANTE / DNI</th><th class="p-2">SALA</th><th class="p-2">CONTACTOS</th><th class="p-2">ACCIONES</th></tr></thead>
                    <tbody id="tableMain"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="sec3" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
            <h3 class="text-blue-400 font-black mb-4">📂 GESTIÓN DE ARCHIVOS</h3>
            <input type="file" id="fileInput" onchange="importJSON(event)" class="text-[8px] w-full border border-white/10 p-2 rounded mb-4">
            <button onclick="exportJSON()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">DESCARGAR RESPALDO ACTUAL</button>
        </div>
        <div class="glass p-6 rounded-2xl border-l-4 border-orange-500">
            <h3 class="text-orange-400 font-black mb-4">⚡ CARGA RÁPIDA (BULK)</h3>
            <textarea id="bulkData" class="input-pro h-24 text-[8px]" placeholder="PEGA AQUÍ LISTA DE EXCEL..."></textarea>
            <button onclick="processBulk()" class="w-full bg-orange-600/20 border border-orange-500 p-2 rounded mt-2 font-bold">CARGAR LISTA</button>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('J926_PLATINUM_DB')) || [];
    const SALAS = ["SALA ROSA TM","SALA ROSA TT","SALA VERDE TM","SALA VERDE TT","SALA CELESTE TM","SALA CELESTE TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT","SALA VIOLETA TM","SALA VIOLETA TT"];

    function tab(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
    }

    function save() {
        const record = {
            id: Date.now(),
            a: { n: document.getElementById('a_n').value.toUpperCase(), d: document.getElementById('a_d').value, s: document.getElementById('a_s').value, e: document.getElementById('a_e').value, dom: document.getElementById('a_dom').value, h: document.getElementById('a_her').value, j: document.getElementById('a_jar').value, m: document.getElementById('a_med').value },
            m: { n: document.getElementById('m_n').value.toUpperCase(), d: document.getElementById('m_d').value, e: document.getElementById('m_e').value, t: document.getElementById('m_t').value, o: document.getElementById('m_o').value },
            p: { n: document.getElementById('p_n').value.toUpperCase(), d: document.getElementById('p_d').value, e: document.getElementById('p_e').value, t: document.getElementById('p_t').value, o: document.getElementById('p_o').value }
        };
        if(!record.a.n || !record.a.d) return alert("FALTAN DATOS CRÍTICOS");
        db.push(record); sync(); alert("CARGA COMPLETA EXITOSA");
        clearInputs();
    }

    function sync() { localStorage.setItem('J926_PLATINUM_DB', JSON.stringify(db)); render(); }

    function clearInputs() {
        document.querySelectorAll('input').forEach(i => i.value = "");
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                let data = JSON.parse(ev.target.result);
                if (Array.isArray(data)) {
                    db = data.map(item => {
                        // Si el dato es del sistema viejo (solo nombre/dni), lo adaptamos al esquema Platinum
                        if (item.n && !item.a) {
                            return { id: item.id || Date.now(), a: { n: item.n, d: item.d, s: item.sala || "SALA ROSA TM", e: "", dom: "", h: "HERMANOS: 0", j: "NO", m: "" }, m: { n: "", d: "", e: "PRIMARIA COMPLETA", t: "", o: "" }, p: { n: "", d: "", e: "PRIMARIA COMPLETA", t: "", o: "" } };
                        }
                        return item;
                    });
                    sync(); alert("✅ SISTEMA PLATINUM RESTAURADO"); tab(2);
                }
            } catch (err) { alert("❌ ARCHIVO INCOMPATIBLE"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function render() {
        const grid = document.getElementById('gridSalas');
        grid.innerHTML = SALAS.map(s => {
            const cant = db.filter(x => x.a.s === s).length;
            return `<div class="glass p-3 rounded-xl border-l-2 ${cant>=30?'border-red-500':'border-slate-700'}"><p class="text-[6px] opacity-40">${s}</p><h4 class="text-xs font-black">${cant}/30</h4></div>`;
        }).join('');

        const table = document.getElementById('tableMain');
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = db.filter(x => x.a.n.toLowerCase().includes(q) || x.a.d.includes(q));
        
        table.innerHTML = filtered.map(x => `
            <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                <td class="p-2 font-bold">${x.a.n}<br><span class="opacity-50 text-[7px]">${x.a.d}</span></td>
                <td class="p-2 text-gold font-bold text-[7px]">${x.a.s}</td>
                <td class="p-2 text-[7px]">👩 ${x.m.t || '-'}<br>👨 ${x.p.t || '-'}</td>
                <td class="p-2"><button onclick="remove(${x.id})" class="text-rose-500 font-bold">X</button></td>
            </tr>
        `).join('');
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `BACKUP_PLATINUM_J926.json`; a.click();
    }

    function remove(id) { if(confirm("¿ELIMINAR ESTE LEGAJO?")) { db = db.filter(x => x.id !== id); sync(); } }
</script>
</body>
</html>
