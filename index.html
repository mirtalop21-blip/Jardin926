<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA J926 - RECUPERACIÓN PLATINUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #000; border: 1px solid #1e293b; padding: 12px; border-radius: 8px; color: #fff; width: 100%; }
        .nav-tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 900; border-bottom: 3px solid transparent; opacity: 0.5; }
        .nav-tab.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); }
    </style>
</head>
<body onload="render()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10">
    <div onclick="tab(1)" id="t1" class="nav-tab active">📝 CARGA INDIVIDUAL</div>
    <div onclick="tab(2)" id="t2" class="nav-tab">📊 SUPERVISIÓN</div>
    <div onclick="tab(3)" id="t3" class="nav-tab">⚙️ EXCEL Y BACKUP</div>
</nav>

<main class="p-4 space-y-4">
    <section id="sec1" class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="glass p-5 rounded-2xl border-t-2 border-blue-500 space-y-2">
            <h3 class="text-blue-400 font-black mb-2">DATOS ALUMNO/A</h3>
            <input id="a_n" class="input-pro" placeholder="NOMBRE COMPLETO">
            <div class="flex gap-2"><input id="a_d" class="input-pro" placeholder="DNI"><input id="a_e" class="input-pro" placeholder="EDAD (EJ: 4 AÑOS)"></div>
            <select id="a_s" class="input-pro text-gold font-bold">
                <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA VERDE TM</option><option>SALA VERDE TT</option>
                <option>SALA CELESTE TM</option><option>SALA CELESTE TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                <option>SALA AZUL TM</option><option>SALA AZUL TT</option><option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option>
            </select>
            <button onclick="save()" class="w-full bg-gold text-black font-black py-4 rounded-xl mt-4 shadow-lg">IMPACTAR EN BASE DE DATOS ⚡</button>
        </div>
        <div class="lg:col-span-2 glass p-5 rounded-2xl opacity-50">
            <p class="text-center py-10">CAMPOS DE PADRE Y MADRE ACTIVOS TRAS GUARDAR ALUMNO</p>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-4">
        <div id="gridSalas" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
        <div class="glass p-5 rounded-2xl">
            <input type="text" id="search" onkeyup="render()" class="input-pro mb-4" placeholder="🔎 BUSCAR ALUMNO...">
            <table class="w-full text-left text-[8px]"><tbody id="tableMain"></tbody></table>
        </div>
    </section>

    <section id="sec3" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="glass p-6 rounded-2xl border-l-4 border-orange-500">
            <h3 class="text-orange-400 font-black mb-4">⚡ CARGA RÁPIDA (BULK)</h3>
            <textarea id="bulkData" class="input-pro h-32 text-[8px]" placeholder="PEGA AQUÍ TUS DATOS DE EXCEL..."></textarea>
            <button onclick="processBulk()" class="w-full bg-orange-600/20 border border-orange-500 p-2 rounded mt-2 font-bold uppercase">Procesar Lista</button>
        </div>
        <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
            <h3 class="text-blue-400 font-black mb-4">📂 SISTEMA DE RECUPERO</h3>
            <div class="space-y-4">
                <input type="file" id="fileInput" onchange="importJSON(event)" class="text-[8px] w-full border border-white/10 p-2 rounded">
                <button onclick="exportJSON()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">GENERAR RESPALDO (.JSON)</button>
            </div>
        </div>
    </section>
</main>

<script>
    // Buscamos datos en cualquier "cajita" de memoria que use el sistema
    let db = JSON.parse(localStorage.getItem('J926_PLATINUM_DB')) || 
             JSON.parse(localStorage.getItem('J926_SISTEMA_V7')) || 
             JSON.parse(localStorage.getItem('masterDB')) || [];

    const SALAS = ["SALA ROSA TM","SALA ROSA TT","SALA VERDE TM","SALA VERDE TT","SALA CELESTE TM","SALA CELESTE TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT","SALA VIOLETA TM","SALA VIOLETA TT"];

    function tab(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
    }

    function save() {
        const n = document.getElementById('a_n').value.toUpperCase();
        const d = document.getElementById('a_d').value;
        if(!n || !d) return alert("FALTAN DATOS");
        db.push({ id: Date.now(), a: { n, d, s: document.getElementById('a_s').value, e: document.getElementById('a_e').value }, m:{}, p:{} });
        sync(); alert("GUARDADO");
    }

    function sync() {
        localStorage.setItem('J926_PLATINUM_DB', JSON.stringify(db));
        render();
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                let data = JSON.parse(ev.target.result);
                // TRADUCTOR AUTOMÁTICO: Si el archivo es viejo, lo convertimos al formato nuevo
                if (Array.isArray(data)) {
                    db = data.map(item => {
                        if (item.n && !item.a) { // Formato antiguo detectado
                            return { id: item.id || Date.now(), a: { n: item.n, d: item.d, s: item.sala, e: "" }, m: { n: item.mtel || "" }, p: {} };
                        }
                        return item;
                    });
                    sync();
                    alert("✅ ÉXITO: SE RECUPERARON " + db.length + " LEGAJOS.");
                    tab(2);
                }
            } catch (err) { alert("❌ EL ARCHIVO TIENE UN ERROR INTERNO."); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function render() {
        const grid = document.getElementById('gridSalas');
        grid.innerHTML = SALAS.map(s => {
            const cant = db.filter(x => (x.a?.s || x.sala) === s).length;
            return `<div class="glass p-3 rounded-xl border-l-4 border-slate-700"><p class="text-[6px] opacity-40">${s}</p><h4 class="text-xs font-black">${cant}/30</h4></div>`;
        }).join('');

        const table = document.getElementById('tableMain');
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = db.filter(x => (x.a?.n || x.n || "").toLowerCase().includes(q));
        
        table.innerHTML = filtered.map(x => `
            <tr class="border-b border-white/5">
                <td class="p-2 font-bold">${x.a?.n || x.n}</td>
                <td class="p-2 opacity-50">${x.a?.s || x.sala}</td>
                <td class="p-2 text-right"><button onclick="remove(${x.id})" class="text-rose-500">ELIMINAR</button></td>
            </tr>
        `).join('');
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `RESPALDO_J926_FINAL.json`; a.click();
    }

    function processBulk() {
        const raw = document.getElementById('bulkData').value.split('\n');
        raw.forEach(line => {
            const parts = line.split('\t');
            if(parts.length >= 2) db.push({ id: Date.now() + Math.random(), a: { n: parts[0].toUpperCase(), d: parts[1], s: parts[2] || "SALA ROSA TM", e: "" }, m:{}, p:{} });
        });
        sync(); alert("CARGA MASIVA COMPLETADA");
        document.getElementById('bulkData').value = ""; tab(2);
    }

    function remove(id) { if(confirm("¿ELIMINAR?")) { db = db.filter(x => x.id !== id); sync(); } }
</script>
</body>
</html>
