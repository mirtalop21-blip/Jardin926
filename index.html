<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA PROFESIONAL J926 - GESTIÓN ESTRATÉGICA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #0f172a; color: #fff; }
        .card-master { background: #ffffff; color: #000; border: 6px solid #000; box-shadow: 12px 12px 0px #facc15; padding: 20px; }
        .input-pro { width: 100%; border: 3px solid #000; padding: 10px; font-weight: 900; background: #fff; font-size: 14px; margin-bottom: 5px; }
        .nav-link { flex: 1; text-align: center; padding: 15px; font-weight: 900; cursor: pointer; border: 2px solid #fff; transition: 0.3s; }
        .nav-link.active { background: #facc15; color: #000; border-bottom: 8px solid #000; }
        th { background: #1e293b; color: #facc15; padding: 12px; font-size: 12px; border: 2px solid #000; }
        td { border: 2px solid #000; padding: 8px; font-size: 12px; font-weight: 900; background: #fff; color: #000; }
        .btn-accion { padding: 8px; font-weight: 900; border: 2px solid #000; width: 100%; margin-bottom: 2px; }
    </style>
</head>
<body onload="inicializarSistema()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-4 border-yellow-400">
    <div onclick="cambiarSeccion(1)" id="t1" class="nav-link active text-xs">1. LEGAJO DETALLADO (VOZ 🎤)</div>
    <div onclick="cambiarSeccion(2)" id="t2" class="nav-link bg-emerald-700 text-xs">2. ASISTENCIA RÁPIDA 📋</div>
    <div onclick="cambiarSeccion(3)" id="t3" class="nav-link bg-blue-700 text-xs">3. SUPERVISIÓN / EXCEL ESTRATÉGICO 📊</div>
</nav>

<main class="p-4">
    <section id="sec3" class="card-master">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div class="bg-black text-white p-4 border-4 border-yellow-400 text-center">
                <p class="text-[10px] italic">MATRÍCULA TOTAL J926</p>
                <p id="totalMat" class="text-6xl font-black text-yellow-400">0</p>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="exportarExcel()" class="bg-green-600 text-white p-4 border-4 border-black font-black text-sm hover:bg-green-500">📥 DESCARGAR EXCEL OFICIAL</button>
                <button onclick="hacerRespaldo()" class="bg-blue-600 text-white p-2 border-2 border-black font-black text-[10px]">💾 RESPALDO PARA OTRA PC</button>
            </div>
            <div class="bg-slate-100 p-2 border-4 border-black text-center">
                <p class="text-[10px] font-bold text-black">CARGAR DESDE OTRA COMPU:</p>
                <input type="file" id="archivoRespaldo" onchange="importarRespaldo(event)" class="text-[9px] text-black w-full">
            </div>
        </div>

        <div class="relative mb-4">
            <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="🔍 BUSCAR POR DNI O APELLIDO DEL ALUMNO PARA EDITAR..." 
            class="w-full p-5 border-4 border-black text-xl font-black italic bg-yellow-50 text-black placeholder-gray-500">
        </div>

        <div class="overflow-x-auto max-h-[600px] border-4 border-black shadow-2xl">
            <table class="w-full">
                <thead class="sticky top-0 z-10">
                    <tr>
                        <th>ALUMNO / DNI</th>
                        <th>SALA (14)</th>
                        <th>CONTACTOS</th>
                        <th>AUH</th>
                        <th>GESTIÓN</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    // MATRÍCULA ESTRATÉGICA CARGADA (33 ALUMNOS DETECTADOS)
    const matriculaInicial = [
        {n:"AMARILLA SUAREZ YAMIR JORGE", d:"39649663", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"AGUILAR CURTIDO BELINDA ABIGAIL", d:"39312579", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"BAGLIETTO THIAN ELIEL", d:"38929058", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"BARBERIS SANTILLAN JUAN PABLO", d:"39330738", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"BENITEZ CIELO ELUNEY", d:"39265375", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"BENITEZ LUISANA VALENTINA", d:"39265376", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"BOGDANOFF NAHOMI ANGELA", d:"39324326", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"CABALLERO ABREGO RONALDO DANIEL", d:"38913429", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"CACERES ISABELLA VALERIA", d:"39185952", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"CARRILLO QUISPE AARIA DAINERIS", d:"39414432", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"CENTURION RIOS LIAM CIRO", d:"39221144", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"CHOQUE MARIÑO MICAELA BRIANA", d:"39180136", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"ESCOBAR NICOLAS MAEL", d:"39562890", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"FARIAS BLANCO FRANCESCO LIONEL", d:"39311744", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"FIGUEROA CATALEYA ANAHI", d:"39724922", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"GARCIA ROMA MARTINA", d:"39335381", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"GAUNA RAMIRO NAHUEL", d:"39311381", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"GOMEZ SANTIAGO ENZO", d:"39330781", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"JIMENEZ ROJAS JAZMIN TERESA", d:"39551211", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"LOZA ELISEO VALENTIN", d:"39330761", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"MONTES MAIRANA ADA ABIGAIL", d:"39311338", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"OJEDA ISABELLA GABRIELA", d:"39419122", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"QUISPE GUARACHI DAYLIN FLORENCIA", d:"39411577", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"RECALDE OVIEDO LUANA", d:"39311132", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"SALVATIERRA ROJAS ANA LIZ", d:"39648162", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"SANTALLA ROJAS GAEL ALEJANDRO", d:"38917354", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"SANTILLAN GAEL DARIO", d:"39311358", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"SAUCEDO VIDAL DESIDERIO", d:"39645283", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"SOSA AYNARA MAGALI", d:"39716152", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"TABOADA CAMILA MAITE", d:"39718115", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"TORRES COCA ANA LUJAN", d:"39641271", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"VALLEJOS HEREDIA AITANA EVELYN", d:"39411786", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"},
        {n:"VELAZQUEZ ARCIENAGA JULIETA ISABEL", d:"39312157", s:"SALA ROSA TM", c:"M: -- / P: --", a:"SÍ"}
    ];

    let db = [];

    function inicializarSistema() {
        const guardado = localStorage.getItem('DB_J926_PROFESIONAL');
        if (guardado) {
            db = JSON.parse(guardado);
        } else {
            db = matriculaInicial;
            localStorage.setItem('DB_J926_PROFESIONAL', JSON.stringify(db));
        }
        renderizarTabla();
    }

    function filtrarTabla() {
        const busqueda = document.getElementById('buscador').value.toUpperCase();
        renderizarTabla(busqueda);
    }

    function renderizarTabla(filtro = "") {
        const cuerpo = document.getElementById('tablaCuerpo');
        cuerpo.innerHTML = "";
        let contador = 0;

        db.forEach((alumno, index) => {
            if (alumno.n.includes(filtro) || alumno.d.includes(filtro)) {
                contador++;
                cuerpo.innerHTML += `
                    <tr>
                        <td><b class="text-blue-800">${alumno.n}</b><br><small class="bg-yellow-200 px-1">DNI: ${alumno.d}</small></td>
                        <td class="text-center font-bold">${alumno.s}</td>
                        <td class="text-[10px]">${alumno.c}</td>
                        <td class="text-center"><b>${alumno.a}</b></td>
                        <td>
                            <button class="btn-accion bg-yellow-400 hover:bg-yellow-300">EDITAR</button>
                            <button class="btn-accion bg-red-600 text-white hover:bg-red-500">BORRAR</button>
                        </td>
                    </tr>`;
            }
        });
        document.getElementById('totalMat').innerText = contador;
    }

    function exportarExcel() {
        let contenido = "ALUMNO;DNI;SALA;CONTACTOS;AUH\n";
        db.forEach(a => {
            contenido += `${a.n};${a.d};${a.s};${a.c};${a.a}\n`;
        });
        const blob = new Blob(["\ufeff" + contenido], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "MATRICULA_ESTRATEGICA_J926.csv";
        link.click();
    }

    function hacerRespaldo() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "RESPALDO_SISTEMA_J926.json";
        link.click();
    }

    function importarRespaldo(event) {
        const reader = new FileReader();
        reader.onload = function(e) {
            db = JSON.parse(e.target.result);
            localStorage.setItem('DB_J926_PROFESIONAL', JSON.stringify(db));
            renderizarTabla();
            alert("✅ DATOS CARGADOS DESDE OTRA COMPUTADORA CON ÉXITO");
        };
        reader.readAsText(event.target.files[0]);
    }

    function cambiarSeccion(n) {
        // Lógica para alternar visibilidad de secciones
        alert("SECCIÓN " + n + " ACTIVADA");
    }
</script>
</body>
</html>
