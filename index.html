<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA J926 PLATINUM - FULL ESTRATÉGICO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(48, 54, 61, 1); border-radius: 16px; }
        .input-pro { background: #0d1117; border: 1px solid #30363d; padding: 10px; border-radius: 8px; color: #fff; width: 100%; font-size: 10px; transition: 0.3s; }
        .input-pro:focus { border-color: #facc15; outline: none; box-shadow: 0 0 8px rgba(250, 204, 21, 0.2); }
        .btn-tab { flex: 1; padding: 15px; text-align: center; font-weight: 900; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.4s; opacity: 0.5; }
        .btn-tab.active { opacity: 1; color: #facc15; border-bottom-color: #facc15; background: rgba(250,204,21,0.05); }
        .mic-btn { color: #8b949e; cursor: pointer; }
        .mic-active { color: #f85149 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body onload="init()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10 rounded-none">
    <div onclick="setTab(1)" id="tab1" class="btn-tab active">📥 CARGA INTEGRAL</div>
    <div onclick="setTab(2)" id="tab2" class="btn-tab">🏫 INTERFAZ DE SALAS</div>
    <div onclick="setTab(3)" id="tab3" class="btn-tab">📊 SUPERVISIÓN PRO</div>
</nav>

<main class="p-4 max-w-[1600px] mx-auto space-y-6">
    
    <section id="sec1" class="space-y-6">
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="glass p-5 border-t-4 border-blue-600 space-y-3">
                <h3 class="text-blue-500 font-black italic">LEGAJO ALUMNO/A</h3>
                <div class="flex gap-2">
                    <div class="relative w-full"><input id="a_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i onclick="startVoice('a_n')" class="bi bi-mic-fill absolute right-3 top-3 mic-btn"></i></div>
                    <input id="a_d" class="input-pro w-32" placeholder="DNI">
                </div>
                <div class="flex gap-2">
                    <input id="a_nac" class="input-pro" value="ARGENTINA">
                    <input id="a_f" type="date" class="input-pro" onchange="calcAge(this.value)">
                    <input id="a_e" class="input-pro w-24" placeholder="EDAD" readonly>
                </div>
                <div class="flex gap-2 items-center">
                    <input id="a_herm" class="input-pro" placeholder="CANT. HERMANOS">
                    <label class="flex items-center gap-2 text-[8px] min-w-[100px]"><input type="checkbox" id="a_hj" class="accent-blue-500"> ¿HERMANO EN JARDÍN?</label>
                </div>
                <select id="a_s" class="input-pro text-yellow-500 font-bold">
                    <option value="">SELECCIONAR SALA...</option>
                    <optgroup label="TURNO MAÑANA" id="tm_list"></optgroup>
                    <optgroup label="TURNO TARDE" id="tt_list"></optgroup>
                </select>
                <input id="a_dom" class="input-pro" placeholder="DOMICILIO ALUMNO/A">
                <textarea id="a_salud" class="input-pro h-16" placeholder="INFO. DE SALUD / ALERTAS"></textarea>
            </div>

            <div class="glass p-5 border-t-4 border-pink-600 space-y-4">
                <div class="space-y-2 pb-4 border-b border-white/5">
                    <h3 class="text-pink-500 font-black italic">DATOS MADRE</h3>
                    <div class="flex gap-2"><input id="m_n" class="input-pro" placeholder="NOMBRE COMPLETO"><input id="m_d" class="input-pro w-32" placeholder="DNI"></div>
                    <div class="flex gap-2"><input id="m_nac" class="input-pro" placeholder="NACIONALIDAD"><input id="m_ocu" class="input-pro" placeholder="OCUPACIÓN"></div>
                    <select id="m_edu" class="input-pro">
                        <option>SIN ESTUDIOS</option><option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                        <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option><option>TERCIARIO COMPLETO</option>
                        <option>UNIVERSITARIO COMPLETO</option>
                    </select>
                    <div class="flex gap-2 items-center">
                        <input id="m_t" class="input-pro" placeholder="TELÉFONO">
                        <label class="flex items-center gap-2 text-[8px] w-24"><input type="checkbox" id="m_auh"> AUH</label>
                    </div>
                </div>
                <div class="space-y-2">
                    <h3 class="text-emerald-500 font-black italic">DATOS PADRE</h3>
                    <div class="flex gap-2"><input id="p_n" class="input-pro" placeholder="NOMBRE COMPLETO"><input id="p_d" class="input-pro w-32" placeholder="DNI"></div>
                    <select id="p_edu" class="input-pro">
                        <option>SIN ESTUDIOS</option><option>PRIMARIA COMPLETA</option><option>SECUNDARIA COMPLETA</option><option>TERCIARIO COMPLETO</option><option>UNIVERSITARIO COMPLETO</option>
                    </select>
                    <input id="p_t" class="input-pro" placeholder="TELÉFONO">
                </div>
            </div>

            <div class="glass p-5 border-t-4 border-yellow-500 space-y-4">
                <input type="hidden" id="edit_id">
                <button onclick="save()" class="w-full bg-yellow-500 text-black font-black p-4 rounded-xl hover:bg-yellow-400">💾 IMPACTAR REGISTRO</button>
                <input type="text" id="search" onkeyup="renderTable()" class="input-pro border-yellow-500/50" placeholder="🔎 BUSCAR POR DNI O APELLIDO...">
                <div class="overflow-y-auto max-h-60"><table class="w-full text-left"><tbody id="mainTable"></tbody></table></div>
            </div>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-6">
        <div id="gridSalas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3"></div>
        <div id="panelSala" class="glass p-8 hidden border-2 border-yellow-500/30">
            <div class="flex justify-between items-center mb-6">
                <h2 id="salaName" class="text-2xl font-black text-yellow-500 italic"></h2>
                <button onclick="closeSala()" class="text-red-500 border border-red-500 px-4 py-1 rounded-full text-[9px]">CERRAR</button>
            </div>
            <div id="listaAlumnos" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
    </section>

    <section id="sec3" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass p-6 border-l-4 border-yellow-500"><p class="opacity-50">MATRÍCULA TOTAL</p><h2 id="st_total" class="text-3xl font-black">0</h2></div>
            <div class="glass p-6 border-l-4 border-pink-500"><p class="opacity-50">BENEFICIARIOS AUH</p><h2 id="st_auh" class="text-3xl font-black">0</h2></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-80">
            <div class="glass p-6"><canvas id="chartEdu"></canvas></div>
            <div class="glass p-6"><canvas id="chartPob"></canvas></div>
        </div>

        <div class="glass p-10 border-2 border-dashed border-white/20 text-center space-y-6">
            <div>
                <h3 class="text-xl font-black italic">GESTOR DE RESPALDOS Y CARGA MASIVA</h3>
                <p class="opacity-40 text-[9px]">IMPORTA TU BACKUP .JSON O EL EXCEL .CSV DE TUS COLEGAS</p>
            </div>
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="exportData()" class="bg-blue-600 px-10 py-4 rounded-xl font-black">DESCARGAR MI RESPALDO (.JSON)</button>
                <label class="bg-emerald-600 px-10 py-4 rounded-xl font-black cursor-pointer">
                    SUBIR ARCHIVO (JSON / EXCEL CSV)
                    <input type="file" class="hidden" onchange="processFile(event)">
                </label>
            </div>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('J926_PLATINUM')) || [];
    const SALAS = ["ROSA","ROJA","NARANJA","CELESTE","VIOLETA","AMARILLA","AZUL"];

    function init() {
        populateSelectors();
        renderTable();
        renderGrid();
    }

    function populateSelectors() {
        const tm = document.getElementById('tm_list'); const tt = document.getElementById('tt_list');
        SALAS.forEach(s => { tm.innerHTML += `<option value="${s} TM">${s} TM</option>`; tt.innerHTML += `<option value="${s} TT">${s} TT</option>`; });
    }

    function setTab(n) {
        [1,2,3].forEach(i => { document.getElementById('sec'+i).classList.toggle('hidden', i !== n); document.getElementById('tab'+i).classList.toggle('active', i === n); });
        if(n === 3) updateStats();
    }

    function startVoice(id) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-AR'; recognition.start();
        recognition.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
    }

    function save() {
        const id = document.getElementById('edit_id').value || Date.now();
        const record = {
            id: Number(id),
            a: { n: v('a_n'), d: v('a_d'), nac: v('a_nac'), f: v('a_f'), e: v('a_e'), s: v('a_s'), dom: v('a_dom'), salud: v('a_salud'), h: v('a_herm'), hj: document.getElementById('a_hj').checked },
            m: { n: v('m_n'), d: v('m_d'), nac: v('m_nac'), ocu: v('m_ocu'), edu: v('m_edu'), t: v('m_t'), auh: document.getElementById('m_auh').checked },
            p: { n: v('p_n'), d: v('p_d'), edu: v('p_edu'), t: v('p_t') }
        };
        db = db.filter(x => x.id !== record.id); db.push(record);
        localStorage.setItem('J926_PLATINUM', JSON.stringify(db));
        alert("GUARDADO EXITOSO"); location.reload();
    }

    function renderTable() {
        const q = document.getElementById('search').value.toUpperCase();
        document.getElementById('mainTable').innerHTML = db.filter(x => x.a.n.includes(q) || x.a.d.includes(q)).map(x => `
            <tr class="border-b border-white/5 hover:bg-white/5 cursor-pointer" onclick="edit(${x.id})">
                <td class="p-2 font-black text-xs">${x.a.n}</td><td class="p-2 text-yellow-500">${x.a.s}</td>
            </tr>`).join('');
    }

    function renderGrid() {
        const grid = document.getElementById('gridSalas'); grid.innerHTML = "";
        ["TM","TT"].forEach(turno => {
            SALAS.forEach(s => {
                const name = `${s} ${turno}`; const count = db.filter(x => x.a.s === name).length;
                grid.innerHTML += `<div onclick="openSala('${name}')" class="glass p-3 border-l-4 border-yellow-500 cursor-pointer">
                    <p class="text-[7px] opacity-40">${name}</p><h4 class="text-lg font-black">${count}/30</h4></div>`;
            });
        });
    }

    function openSala(s) {
        document.getElementById('panelSala').classList.remove('hidden'); document.getElementById('salaName').innerText = s;
        document.getElementById('listaAlumnos').innerHTML = db.filter(x => x.a.s === s).map(x => `
            <div class="glass p-3 flex justify-between items-center"><p class="font-black">${x.a.n}</p><button onclick="edit(${x.id})" class="text-blue-400">EDITAR</button></div>
        `).join('') || '<p>SALA VACÍA</p>';
    }

    // --- LÓGICA DE IMPORTACIÓN CRÍTICA ---
    function processFile(e) {
        const reader = new FileReader();
        const file = e.target.files[0];
        reader.onload = (ev) => {
            try {
                if(file.name.endsWith('.json')) {
                    const imported = JSON.parse(ev.target.result);
                    db = [...new Map([...db, ...imported].map(item => [item.a.d, item])).values()]; // Unifica sin duplicar DNI
                } else {
                    const lines = ev.target.result.split('\n').slice(1);
                    lines.forEach(l => {
                        const c = l.split(';');
                        if(c.length > 2) {
                            db.push({ id: Date.now()+Math.random(), a:{n:c[1], d:c[2], nac:'ARGENTINA', s:c[0], dom:c[3]||'', salud:''}, m:{n:c[4]||'', d:'', edu:'SIN ESTUDIOS', auh:false}, p:{n:c[5]||'', d:'', edu:'SIN ESTUDIOS'} });
                        }
                    });
                }
                localStorage.setItem('J926_PLATINUM', JSON.stringify(db));
                alert("DATOS INTEGRADOS CORRECTAMENTE"); location.reload();
            } catch(err) { alert("ERROR AL LEER ARCHIVO"); }
        };
        reader.readAsText(file);
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="BACKUP_SUPERVISION_J926.json"; a.click();
    }

    function updateStats() {
        document.getElementById('st_total').innerText = db.length;
        document.getElementById('st_auh').innerText = db.filter(x => x.m.auh).length;
        renderCharts();
    }

    function renderCharts() {
        if(window.myChart) window.myChart.destroy();
        const edu = {}; db.forEach(x => edu[x.m.edu] = (edu[x.m.edu]||0)+1);
        window.myChart = new Chart(document.getElementById('chartEdu'), { type:'bar', data:{ labels:Object.keys(edu), datasets:[{label:'NIVEL EDUCATIVO MADRE', data:Object.values(edu), backgroundColor:'#facc15'}]}, options:{responsive:true, maintainAspectRatio:false}});
    }

    function v(id) { return document.getElementById(id).value.toUpperCase().trim(); }
    function calcAge(f) { const birth = new Date(f); const limit = new Date("2026-06-30"); let age = limit.getFullYear() - birth.getFullYear(); if (limit.getMonth() < birth.getMonth() || (limit.getMonth() === birth.getMonth() && limit.getDate() < birth.getDate())) age--; document.getElementById('a_e').value = age + " AÑOS"; }
    function edit(id) { const x = db.find(i => i.id === id); document.getElementById('edit_id').value = x.id; document.getElementById('a_n').value = x.a.n; document.getElementById('a_d').value = x.a.d; document.getElementById('a_s').value = x.a.s; setTab(1); }
    function closeSala() { document.getElementById('panelSala').classList.add('hidden'); }
    function clearForm() { document.querySelectorAll('input').forEach(i => i.value=""); }
</script>
</body>
</html>
