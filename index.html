<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE GESTIÓN JARDÍN 926 - V. FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #f1f5f9; color: #000; }
        .input-heavy { width: 100%; border: 3px solid #000; padding: 12px; font-weight: 900; background: #fff; font-size: 14px; }
        .card-elite { border: 5px solid #000; background: white; padding: 25px; box-shadow: 12px 12px 0px #000; margin-bottom: 30px; }
        .btn-mic { background: #e11d48; color: white; padding: 10px; border: 3px solid #000; font-weight: 900; cursor: pointer; }
        .nav-btn { flex: 1; background: #001f3f; color: white; padding: 15px; font-weight: 900; border-right: 2px solid #fff; transition: 0.3s; }
        .nav-btn.active { background: #facc15; color: #000; }
        label { display: block; font-size: 11px; font-weight: 900; margin-top: 12px; color: #1e293b; }
        th { background: #000; color: #fff; padding: 12px; font-size: 12px; border: 1px solid #fff; }
        td { border: 2px solid #000; padding: 10px; font-size: 11px; text-align: center; font-weight: 900; }
        .alerta-roja { background: #fee2e2; color: #991b1b; border: 4px solid red !important; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
    </style>
</head>
<body onload="iniciar()">

<nav class="flex sticky top-0 z-50 border-b-8 border-black">
    <button onclick="ver(1)" id="b1" class="nav-btn active">1. MATRÍCULA 🎤</button>
    <button onclick="ver(2)" id="b2" class="nav-btn">2. ASISTENCIA</button>
    <button onclick="ver(3)" id="b3" class="nav-btn">3. SUPERVISIÓN 📊</button>
</nav>

<div class="max-w-7xl mx-auto p-4">
    
    <section id="s1" class="card-elite">
        <h2 class="bg-black text-white text-xl p-3 mb-6 inline-block italic">REGISTRO INSTITUCIONAL DE ALUMNOS</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="space-y-2">
                <p class="border-b-4 border-blue-800 font-black">DATOS DEL ALUMNO</p>
                <label>NOMBRE Y APELLIDO (🎤)</label>
                <div class="flex"><input type="text" id="n" class="input-heavy"><button onclick="dictar('n')" class="btn-mic">🎤</button></div>
                <label>DNI / FECHA NACIMIENTO</label>
                <div class="flex gap-1"><input type="number" id="d" class="input-heavy"><input type="date" id="f" class="input-heavy"></div>
                <label>NACIONALIDAD (🎤)</label>
                <div class="flex"><input type="text" id="nac" value="ARGENTINA" class="input-heavy"><button onclick="dictar('nac')" class="btn-mic">🎤</button></div>
                <label>SALA (7 COLORES X 2 TURNOS)</label>
                <select id="sala" class="input-heavy">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option>
                    <option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option>
                    <option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
                    <option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option>
                </select>
                <label>DOMICILIO ALUMNO (🎤)</label>
                <div class="flex"><input type="text" id="dom" class="input-heavy"><button onclick="dictar('dom')" class="btn-mic">🎤</button></div>
                <label>HERMANOS EN JARDÍN</label>
                <select id="hj" class="input-heavy"><option>NO</option><option>SÍ</option></select>
            </div>

            <div class="space-y-2">
                <p class="border-b-4 border-red-800 font-black">DATOS DE LA MADRE / PADRE</p>
                <label>NOMBRE Y APELLIDO (🎤)</label>
                <div class="flex"><input type="text" id="pn" class="input-heavy"><button onclick="dictar('pn')" class="btn-mic">🎤</button></div>
                <label>DNI PADRE/MADRE</label>
                <input type="number" id="pd" class="input-heavy">
                <label>NACIONALIDAD (🎤)</label>
                <div class="flex"><input type="text" id="pnac" value="ARGENTINA" class="input-heavy"><button onclick="dictar('pnac')" class="btn-mic">🎤</button></div>
                <label>OCUPACIÓN (🎤)</label>
                <div class="flex"><input type="text" id="po" class="input-heavy"><button onclick="dictar('po')" class="btn-mic">🎤</button></div>
                <label>ESTUDIOS</label>
                <select id="pe" class="input-heavy">
                    <option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIA COMPLETA</option><option>UNIVERSIDAD COMPLETA</option>
                    <option>UNIVERSIDAD INCOMPLETA</option>
                </select>
                <label>TELÉFONO DE ALERTA</label>
                <input type="text" id="pt" class="input-heavy">
                <label>RECIBE AUH</label>
                <select id="auh" class="input-heavy"><option>SÍ</option><option>NO</option></select>
            </div>

            <div class="flex flex-col justify-end">
                <button onclick="vistaPrevia()" class="bg-blue-700 text-white p-6 border-4 border-black text-xl font-black shadow-[10px_10px_0px_#000] hover:bg-blue-800">👁️ VISTA PREVIA Y GUARDAR</button>
            </div>
        </div>
    </section>

    <section id="s3" class="card-elite hidden">
        <div class="flex flex-wrap justify-between gap-4 mb-6">
            <h2 class="text-2xl font-black">SUPERVISIÓN DE MATRÍCULA</h2>
            <button onclick="descargarExcel()" class="bg-emerald-600 text-white px-6 py-2 border-4 border-black font-black">📊 EXCEL PARA INSPECCIÓN</button>
        </div>

        <input type="text" id="bus" placeholder="🔍 BUSCAR POR APELLIDO O DNI..." onkeyup="renderTabla()" class="input-heavy mb-6 bg-yellow-50 border-4">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="border-4 border-black bg-white p-2"><canvas id="grafS"></canvas></div>
            <div class="border-4 border-black bg-white p-2 text-center">
                <p class="font-black border-b-2 border-black">DATOS INSTITUCIONALES</p>
                <div class="grid grid-cols-2 mt-4 gap-2">
                    <div class="bg-blue-100 p-2 border-2 border-black">MATRÍCULA: <span id="totA">0</span></div>
                    <div class="bg-red-100 p-2 border-2 border-black">AUSENTISMO: <span id="totF">0</span></div>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr>
                        <th>ALUMNO / DNI</th>
                        <th>SALA</th>
                        <th>EDAD (30/06)</th>
                        <th>DOMICILIO</th>
                        <th>DATOS PADRES / TEL</th>
                        <th>AUH</th>
                        <th>GESTIÓN</th>
                    </tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="mod" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white border-[10px] border-blue-900 w-full max-w-2xl p-8">
        <h2 class="text-3xl font-black mb-4 border-b-4 border-black">REVISAR ANTES DE GUARDAR</h2>
        <div id="repaso" class="grid grid-cols-2 gap-2 text-sm font-bold uppercase mb-6"></div>
        <div class="flex gap-4">
            <button onclick="cerrarMod()" class="flex-1 bg-gray-500 text-white p-4 border-4 border-black">EDITAR</button>
            <button onclick="finalizarGuardado()" class="flex-1 bg-green-600 text-white p-4 border-4 border-black">✅ CONFIRMAR Y GUARDAR</button>
        </div>
    </div>
</div>

<script>
    let alumnos = [];
    const salasConfig = ["SALA ROSA TM","SALA ROSA TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA CELESTE TM","SALA CELESTE TT","SALA AZUL TM","SALA AZUL TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA VIOLETA TM","SALA VIOLETA TT"];

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('s'+i)?.classList.toggle('hidden', i !== n);
            document.getElementById('b'+i).classList.toggle('active', i === n);
        });
        if(n === 3) renderTabla();
    }

    function dictar(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR'; rec.start();
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
    }

    function calcularEdad(f) {
        if(!f) return "-";
        const n = new Date(f); const c = new Date(2026, 5, 30);
        let e = c.getFullYear() - n.getFullYear();
        if (c.getMonth() < n.getMonth() || (c.getMonth() === n.getMonth() && c.getDate() < n.getDate())) e--;
        return e + " AÑOS";
    }

    function vistaPrevia() {
        const ids = ['n','d','f','nac','sala','dom','hj','pn','pd','pnac','po','pe','pt','auh'];
        let h = "";
        ids.forEach(id => { h += `<div class="border-b border-gray-200 p-1">${id.toUpperCase()}: ${document.getElementById(id).value.toUpperCase()}</div>`; });
        document.getElementById('repaso').innerHTML = h;
        document.getElementById('mod').classList.remove('hidden');
    }

    function cerrarMod() { document.getElementById('mod').classList.add('hidden'); }

    function finalizarGuardado() {
        const a = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            f: document.getElementById('f').value,
            sala: document.getElementById('sala').value,
            dom: document.getElementById('dom').value,
            pn: document.getElementById('pn').value,
            pd: document.getElementById('pd').value,
            pt: document.getElementById('pt').value,
            auh: document.getElementById('auh').value
        };
        alumnos = alumnos.filter(x => x.d !== a.d);
        alumnos.push(a);
        localStorage.setItem('J926_MASTER', JSON.stringify(alumnos));
        cerrarMod();
        alert("GUARDADO EXITOSO ✅");
        ver(3);
    }

    function renderTabla() {
        const t = document.getElementById('cuerpo');
        const f = document.getElementById('bus').value.toUpperCase();
        t.innerHTML = "";
        
        alumnos.forEach((a, i) => {
            if(a.n.includes(f) || a.d.includes(f)) {
                t.innerHTML += `<tr>
                    <td>${a.n}<br><span class="text-[9px]">DNI: ${a.d}</span></td>
                    <td>${a.sala}</td>
                    <td>${calcularEdad(a.f)}</td>
                    <td>${a.dom || '-'}</td>
                    <td class="text-[9px] text-left">PADRE: ${a.pn}<br>TEL: ${a.pt}</td>
                    <td>${a.auh}</td>
                    <td><button onclick="borrar(${i})" class="bg-red-600 text-white p-1 text-[9px]">BORRAR</button></td>
                </tr>`;
            }
        });
        document.getElementById('totA').innerText = alumnos.length;
        actualizarGrafico();
    }

    function actualizarGrafico() {
        const ctx = document.getElementById('grafS').getContext('2d');
        const data = salasConfig.map(s => alumnos.filter(a => a.sala === s).length);
        if(window.mCh) window.mCh.destroy();
        window.mCh = new Chart(ctx, {
            type: 'bar',
            data: { labels: salasConfig, datasets: [{ label: 'MATRÍCULA POR SALA', data: data, backgroundColor: '#001f3f' }] },
            options: { indexAxis: 'y' }
        });
    }

            {n:"CACERES ISABELLA VALERIA", d:"39185952", f:"2021-01-20", sala:"SALA NARANJA TT", dom:"FLORENCIO VARELA", pn:"PADRE EJEMPLO", pt:"11223344", auh:"SÍ"},
            {n:"CENTURION RIOS LIAM CIRO", d:"39221144", f:"2021-02-05", sala:"SALA NARANJA TT", dom:"FLORENCIO VARELA", pn:"PADRE EJEMPLO", pt:"11223344", auh:"SÍ"},
            {n:"GONZALEZ CIRO DANIEL", d:"39445566", f:"2021-06-30", sala:"SALA NARANJA TT", dom:"FLORENCIO VARELA", pn:"PADRE EJEMPLO", pt:"11223344", auh:"SÍ"}
        ];

        const guardado = localStorage.getItem('J926_MASTER');
        alumnos = guardado ? JSON.parse(guardado) : precarga;
        renderTabla();
    }

    function borrar(i) { if(confirm("¿ELIMINAR?")) { alumnos.splice(i,1); localStorage.setItem('J926_MASTER', JSON.stringify(alumnos)); renderTabla(); } }

    function descargarExcel() {
        let csv = "\uFEFFALUMNO,DNI,SALA,EDAD,DOMICILIO,PADRE,TEL,AUH\n";
        alumnos.forEach(a => { csv += `"${a.n}","${a.d}","${a.sala}","${calcularEdad(a.f)}","${a.dom}","${a.pn}","${a.pt}","${a.auh}"\n`; });
        const l = document.createElement("a");
        l.href = URL.createObjectURL(new Blob([csv], {type: "text/csv;charset=utf-8;"}));
        l.download = "MATRICULA_JARDIN_926.csv"; l.click();
    }
</script>
</body>
</html>
