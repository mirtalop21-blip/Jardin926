<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA J926 - GESTIÓN INTEGRAL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; text-transform: uppercase; }
        .card-pro { background: #fff; color: #000; border: 4px solid #facc15; padding: 15px; border-radius: 8px; }
        .input-group { position: relative; margin-bottom: 8px; }
        .input-pro { width: 100%; border: 2px solid #cbd5e1; padding: 8px; font-weight: 700; background: #f8fafc; font-size: 11px; border-radius: 4px; padding-right: 35px; }
        .mic-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: #ef4444; color: #fff; border-radius: 4px; padding: 4px; cursor: pointer; font-size: 10px; border: none; }
        .nav-link { flex: 1; text-align: center; padding: 12px; font-weight: 800; cursor: pointer; border-bottom: 4px solid transparent; transition: 0.3s; font-size: 10px; }
        .nav-link.active { background: #1e293b; border-bottom: 4px solid #facc15; color: #facc15; }
        th { background: #1e293b; color: #facc15; padding: 10px; font-size: 10px; text-align: center; }
        td { border-bottom: 1px solid #e2e8f0; padding: 8px; font-size: 10px; color: #1e293b; font-weight: 600; text-align: center; }
        .btn-save { background: #facc15; color: #000; padding: 15px; font-weight: 900; width: 100%; border-radius: 6px; box-shadow: 0 4px 0 #ca8a04; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex bg-slate-900 border-b-2 border-slate-700 sticky top-0 z-50">
    <div onclick="ver(1)" id="t1" class="nav-link active">💎 MATRÍCULA ESTRATÉGICA</div>
    <div onclick="ver(2)" id="t2" class="nav-link">📋 ASISTENCIA Y VISTA RÁPIDA</div>
    <div onclick="ver(3)" id="t3" class="nav-link">📊 MAPA DE SUPERVISIÓN PRO</div>
</nav>

<main class="p-4 max-w-7xl mx-auto">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-2">
                <p class="bg-blue-700 text-white p-2 text-center font-bold rounded">DATOS DEL ALUMNO/A</p>
                <div class="input-group">
                    <input id="n" placeholder="NOMBRE COMPLETO" class="input-pro">
                    <button onclick="dictar('n')" class="mic-btn">🎤</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input id="d" placeholder="DNI" class="input-pro">
                    <input id="nac" placeholder="NACIONALIDAD" class="input-pro" value="ARGENTINA">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input id="f" type="date" class="input-pro" onchange="autoSala(this.value)">
                    <input id="e" placeholder="EDAD AL 30/6" class="input-pro" readonly>
                </div>
                <select id="sala" class="input-pro">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA VERDE TM</option><option>SALA VERDE TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option><option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option>
                </select>
                <div class="input-group">
                    <input id="adom" placeholder="DOMICILIO ALUMNO" class="input-pro">
                    <button onclick="dictar('adom')" class="mic-btn">🎤</button>
                </div>
                <input id="salud" placeholder="OBSERVACIONES SALUD" class="input-pro">
            </div>

            <div class="space-y-2">
                <p class="bg-rose-700 text-white p-2 text-center font-bold rounded">DATOS DE LA MADRE</p>
                <div class="input-group">
                    <input id="mn" placeholder="APELLIDO Y NOMBRE" class="input-pro">
                    <button onclick="dictar('mn')" class="mic-btn">🎤</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input id="mdni" placeholder="DNI MADRE" class="input-pro">
                    <select id="auh" class="input-pro"><option>SÍ AUH</option><option>NO AUH</option></select>
                </div>
                <select id="m_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>SECUNDARIA COMPLETA</option><option>TERCIARIO COMPLETO</option><option>UNIVERSITARIO COMPLETO</option>
                </select>
                <input id="mtel" placeholder="TELÉFONO" class="input-pro">
                <div class="input-group">
                    <input id="mdom" placeholder="DOMICILIO MADRE" class="input-pro">
                    <button onclick="dictar('mdom')" class="mic-btn">🎤</button>
                </div>
                <input id="m_ocu" placeholder="OCUPACIÓN" class="input-pro">
            </div>

            <div class="space-y-2">
                <p class="bg-emerald-700 text-white p-2 text-center font-bold rounded">DATOS DEL PADRE</p>
                <div class="input-group">
                    <input id="pn" placeholder="APELLIDO Y NOMBRE" class="input-pro">
                    <button onclick="dictar('pn')" class="mic-btn">🎤</button>
                </div>
                <input id="pdni" placeholder="DNI PADRE" class="input-pro">
                <select id="p_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>SECUNDARIA COMPLETA</option><option>TERCIARIO COMPLETO</option><option>UNIVERSITARIO COMPLETO</option>
                </select>
                <input id="ptel" placeholder="TELÉFONO" class="input-pro">
                <div class="input-group">
                    <input id="pdom" placeholder="DOMICILIO PADRE" class="input-pro">
                    <button onclick="dictar('pdom')" class="mic-btn">🎤</button>
                </div>
                <input id="p_ocu" placeholder="OCUPACIÓN" class="input-pro">
                <button onclick="guardar()" class="btn-save mt-2">💾 GUARDAR Y LIMPIAR</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="hidden">
        <div id="asisBar" class="bg-slate-800 p-4 text-center font-bold border-b-2 border-yellow-400 rounded-t-lg"></div>
        <div id="asisGrid" class="grid grid-cols-2 md:grid-cols-6 gap-3 bg-white p-4 text-black rounded-b-lg"></div>
    </section>

    <section id="sec3" class="hidden space-y-4">
        <div id="statsGrid" class="grid grid-cols-4 md:grid-cols-8 gap-1"></div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-black">
            <div class="card-pro">
                <p class="text-[9px] font-bold text-blue-600 mb-2">📥 EXPORTACIÓN OFICIAL</p>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-white w-full p-3 font-bold rounded">DESCARGAR EXCEL PRO</button>
            </div>
            <div class="card-pro">
                <p class="text-[9px] font-bold text-red-600 mb-2">🔄 HERRAMIENTAS DE BACKUP</p>
                <button onclick="descargarJSON()" class="bg-blue-600 text-white w-full p-2 text-[9px] font-bold mb-1 rounded">GENERAR ARCHIVO BACKUP</button>
                <input type="file" id="fileInput" onchange="subirJSON(event)" class="text-[8px] w-full border">
            </div>
            <div class="card-pro">
                <p class="text-[9px] font-bold mb-2">⚡ IMPORTACIÓN DESDE EXCEL</p>
                <textarea id="masivo" placeholder="PEGUE AQUÍ LAS FILAS" class="w-full h-10 text-[8px] p-1 border"></textarea>
                <button onclick="procesarExcel()" class="bg-black text-white w-full p-1 text-[9px] font-bold">CARGAR LISTADO</button>
            </div>
        </div>

        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR APELLIDO O DNI PARA VISTA PREVIA Y EDICIÓN..." class="w-full p-4 rounded-lg text-black font-bold border-4 border-slate-900">

        <div class="bg-white rounded-lg overflow-hidden shadow-2xl">
            <table class="w-full">
                <thead><tr><th>ESTUDIANTE</th><th>SALA</th><th>CONTACTOS</th><th>ESTADO</th><th>ACCIONES</th></tr></thead>
                <tbody id="cuerpo" class="bg-white"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let db = [];
    let editIdx = null;
    const salasDisp = ["SALA ROSA TM","SALA ROSA TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA CELESTE TM","SALA CELESTE TT","SALA VERDE TM","SALA VERDE TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT","SALA VIOLETA TM","SALA VIOLETA TT"];

    function inicializar() {
        const local = localStorage.getItem('J926_SISTEMA_V_VOZ');
        if(local) db = JSON.parse(local);
        actualizarTodo();
    }

    function dictar(id) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-AR';
        recognition.start();
        recognition.onresult = (event) => {
            document.getElementById(id).value = event.results[0][0].transcript.toUpperCase();
        };
    }

    function autoSala(fecha) {
        if(!fecha) return;
        const edad = Math.floor((new Date("2026-06-30") - new Date(fecha)) / 31557600000);
        document.getElementById('e').value = edad + " AÑOS";
        const s = document.getElementById('sala');
        if(edad == 2) s.value = "SALA ROSA TM";
        else if(edad == 3) s.value = "SALA VERDE TM";
        else if(edad == 4) s.value = "SALA NARANJA TM";
        else if(edad == 5) s.value = "SALA AZUL TM";
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
    }

    function guardar() {
        const ids = ['n','d','nac','f','e','sala','adom','salud','mn','mdni','m_est','mtel','auh','mdom','m_ocu','pn','pdni','p_est','ptel','pdom','p_ocu'];
        const obj = { activo: true, motivoBaja: "", presente: true };
        ids.forEach(id => obj[id] = document.getElementById(id).value.toUpperCase());
        
        if(editIdx !== null) db[editIdx] = obj; else db.push(obj);
        
        ids.forEach(id => { if(!['m_est','p_est','auh','sala','nac'].includes(id)) document.getElementById(id).value = ""; });
        editIdx = null; actualizarTodo(); alert("✅ DATOS GUARDADOS EN MATRÍCULA");
    }

    function editar(i) {
        const a = db[i]; editIdx = i;
        const ids = ['n','d','nac','f','e','sala','adom','salud','mn','mdni','m_est','mtel','auh','mdom','m_ocu','pn','pdni','p_est','ptel','pdom','p_ocu'];
        ids.forEach(id => document.getElementById(id).value = a[id] || "");
        ver(1);
    }

    function renderTabla() {
        const b = document.getElementById('bus').value.toUpperCase();
        const c = document.getElementById('cuerpo'); c.innerHTML = "";
        db.forEach((a, i) => {
            if(a.n.includes(b) || a.d.includes(b)) {
                c.innerHTML += `<tr>
                    <td>${a.n}<br><span class="text-[8px] text-slate-500">DNI: ${a.d}</span></td>
                    <td>${a.sala}</td>
                    <td>M:${a.mtel}<br>P:${a.ptel}</td>
                    <td><span class="${a.activo ? 'text-green-600' : 'text-red-600'}">● ${a.activo ? 'ALTA' : 'BAJA'}</span></td>
                    <td><button onclick="editar(${i})" class="bg-blue-600 text-white px-2 py-1 rounded text-[9px] font-bold">VER / EDITAR</button></td>
                </tr>`;
            }
        });
    }

    function renderStats() {
        const g = document.getElementById('statsGrid'); g.innerHTML = "";
        salasDisp.forEach(s => {
            const cant = db.filter(a => a.sala === s && a.activo).length;
            g.innerHTML += `<div class="bg-black border border-yellow-500 p-1 text-center rounded">
                <p class="text-[6px] text-yellow-400">${s.replace("SALA ","")}</p>
                <p class="text-xs font-bold">${cant}</p>
            </div>`;
        });
    }

    function actualizarTodo() {
        localStorage.setItem('J926_SISTEMA_V_VOZ', JSON.stringify(db));
        renderTabla(); renderStats();
    }

    function descargarJSON() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="RESPALDO_J926_VOZ.json"; a.click();
    }

    function subirJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { db = JSON.parse(ev.target.result); actualizarTodo(); alert("✅ BACKUP RECUPERADO CON ÉXITO"); };
        reader.readAsText(e.target.files[0]);
    }

    function exportarExcel() {
        let csv = "\ufeffALUMNO;DNI;NAC;SALA;EDAD;ESTADO;DOMICILIO;SALUD;MADRE;TEL M;DOM MADRE;PADRE;TEL P;DOM PADRE\n";
        db.forEach(a => {
            csv += `${a.n};${a.d};${a.nac};${a.sala};${a.e};${a.activo?'ALTA':'BAJA'};${a.adom};${a.salud};${a.mn};${a.mtel};${a.mdom};${a.pn};${a.ptel};${a.pdom}\n`;
        });
        const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); a.download="MATRICULA_SUPERVISION.csv"; a.click();
    }

    function procesarExcel() {
        const t = document.getElementById('masivo').value.split('\n');
        t.forEach(f => {
            const c = f.split('\t');
            if(c.length >= 2) db.push({ n: c[0].toUpperCase(), d: c[1], sala: c[2] || "SALA ROSA TM", activo: true, nac: "ARGENTINA", presente: true });
        });
        actualizarTodo(); alert("✅ LISTADO IMPORTADO");
    }
</script>
</body>
</html>
