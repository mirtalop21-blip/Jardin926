    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GESTIÓN JARDÍN 926 - PROFESIONAL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #001f3f; --amarillo: #facc15; --rojo: #dc2626; --verde: #16a34a; --gris: #f8fafc; }
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: var(--gris); margin: 0; font-size: 12px; font-weight: 900; }
        
        nav { background: var(--azul); display: flex; border-bottom: 5px solid #000; position: sticky; top: 0; z-index: 100; }
        nav button { flex: 1; background: var(--azul); color: white; border: none; padding: 15px; cursor: pointer; font-weight: 900; border-right: 1px solid #334155; font-size: 10px; }
        nav button.active { background: var(--amarillo); color: #000; }

        .container { max-width: 1300px; margin: 15px auto; padding: 0 10px; }
        .card { background: white; border: 4px solid #000; padding: 20px; box-shadow: 8px 8px 0px #000; margin-bottom: 25px; display: none; }
        .card.active { display: block; }
        
        .header-seccion { background: var(--azul); color: white; padding: 10px; margin-bottom: 15px; border-left: 10px solid var(--amarillo); font-style: italic; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        .grupo-titulo { grid-column: 1 / -1; background: #000; color: #fff; padding: 8px; margin-top: 15px; font-size: 12px; }
        
        .campo { display: flex; flex-direction: column; }
        label { font-size: 10px; margin-bottom: 4px; color: #000; }
        .input-mic { display: flex; gap: 5px; }
        input, select, textarea { border: 3px solid #000; padding: 10px; font-weight: 900; background: #fff; width: 100%; box-sizing: border-box; font-size: 14px; text-transform: uppercase; }
        
        .btn-mic { background: var(--rojo); color: white; border: 3px solid #000; padding: 0 15px; cursor: pointer; font-size: 20px; }
        .btn-principal { background: var(--verde); color: white; border: 5px solid #000; padding: 20px; width: 100%; font-size: 18px; cursor: pointer; margin-top: 20px; font-weight: 900; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th { background: #000; color: #fff; padding: 10px; font-size: 11px; }
        td { border: 2px solid #000; padding: 8px; font-size: 11px; text-align: center; }

        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal-body { background: white; border: 6px solid #000; width: 95%; max-width: 800px; margin: 20px auto; padding: 20px; }
    </style>
</head>
<body onload="iniciarApp()">

<nav>
    <button id="b1" class="active" onclick="ver(1)">1. CARGA MATRÍCULA</button>
    <button id="b2" onclick="ver(2)">2. ASISTENCIA</button>
    <button id="b3" onclick="ver(3)">3. SUPERVISIÓN / EXCEL</button>
</nav>

<div class="container">
    
    <section id="s1" class="card active">
        <div class="header-seccion">NUEVA CARGA DE LEGAJO 🎤</div>
        <div class="form-grid">
            <div class="grupo-titulo">DATOS DEL ALUMNO/A</div>
            <div class="campo"><label>NOMBRE Y APELLIDO</label><div class="input-mic"><input type="text" id="n"><button onclick="dictar('n')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>DNI</label><input type="number" id="d"></div>
            <div class="campo"><label>FECHA NACIMIENTO</label><input type="date" id="f"></div>
            <div class="campo"><label>NACIONALIDAD</label><div class="input-mic"><input type="text" id="nac" value="ARGENTINA"><button onclick="dictar('nac')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>SALA</label><select id="sala"><option>SALA ROSA TM</option><option>SALA NARANJA TT</option><option>SALA VERDE TM</option><option>SALA AZUL TT</option></select></div>
            <div class="campo"><label>DOMICILIO</label><div class="input-mic"><input type="text" id="dom"><button onclick="dictar('dom')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>CANT. HERMANOS</label><input type="number" id="h_c"></div>
            <div class="campo"><label>¿HERMANOS EN JARDÍN?</label><select id="h_j"><option>NO</option><option>SÍ</option></select></div>

            <div class="grupo-titulo">DATOS DE LOS PADRES</div>
            <div class="campo"><label>NOMBRE Y DNI (PADRE)</label><div class="input-mic"><input type="text" id="p_n"><button onclick="dictar('p_n')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>NACIONALIDAD / OCUPACIÓN</label><div class="input-mic"><input type="text" id="p_o"><button onclick="dictar('p_o')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>ESTUDIOS PADRE</label><select id="p_e"><option>SECUNDARIO COMPLETO</option><option>SECUNDARIO INCOMPLETO</option><option>PRIMARIO COMPLETO</option><option>UNIVERSITARIO</option></select></div>
            
            <div class="campo"><label>NOMBRE Y DNI (MADRE)</label><div class="input-mic"><input type="text" id="m_n"><button onclick="dictar('m_n')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>NACIONALIDAD / OCUPACIÓN</label><div class="input-mic"><input type="text" id="m_o"><button onclick="dictar('m_o')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>ESTUDIOS MADRE</label><select id="m_e"><option>SECUNDARIO COMPLETO</option><option>SECUNDARIO INCOMPLETO</option><option>PRIMARIO COMPLETO</option><option>UNIVERSITARIO</option></select></div>

            <div class="grupo-titulo">CONTACTO Y SOCIAL</div>
            <div class="campo"><label>TELÉFONO</label><input type="text" id="tel"></div>
            <div class="campo"><label>¿RECIBE AUH?</label><select id="auh"><option>SÍ</option><option>NO</option></select></div>
        </div>
        <button onclick="revisarYEditar()" class="btn-principal" style="background:var(--amarillo); color:#000;">👁️ REVISAR Y GUARDAR</button>
    </section>

    <section id="s3" class="card">
        <div class="header-seccion">REPORTES PARA SUPERVISIÓN 📊</div>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
            <div style="background:#fff; border:3px solid #000; padding:10px;">
                <canvas id="chartSalas"></canvas>
            </div>
            <div>
                <button onclick="exportarExcel()" class="btn-principal" style="margin-top:0;">📊 DESCARGAR EXCEL COMPLETO</button>
                <button onclick="copiaSeguridad()" class="btn-principal" style="background:var(--azul);">💾 EXPORTAR PARA OTRA PC</button>
                <input type="file" id="importFile" onchange="importarDatos(event)" style="display:none">
                <button onclick="document.getElementById('importFile').click()" class="btn-principal" style="background:gray;">📂 IMPORTAR DE OTRA PC</button>
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table id="tablaTotal">
                <thead>
                    <tr><th>ALUMNO</th><th>DNI</th><th>EDAD 30/6</th><th>SALA</th><th>DOMICILIO</th><th>FAMILIA</th><th>AUH</th><th>ACCIÓN</th></tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="modal">
    <div class="modal-body">
        <h2 style="background:#000; color:#fff; padding:10px; margin:0;">VERIFICAR Y CORREGIR</h2>
        <div id="formEdicion" class="form-grid" style="margin-top:15px;"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('modal').style.display='none'" class="btn-principal" style="background:gray;">VOLVER</button>
            <button onclick="confirmar()" class="btn-principal">✅ GRABAR ALUMNO</button>
        </div>
    </div>
</div>

<script>
    let db = [];
    const LLAVE = 'J926_MATRICULA_UNIFICADA';

    function ver(n) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
        document.getElementById('b'+n).classList.add('active');
        if(n === 3) { renderTabla(); renderGrafico(); }
    }

    function dictar(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR';
        rec.start();
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
    }

    function calcularEdad(fec) {
        if(!fec) return "-";
        let nac = new Date(fec);
        let corte = new Date(2026, 5, 30);
        let edad = corte.getFullYear() - nac.getFullYear();
        if (corte.getMonth() < nac.getMonth() || (corte.getMonth() === nac.getMonth() && corte.getDate() < nac.getDate())) edad--;
        return edad + " AÑOS";
    }

    function revisarYEditar() {
        const campos = ['n','d','f','nac','sala','dom','h_c','h_j','p_n','p_o','p_e','m_n','m_o','m_e','tel','auh'];
        let html = '';
        campos.forEach(id => {
            let val = document.getElementById(id).value;
            html += `<div class="campo"><label>${id.toUpperCase()}</label><input type="text" id="ed_${id}" value="${val.toUpperCase()}"></div>`;
        });
        document.getElementById('formEdicion').innerHTML = html;
        document.getElementById('modal').style.display = 'block';
    }

    function confirmar() {
        const alu = {};
        ['n','d','f','nac','sala','dom','h_c','h_j','p_n','p_o','p_e','m_n','m_o','m_e','tel','auh'].forEach(id => {
            alu[id] = document.getElementById('ed_'+id).value.toUpperCase();
        });
        db.push(alu);
        localStorage.setItem(LLAVE, JSON.stringify(db));
        document.getElementById('modal').style.display = 'none';
        alert("ALUMNO AGREGADO ✅");
        location.reload();
    }

    function renderTabla() {
        const t = document.getElementById('cuerpoTabla');
        t.innerHTML = "";
        db.forEach((a, i) => {
            t.innerHTML += `<tr>
                <td>${a.n}</td><td>${a.d}</td><td>${calcularEdad(a.f)}</td><td>${a.sala}</td><td>${a.dom}</td>
                <td><small>P: ${a.p_n} (${a.p_e})<br>M: ${a.m_n} (${a.m_e})</small></td><td>${a.auh}</td>
                <td><button onclick="borrar(${i})" style="background:red; color:white; border:none; padding:5px;">❌</button></td>
            </tr>`;
        });
    }

    function renderGrafico() {
        const ctx = document.getElementById('chartSalas').getContext('2d');
        const c = {};
        db.forEach(a => c[a.sala] = (c[a.sala] || 0) + 1);
        if(window.mCh) window.mCh.destroy();
        window.mCh = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.keys(c), datasets: [{ label: 'ALUMNOS', data: Object.values(c), backgroundColor: '#001f3f' }] }
        });
    }

    function exportarExcel() {
        let csv = "\uFEFFALUMNO,DNI,EDAD_30_6,SALA,DOMICILIO,PADRE,ESTUDIOS_P,MADRE,ESTUDIOS_M,TEL,AUH\n";
        db.forEach(a => {
            csv += `"${a.n}","${a.d}","${calcularEdad(a.f)}","${a.sala}","${a.dom}","${a.p_n}","${a.p_e}","${a.m_n}","${a.m_e}","${a.tel}","${a.auh}"\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'MATRICULA_JARDIN_926.csv';
        link.click();
    }

    function copiaSeguridad() {
        const b = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'RESPALDO_926.json';
        a.click();
    }

    function importarDatos(e) {
        const fr = new FileReader();
        fr.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem(LLAVE, JSON.stringify(db));
            alert("DATOS IMPORTADOS EXITOSAMENTE");
            location.reload();
        };
        fr.readAsText(e.target.files[0]);
    }

    function borrar(i) { if(confirm("¿ELIMINAR?")) { db.splice(i,1); localStorage.setItem(LLAVE, JSON.stringify(db)); renderTabla(); } }

    function iniciarApp() {
        const local = localStorage.getItem(LLAVE);
        if(local) db = JSON.parse(local);
        renderTabla();
    }
</script>
</body>
</html>
