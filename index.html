<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J926 ANALÍTICA SUPERIOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #000; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: #fff; width: 100%; font-size: 10px; }
        .nav-tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 900; opacity: 0.5; border-bottom: 3px solid transparent; }
        .nav-tab.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); background: linear-gradient(to top, rgba(250,204,21,0.1), transparent); }
        
        .SALA-ROSA { border-left: 10px solid #f472b6; } .SALA-ROJA { border-left: 10px solid #ef4444; }
        .SALA-NARANJA { border-left: 10px solid #fb923c; } .SALA-CELESTE { border-left: 10px solid #38bdf8; }
        .SALA-VIOLETA { border-left: 10px solid #a855f7; } .SALA-AMARILLA { border-left: 10px solid #facc15; }
        .SALA-AZUL { border-left: 10px solid #2563eb; }

        .mic-active { color: #ef4444 !important; filter: drop-shadow(0 0 8px #ef4444); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .progress-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body onload="render()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10">
    <div onclick="tab(1)" id="t1" class="nav-tab active">💎 CARGA IA</div>
    <div onclick="tab(2)" id="t2" class="nav-tab">📋 REGISTRO</div>
    <div onclick="tab(3)" id="t3" class="nav-tab">🛡️ SUPERVISIÓN</div>
</nav>

<main class="p-4 space-y-6">
    <section id="sec1" class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="glass p-5 rounded-3xl border-t-4 border-blue-500 space-y-3">
            <h3 class="text-blue-400 font-black italic">ALUMNO/A</h3>
            <div class="relative"><input id="a_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('a_n')"></i></div>
            <div class="flex gap-2">
                <input id="a_d" class="input-pro w-full" placeholder="DNI">
                <div class="relative w-full"><input id="a_nac" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer text-[8px]" onclick="voice('a_nac')"></i></div>
            </div>
            <div class="flex gap-2"><input id="a_f" type="date" class="input-pro" onchange="calcAge(this.value)"><input id="a_e" class="input-pro w-24" placeholder="EDAD" readonly></div>
            <select id="a_s" class="input-pro text-gold font-black">
                <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                <option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
            </select>
            <div class="relative"><input id="a_dom" class="input-pro" placeholder="DOMICILIO"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('a_dom')"></i></div>
        </div>

        <div class="glass p-5 rounded-3xl border-t-4 border-rose-500 space-y-3">
            <h3 class="text-rose-400 font-black italic">MADRE</h3>
            <div class="relative"><input id="m_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('m_n')"></i></div>
            <div class="flex gap-2"><input id="m_d" class="input-pro" placeholder="DNI"><input id="m_t" class="input-pro" placeholder="TELÉFONO"></div>
            <div class="flex gap-2">
                <select id="m_dom_opt" class="input-pro text-[8px]" onchange="toggleDom('m')"><option value="OTRO">OTRO DOMICILIO</option><option value="MISMO">MISMO QUE NIÑO</option></select>
                <input id="m_dom" class="input-pro" placeholder="DOMICILIO">
            </div>
            <select id="m_edu" class="input-pro">
                <option value="SIN ESTUDIOS">SIN ESTUDIOS</option><option value="PRIMARIA C">PRIMARIA COMPLETA</option><option value="PRIMARIA I">PRIMARIA INCOMPLETA</option>
                <option value="SECUNDARIA C">SECUNDARIA COMPLETA</option><option value="SECUNDARIA I">SECUNDARIA INCOMPLETA</option>
                <option value="TERCIARIA C">TERCIARIA COMPLETA</option><option value="TERCIARIA I">TERCIARIA INCOMPLETA</option>
                <option value="UNIVERSITARIA C">UNIVERSITARIA COMPLETA</option><option value="UNIVERSITARIA I">UNIVERSITARIA INCOMPLETA</option>
            </select>
        </div>

        <div class="glass p-5 rounded-3xl border-t-4 border-emerald-500 space-y-3">
            <h3 class="text-emerald-400 font-black italic">PADRE</h3>
            <div class="relative"><input id="p_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('p_n')"></i></div>
            <div class="flex gap-2"><input id="p_d" class="input-pro" placeholder="DNI"><input id="p_t" class="input-pro" placeholder="TELÉFONO"></div>
            <div class="flex gap-2">
                <select id="p_dom_opt" class="input-pro text-[8px]" onchange="toggleDom('p')"><option value="OTRO">OTRO DOMICILIO</option><option value="MISMO">MISMO QUE NIÑO</option></select>
                <input id="p_dom" class="input-pro" placeholder="DOMICILIO">
            </div>
            <input type="hidden" id="edit_id">
            <button onclick="save()" id="btnSave" class="w-full bg-gold text-black font-black py-4 rounded-xl shadow-xl hover:bg-yellow-500 transition">💾 GUARDAR LEGADO J926</button>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-4">
        <div id="asisCards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3"></div>
        <div id="salaView" class="glass p-6 rounded-3xl hidden border-2 border-gold/20">
            <h3 id="currentSala" class="text-xl font-black italic text-gold mb-6 uppercase"></h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="studentList"></div>
            <button onclick="closeSala()" class="mt-6 w-full p-3 glass text-rose-500 font-black rounded-xl">CERRAR VISTA</button>
        </div>
    </section>

    <section id="sec3" class="hidden space-y-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl border-l-8 border-blue-500">
                <h4 class="font-black italic mb-4">ANÁLISIS DE NACIONALIDADES (%)</h4>
                <div id="statsNac" class="space-y-3"></div>
            </div>
            <div class="glass p-6 rounded-3xl border-l-8 border-rose-500">
                <h4 class="font-black italic mb-4">NIVEL EDUCATIVO PROMEDIO (%)</h4>
                <div id="statsEdu" class="space-y-3"></div>
            </div>
        </div>
        
        <div class="glass p-6 rounded-3xl text-center border-2 border-white/5">
            <h4 class="font-black mb-4">MAPA ESTRATÉGICO DE VACANTES</h4>
            <div id="vacanteGrid" class="grid grid-cols-2 md:grid-cols-7 gap-2"></div>
        </div>

        <div class="flex gap-4 justify-center py-6">
            <button onclick="exportData()" class="bg-blue-600 px-10 py-3 rounded-full font-black shadow-lg">EXPORTAR NÚCLEO</button>
            <label class="bg-emerald-600 px-10 py-3 rounded-full font-black cursor-pointer shadow-lg">CARGAR EXCEL / COMPAÑERA
                <input type="file" class="hidden" onchange="importExcel(event)">
            </label>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('J926_S_CORE')) || [];
    let asis = JSON.parse(localStorage.getItem('J926_S_ASIS')) || {};
    const SALAS = ["SALA ROSA TM","SALA ROSA TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA CELESTE TM","SALA CELESTE TT","SALA VIOLETA TM","SALA VIOLETA TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT"];

    function tab(n) { [1,2,3].forEach(i => { document.getElementById('sec'+i).classList.toggle('hidden', i !== n); document.getElementById('t'+i).classList.toggle('active', i === n); }); }

    function voice(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = "es-AR";
        rec.onstart = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.add('mic-active');
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.onend = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.remove('mic-active');
        rec.start();
    }

    function toggleDom(p) { if(document.getElementById(p+'_dom_opt').value === 'MISMO') document.getElementById(p+'_dom').value = document.getElementById('a_dom').value; }

    function calcAge(f) {
        const limit = new Date("2026-06-30"), nac = new Date(f);
        let e = limit.getFullYear() - nac.getFullYear();
        if (limit.getMonth() < nac.getMonth() || (limit.getMonth() === nac.getMonth() && limit.getDate() < nac.getDate())) e--;
        document.getElementById('a_e').value = e + " AÑOS";
    }

    function save() {
        const id = document.getElementById('edit_id').value || Date.now();
        const record = {
            id: Number(id),
            a: { n: v('a_n'), d: v('a_d'), nac: v('a_nac'), f: v('a_f'), e: v('a_e'), s: v('a_s'), dom: v('a_dom') },
            m: { n: v('m_n'), d: v('m_d'), t: v('m_t'), dom: v('m_dom'), edu: v('m_edu') },
            p: { n: v('p_n'), d: v('p_d'), t: v('p_t'), dom: v('p_dom') }
        };
        db = db.filter(x => x.id !== record.id); db.push(record);
        sync(); alert("REGISTRO EXITOSO"); clear();
    }

    function sync() { 
        localStorage.setItem('J926_S_CORE', JSON.stringify(db)); 
        localStorage.setItem('J926_S_ASIS', JSON.stringify(asis)); 
        render(); 
    }

    function render() {
        // Registro Cards
        document.getElementById('asisCards').innerHTML = SALAS.map(s => {
            const count = db.filter(x => x.a.s === s).length;
            const colorClass = s.split(' ')[1];
            return `<div onclick="openSala('${s}')" class="glass p-4 rounded-2xl SALA-${colorClass} cursor-pointer hover:scale-105 transition">
                <p class="text-[7px] font-black opacity-70">${s}</p>
                <div class="flex justify-between items-end mt-2"><h4 class="text-sm font-black">${count}/30</h4><span class="text-gold text-[7px] font-bold">VER</span></div>
            </div>`;
        }).join('');

        // Estadísticas de Nacionalidad con Porcentajes
        const nacs = ["ARGENTINA", "PARAGUAYA", "BOLIVIANA", "PERUANA"];
        const total = db.length || 1;
        document.getElementById('statsNac').innerHTML = nacs.map(n => {
            const c = db.filter(x => x.a.nac.includes(n)).length;
            const p = ((c/total)*100).toFixed(1);
            return `<div class="text-[8px]"><div class="flex justify-between"><span>${n}</span><span>${p}%</span></div>
                    <div class="progress-bar"><div class="progress-fill bg-blue-400" style="width:${p}%"></div></div></div>`;
        }).join('');

        // Estadísticas de Estudios con Porcentajes
        const edus = ["SIN ESTUDIOS", "PRIMARIA C", "SECUNDARIA C", "TERCIARIA C", "UNIVERSITARIA C"];
        document.getElementById('statsEdu').innerHTML = edus.map(e => {
            const c = db.filter(x => x.m.edu === e).length;
            const p = ((c/total)*100).toFixed(1);
            return `<div class="text-[8px]"><div class="flex justify-between"><span>${e}</span><span>${p}%</span></div>
                    <div class="progress-bar"><div class="progress-fill bg-rose-400" style="width:${p}%"></div></div></div>`;
        }).join('');

        // Vacantes Grid
        document.getElementById('vacanteGrid').innerHTML = SALAS.map(s => {
            const v = 30 - db.filter(x => x.a.s === s).length;
            return `<div class="p-2 glass rounded-lg border border-white/5"><p class="text-[6px] opacity-50">${s}</p><p class="text-gold font-black">${v}</p></div>`;
        }).join('');
    }

    function openSala(sala) {
        document.getElementById('salaView').classList.remove('hidden');
        document.getElementById('currentSala').innerText = "SALA: " + sala;
        const students = db.filter(x => x.a.s === sala).sort((a,b) => a.a.n.localeCompare(b.a.n));
        document.getElementById('studentList').innerHTML = students.map(x => `
            <div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5 shadow-inner">
                <div><p class="font-black text-[9px] text-blue-400">${x.a.n}</p><p class="text-[7px] opacity-40">DNI: ${x.a.d}</p></div>
                <button onclick="edit(${x.id})" class="bg-gold/20 text-gold p-2 rounded-lg">EDITAR</button>
            </div>`).join('');
    }

    function edit(id) {
        const x = db.find(i => i.id === id); if(!x) return;
        document.getElementById('edit_id').value = x.id;
        Object.keys(x.a).forEach(k => { if(document.getElementById('a_'+k)) document.getElementById('a_'+k).value = x.a[k]; });
        Object.keys(x.m).forEach(k => { if(document.getElementById('m_'+k)) document.getElementById('m_'+k).value = x.m[k]; });
        Object.keys(x.p).forEach(k => { if(document.getElementById('p_'+k)) document.getElementById('p_'+k).value = x.p[k]; });
        tab(1); closeSala();
    }

    function v(id) { return document.getElementById(id).value.toUpperCase().trim(); }
    function clear() { document.querySelectorAll('input, textarea').forEach(i => { if(!['a_s','a_nac','m_dom_opt','p_dom_opt','m_edu'].includes(i.id)) i.value=""; }); }
    function closeSala() { document.getElementById('salaView').classList.add('hidden'); }
    function exportData() {
        const b = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "CORE_J926_STAT.json"; a.click();
    }
    function importExcel(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { db = JSON.parse(ev.target.result); sync(); alert("CARGA EXITOSA"); };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
