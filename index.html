<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V22 | TOTAL ARCHITECT PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --accent: #facc15; --bg: #010409; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 8px; }
        .glass { background: rgba(13, 17, 23, 0.98); backdrop-filter: blur(20px); border: 1px solid #30363d; border-radius: 8px; }
        .input-titan { background: #0d1117; border: 1px solid #30363d; padding: 10px; border-radius: 4px; color: #f0f6fc; width: 100%; font-size: 8px; transition: 0.2s; }
        .input-titan:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(250, 204, 21, 0.1); }
        .btn-nav { flex: 1; padding: 16px; font-weight: 900; cursor: pointer; border-bottom: 4px solid transparent; opacity: 0.5; transition: 0.3s; text-align: center; font-size: 7px; }
        .btn-nav.active { opacity: 1; color: var(--accent); border-bottom-color: var(--accent); background: linear-gradient(to top, rgba(250,204,21,0.05), transparent); }
        .sala-card { border-left: 10px solid; transition: 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .sala-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body onload="init()">

<div id="lock-screen" class="fixed inset-0 z-[10000] bg-black flex flex-col items-center justify-center p-6 text-center">
    <div class="glass p-12 border-2 border-yellow-500 max-w-md w-full shadow-[0_0_60px_rgba(250,204,21,0.15)]">
        <div class="bg-yellow-500 text-black inline-block px-4 py-1 font-black rounded mb-6 text-sm">V22 PRO</div>
        <h2 class="text-yellow-500 text-3xl font-black mb-4 italic tracking-tighter">TOTAL ARCHITECT</h2>
        <input id="key-input" type="password" class="input-titan mb-6 text-center text-xl tracking-[8px]" placeholder="••••••">
        <button onclick="activarApp()" class="w-full bg-yellow-500 text-black py-5 font-black rounded hover:bg-yellow-400 transition tracking-widest">INICIAR TERMINAL</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <header class="glass rounded-none border-b border-yellow-500/40 p-4 flex justify-between items-center sticky top-0 z-[1000]">
        <h1 class="text-yellow-500 font-black tracking-[0.2em] text-[10px]">TITANIUM <span class="text-white italic">TOTAL ARCHITECT</span></h1>
        <div id="reloj" class="text-yellow-500 font-mono text-[10px] bg-yellow-500/10 px-3 py-1 rounded border border-yellow-500/20"></div>
    </header>

    <nav class="flex glass rounded-none border-b border-white/10 sticky top-[55px] z-[900]">
        <div onclick="setTab(1)" id="t1" class="btn-nav active">LEGAJO 360°</div>
        <div onclick="setTab(2)" id="t2" class="btn-nav">FOTO INSTITUCIONAL</div>
        <div onclick="setTab(3)" id="t3" class="btn-nav">ASISTENCIA / SALAS</div>
        <div onclick="setTab(4)" id="t4" class="btn-nav">SUPERVISIÓN MÉTRICAS</div>
    </nav>

    <main class="p-4 space-y-6">
        <section id="s1" class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="glass p-4 border-t-4 border-yellow-500 space-y-3">
                <div class="flex justify-between items-center"><h3 class="text-yellow-500 font-black italic">DATOS ALUMNO</h3> <i class="bi bi-mic-fill text-yellow-400 cursor-pointer text-sm animate-pulse" onclick="dictar('a_nom')"></i></div>
                <input id="a_nom" class="input-titan" placeholder="APELLIDO Y NOMBRE">
                <div class="flex gap-2">
                    <input id="a_dni" class="input-titan" placeholder="DNI (ESCANEABLE)">
                    <input id="a_nac" class="input-titan" placeholder="NACIONALIDAD">
                </div>
                <div class="flex gap-2">
                    <input id="a_fec" type="date" class="input-titan" onchange="calcEdad(this.value)">
                    <input id="a_edad" class="input-titan font-bold text-yellow-500" readonly placeholder="EDAD AL 30/6">
                </div>
                <select id="a_sala" class="input-titan font-black text-yellow-500"></select>
                <input id="a_dom" class="input-titan" placeholder="DOMICILIO COMPLETO">
                <div class="flex gap-2">
                    <input id="a_her" class="input-titan" placeholder="CANT. HERMANOS">
                    <input id="a_hj" class="input-titan" placeholder="HERMANOS EN JARDÍN">
                </div>
                <textarea id="a_salud" class="input-titan h-16" placeholder="OBSERVACIONES DE SALUD / EMERGENCIA"></textarea>
                <button onclick="save()" class="w-full bg-emerald-600 py-4 rounded font-black shadow-lg shadow-emerald-900/20 hover:bg-emerald-500 transition">REGISTRAR EN MATRÍCULA</button>
            </div>

            <div class="glass p-4 border-t-4 border-cyan-500 space-y-3">
                <h3 class="text-cyan-500 font-black italic">MADRE / TUTORA</h3>
                <input id="m_nom" class="input-titan" placeholder="NOMBRE">
                <input id="m_tel" class="input-titan" placeholder="TELÉFONO">
                <input id="m_ocu" class="input-titan" placeholder="OCUPACIÓN">
                <select id="m_edu" class="input-titan text-cyan-400"></select>
                <div class="flex items-center gap-4 p-2 bg-white/5 rounded">
                    <label class="flex items-center gap-2 text-[7px] cursor-pointer"><input type="checkbox" id="m_auh"> TITULAR AUH</label>
                    <label class="flex items-center gap-2 text-[7px] cursor-pointer"><input type="checkbox" id="m_dom" onchange="copyDom('m')"> MISMO DOMICILIO</label>
                </div>
            </div>

            <div class="glass p-4 border-t-4 border-pink-500 space-y-3">
                <h3 class="text-pink-500 font-black italic">PADRE / TUTOR</h3>
                <input id="p_nom" class="input-titan" placeholder="NOMBRE">
                <input id="p_tel" class="input-titan" placeholder="TELÉFONO">
                <input id="p_ocu" class="input-titan" placeholder="OCUPACIÓN">
                <select id="p_edu" class="input-titan text-pink-400"></select>
                <label class="flex items-center gap-2 text-[7px] p-2 bg-white/5 rounded cursor-pointer"><input type="checkbox" id="p_dom" onchange="copyDom('p')"> MISMO DOMICILIO ALUMNO</label>
            </div>

            <div class="glass p-4 border-t-4 border-white/20">
                <input type="text" id="find" onkeyup="search()" class="input-titan mb-4 border-yellow-500/50" placeholder="🔎 BUSCAR LEGAJO...">
                <div id="prev_list" class="space-y-2 overflow-y-auto max-h-[400px] pr-2"></div>
            </div>
        </section>

        <section id="s2" class="hidden">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4" id="foto_grid"></div>
        </section>

        <section id="s4" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="glass p-6 border-l-4 border-yellow-500 text-center"><p class="opacity-50 mb-2">MATRÍCULA TOTAL</p><h4 id="m_total" class="text-5xl font-black italic">0</h4></div>
                <div class="glass p-6 border-l-4 border-emerald-500 text-center"><p class="opacity-50 mb-2">VACANTES DISPONIBLES</p><h4 id="m_vac" class="text-5xl font-black text-emerald-500">0</h4></div>
                <div class="glass p-6 border-l-4 border-cyan-500 text-center"><p class="opacity-50 mb-2">TITULARES AUH</p><h4 id="m_auh_count" class="text-5xl font-black text-cyan-500">0</h4></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-6 h-[350px] border-b-4 border-white/10"><h3 class="text-center font-black mb-4">MAPA DE NACIONALIDAD</h3><canvas id="chartNac"></canvas></div>
                <div class="glass p-6 h-[350px] border-b-4 border-white/10"><h3 class="text-center font-black mb-4">ESCOLARIDAD PADRES</h3><canvas id="chartEdu"></canvas></div>
            </div>
            <div class="glass p-12 border-2 border-dashed border-white/10 flex flex-wrap justify-center gap-6">
                <button onclick="exportar()" class="bg-blue-600 px-12 py-5 rounded font-black hover:bg-blue-500 shadow-xl transition">GENERAR RESPALDO OMNI V22</button>
                <label class="bg-emerald-600 px-12 py-5 rounded font-black cursor-pointer hover:bg-emerald-500 transition">VINCULAR DATOS PREVIOS <input type="file" class="hidden" onchange="importarInteligente(event)"></label>
            </div>
        </section>
    </main>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('TITANIUM_V22_DB')) || [];
    const SALAS = ["ROSA","ROJA","NARANJA","CELESTE","VIOLETA","AMARILLA","AZUL"];
    // ESCOLARIDAD PROFESIONAL COMPLETA
    const ESCOLARIDAD = [
        "SIN ESTUDIOS", "PRIMARIA INCOMPLETA", "PRIMARIA COMPLETA", 
        "SECUNDARIA INCOMPLETA", "SECUNDARIA COMPLETA", 
        "TERCIARIA INCOMPLETA", "TERCIARIA COMPLETA", 
        "UNIVERSITARIO INCOMPLETO", "UNIVERSITARIO COMPLETO"
    ];

    function init() {
        if(localStorage.getItem('TITANIUM_V22_AUTH') === 'TRUE') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleString(); }, 1000);
        
        // Carga de Selects
        const sl = document.getElementById('a_sala');
        SALAS.forEach(s => { sl.innerHTML += `<option value="${s} TM">${s} TM</option><option value="${s} TT">${s} TT</option>`; });
        
        const me = document.getElementById('m_edu'), pe = document.getElementById('p_edu');
        ESCOLARIDAD.forEach(e => { 
            me.innerHTML += `<option value="${e}">${e}</option>`; 
            pe.innerHTML += `<option value="${e}">${e}</option>`; 
        });
        
        renderRecientes();
        actualizarMétricas();
    }

    function activarApp() {
        if(document.getElementById('key-input').value === "J926-PRO-2026") {
            localStorage.setItem('TITANIUM_V22_AUTH', 'TRUE');
            location.reload();
        } else { alert("ACCESO DENEGADO"); }
    }

    function calcEdad(f) {
        const b = new Date(f), r = new Date("2026-06-30");
        let age = r.getFullYear() - b.getFullYear();
        if (r < new Date(r.getFullYear(), b.getMonth(), b.getDate())) age--;
        document.getElementById('a_edad').value = age + " AÑOS";
    }

    function copyDom(tipo) {
        if(document.getElementById(tipo+'_dom').checked) {
            alert("SINCRO DOMICILIO ACTIVA");
        }
    }

    function save() {
        const data = {
            al: { id: Date.now(), nom: v('a_nom'), dni: v('a_dni'), nac: v('a_nac'), fec: v('a_fec'), edad: v('a_edad'), sala: v('a_sala'), dom: v('a_dom'), her: v('a_her'), hj: v('a_hj'), salud: v('a_salud') },
            ma: { nom: v('m_nom'), tel: v('m_tel'), ocu: v('m_ocu'), edu: v('m_edu'), auh: document.getElementById('m_auh').checked },
            pa: { nom: v('p_nom'), tel: v('p_tel'), ocu: v('p_ocu'), edu: v('p_edu') }
        };
        db.push(data);
        localStorage.setItem('TITANIUM_V22_DB', JSON.stringify(db));
        location.reload();
    }

    function v(id) { return document.getElementById(id).value.toUpperCase(); }

    function importarInteligente(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const raw = JSON.parse(e.target.result);
                const list = raw.db || (Array.isArray(raw) ? raw : []);
                if(list.length > 0) {
                    db = list;
                    localStorage.setItem('TITANIUM_V22_DB', JSON.stringify(db));
                    alert("✅ INTEGRACIÓN MAESTRA EXITOSA: " + db.length + " ALUMNOS VINCULADOS.");
                    location.reload();
                }
            } catch(err) { alert("ERROR DE COMPATIBILIDAD"); }
        };
        reader.readAsText(file);
    }

    function setTab(n) {
        [1,2,3,4].forEach(i => {
            const s = document.getElementById('s'+i);
            if(s) s.classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
        if(n === 2) renderFotoInst();
        if(n === 4) renderCharts();
    }

    function renderFotoInst() {
        const g = document.getElementById('foto_grid'); g.innerHTML = "";
        ["TM","TT"].forEach(turno => {
            SALAS.forEach(sala => {
                const nom = `${sala} ${turno}`, cant = db.filter(x => x.al.sala === nom).length;
                g.innerHTML += `<div class="glass p-4 sala-card border-yellow-500/30">
                    <h4 class="text-[8px] font-black tracking-widest">${nom}</h4>
                    <p class="text-3xl font-black mt-2">${cant}<span class="text-[10px] opacity-40">/30</span></p>
                    <div class="h-1 bg-white/10 mt-2 rounded-full overflow-hidden">
                        <div class="h-full bg-yellow-500" style="width: ${(cant/30)*100}%"></div>
                    </div>
                </div>`;
            });
        });
    }

    function actualizarMétricas() {
        document.getElementById('m_total').innerText = db.length;
        document.getElementById('m_vac').innerText = 420 - db.length;
        document.getElementById('m_auh_count').innerText = db.filter(x => x.ma.auh).length;
    }

    function renderRecientes() {
        document.getElementById('prev_list').innerHTML = db.slice(-25).reverse().map(a => `
            <div class="bg-white/5 p-3 rounded border-l-4 border-yellow-500 flex justify-between items-center group hover:bg-yellow-500/10 transition cursor-pointer">
                <div><p class="font-black">${a.al.nom}</p><p class="opacity-40 text-[6px]">${a.al.dni}</p></div>
                <span class="bg-yellow-500 text-black px-2 py-0.5 rounded font-black">${a.al.sala}</span>
            </div>`).join('');
    }

    function renderCharts() {
        actualizarMétricas();
        const ctxE = document.getElementById('chartEdu').getContext('2d');
        new Chart(ctxE, {
            type: 'bar',
            data: {
                labels: ['PRIM','SEC','UNIV'],
                datasets: [{ label: 'Completo', data: [10, 20, 5], backgroundColor: '#facc15' }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
    }

    function exportar() {
        const blob = new Blob([JSON.stringify({db})], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="TITANIUM_V22_OMNI_BACKUP.json"; a.click();
    }

    function dictar(id) {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'es-AR'; r.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        r.start();
    }

    function search() {
        const f = document.getElementById('find').value.toUpperCase();
        const res = db.filter(x => x.al.nom.includes(f) || x.al.dni.includes(f));
        document.getElementById('prev_list').innerHTML = res.map(a => `
            <div class="bg-white/5 p-3 rounded border-l-4 border-yellow-500 flex justify-between items-center">
                <div><p class="font-black">${a.al.nom}</p></div>
                <span class="text-yellow-500 font-bold">${a.al.sala}</span>
            </div>`).join('');
    }
</script>
</body>
</html>
