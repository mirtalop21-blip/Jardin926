<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA JARDÍN 926 - GESTIÓN INTEGRAL v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #cbd5e1; }
        .input-pro { width: 100%; border: 4px solid #000; padding: 8px; font-weight: 900; background: #fff; font-size: 12px; }
        .card-main { border: 8px solid #000; background: white; padding: 20px; box-shadow: 12px 12px 0px #000; }
        .nav-link { flex: 1; text-align: center; padding: 15px; font-weight: 900; color: white; cursor: pointer; border-right: 2px solid #fff; }
        .nav-link.active { background: #facc15; color: #000; border-bottom: 6px solid #000; }
        th { background: #000; color: #fff; padding: 10px; font-size: 10px; }
        td { border: 2px solid #000; padding: 6px; font-weight: 900; text-align: center; font-size: 10px; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-8 border-black">
    <div onclick="ver(1)" id="t1" class="nav-link active">1. MATRÍCULA (LEGAJO 🎤)</div>
    <div onclick="ver(3)" id="t3" class="nav-link">3. SUPERVISIÓN (LOS 35 ALUMNOS 📊)</div>
</nav>

<main class="p-4">
    <section id="sec1" class="card-main">
        <h2 class="bg-black text-white p-2 text-center mb-4 italic">CARGA Y EDICIÓN DE LEGAJOS</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="border-r-2 border-black pr-4">
                <p class="bg-blue-600 text-white p-1 font-black text-center mb-2">NIÑO/A</p>
                <div class="flex gap-1"><input type="text" id="n" placeholder="NOMBRE COMPLETO" class="input-pro"><button onclick="voz('n')" class="bg-red-600 text-white px-2 border-2 border-black">🎤</button></div>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <input type="number" id="d" placeholder="DNI" class="input-pro">
                    <input type="text" id="e" placeholder="EDAD AL 30/06" class="input-pro">
                </div>
                <select id="sala" class="input-pro mt-2">
                    <option>SALA ROSA TM</option><option>SALA NARANJA TT</option>
                    <option>SALA ROJA TM</option><option>SALA CELESTE TT</option>
                </select>
                <input type="text" id="salud" placeholder="SALUD / ALERGIAS" class="input-pro mt-2">
            </div>
            <div class="border-r-2 border-black pr-4">
                <p class="bg-rose-600 text-white p-1 font-black text-center mb-2">FAMILIA</p>
                <input type="text" id="mn" placeholder="MADRE: NOMBRE" class="input-pro mb-2">
                <input type="text" id="mtel" placeholder="TELÉFONO MADRE" class="input-pro mb-2">
                <input type="text" id="pn" placeholder="PADRE: NOMBRE" class="input-pro mb-2">
                <input type="text" id="ptel" placeholder="TELÉFONO PADRE" class="input-pro mb-2">
            </div>
            <div class="flex flex-col justify-center">
                <button onclick="previa()" class="bg-yellow-400 p-8 border-4 border-black font-black text-xl shadow-[6px_6px_0px_#000] hover:bg-yellow-500">👁️ GUARDAR CAMBIOS</button>
                <p class="text-[10px] mt-4 font-bold text-center italic">RECUERDA: BUSCA AL ALUMNO ABAJO Y TOCA "EDITAR" PARA COMPLETAR SUS DATOS.</p>
            </div>
        </div>
    </section>

    <section id="sec3" class="card-main hidden mt-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-black text-white p-4 border-4 border-black text-center">
                <p class="text-[10px]">MATRÍCULA CARGADA</p>
                <p id="totalLabel" class="text-5xl font-black">0</p>
            </div>
            <div class="md:col-span-2 bg-white border-4 border-black p-1 h-32"><canvas id="chartSalas"></canvas></div>
            <div class="flex flex-col gap-1">
                <button onclick="respaldar()" class="bg-blue-600 text-white p-2 border-2 border-black font-black text-xs">💾 GUARDAR RESPALDO</button>
                <button onclick="exportarExcel()" class="bg-green-600 text-white p-2 border-2 border-black font-black text-xs">📊 EXPORTAR EXCEL</button>
            </div>
        </div>

        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR APELLIDO O DNI..." class="input-pro text-lg mb-4 border-blue-700">
        
        <div class="overflow-x-auto h-[500px]">
            <table class="w-full">
                <thead class="sticky top-0">
                    <tr>
                        <th>ALUMNO / DNI</th><th>SALA</th><th>EDAD</th><th>CONTACTOS</th><th>SALUD</th><th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let db = [];
    let editIdx = null;
    let chartObj = null;

    // LISTA COMPLETA DE RESCATE (33 ALUMNOS)
    const iniciales = [
        "AGUILAR CURTIDO BELINDA ABIGAIL", "AMARILLA SUAREZ YAMIR JORGE", "BAGLIETTO THIAN ELIEL", 
        "BARBERIS SANTILLAN JUAN PABLO", "BENITEZ CIELO ELUNEY", "BENITEZ LUISANA VALENTINA", 
        "BOGDANOFF NAHOMI ANGELA", "CABALLERO ABREGO RONALDO DANIEL", "CACERES ISABELLA VALERIA", 
        "CARRILLO QUISPE AARIA DAINERIS", "CENTURION RIOS LIAM CIRO", "CHOQUE MAREA O MICAELA BRIANA", 
        "ESCOBAR NICOLAS MAEL", "FARIA AS BLANCO FRANCESCO LIONEL", "FIGUEROA CATALEYA ANAHI", 
        "GARCIA ROMA MARTINA", "GAUNA RAMIRO NAHUEL", "GOMEZ SANTIAGO ENZO", "JIMENEZ ROJAS JAZMIN TERESA", 
        "LOZA ELISEO VALENTIN", "MONTES MAIRANA ADA ABIGAIL", "OJEDA ISABELLA GABRIELA", 
        "QUISPE GUARACHI DAYLIN FLORENCIA", "RECALDE OVIEDO LUANA", "SALVATIERRA ROJAS ANA LIZ", 
        "SANTALLA ROJAS GAEL ALEJANDRO", "SANTILLAN GAEL DARIO", "SAUCEDO VIDAL DESIDERIO", 
        "SOSA AYNARA MAGALI", "TABOADA CAMILA MAITE", "TORRES COCA ANA LUJAN", 
        "VALLEJOS HEREDIA AITANA EVELYN", "VELAZQUEZ ARCIENAGA JULIETA ISABEL"
    ];

    function inicializar() {
        const saved = localStorage.getItem('J926_V11_DATA');
        if (saved) {
            db = JSON.parse(saved);
        } else {
            // Si es la primera vez, cargar los 33 nombres automáticamente
            db = iniciales.map(nombre => ({
                n: nombre, d: "", s: "SALA ROSA TM", e: "5 AÑOS", 
                salud: "SIN DATOS", mn: "", mtel: "", pn: "", ptel: ""
            }));
        }
        renderTabla();
    }

    function ver(n) {
        document.getElementById('sec1').classList.toggle('hidden', n !== 1);
        document.getElementById('sec3').classList.toggle('hidden', n !== 3);
        document.getElementById('t1').className = n === 1 ? 'nav-link active' : 'nav-link';
        document.getElementById('t3').className = n === 3 ? 'nav-link active' : 'nav-link';
    }

    function previa() {
        const alu = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            e: document.getElementById('e').value,
            s: document.getElementById('sala').value,
            salud: document.getElementById('salud').value.toUpperCase(),
            mn: document.getElementById('mn').value.toUpperCase(),
            mtel: document.getElementById('mtel').value,
            pn: document.getElementById('pn').value.toUpperCase(),
            ptel: document.getElementById('ptel').value
        };

        if(editIdx !== null) db[editIdx] = alu;
        else db.push(alu);

        localStorage.setItem('J926_V11_DATA', JSON.stringify(db));
        editIdx = null;
        limpiarForm();
        renderTabla();
        alert("¡DATOS GUARDADOS! REVISA LA PESTAÑA SUPERVISIÓN.");
    }

    function editar(i) {
        editIdx = i;
        const a = db[i];
        document.getElementById('n').value = a.n;
        document.getElementById('d').value = a.d;
        document.getElementById('e').value = a.e;
        document.getElementById('sala').value = a.s;
        document.getElementById('salud').value = a.salud;
        document.getElementById('mn').value = a.mn;
        document.getElementById('mtel').value = a.mtel;
        document.getElementById('pn').value = a.pn;
        document.getElementById('ptel').value = a.ptel;
        ver(1);
        window.scrollTo(0,0);
    }

    function renderTabla() {
        const filtro = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('cuerpo');
        t.innerHTML = "";
        const salasCont = {};

        db.forEach((a, i) => {
            salasCont[a.s] = (salasCont[a.s] || 0) + 1;
            if(a.n.includes(filtro) || a.d.includes(filtro)) {
                t.innerHTML += `<tr>
                    <td>${a.n}<br><span class="text-blue-600">DNI: ${a.d}</span></td>
                    <td>${a.s}</td><td>${a.e}</td>
                    <td>M: ${a.mtel}<br>P: ${a.ptel}</td>
                    <td class="${a.salud !== 'SIN DATOS' ? 'text-red-600' : ''}">${a.salud}</td>
                    <td><button onclick="editar(${i})" class="bg-yellow-400 p-2 border border-black font-black">EDITAR</button></td>
                </tr>`;
            }
        });
        document.getElementById('totalLabel').innerText = db.length;
        updateChart(salasCont);
    }

    function updateChart(data) {
        const ctx = document.getElementById('chartSalas').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(data),
                datasets: [{ label: 'NIÑOS', data: Object.values(data), backgroundColor: '#1e293b' }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    function voz(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR';
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.start();
    }

    function respaldar() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'RESPALDO_J926_COMPLETO.json';
        a.click();
    }

    function limpiarForm() {
        ['n','d','e','salud','mn','mtel','pn','ptel'].forEach(id => document.getElementById(id).value = "");
    }
</script>
</body>
</html>
