    function dictar(id) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-AR';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById(id).value = e.results[0][0].transcript.toUpperCase();
        };
    }

    function calcularEdadAl30DeJunio(fechaNac) {
        if(!fechaNac) return "-";
        const nac = new Date(fechaNac);
        const corte = new Date(2026, 5, 30); // 30 de Junio 2026
        let edad = corte.getFullYear() - nac.getFullYear();
        const m = corte.getMonth() - nac.getMonth();
        if (m < 0 || (m === 0 && corte.getDate() < nac.getDate())) { edad--; }
        return edad + " AÑOS";
    }

    function iniciarSistema() {
        const guardado = localStorage.getItem('J926_SISTEMA_V3');
        if(guardado) db = JSON.parse(guardado);
        render();
    }

    function agregarAlumno() {
        const alu = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            s: document.getElementById('s').value,
            f: document.getElementById('f').value,
            p: document.getElementById('p').value.toUpperCase(),
            m: document.getElementById('m').value.toUpperCase()
        };
        if(alu.n && alu.d) {
            db.push(alu);
            localStorage.setItem('J926_SISTEMA_V3', JSON.stringify(db));
            render();
            alert("ALUMNO REGISTRADO");
            ['n','d','f','p','m'].forEach(id => document.getElementById(id).value = "");
        } else {
            alert("COMPLETAR NOMBRE Y DNI");
        }
    }

    function render() {
        const cuerpo = document.getElementById('tablaCuerpo');
        cuerpo.innerHTML = "";
        db.sort((a,b) => a.s.localeCompare(b.s) || a.n.localeCompare(b.n)).forEach((a, i) => {
            cuerpo.innerHTML += `
                <tr class="border-4 border-black">
                    <td class="p-3 border-r-4 border-black">${a.n}<br><span class="text-[10px] text-blue-700">DNI: ${a.d}</span></td>
                    <td class="p-3 border-r-4 border-black text-center bg-blue-50">${a.s}</td>
                    <td class="p-3 border-r-4 border-black text-center text-red-600">${calcularEdadAl30DeJunio(a.f)}</td>
                    <td class="p-3 text-center"><button onclick="eliminar(${i})" class="bg-red-600 text-white p-1 text-xs">BORRAR</button></td>
                </tr>`;
        });
    }

    function exportarExcelProfesional() {
        let csv = "\uFEFFMATRÍCULA INSTITUCIONAL - JARDÍN 926\n";
        const salas = [...new Set(db.map(a => a.s))];
        salas.forEach(sala => {
            csv += `\n--- SECCIÓN: ${sala} ---\n`;
            csv += "APELLIDO Y NOMBRE, DNI, EDAD AL 30/06, PADRE/TUTOR, MADRE/TUTORA\n";
            db.filter(a => a.s === sala).forEach(a => {
                csv += `${a.n}, ${a.d}, ${calcularEdadAl30DeJunio(a.f)}, ${a.p}, ${a.m}\n`;
            });
        });
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "MATRICULA_J926_INSPECCION.csv";
        link.click();
    }

    function eliminar(i) { if(confirm("¿ELIMINAR?")) { db.splice(i,1); localStorage.setItem('J926_SISTEMA_V3', JSON.stringify(db)); render(); } }
    function descargarBackup() {
        const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const dl = document.createElement('a');
        dl.setAttribute("href", data);
        dl.setAttribute("download", "BACKUP_COMPLETO_J926.json");
        dl.click();
