                    </div>
                    <div>
                        <label class="label-style">Hermanos en el Jardín <i class="fas fa-microphone voice-btn" onclick="iniciarVoz('alu_her_jardin')"></i></label>
                        <input type="text" id="alu_her_jardin" class="input-field" placeholder="Sala / Nombre">
                    </div>
                </div>

                <div class="mb-8">
                    <label class="label-style text-red-600">Salud / Alergias <i class="fas fa-microphone voice-btn" onclick="iniciarVoz('alu_salud')"></i></label>
                    <input type="text" id="alu_salud" class="input-field border-red-200 bg-red-50">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-50 p-4 rounded-lg border space-y-3">
                        <h3 class="label-style border-b pb-1 text-blue-700">Responsable 1 (Padre/Madre/Tutor)</h3>
                        <input type="text" id="r1_nom" class="input-field" placeholder="Nombre y Apellido">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="r1_dni" class="input-field" placeholder="DNI">
                            <input type="text" id="r1_nac" class="input-field" placeholder="Nacionalidad">
                        </div>
                        <input type="text" id="r1_dom" class="input-field" placeholder="Domicilio">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="r1_tel" class="input-field" placeholder="Teléfono">
                            <input type="text" id="r1_ocu" class="input-field" placeholder="Ocupación">
                        </div>
                        <select id="r1_esc" class="input-field"><option value="">Escolaridad...</option><option>Primaria Completa</option><option>Primaria Incompleta</option><option>Secundaria Completa</option><option>Secundaria Incompleta</option><option>Terciaria Completa</option></select>
                        <select id="r1_auh" class="input-field"><option value="NO">¿Recibe AUH? NO</option><option value="SI">¿Recibe AUH? SI</option></select>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-lg border space-y-3">
                        <h3 class="label-style border-b pb-1 text-pink-700">Responsable 2 (Padre/Madre/Tutor)</h3>
                        <input type="text" id="r2_nom" class="input-field" placeholder="Nombre y Apellido">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="r2_dni" class="input-field" placeholder="DNI">
                            <input type="text" id="r2_nac" class="input-field" placeholder="Nacionalidad">
                        </div>
                        <input type="text" id="r2_dom" class="input-field" placeholder="Domicilio">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="r2_tel" class="input-field" placeholder="Teléfono">
                            <input type="text" id="r2_ocu" class="input-field" placeholder="Ocupación">
                        </div>
                        <select id="r2_esc" class="input-field"><option value="">Escolaridad...</option><option>Primaria Completa</option><option>Primaria Incompleta</option><option>Secundaria Completa</option><option>Secundaria Incompleta</option><option>Terciaria Completa</option></select>
                        <select id="r2_auh" class="input-field"><option value="NO">¿Recibe AUH? NO</option><option value="SI">¿Recibe AUH? SI</option></select>
                    </div>
                </div>

                <button type="submit" id="btn_guardar" class="w-full mt-6 bg-blue-600 text-white font-black py-4 rounded-xl uppercase shadow-lg hover:bg-blue-700 transition-all">Guardar Alumno en Matrícula</button>
            </form>

            <div class="bg-white rounded-xl shadow-lg border overflow-hidden">
                <div class="bg-slate-800 p-4 flex flex-col md:flex-row justify-between gap-4">
                    <h3 class="text-white font-black uppercase text-xs self-center">Control de Carga por Sala</h3>
                    <div class="flex gap-2">
                        <select id="filtro_sala" class="bg-slate-700 text-white p-2 rounded text-xs" onchange="renderMatricula()"></select>
                        <input type="text" id="bus_nom" class="bg-slate-700 text-white p-2 rounded text-xs w-48" placeholder="Buscar por Nombre..." oninput="renderMatricula()">
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-100 text-[10px] uppercase font-black text-slate-600 border-b">
                            <tr>
                                <th class="p-4">Alumno</th>
                                <th class="p-4">DNI</th>
                                <th class="p-4">Salud/Alergia</th>
                                <th class="p-4 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tbody_matricula" class="text-xs divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="asistencia" class="tab-content">
            <div class="bg-white rounded-xl shadow-lg border p-4">
                <div class="flex flex-col md:flex-row justify-between mb-4 gap-4">
                    <h2 class="font-black uppercase text-sm">Libro de Asistencia (Mes en Curso)</h2>
                    <div class="flex gap-2">
                        <select id="asis_sala" class="border p-2 rounded text-xs font-bold" onchange="renderAsistencia()"></select>
                        <button onclick="marcarTodosPresentes()" class="bg-blue-100 text-blue-700 px-3 py-1 rounded text-[10px] font-black uppercase">Todo Presente Hoy</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full border-collapse">
                        <thead class="bg-slate-800 text-white text-[9px]">
                            <tr id="asis_header"></tr>
                        </thead>
                        <tbody id="asis_body" class="text-[10px] bg-white divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="supervision" class="tab-content space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-blue-500">
                    <p class="text-[10px] font-black text-slate-500 uppercase">Matrícula Total</p>
                    <h4 id="stat_total" class="text-2xl font-black">0</h4>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-emerald-500">
                    <p class="text-[10px] font-black text-slate-500 uppercase">Presentismo Promedio</p>
                    <h4 id="stat_pres" class="text-2xl font-black">0%</h4>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-orange-500">
                    <p class="text-[10px] font-black text-slate-500 uppercase">Bajas del Mes</p>
                    <h4 id="stat_bajas" class="text-2xl font-black">0</h4>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-red-500">
                    <p class="text-[10px] font-black text-slate-500 uppercase">Alertas (>10 Faltas)</p>
                    <h4 id="stat_alertas" class="text-2xl font-black text-red-600">0</h4>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow border">
                <canvas id="graficoMatricula" height="100"></canvas>
            </div>
        </div>

    </main>

    <script>
        // Configuración de Salas según Instrucciones del Jardín 926
        const SALAS = ["Sala Rosa TM", "Sala Roja TM", "Sala Naranja TM", "Sala Amarilla TM", "Sala Violeta TM", "Sala Azul TM", "Sala Celeste TM", "Sala Rosa TT", "Sala Roja TT", "Sala Naranja TT", "Sala Amarilla TT", "Sala Violeta TT", "Sala Azul TT", "Sala Celeste TT"]; //
        let db = JSON.parse(localStorage.getItem('j926_v4_data')) || [];

        function init() {
            const sc = document.getElementById('alu_sala');
            const sf = document.getElementById('filtro_sala');
            const sa = document.getElementById('asis_sala');
            SALAS.forEach(s => {
                const opt = `<option value="${s}">${s}</option>`;
                sc.innerHTML += opt; sf.innerHTML += opt; sa.innerHTML += opt;
            });
            renderMatricula();
            renderAsistencia();
            actualizarEstadisticas();
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('text-blue-600', 'border-blue-600');
                b.classList.add('text-slate-500', 'border-transparent');
            });
            document.getElementById('tab-btn-' + id).classList.add('text-blue-600', 'border-blue-600');
            if(id === 'supervision') actualizarEstadisticas();
        }

        // --- SISTEMA DE VOZ ---
        function iniciarVoz(id) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRec) return alert("Navegador no compatible con voz");
            const rec = new SpeechRec();
            rec.lang = 'es-AR';
            rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
            rec.start();
        }

        // --- MATRÍCULA Y EDICIÓN ---
        document.getElementById('formMatricula').onsubmit = function(e) {
            e.preventDefault();
            const dni = document.getElementById('alu_dni').value;
            const alu = {
                dni: dni,
                nombre: document.getElementById('alu_nombre').value.toUpperCase(),
                f_nac: document.getElementById('alu_f_nac').value,
                edad: document.getElementById('alu_edad').value,
                sala: document.getElementById('alu_sala').value,
                dom: document.getElementById('alu_dom').value,
                her_cant: document.getElementById('alu_her_cant').value,
                her_jardin: document.getElementById('alu_her_jardin').value,
                salud: document.getElementById('alu_salud').value,
                status: 'ACTIVO',
                asistencias: {}, //
                r1: { nom: document.getElementById('r1_nom').value, dni: document.getElementById('r1_dni').value, esc: document.getElementById('r1_esc').value, auh: document.getElementById('r1_auh').value },
                r2: { nom: document.getElementById('r2_nom').value, dni: document.getElementById('r2_dni').value, esc: document.getElementById('r2_esc').value, auh: document.getElementById('r2_auh').value }
            };
            const idx = db.findIndex(x => x.dni === dni);
            if(idx > -1) db[idx] = alu; else db.push(alu);
            saveData();
            renderMatricula(); this.reset();
            alert("LEGADO GUARDADO Y ACTUALIZADO");
        };

        function renderMatricula() {
            const tbody = document.getElementById('tbody_matricula');
            tbody.innerHTML = '';
            const filtro = document.getElementById('filtro_sala').value;
            const bus = document.getElementById('bus_nom').value.toUpperCase();

            db.filter(a => a.sala === filtro && a.nombre.includes(bus)).forEach(a => {
                tbody.innerHTML += `
                    <tr class="${a.status === 'BAJA' ? 'bg-red-50' : ''}">
                        <td class="p-4 font-bold text-slate-800">${a.nombre}</td>
                        <td class="p-4">${a.dni}</td>
                        <td class="p-4 text-red-600 font-bold">${a.salud || '-'}</td>
                        <td class="p-4 text-center space-x-2">
                            <button onclick="editAlu('${a.dni}')" class="text-blue-600 font-bold">EDITAR</button>
                            ${a.status === 'BAJA' 
                                ? `<button onclick="cambiarEstado('${a.dni}', 'ACTIVO')" class="bg-green-600 text-white px-2 py-1 rounded text-[9px] font-black">REINCORPORAR</button>` 
                                : `<button onclick="cambiarEstado('${a.dni}', 'BAJA')" class="bg-red-600 text-white px-2 py-1 rounded text-[9px] font-black">BAJA</button>`
                            }
                        </td>
                    </tr>
                `;
            });
        }

        function editAlu(dni) {
            const a = db.find(x => x.dni === dni);
            document.getElementById('alu_nombre').value = a.nombre;
            document.getElementById('alu_dni').value = a.dni;
            document.getElementById('alu_sala').value = a.sala;
            document.getElementById('alu_dom').value = a.dom || '';
            document.getElementById('alu_salud').value = a.salud || '';
            // (Carga el resto de los campos para editar...)
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function cambiarEstado(dni, estado) {
            const idx = db.findIndex(x => x.dni === dni);
            db[idx].status = estado;
            saveData();
            renderMatricula();
        }

        // --- LIBRO DE ASISTENCIA 30 DÍAS ---
        function renderAsistencia() {
            const header = document.getElementById('asis_header');
            const body = document.getElementById('asis_body');
            const sala = document.getElementById('asis_sala').value;
            
            // Cabecera con 30 días
            header.innerHTML = '<th class="p-2 border">ALUMNO</th><th class="p-2 border">ALTA/BAJA</th>';
            for(let i=1; i<=30; i++) header.innerHTML += `<th class="border w-8">${i}</th>`;
            header.innerHTML += '<th class="p-2 border bg-red-700">TOTAL FALTAS</th>';

            body.innerHTML = '';
            db.filter(a => a.sala === sala).forEach(a => {
                let faltas = 0;
                let fila = `<tr class="${a.status === 'BAJA' ? 'opacity-50 grayscale' : ''}">
                    <td class="p-2 border font-bold">${a.nombre}</td>
                    <td class="p-2 border text-center font-black">${a.status}</td>`;
                
                for(let d=1; d<=30; d++) {
                    const val = a.asistencias[d] || '.';
                    if(val === 'A') faltas++;
                    fila += `<td class="asistencia-cell border ${val==='A'?'text-red-600':'text-green-600'}" onclick="toggleAsis('${a.dni}', ${d})">${val}</td>`;
                }
                
                fila += `<td class="p-2 border text-center font-black ${faltas >= 10 ? 'bg-red-500 text-white' : ''}">${faltas}</td></tr>`;
                body.innerHTML += fila;
            });
        }

        function toggleAsis(dni, dia) {
            const a = db.find(x => x.dni === dni);
            if(a.status === 'BAJA') return;
            const actual = a.asistencias[dia] || '.';
            a.asistencias[dia] = (actual === '.') ? 'A' : '.'; // . = Presente, A = Ausente
            saveData();
            renderAsistencia();
        }

        function saveData() { localStorage.setItem('j926_v4_data', JSON.stringify(db)); }

        function actualizarEstadisticas() {
            document.getElementById('stat_total').innerText = db.filter(a => a.status === 'ACTIVO').length;
            document.getElementById('stat_bajas').innerText = db.filter(a => a.status === 'BAJA').length;
            let alertas = 0;
            db.forEach(a => {
                let f = Object.values(a.asistencias).filter(v => v === 'A').length;
                if(f >= 10) alertas++;
            });
            document.getElementById('stat_alertas').innerText = alertas;
        }

        init();
    </script>
</body>
</html>
