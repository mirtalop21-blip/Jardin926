<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J926 SUPERVISIÓN - VERSIÓN FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #000; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: #fff; width: 100%; font-size: 10px; }
        .nav-tab { flex: 1; text-align: center; padding: 18px; cursor: pointer; font-weight: 900; opacity: 0.4; border-bottom: 3px solid transparent; transition: 0.3s; }
        .nav-tab.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); background: linear-gradient(to top, rgba(250,204,21,0.1), transparent); }
        
        /* Colores por Sala */
        .SALA-ROSA { border-left: 12px solid #f472b6; } .SALA-ROJA { border-left: 12px solid #ef4444; }
        .SALA-NARANJA { border-left: 12px solid #fb923c; } .SALA-CELESTE { border-left: 12px solid #38bdf8; }
        .SALA-VIOLETA { border-left: 12px solid #a855f7; } .SALA-AMARILLA { border-left: 12px solid #facc15; }
        .SALA-AZUL { border-left: 12px solid #2563eb; }

        .mic-active { color: #ef4444 !important; filter: drop-shadow(0 0 10px #ef4444); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .stat-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
        .stat-fill { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body onload="render()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10">
    <div onclick="tab(1)" id="t1" class="nav-tab active"><i class="bi bi-person-plus-fill"></i> CARGA</div>
    <div onclick="tab(2)" id="t2" class="nav-tab"><i class="bi bi-grid-3x3-gap-fill"></i> FOTOGRAFÍA</div>
    <div onclick="tab(3)" id="t3" class="nav-tab"><i class="bi bi-shield-check"></i> SUPERVISIÓN</div>
</nav>

<main class="p-4 space-y-6">
    <section id="sec1" class="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <div class="glass p-5 rounded-3xl border-t-4 border-blue-500 space-y-3">
            <h3 class="text-blue-400 font-black italic">LEGAJO ALUMNO/A</h3>
            <div class="relative"><input id="a_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('a_n')"></i></div>
            <div class="flex gap-2"><input id="a_d" class="input-pro" placeholder="DNI"><input id="a_nac" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA"></div>
            <div class="flex gap-2"><input id="a_f" type="date" class="input-pro" onchange="calcAge(this.value)"><input id="a_e" class="input-pro w-24" placeholder="EDAD" readonly></div>
            <select id="a_s" class="input-pro text-gold font-black">
                <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                <option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
            </select>
            <div class="relative"><input id="a_dom" class="input-pro" placeholder="DOMICILIO"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('a_dom')"></i></div>
            <div class="relative"><textarea id="a_salud" class="input-pro h-14" placeholder="SALUD / ALERGIAS / ANTECEDENTES"></textarea><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('a_salud')"></i></div>
        </div>

        <div class="glass p-5 rounded-3xl border-t-4 border-rose-500 space-y-3">
            <h3 class="text-rose-400 font-black italic">DATOS MADRE</h3>
            <div class="relative"><input id="m_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('m_n')"></i></div>
            <div class="flex gap-2">
                <input id="m_d" class="input-pro" placeholder="DNI">
                <div class="flex-1 flex gap-1">
                    <select id="m_nac_opt" class="input-pro text-[7px]" onchange="syncField('m','nac')"><option value="OTRO">OTRA</option><option value="MISMO">MISMO NIÑO</option></select>
                    <input id="m_nac" class="input-pro" placeholder="NACIONALIDAD">
                </div>
            </div>
            <div class="flex gap-2">
                <select id="m_dom_opt" class="input-pro text-[7px]" onchange="syncField('m','dom')"><option value="OTRO">OTRO</option><option value="MISMO">MISMO NIÑO</option></select>
                <input id="m_dom" class="input-pro" placeholder="DOMICILIO">
            </div>
            <select id="m_edu" class="input-pro">
                <option>SIN ESTUDIOS</option><option>PRIMARIA COMPLETA/INC</option><option>SECUNDARIA COMPLETA/INC</option><option>TERCIARIA COMPLETA/INC</option><option>UNIVERSITARIA COMPLETA/INC</option>
            </select>
            <div class="flex gap-2"><input id="m_ocu" class="input-pro" placeholder="OCUPACIÓN"><input id="m_t" class="input-pro" placeholder="TELÉFONO"></div>
        </div>

        <div class="glass p-5 rounded-3xl border-t-4 border-emerald-500 space-y-3">
            <h3 class="text-emerald-400 font-black italic">DATOS PADRE</h3>
            <div class="relative"><input id="p_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('p_n')"></i></div>
            <div class="flex gap-2">
                <input id="p_d" class="input-pro" placeholder="DNI">
                <div class="flex-1 flex gap-1">
                    <select id="p_nac_opt" class="input-pro text-[7px]" onchange="syncField('p','nac')"><option value="OTRO">OTRA</option><option value="MISMO">MISMO NIÑO</option></select>
                    <input id="p_nac" class="input-pro" placeholder="NACIONALIDAD">
                </div>
            </div>
            <div class="flex gap-2">
                <select id="p_dom_opt" class="input-pro text-[7px]" onchange="syncField('p','dom')"><option value="OTRO">OTRO</option><option value="MISMO">MISMO NIÑO</option></select>
                <input id="p_dom" class="input-pro" placeholder="DOMICILIO">
            </div>
            <select id="p_edu" class="input-pro">
                <option>SIN ESTUDIOS</option><option>PRIMARIA COMPLETA/INC</option><option>SECUNDARIA COMPLETA/INC</option><option>TERCIARIA COMPLETA/INC</option><option>UNIVERSITARIA COMPLETA/INC</option>
            </select>
            <div class="flex gap-2"><input id="p_ocu" class="input-pro" placeholder="OCUPACIÓN"><input id="p_t" class="input-pro" placeholder="TELÉFONO"></div>
            <input type="hidden" id="edit_id">
            <button onclick="save()" class="w-full bg-gold text-black font-black py-4 rounded-xl shadow-xl hover:scale-105 transition">💾 IMPACTAR EN NÚCLEO</button>
        </div>

        <div class="lg:col-span-3 glass p-4 rounded-2xl">
            <input type="text" id="search" onkeyup="renderTable()" class="input-pro border-gold/40" placeholder="🔎 BUSCADOR POR DNI O APELLIDO PARA EDITAR...">
            <div class="overflow-x-auto mt-4"><table class="w-full text-[9px]"><tbody id="mainTable"></tbody></table></div>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-4">
        <div class="flex justify-between items-center glass p-4 rounded-2xl">
            <h2 class="text-gold font-black italic">FOTOGRAFÍA Y ASISTENCIA</h2>
            <input type="date" id="asisDate" class="bg-transparent border-b border-gold text-white font-bold" onchange="renderAsis()">
        </div>
        <div id="asisCards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3"></div>
        <div id="salaView" class="glass p-6 rounded-3xl hidden border-2 border-gold/30">
            <div class="flex justify-between items-center mb-6">
                <h3 id="currentSala" class="text-xl font-black text-gold"></h3>
                <button onclick="closeSala()" class="text-rose-500 font-bold border border-rose-500 px-3 py-1 rounded">CERRAR</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="studentList"></div>
        </div>
    </section>

    <section id="sec3" class="hidden space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 text-center">
            <div class="glass p-5 rounded-2xl border-l-8 border-blue-500"><p class="text-[7px] opacity-60">VACANTES LIBRES</p><h4 id="statVac" class="text-2xl font-black text-blue-400"></h4></div>
            <div class="glass p-5 rounded-2xl border-l-8 border-gold"><p class="text-[7px] opacity-60">MATRÍCULA TOTAL</p><h4 id="statMat" class="text-2xl font-black text-gold"></h4></div>
            <div class="glass p-5 rounded-2xl border-l-8 border-rose-500"><p class="text-[7px] opacity-60">PROM. ASISTENCIA HOY</p><h4 id="statAsis" class="text-2xl font-black text-rose-400"></h4></div>
        </div>

        <div class="glass p-6 rounded-3xl">
            <h3 class="font-black italic mb-4 text-center">INDICADORES DE ASISTENCIA POBLACIONAL POR SALA</h3>
            <div id="asisCharts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div class="glass p-8 rounded-3xl border-2 border-dashed border-white/20 text-center space-y-4">
            <h3 class="font-black italic">GESTOR DE BACKUP Y CARGA RÁPIDA EXCEL</h3>
            <div class="flex flex-wrap gap-4 justify-center">
                <button onclick="exportData()" class="bg-blue-600 px-8 py-3 rounded-full font-black">EXPORTAR TODO (.JSON)</button>
                <button onclick="exportExcel()" class="bg-emerald-600 px-8 py-3 rounded-full font-black">BAJAR EXCEL SUPERVISIÓN</button>
                <label class="bg-purple-600 px-8 py-3 rounded-full font-black cursor-pointer">CARGAR EXCEL / COMPAÑERA
                    <input type="file" class="hidden" onchange="importData(event)">
                </label>
            </div>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('J926_V_FINAL')) || [];
    let asis = JSON.parse(localStorage.getItem('J926_A_FINAL')) || {};
    const SALAS = ["SALA ROSA TM","SALA ROSA TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA CELESTE TM","SALA CELESTE TT","SALA VIOLETA TM","SALA VIOLETA TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT"];

    function tab(n) { [1,2,3].forEach(i => { document.getElementById('sec'+i).classList.toggle('hidden', i !== n); document.getElementById('t'+i).classList.toggle('active', i === n); }); }

    function voice(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = "es-AR";
        rec.onstart = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.add('mic-active');
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.onend = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.remove('mic-active');
        rec.start();
    }

    function syncField(p, type) { 
        const opt = document.getElementById(p+'_'+type+'_opt').value;
        if(opt === 'MISMO') document.getElementById(p+'_'+type).value = document.getElementById('a_'+type).value;
    }

    function calcAge(f) {
        const limit = new Date("2026-06-30"), nac = new Date(f);
        let e = limit.getFullYear() - nac.getFullYear();
        if (limit.getMonth() < nac.getMonth() || (limit.getMonth() === nac.getMonth() && limit.getDate() < nac.getDate())) e--;
        document.getElementById('a_e').value = e + " AÑOS";
    }

    function save() {
        const id = document.getElementById('edit_id').value || Date.now();
        const record = {
            id: Number(id),
            a: { n: v('a_n'), d: v('a_d'), nac: v('a_nac'), f: v('a_f'), e: v('a_e'), s: v('a_s'), dom: v('a_dom'), salud: v('a_salud') },
            m: { n: v('m_n'), d: v('m_d'), nac: v('m_nac'), dom: v('m_dom'), edu: v('m_edu'), ocu: v('m_ocu'), t: v('m_t') },
            p: { n: v('p_n'), d: v('p_d'), nac: v('p_nac'), dom: v('p_dom'), edu: v('p_edu'), ocu: v('p_ocu'), t: v('p_t') }
        };
        db = db.filter(x => x.id !== record.id); db.push(record);
        sync(); alert("REGISTRO AUDITADO Y GUARDADO"); clear();
    }

    function sync() { 
        localStorage.setItem('J926_V_FINAL', JSON.stringify(db)); 
        localStorage.setItem('J926_A_FINAL', JSON.stringify(asis)); 
        render(); 
    }

    function render() {
        // Tarjetas Fotografía
        document.getElementById('asisCards').innerHTML = SALAS.map(s => {
            const count = db.filter(x => x.a.s === s).length;
            const colorClass = s.split(' ')[1];
            return `<div onclick="openSala('${s}')" class="glass p-4 rounded-2xl SALA-${colorClass} cursor-pointer hover:scale-105 transition shadow-lg">
                <p class="text-[7px] font-black opacity-70">${s}</p>
                <div class="flex justify-between items-end mt-2"><h4 class="text-sm font-black">${count}/30</h4><span class="text-gold text-[7px] font-bold">FOTOGRAFÍA</span></div>
            </div>`;
        }).join('');

        // Supervisión Stats
        const date = document.getElementById('asisDate').value || new Date().toISOString().split('T')[0];
        document.getElementById('statVac').innerText = (420 - db.length);
        document.getElementById('statMat').innerText = db.length;
        
        // Gráficos de Asistencia Poblacional
        document.getElementById('asisCharts').innerHTML = SALAS.map(s => {
            const totalSala = db.filter(x => x.a.s === s);
            if(totalSala.length === 0) return "";
            const presentes = totalSala.filter(x => asis[date] && asis[date][x.id] === 'P').length;
            const perc = ((presentes / totalSala.length) * 100).toFixed(0);
            return `<div><div class="flex justify-between text-[8px] mb-1"><span>${s}</span><span>${perc}% ASIS.</span></div>
                    <div class="stat-bar"><div class="stat-fill bg-gold" style="width:${perc}%"></div></div></div>`;
        }).join('');

        renderTable();
    }

    function openSala(sala) {
        document.getElementById('salaView').classList.remove('hidden');
        document.getElementById('currentSala').innerText = "VISTA: " + sala;
        const students = db.filter(x => x.a.s === sala).sort((a,b) => a.a.n.localeCompare(b.a.n));
        const date = document.getElementById('asisDate').value || new Date().toISOString().split('T')[0];
        
        document.getElementById('studentList').innerHTML = students.map(x => {
            const state = (asis[date] && asis[date][x.id]) || '';
            const hasSalud = x.a.salud.length > 5;
            return `<div class="glass p-4 rounded-2xl border ${hasSalud ? 'border-rose-500/50':'border-white/5'}">
                <div class="flex justify-between mb-1"><span class="font-black text-blue-400 text-[9px]">${x.a.n}</span><span class="opacity-40">${x.a.d}</span></div>
                <p class="text-[7px] opacity-60 mb-3">${x.a.salud || 'SIN ALERTAS DE SALUD'}</p>
                <div class="flex gap-1">
                    <button onclick="mark('${date}',${x.id},'P')" class="flex-1 py-2 rounded-lg ${state==='P'?'bg-emerald-500':'bg-white/5'}">P</button>
                    <button onclick="mark('${date}',${x.id},'A')" class="flex-1 py-2 rounded-lg ${state==='A'?'bg-rose-500':'bg-white/5'}">A</button>
                    <button onclick="edit(${x.id})" class="bg-gold/20 text-gold px-3 rounded-lg"><i class="bi bi-pencil"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    function mark(date, id, val) { if(!asis[date]) asis[date]={}; asis[date][id]=val; sync(); openSala(document.getElementById('currentSala').innerText.replace("VISTA: ","")); }

    function renderTable() {
        const q = document.getElementById('search').value.toUpperCase();
        document.getElementById('mainTable').innerHTML = db.filter(x => x.a.d.includes(q) || x.a.n.includes(q)).map(x => `
            <tr class="border-b border-white/5 hover:bg-white/5">
                <td class="p-3 font-black">${x.a.n} <span class="text-gold ml-2">${x.a.s}</span></td>
                <td class="p-3 text-right text-blue-400 cursor-pointer" onclick="edit(${x.id})">EDITAR</td>
            </tr>
        `).join('');
    }

    function edit(id) {
        const x = db.find(i => i.id === id); if(!x) return;
        document.getElementById('edit_id').value = x.id;
        ['a','m','p'].forEach(pref => { Object.keys(x[pref]).forEach(k => { if(document.getElementById(pref+'_'+k)) document.getElementById(pref+'_'+k).value = x[pref][k]; }); });
        tab(1); closeSala();
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:'application/json'}));
        a.download = "J926_BACKUP_TOTAL.json"; a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { db = JSON.parse(ev.target.result); sync(); alert("DATA IMPORTADA CON ÉXITO"); };
        reader.readAsText(e.target.files[0]);
    }

    function exportExcel() {
        let csv = "\ufeffINFORME INSPECCIÓN J926\nSALA;ALUMNO;DNI;SALUD;MADRE;PADRE;TEL;ESTUDIOS PADRE\n";
        db.forEach(x => csv += `${x.a.s};${x.a.n};${x.a.d};${x.a.salud};${x.m.n};${x.p.n};${x.p.t};${x.p.edu}\n`);
        const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); a.download="INFORME_SUPERVISION.csv"; a.click();
    }

    function v(id) { return document.getElementById(id).value.toUpperCase().trim(); }
    function clear() { document.querySelectorAll('input, textarea').forEach(i => { if(!['a_s','a_nac','m_nac_opt','p_nac_opt','m_dom_opt','p_dom_opt','m_edu','p_edu'].includes(i.id)) i.value=""; }); document.getElementById('edit_id').value=""; }
    function closeSala() { document.getElementById('salaView').classList.add('hidden'); }
</script>
</body>
</html>
