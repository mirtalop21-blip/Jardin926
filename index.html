<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA PROFESIONAL JARDÍN 926 - VARELA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #94a3b8; }
        .input-master { width: 100%; border: 3px solid #000; padding: 8px; font-weight: 900; background: #fff; font-size: 11px; margin-bottom: 5px; }
        .card-pro { border: 6px solid #000; background: white; padding: 20px; box-shadow: 12px 12px 0px #000; }
        .nav-tab { flex: 1; text-align: center; padding: 15px; font-weight: 900; color: white; cursor: pointer; border-right: 2px solid #fff; }
        .nav-tab.active { background: #facc15; color: #000; border-bottom: 6px solid #000; }
        label { display: block; font-size: 10px; font-weight: 900; color: #1e293b; margin-top: 4px; }
        th { background: #000; color: #fff; padding: 10px; font-size: 10px; border: 1px solid #fff; }
        td { border: 2px solid #000; padding: 6px; font-weight: 900; font-size: 10px; background: #fff; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-8 border-black">
    <div onclick="ver(1)" id="t1" class="nav-tab active">1. LEGAJO COMPLETO 🎤</div>
    <div onclick="ver(3)" id="t3" class="nav-tab">2. SUPERVISIÓN Y MATRÍCULA 📊</div>
</nav>

<main class="p-4">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="border-r-4 border-black pr-4">
                <p class="bg-blue-700 text-white p-2 font-black text-center mb-2">DATOS DEL ALUMNO/A</p>
                <label>APELLIDO Y NOMBRE</label>
                <div class="flex gap-1"><input type="text" id="n" class="input-master"><button onclick="voz('n')" class="bg-red-600 text-white px-2 border-2 border-black">🎤</button></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label>DNI</label><input type="number" id="d" class="input-master"></div>
                    <div><label>NACIONALIDAD</label><input type="text" id="nac" class="input-master"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label>FECHA NAC.</label><input type="date" id="f" class="input-master"></div>
                    <div><label>EDAD AL 30/06</label><input type="text" id="e" class="input-master"></div>
                </div>
                <label>SALA</label>
                <select id="sala" class="input-master">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option>
                    <option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option>
                    <option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                </select>
                <label>DOMICILIO ALUMNO</label><input type="text" id="dom" class="input-master">
                <div class="grid grid-cols-2 gap-2">
                    <div><label>HERMANOS (CANT)</label><input type="number" id="her" class="input-master"></div>
                    <div><label>¿EN JARDÍN?</label><select id="hj" class="input-master"><option>NO</option><option>SÍ</option></select></div>
                </div>
                <label>SALUD / ALERGIAS</label><input type="text" id="salud" class="input-master">
            </div>

            <div class="border-r-4 border-black pr-4">
                <p class="bg-rose-600 text-white p-2 font-black text-center mb-2">DATOS DE LA MADRE</p>
                <label>APELLIDO Y NOMBRE</label><input type="text" id="mn" class="input-master">
                <div class="grid grid-cols-2 gap-2">
                    <div><label>DNI</label><input type="number" id="mdni" class="input-master"></div>
                    <div><label>NACIONALIDAD</label><input type="text" id="mnac" class="input-master"></div>
                </div>
                <label>OCUPACIÓN / TRABAJO</label><input type="text" id="m_ocu" class="input-master">
                <label>NIVEL EDUCATIVO</label>
                <select id="m_edu" class="input-master">
                    <option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIA COMPLETA</option><option>TERCIARIA INCOMPLETA</option>
                    <option>UNIV. COMPLETA</option><option>UNIV. INCOMPLETA</option>
                </select>
                <div class="grid grid-cols-2 gap-2">
                    <div><label>TELÉFONO</label><input type="text" id="mtel" class="input-master"></div>
                    <div><label>PERCIBE AUH</label><select id="auh" class="input-master"><option>SÍ</option><option>NO</option></select></div>
                </div>
                <label>DOMICILIO MADRE</label><input type="text" id="mdom" class="input-master">
            </div>

            <div>
                <p class="bg-emerald-700 text-white p-2 font-black text-center mb-2">DATOS DEL PADRE</p>
                <label>APELLIDO Y NOMBRE</label><input type="text" id="pn" class="input-master">
                <div class="grid grid-cols-2 gap-2">
                    <div><label>DNI</label><input type="number" id="pdni" class="input-master"></div>
                    <div><label>NACIONALIDAD</label><input type="text" id="pnac" class="input-master"></div>
                </div>
                <label>OCUPACIÓN / TRABAJO</label><input type="text" id="p_ocu" class="input-master">
                <label>NIVEL EDUCATIVO</label>
                <select id="p_edu" class="input-master">
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIA/UNIV COMPLETA</option><option>INCOMPLETO</option>
                </select>
                <label>TELÉFONO PADRE</label><input type="text" id="ptel" class="input-master">
                <label>DOMICILIO PADRE</label><input type="text" id="pdom" class="input-master">
                
                <button onclick="previa()" class="mt-4 w-full bg-yellow-400 p-5 border-4 border-black font-black text-lg hover:bg-yellow-500 shadow-[6px_6px_0px_#000]">👁️ VISTA PREVIA Y GUARDAR</button>
            </div>
        </div>
    </section>

    <section id="sec3" class="card-pro hidden mt-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
            <div class="bg-black text-white p-4 border-4 border-black text-center">
                <p class="text-[10px]">MATRÍCULA TOTAL</p>
                <p id="totalLabel" class="text-5xl font-black">0</p>
            </div>
            <div class="md:col-span-2 bg-white border-4 border-black p-1 h-32"><canvas id="chartSalas"></canvas></div>
            <div class="flex flex-col gap-1">
                <button onclick="respaldar()" class="bg-blue-600 text-white p-2 border-2 border-black font-black text-xs">💾 RESPALDO PC</button>
                <button onclick="exportarExcel()" class="bg-green-700 text-white p-2 border-2 border-black font-black text-xs">📊 EXCEL</button>
            </div>
        </div>

        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR APELLIDO O DNI..." class="input-master text-lg border-blue-800 p-4 mb-4">
        
        <div class="overflow-x-auto max-h-[600px]">
            <table class="w-full">
                <thead class="sticky top-0 z-10">
                    <tr>
                        <th>ALUMNO / DNI</th><th>SALA</th><th>EDAD</th><th>CONTACTOS</th><th>AUH</th><th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white border-[8px] border-black p-6 w-full max-w-4xl max-h-[90vh] overflow-y-auto">
        <h2 class="text-2xl font-black mb-4 underline">CONFIRMAR CARGA INTEGRAL</h2>
        <div id="previaCont" class="grid grid-cols-1 md:grid-cols-3 gap-4 text-[10px] font-bold bg-slate-100 p-4 border-2 border-black"></div>
        <div class="flex gap-4 mt-6">
            <button onclick="cerrarModal()" class="flex-1 bg-gray-500 text-white p-4 font-black border-4 border-black">CORREGIR</button>
            <button onclick="guardar()" class="flex-1 bg-green-600 text-white p-4 font-black border-4 border-black">GUARDAR EN SISTEMA</button>
        </div>
    </div>
</div>

<script>
    let db = [];
    let editIdx = null;
    let chartObj = null;

    const iniciales = [
        "AGUILAR CURTIDO BELINDA ABIGAIL", "AMARILLA SUAREZ YAMIR JORGE", "BAGLIETTO THIAN ELIEL", 
        "BARBERIS SANTILLAN JUAN PABLO", "BENITEZ CIELO ELUNEY", "BENITEZ LUISANA VALENTINA", 
        "BOGDANOFF NAHOMI ANGELA", "CABALLERO ABREGO RONALDO DANIEL", "CACERES ISABELLA VALERIA", 
        "CARRILLO QUISPE AARIA DAINERIS", "CENTURION RIOS LIAM CIRO", "CHOQUE MAREA O MICAELA BRIANA", 
        "ESCOBAR NICOLAS MAEL", "FARIA AS BLANCO FRANCESCO LIONEL", "FIGUEROA CATALEYA ANAHI", 
        "GARCIA ROMA MARTINA", "GAUNA RAMIRO NAHUEL", "GOMEZ SANTIAGO ENZO", "JIMENEZ ROJAS JAZMIN TERESA", 
        "LOZA ELISEO VALENTIN", "MONTES MAIRANA ADA ABIGAIL", "OJEDA ISABELLA GABRIELA", 
        "QUISPE GUARACHI DAYLIN FLORENCIA", "RECALDE OVIEDO LUANA", "SALVATIERRA ROJAS ANA LIZ", 
        "SANTALLA ROJAS GAEL ALEJANDRO", "SANTILLAN GAEL DARIO", "SAUCEDO VIDAL DESIDERIO", 
        "SOSA AYNARA MAGALI", "TABOADA CAMILA MAITE", "TORRES COCA ANA LUJAN", 
        "VALLEJOS HEREDIA AITANA EVELYN", "VELAZQUEZ ARCIENAGA JULIETA ISABEL"
    ];

    function inicializar() {
        const saved = localStorage.getItem('J926_MASTER_FINAL');
        if (saved) {
            db = JSON.parse(saved);
        } else {
            db = iniciales.map(n => ({
                n: n, d: "", nac: "ARGENTINA", f: "", e: "", s: "SALA ROSA TM", dom: "", her: "", hj: "NO", salud: "NINGUNA",
                mn: "", mdni: "", mnac: "", m_ocu: "", m_edu: "SECUNDARIA COMPLETA", mtel: "", mdom: "", auh: "SÍ",
                pn: "", pdni: "", pnac: "", p_ocu: "", p_edu: "SECUNDARIA COMPLETA", ptel: "", pdom: ""
            }));
        }
        renderTabla();
    }

    function ver(n) {
        document.getElementById('sec1').classList.toggle('hidden', n !== 1);
        document.getElementById('sec3').classList.toggle('hidden', n !== 3);
        document.getElementById('t1').className = n === 1 ? 'nav-tab active' : 'nav-tab';
        document.getElementById('t3').className = n === 3 ? 'nav-tab active' : 'nav-tab';
    }

    function previa() {
        const p = document.getElementById('previaCont');
        p.innerHTML = `
            <div class="border-b-2 border-black pb-2"><b>ALUMNO:</b> ${document.getElementById('n').value}<br><b>DNI:</b> ${document.getElementById('d').value}<br><b>EDAD:</b> ${document.getElementById('e').value}</div>
            <div class="border-b-2 border-black pb-2"><b>MADRE:</b> ${document.getElementById('mn').value}<br><b>TEL:</b> ${document.getElementById('mtel').value}<br><b>AUH:</b> ${document.getElementById('auh').value}</div>
            <div class="border-b-2 border-black pb-2"><b>PADRE:</b> ${document.getElementById('pn').value}<br><b>TEL:</b> ${document.getElementById('ptel').value}</div>
        `;
        document.getElementById('modal').classList.remove('hidden');
    }

    function guardar() {
        const data = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            nac: document.getElementById('nac').value.toUpperCase(),
            f: document.getElementById('f').value,
            e: document.getElementById('e').value,
            s: document.getElementById('sala').value,
            dom: document.getElementById('dom').value.toUpperCase(),
            her: document.getElementById('her').value,
            hj: document.getElementById('hj').value,
            salud: document.getElementById('salud').value.toUpperCase(),
            mn: document.getElementById('mn').value.toUpperCase(),
            mdni: document.getElementById('mdni').value,
            mnac: document.getElementById('mnac').value.toUpperCase(),
            m_ocu: document.getElementById('m_ocu').value.toUpperCase(),
            m_edu: document.getElementById('m_edu').value,
            mtel: document.getElementById('mtel').value,
            mdom: document.getElementById('mdom').value.toUpperCase(),
            auh: document.getElementById('auh').value,
            pn: document.getElementById('pn').value.toUpperCase(),
            pdni: document.getElementById('pdni').value,
            pnac: document.getElementById('pnac').value.toUpperCase(),
            p_ocu: document.getElementById('p_ocu').value.toUpperCase(),
            p_edu: document.getElementById('p_edu').value,
            ptel: document.getElementById('ptel').value,
            pdom: document.getElementById('pdom').value.toUpperCase()
        };

        if(editIdx !== null) db[editIdx] = data;
        else db.push(data);

        localStorage.setItem('J926_MASTER_FINAL', JSON.stringify(db));
        editIdx = null;
        cerrarModal();
        limpiarForm();
        renderTabla();
        alert("¡LEGAJO GUARDADO EXITOSAMENTE!");
    }

    function editar(i) {
        const a = db[i];
        editIdx = i;
        document.getElementById('n').value = a.n;
        document.getElementById('d').value = a.d;
        document.getElementById('nac').value = a.nac;
        document.getElementById('f').value = a.f;
        document.getElementById('e').value = a.e;
        document.getElementById('sala').value = a.s;
        document.getElementById('dom').value = a.dom;
        document.getElementById('her').value = a.her;
        document.getElementById('hj').value = a.hj;
        document.getElementById('salud').value = a.salud;
        document.getElementById('mn').value = a.mn;
        document.getElementById('mdni').value = a.mdni;
        document.getElementById('mnac').value = a.mnac;
        document.getElementById('m_ocu').value = a.m_ocu;
        document.getElementById('m_edu').value = a.m_edu;
        document.getElementById('mtel').value = a.mtel;
        document.getElementById('mdom').value = a.mdom;
        document.getElementById('auh').value = a.auh;
        document.getElementById('pn').value = a.pn;
        document.getElementById('pdni').value = a.pdni;
        document.getElementById('pnac').value = a.pnac;
        document.getElementById('p_ocu').value = a.p_ocu;
        document.getElementById('p_edu').value = a.p_edu;
        document.getElementById('ptel').value = a.ptel;
        document.getElementById('pdom').value = a.pdom;
        ver(1);
    }

    function renderTabla() {
        const f = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('cuerpo');
        t.innerHTML = "";
        const salas = {};
        db.forEach((a, i) => {
            salas[a.s] = (salas[a.s] || 0) + 1;
            if(a.n.includes(f) || a.d.includes(f)) {
                t.innerHTML += `<tr>
                    <td>${a.n}<br><span class="text-blue-600">DNI: ${a.d}</span></td>
                    <td>${a.s}</td><td>${a.e}</td>
                    <td>M: ${a.mtel}<br>P: ${a.ptel}</td>
                    <td>${a.auh}</td>
                    <td><button onclick="editar(${i})" class="bg-yellow-400 p-2 border border-black font-black">EDITAR</button></td>
                </tr>`;
            }
        });
        document.getElementById('totalLabel').innerText = db.length;
        updateChart(salas);
    }

    function updateChart(data) {
        const ctx = document.getElementById('chartSalas').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.keys(data), datasets: [{ label: 'ALUMNOS', data: Object.values(data), backgroundColor: '#0f172a' }] },
            options: { maintainAspectRatio: false }
        });
    }

    function voz(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR';
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.start();
    }

    function respaldar() {
        const b = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b); a.download = 'RESPALDO_SISTEMA_COMPLETO.json'; a.click();
    }

    function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
    function limpiarForm() { document.querySelectorAll('input').forEach(i => i.value = ""); }
</script>
</body>
</html>
