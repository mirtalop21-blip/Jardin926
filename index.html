<!DOCTYPE html>

</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-8 border-black">

    <div onclick="ver(2)" id="t2" class="nav-link">2. ASISTENCIA (GRILLA 30)</div>

            <div>

                </div>
                <label>OCUPACIÓN</label><input type="text" id="p_ocu" class="input-pro">
                <label>EDUCACIÓN</label>

    <section id="sec3" class="card-main hidden">

                <p class="text-xs">MATRÍCULA TOTAL JARDÍN 926</p>

            </div>
            <div class="md:col-span-2 bg-white border-4 border-black p-2"><canvas id="chartSalas" height="100"></canvas></div>
            <div class="flex flex-col gap-2">
                <button onclick="exportarExcel()" class="bg-emerald-600 text-white p-4 border-4 border-black font-black">📊 EXPORTAR A EXCEL</button>
                <button onclick="respaldar()" class="bg-blue-600 text-white p-4 border-4 border-black font-black">💾 GUARDAR RESPALDO PC</button>
                <input type="file" id="importar" onchange="importarDatos(event)" class="hidden">
                <button onclick="document.getElementById('importar').click()" class="bg-gray-800 text-white p-2 border-2 border-black font-black text-xs">📂 CARGAR RESPALDO OTRA PC</button>

        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR APELLIDO O DNI..." class="input-pro text-xl mb-4 border-blue-700">
        
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr>
                        <th>ALUMNO / DNI</th>
                        <th>SALA</th>
                        <th>EDAD (30/06)</th>
                        <th>CONTACTOS FAMILIA</th>
                        <th>SALUD</th>

                </thead>

</main>

<div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4">

        <h2 class="text-3xl font-black mb-6 underline">REVISIÓN FINAL DE DATOS</h2>
        <div id="previaCont" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <div class="flex gap-4 mt-8">
            <button onclick="cerrarModal()" class="flex-1 bg-gray-500 text-white p-4 font-black border-4 border-black">VOLVER A EDITAR</button>
            <button onclick="guardar()" class="flex-1 bg-green-600 text-white p-4 font-black border-4 border-black">TODO CORRECTO: GUARDAR</button>
        </div>
    </div>
</div>

    ];

    function inicializar() {
        const salvado = localStorage.getItem('J926_DB_FINAL');
        db = salvado ? JSON.parse(salvado) : listaInicial;
        renderTabla();
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
        if(n === 3) { renderTabla(); updateChart(); }
    }

    function previa() {
        const ids = ['n','d','f','sala','dom','salud','mn','mtel','pn','ptel','auh'];
        let h = "";
        ids.forEach(id => {
            h += `<div class="p-3 border-2 border-black"><b>${id.toUpperCase()}:</b><br>${document.getElementById(id).value.toUpperCase()}</div>`;
        });
        document.getElementById('previaCont').innerHTML = h;
        document.getElementById('modal').classList.remove('hidden');
    }

    function guardar() {
        const nuevo = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            f: document.getElementById('f').value,
            s: document.getElementById('sala').value,
            dom: document.getElementById('dom').value.toUpperCase(),
            salud: document.getElementById('salud').value.toUpperCase() || 'NINGUNA',
            mn: document.getElementById('mn').value.toUpperCase(),
            mtel: document.getElementById('mtel').value,
            pn: document.getElementById('pn').value.toUpperCase(),
            ptel: document.getElementById('ptel').value,
            auh: document.getElementById('auh').value
        };
        db = db.filter(a => a.d !== nuevo.d); // Evitar duplicados por DNI
        db.push(nuevo);
        localStorage.setItem('J926_DB_FINAL', JSON.stringify(db));
        cerrarModal();
        alert("¡DATOS GUARDADOS Y ASEGURADOS! ✅");
        ver(3);
    }

    function renderTabla() {
        const b = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('cuerpo');
        t.innerHTML = "";
        db.forEach((a, i) => {
            if(a.n.includes(b) || a.d.includes(b)) {
                t.innerHTML += `<tr>
                    <td>${a.n}<br><span class="text-blue-700">${a.d}</span></td>
                    <td>${a.s}</td>
                    <td>5 AÑOS</td>
                    <td class="text-left text-[9px]">MADRE: ${a.mtel}<br>PADRE: ${a.ptel}</td>
                    <td class="${a.salud !== 'NINGUNA' ? 'bg-red-200 text-red-800' : ''}">${a.salud}</td>
                    <td><button onclick="editar(${i})" class="bg-yellow-400 p-1 border">EDIT</button></td>
                </tr>`;
            }
        });
        document.getElementById('totalLabel').innerText = db.length;
    }

    function respaldar() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `RESPALDO_J926_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function importarDatos(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem('J926_DB_FINAL', JSON.stringify(db));
            renderTabla();
            alert("¡DATOS IMPORTADOS CON ÉXITO! CARGA LISTA.");
        };
        reader.readAsText(e.target.files[0]);
    }

    function exportarExcel() {
        let csv = "\uFEFFALUMNO;DNI;SALA;DOMICILIO;MADRE;TEL MADRE;PADRE;TEL PADRE;SALUD;AUH\n";
        db.forEach(a => {
            csv += `${a.n};${a.d};${a.s};${a.dom};${a.mn};${a.mtel};${a.pn};${a.ptel};${a.salud};${a.auh}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "MATRICULA_JARDIN_926.csv";
        a.click();
    }

    function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
