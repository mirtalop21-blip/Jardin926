    function guardar() {
        const nuevo = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            f: document.getElementById('f').value,
            s: document.getElementById('sala').value,
            dom: document.getElementById('dom').value.toUpperCase(),
            salud: document.getElementById('salud').value.toUpperCase() || 'NINGUNA',
            mn: document.getElementById('mn').value.toUpperCase(),
            mtel: document.getElementById('mtel').value,
            pn: document.getElementById('pn').value.toUpperCase(),
            ptel: document.getElementById('ptel').value,
            auh: document.getElementById('auh').value
        };
        db = db.filter(a => a.d !== nuevo.d); // Evitar duplicados por DNI

    function renderTabla() {
        const b = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('cuerpo');
        t.innerHTML = "";
        db.forEach((a, i) => {
            if(a.n.includes(b) || a.d.includes(b)) {
                t.innerHTML += `<tr>
                    <td>${a.n}<br><span class="text-blue-700">${a.d}</span></td>
                    <td>${a.s}</td>

                </tr>`;
            }
        });
        document.getElementById('totalLabel').innerText = db.length;
    }

    function respaldar() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `RESPALDO_J926_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function importarDatos(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem('J926_DB_FINAL', JSON.stringify(db));
            renderTabla();
            alert("¡DATOS IMPORTADOS CON ÉXITO! CARGA LISTA.");
        };
        reader.readAsText(e.target.files[0]);
    }

        });

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
