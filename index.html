<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Jardín N° 926</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Estilos para el menú móvil */
        @media (max-width: 768px) {
            .sidebar-closed { transform: translateX(-100%); }
            .sidebar-open { transform: translateX(0); }
        }
        .transition-transform { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-100 flex h-screen overflow-hidden font-sans">

    <button onclick="toggleSidebar()" class="fixed top-4 left-4 z-50 md:hidden bg-indigo-900 text-white p-2 rounded-lg shadow-lg">
        <i class="fas fa-bars"></i>
    </button>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-indigo-900 text-white flex flex-col shadow-2xl transition-transform sidebar-closed md:translate-x-0 md:relative md:flex">
        <div class="p-6 border-b border-indigo-800 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Jardín 926</h1>
                <p class="text-[10px] text-indigo-300 uppercase tracking-widest mt-1">Gestión Profesional</p>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-indigo-300"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="showTab('dashboard')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 transition">
                <i class="fas fa-chart-line mr-3"></i> Panel de Control
            </button>
            <button onclick="showTab('alumnos')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 transition">
                <i class="fas fa-user-graduate mr-3"></i> Gestión 30 Alumnos
            </button>
            <button onclick="showTab('asistencia')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 transition">
                <i class="fas fa-calendar-check mr-3"></i> Asistencia Anual
            </button>
        </nav>

        <div class="p-4 bg-indigo-950 border-t border-indigo-800">
            <label class="text-[10px] text-indigo-400 block mb-1 uppercase">Docente Responsable:</label>
            <input type="text" id="docente" onchange="saveDocente()" placeholder="Nombre de la docente..." class="bg-indigo-900 border border-indigo-700 text-sm w-full rounded p-2 outline-none focus:border-white">
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 w-full">
        
        <section id="dashboard" class="tab-content block space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-indigo-500">
                    <p class="text-xs text-gray-500 font-bold uppercase">Matrícula Inicial</p>
                    <h2 id="m-inicial" class="text-3xl font-black text-gray-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                    <p class="text-xs text-gray-500 font-bold uppercase">Matrícula Actual</p>
                    <h2 id="m-actual" class="text-3xl font-black text-green-600">0</h2>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-red-500">
                    <p class="text-xs text-gray-500 font-bold uppercase">Bajas</p>
                    <h2 id="m-bajas" class="text-3xl font-black text-red-500">0</h2>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <canvas id="mainChart" height="150"></canvas>
            </div>
        </section>

        <section id="alumnos" class="tab-content hidden space-y-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h2 class="text-2xl font-bold text-gray-800">Ficha de Alumnos (Máx 30)</h2>
                <button onclick="abrirFormulario()" class="bg-indigo-600 text-white px-6 py-2 rounded-full shadow-lg hover:bg-indigo-700 w-full sm:w-auto">
                    <i class="fas fa-plus mr-2"></i> Nuevo Ingreso
                </button>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-100 text-gray-700 text-xs uppercase">
                            <tr>
                                <th class="p-4">Alumno / DNI</th>
                                <th class="p-4">Familia y Contacto</th>
                                <th class="p-4">Domicilio</th>
                                <th class="p-4 text-center">Estado</th>
                                <th class="p-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAlumnos" class="text-sm divide-y">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="asistencia" class="tab-content hidden space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-md">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Asistencia Marzo - Diciembre</h2>
                    <select id="selectMes" class="border rounded p-2 text-sm bg-gray-50">
                        <option value="3">Marzo</option><option value="4">Abril</option>
                        <option value="5">Mayo</option><option value="6">Junio</option>
                        <option value="7">Julio</option><option value="8">Agosto</option>
                        <option value="9">Septiembre</option><option value="10">Octubre</option>
                        <option value="11">Noviembre</option><option value="12">Diciembre</option>
                    </select>
                </div>
                <div class="overflow-x-auto border rounded">
                    <table class="w-full text-[10px] text-center">
                        <thead id="headAsist" class="bg-indigo-50 border-b"></thead>
                        <tbody id="bodyAsist" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- LÓGICA DE CONTROL ---
        let db = JSON.parse(localStorage.getItem('jardin926_data')) || { alumnos: [], docente: "" };
        let currentChart;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(window.innerWidth < 768) toggleSidebar();
            if(id === 'dashboard') initChart();
            if(id === 'alumnos') renderAlumnos();
            if(id === 'asistencia') renderAsistencia();
        }

        function saveDocente() {
            db.docente = document.getElementById('docente').value;
            localStorage.setItem('jardin926_data', JSON.stringify(db));
        }

        function abrirFormulario() {
            if(db.alumnos.filter(a => a.status === 'alta').length >= 30) return alert("Sección completa");
            const nombre = prompt("Nombre completo del alumno:");
            if(!nombre) return;
            const dni = prompt("DNI del alumno:");
            const madre = prompt("Datos Madre (Nombre, DNI, Tel):");
            const padre = prompt("Datos Padre (Nombre, DNI, Tel):");
            const domicilio = prompt("Domicilio (Si es diferente al del menor):");

            db.alumnos.push({
                nombre, dni, madre, padre, domicilio,
                status: 'alta', faltas: 0, registro: new Date().toLocaleDateString()
            });
            saveAndRefresh();
        }

        function darBaja(idx) {
            if(confirm("¿Confirmar baja definitiva?")) {
                db.alumnos[idx].status = 'baja';
                saveAndRefresh();
            }
        }

        function checkFaltas(idx) {
            db.alumnos[idx].faltas++;
            if(db.alumnos[idx].faltas >= 10) {
                const tel = prompt("¡ALERTA 10 FALTAS! Ingrese Teléfono para WhatsApp:");
                if(tel) {
                    const msg = `Jardín 926: El alumno ${db.alumnos[idx].nombre} tiene 10 inasistencias. Favor de comunicarse.`;
                    window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
                }
            }
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('jardin926_data', JSON.stringify(db));
            renderAlumnos();
            updateStats();
        }

        function renderAlumnos() {
            const container = document.getElementById('tablaAlumnos');
            container.innerHTML = db.alumnos.map((a, i) => `
                <tr class="${a.status === 'baja' ? 'bg-red-50' : ''}">
                    <td class="p-4"><b>${a.nombre}</b><br><span class="text-xs text-gray-400">${a.dni}</span></td>
                    <td class="p-4 text-xs">M: ${a.madre}<br>P: ${a.padre}</td>
                    <td class="p-4 text-xs">${a.domicilio || 'El mismo'}</td>
                    <td class="p-4 text-center">
                        <span class="px-2 py-1 rounded text-[10px] ${a.status==='alta'?'bg-green-100 text-green-700':'bg-red-200 text-red-800'}">${a.status.toUpperCase()}</span>
                    </td>
                    <td class="p-4 text-center space-x-2">
                        <button onclick="checkFaltas(${i})" class="text-orange-500" title="Sumar falta"><i class="fas fa-user-clock"></i></button>
                        <button onclick="darBaja(${i})" class="text-red-400"><i class="fas fa-user-minus"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            const inicial = db.alumnos.length;
            const actual = db.alumnos.filter(a => a.status === 'alta').length;
            const bajas = db.alumnos.filter(a => a.status === 'baja').length;
            document.getElementById('m-inicial').innerText = inicial;
            document.getElementById('m-actual').innerText = actual;
            document.getElementById('m-bajas').innerText = bajas;
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Inicial', 'Actual', 'Bajas'],
                    datasets: [{
                        label: 'Cant. Alumnos',
                        data: [db.alumnos.length, db.alumnos.filter(a=>a.status==='alta').length, db.alumnos.filter(a=>a.status==='baja').length],
                        backgroundColor: ['#4338ca', '#10b981', '#ef4444']
                    }]
                }
            });
        }

        function renderAsistencia() {
            const head = document.getElementById('headAsist');
            const body = document.getElementById('bodyAsist');
            let th = '<tr><th class="p-2 border">Alumno</th>';
            for(let d=1; d<=31; d++) th += `<th class="border">${d}</th>`;
            head.innerHTML = th + '</tr>';

            body.innerHTML = db.alumnos.filter(a=>a.status==='alta').map(a => `
                <tr>
                    <td class="p-1 border text-left font-bold">${a.nombre.split(' ')[0]}</td>
                    ${Array(31).fill(0).map(() => `<td class="border p-0"><input type="checkbox" class="scale-75"></td>`).join('')}
                </tr>
            `).join('');
        }

        window.onload = () => {
            document.getElementById('docente').value = db.docente;
            updateStats();
            showTab('dashboard');
        };
    </script>
</body>
</html>
