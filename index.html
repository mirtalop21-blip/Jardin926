<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Jardín 926 - Lomas de Zamora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 8px; border: 1px solid #e2e8f0; padding: 1.2rem; margin-bottom: 1rem; }
        .voice-btn { color: #2563eb; cursor: pointer; margin-left: -30px; font-size: 1.1rem; transition: transform 0.2s; }
        .voice-btn:active { transform: scale(1.3); color: #dc2626; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 0.2rem; }
        input, select, textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 4px; padding: 0.5rem; font-size: 0.85rem; background: #fff; margin-bottom: 0.5rem; }
        .status-baja { background-color: #fee2e2; color: #991b1b; opacity: 0.7; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="max-w-6xl mx-auto">
        <header class="bg-[#1e293b] text-white p-5 rounded-t-lg flex justify-between items-center shadow-md">
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Jardín de Infantes N° 926</h1>
                <p class="text-blue-400 text-[10px] font-bold uppercase">Gestión 14 Secciones - Lomas de Zamora</p>
            </div>
            <button onclick="exportToExcel()" class="bg-emerald-600 px-4 py-2 rounded text-xs font-bold hover:bg-emerald-700 transition">
                <i class="fas fa-file-excel mr-1"></i> EXCEL
            </button>
        </header>

        <nav class="flex bg-slate-800 text-white rounded-b-lg mb-4 shadow-sm overflow-hidden text-[10px] font-black uppercase">
            <button onclick="openTab('registro')" class="flex-1 py-3 hover:bg-slate-700 border-r border-slate-700">Matrícula</button>
            <button onclick="openTab('asistencia')" class="flex-1 py-3 hover:bg-slate-700 border-r border-slate-700">Asistencia / Altas-Bajas</button>
            <button onclick="openTab('supervision')" class="flex-1 py-3 hover:bg-slate-700">Supervisión</button>
        </nav>

        <div id="registro" class="tab-content active">
            <form id="mainForm">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="card border-t-4 border-blue-500">
                    <h2 class="text-blue-700 font-black mb-3 text-xs uppercase"><i class="fas fa-child mr-2"></i> Datos del Alumno</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div class="md:col-span-2"><label>Nombre y Apellido</label><div class="flex items-center"><input type="text" id="name" required><i class="fas fa-microphone voice-btn" onclick="startVoice('name')"></i></div></div>
                        <div><label>DNI</label><input type="number" id="dni" required></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                        <div><label>F. Nacimiento</label><input type="date" id="birth" onchange="calculateAge()" required></div>
                        <div><label>Edad (30/06)</label><div id="ageBox" class="p-2 bg-slate-50 border rounded font-bold text-sm text-slate-700">--</div></div>
                        <div><label>Sección / Sala</label>
                            <select id="section">
                                <optgroup label="T. Mañana">
                                    <option>Sala Rosa TM</option><option>Sala Roja TM</option><option>Sala Naranja TM</option><option>Sala Amarilla TM</option><option>Sala Violeta TM</option><option>Sala Azul TM</option><option>Sala Celeste TM</option>
                                </optgroup>
                                <optgroup label="T. Tarde">
                                    <option>Sala Rosa TT</option><option>Sala Roja TT</option><option>Sala Naranja TT</option><option>Sala Amarilla TT</option><option>Sala Violeta TT</option><option>Sala Azul TT</option><option>Sala Celeste TT</option>
                                </optgroup>
                            </select>
                        </div>
                        <div><label>Nacionalidad</label><div class="flex items-center"><input type="text" id="alumnoNac" value="Argentina"><i class="fas fa-microphone voice-btn" onclick="startVoice('alumnoNac')"></i></div></div>
                    </div>
                    <div class="mt-2"><label>Salud y Observaciones</label><div class="flex items-center"><textarea id="obs" rows="2"></textarea><i class="fas fa-microphone voice-btn" onclick="startVoice('obs')"></i></div></div>
                </div>

                <div class="card border-t-4 border-emerald-500">
                    <h2 class="text-emerald-700 font-black mb-3 text-xs uppercase"><i class="fas fa-users mr-2"></i> Datos de los Padres</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="p-3 bg-slate-50 rounded border">
                            <p class="text-[9px] font-black text-emerald-800 mb-2 underline">RESPONSABLE 1</p>
                            <label>Nombre Completo</label><div class="flex items-center"><input type="text" id="p1Name"><i class="fas fa-microphone voice-btn" onclick="startVoice('p1Name')"></i></div>
                            <label>DNI</label><input type="number" id="p1Dni">
                            <label>WhatsApp</label><input type="text" id="p1Tel" placeholder="549...">
                            <label>Estudios</label>
                            <select id="p1Edu">
                                <option>Primario Completo</option><option>Primario Incompleto</option><option>Secundario Completo</option><option>Secundario Incompleto</option><option>Terciario/Universitario</option>
                            </select>
                            <label>Ocupación</label><div class="flex items-center"><input type="text" id="p1Job"><i class="fas fa-microphone voice-btn" onclick="startVoice('p1Job')"></i></div>
                        </div>
                        <div class="p-3 bg-slate-50 rounded border">
                            <p class="text-[9px] font-black text-emerald-800 mb-2 underline">RESPONSABLE 2</p>
                            <label>Nombre Completo</label><div class="flex items-center"><input type="text" id="p2Name"><i class="fas fa-microphone voice-btn" onclick="startVoice('p2Name')"></i></div>
                            <label>DNI</label><input type="number" id="p2Dni">
                            <label>WhatsApp</label><input type="text" id="p2Tel">
                            <label>Estudios</label>
                            <select id="p2Edu">
                                <option>Primario Completo</option><option>Primario Incompleto</option><option>Secundario Completo</option><option>Secundario Incompleto</option><option>Terciario/Universitario</option>
                            </select>
                            <label>Ocupación</label><div class="flex items-center"><input type="text" id="p2Job"><i class="fas fa-microphone voice-btn" onclick="startVoice('p2Job')"></i></div>
                        </div>
                    </div>
                    <div class="mt-3"><label>Domicilio</label><div class="flex items-center"><input type="text" id="address"><i class="fas fa-microphone voice-btn" onclick="startVoice('address')"></i></div></div>
                    <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-black py-4 rounded-lg mt-4 shadow-lg uppercase text-xs tracking-widest hover:bg-black transition">Grabar / Actualizar Legajo</button>
                </div>
            </form>
        </div>

        <div id="asistencia" class="tab-content">
            <div class="card">
                <div class="flex flex-wrap justify-between items-center mb-4">
                    <h2 class="text-slate-800 font-black text-xs uppercase">Listado de Alumnos</h2>
                    <select id="filterSection" onchange="renderAll()" class="w-auto text-xs font-bold border-blue-500"></select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px]">
                        <thead><tr class="bg-slate-100 text-slate-600 border-b">
                            <th class="p-3">Alumno</th><th class="p-3">Sala</th><th class="p-3 text-center">Faltas</th><th class="p-3 text-right">Gestión</th>
                        </tr></thead>
                        <tbody id="attendanceBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="supervision" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="card"><h2 class="font-black text-[10px] uppercase mb-4">Gráfico de Presentismo</h2><canvas id="chartPres" height="200"></canvas></div>
                <div class="card">
                    <h2 class="font-black text-[10px] uppercase mb-4 text-red-600">Configuración y Alertas</h2>
                    <label>Tel. Directivo</label><input type="text" id="confDir" value="5491166860054" onchange="saveConfig()">
                    <label>Tel. Secretaría</label><input type="text" id="confSec" value="5491166860054" onchange="saveConfig()">
                    <div id="criticalAlerts" class="mt-4 space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('jardin926_db')) || [];
        let config = JSON.parse(localStorage.getItem('jardin926_config')) || { dir: "5491166860054", sec: "5491166860054" };
        let chart;

        const SALAS = ["Sala Rosa TM", "Sala Roja TM", "Sala Naranja TM", "Sala Amarilla TM", "Sala Violeta TM", "Sala Azul TM", "Sala Celeste TM", "Sala Rosa TT", "Sala Roja TT", "Sala Naranja TT", "Sala Amarilla TT", "Sala Violeta TT", "Sala Azul TT", "Sala Celeste TT"];

        function init() {
            const filter = document.getElementById('filterSection');
            filter.innerHTML = '<option value="Todas">Todas las Salas</option>';
            SALAS.forEach(s => filter.innerHTML += `<option value="${s}">${s}</option>`);
            document.getElementById('confDir').value = config.dir;
            document.getElementById('confSec').value = config.sec;
            renderAll();
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startVoice(id) {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-AR'; rec.start();
            rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; };
        }

        function calculateAge() {
            const birth = new Date(document.getElementById('birth').value);
            const cutoff = new Date(2026, 5, 30);
            let age = cutoff.getFullYear() - birth.getFullYear();
            if (cutoff.getMonth() < birth.getMonth() || (cutoff.getMonth() === birth.getMonth() && cutoff.getDate() < birth.getDate())) age--;
            document.getElementById('ageBox').innerText = age + " años";
        }

        document.getElementById('mainForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const idx = document.getElementById('editIndex').value;
            const student = {
                name: document.getElementById('name').value,
                dni: document.getElementById('dni').value,
                section: document.getElementById('section').value,
                birth: document.getElementById('birth').value,
                obs: document.getElementById('obs').value,
                address: document.getElementById('address').value,
                p1: { name: document.getElementById('p1Name').value, dni: document.getElementById('p1Dni').value, tel: document.getElementById('p1Tel').value, edu: document.getElementById('p1Edu').value, job: document.getElementById('p1Job').value },
                p2: { name: document.getElementById('p2Name').value, dni: document.getElementById('p2Dni').value, tel: document.getElementById('p2Tel').value, edu: document.getElementById('p2Edu').value, job: document.getElementById('p2Job').value },
                status: idx == -1 ? 'Alta' : db[idx].status,
                absences: idx == -1 ? 0 : db[idx].absences,
                motivo: idx == -1 ? '' : db[idx].motivo
            };
            if(idx == -1) db.push(student); else db[idx] = student;
            localStorage.setItem('jardin926_db', JSON.stringify(db));
            e.target.reset();
            document.getElementById('editIndex').value = "-1";
            document.getElementById('submitBtn').innerText = "Grabar Legajo Digital";
            renderAll();
            alert("¡Guardado con éxito!");
        });

        function renderAll() {
            const body = document.getElementById('attendanceBody');
            const alerts = document.getElementById('criticalAlerts');
            const filter = document.getElementById('filterSection').value;
            body.innerHTML = ''; alerts.innerHTML = '';
            let p = 0, a = 0;

            db.forEach((s, i) => {
                if(filter !== 'Todas' && s.section !== filter) return;
                const isBaja = s.status === 'Baja';
                if(!isBaja) { if(s.absences > 0) a++; else p++; }

                if(s.absences >= 10 && !isBaja) {
                    alerts.innerHTML += `<div class="p-2 bg-red-50 text-red-700 text-[9px] font-bold border-l-4 border-red-500 uppercase">
                        ${s.name}: ${s.absences} Faltas <button onclick="sendWA(${i}, 'dir')" class="ml-2 underline text-blue-600">Avisar Directivo</button>
                    </div>`;
                }

                body.innerHTML += `<tr class="border-b ${isBaja ? 'status-baja' : ''}">
                    <td class="p-3"><b>${s.name}</b><br><span class="text-[9px] text-slate-400">DNI: ${s.dni}</span></td>
                    <td class="p-3 text-[9px] uppercase">${s.section}</td>
                    <td class="p-3 text-center font-black text-lg">${isBaja ? '-' : s.absences}</td>
                    <td class="p-3 text-right space-x-1">
                        ${!isBaja ? `<button onclick="addAbs(${i})" class="bg-red-500 text-white px-2 py-1 rounded text-[9px] font-bold">+ FALTA</button>` : ''}
                        <button onclick="edit(${i})" class="bg-amber-500 text-white px-2 py-1 rounded text-[9px] font-bold">EDITAR</button>
                        <button onclick="toggleStatus(${i})" class="bg-slate-700 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">${isBaja ? 'Alta' : 'Baja'}</button>
                    </td>
                </tr>`;
            });
            updateChart(p, a);
        }

        function edit(i) {
            const s = db[i];
            document.getElementById('name').value = s.name;
            document.getElementById('dni').value = s.dni;
            document.getElementById('section').value = s.section;
            document.getElementById('birth').value = s.birth;
            document.getElementById('obs').value = s.obs;
            document.getElementById('address').value = s.address;
            document.getElementById('p1Name').value = s.p1.name;
            document.getElementById('p1Dni').value = s.p1.dni;
            document.getElementById('p1Tel').value = s.p1.tel;
            document.getElementById('p1Edu').value = s.p1.edu;
            document.getElementById('p1Job').value = s.p1.job;
            document.getElementById('p2Name').value = s.p2.name;
            document.getElementById('p2Dni').value = s.p2.dni;
            document.getElementById('p2Tel').value = s.p2.tel;
            document.getElementById('p2Edu').value = s.p2.edu;
            document.getElementById('p2Job').value = s.p2.job;
            document.getElementById('editIndex').value = i;
            document.getElementById('submitBtn').innerText = "CORREGIR Y ACTUALIZAR DATOS";
            calculateAge();
            openTab('registro');
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function addAbs(i) { db[i].absences++; localStorage.setItem('jardin926_db', JSON.stringify(db)); renderAll(); }
        
        function toggleStatus(i) {
            const s = db[i];
            if(s.status === 'Alta') {
                const m = prompt("Motivo de la Baja (Mudanza, Pase, etc):");
                if(m) { s.status = 'Baja'; s.motivo = m; }
            } else { s.status = 'Alta'; s.motivo = ''; }
            localStorage.setItem('jardin926_db', JSON.stringify(db));
            renderAll();
        }

        function saveConfig() {
            config.dir = document.getElementById('confDir').value;
            config.sec = document.getElementById('confSec').value;
            localStorage.setItem('jardin926_config', JSON.stringify(config));
        }

        function sendWA(i, type) {
            const s = db[i];
            const tel = type === 'dir' ? config.dir : config.sec;
            const msg = `ALERTA JARDÍN 926: El alumno ${s.name} (${s.section}) tiene ${s.absences} faltas.`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
        }

        function updateChart(p, a) {
            if(chart) chart.destroy();
            const ctx = document.getElementById('chartPres').getContext('2d');
            chart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Presentes', 'Faltas'], datasets: [{ data: [p, a], backgroundColor: ['#10b981', '#ef4444'] }] }});
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(db);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Datos");
            XLSX.writeFile(wb, "Jardin_926_Lomas_Completo.xlsx");
        }

        init();
    </script>
</body>
</html>
