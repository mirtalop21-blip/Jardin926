<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V22 TOTAL ARCHITECT | MASTER DGCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #010409; --panel: #0d1117; --border: #30363d; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; overflow-x: hidden; }
        .glass { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
        .input-titan { background: #000; border: 1px solid var(--border); padding: 10px; border-radius: 4px; color: #fff; width: 100%; font-weight: bold; transition: 0.3s; }
        .input-titan:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 12px rgba(250, 204, 21, 0.2); }
        .tab-active { border-bottom: 4px solid var(--gold); color: var(--gold); background: rgba(250,204,21,0.05); }
        .sala-card { transition: 0.3s; cursor: pointer; border-bottom: 6px solid; position: relative; }
        .sala-card:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .alert-pulse { animation: pulse 2s infinite; border: 2px solid #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .mic-active { color: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body onload="init()">

<header class="glass sticky top-0 z-[100] p-4 flex justify-between items-center border-b border-yellow-500/40 bg-[#0d1117]">
    <div class="flex items-center gap-4">
        <h1 class="text-yellow-500 font-black text-2xl italic tracking-tighter">TITANIUM V22 <span class="text-white">ARCHITECT</span></h1>
        <div id="reloj" class="text-[9px] font-mono opacity-60"></div>
    </div>
    <div class="flex gap-3">
        <button onclick="document.getElementById('importFile').click()" class="bg-blue-600 px-4 py-2 rounded text-[9px] font-black"><i class="bi bi-cloud-upload"></i> IMPORTAR BACKUP</button>
        <input type="file" id="importFile" class="hidden" onchange="importarInteligente(event)">
        <button onclick="exportarExcelDGCE()" class="bg-emerald-600 px-4 py-2 rounded text-[9px] font-black"><i class="bi bi-file-earmark-excel"></i> EXCEL DGCE</button>
    </div>
</header>

<nav class="flex glass sticky top-[72px] z-[90] text-center bg-[#0d1117] border-b border-white/5">
    <button onclick="setTab(1)" id="t1" class="flex-1 p-4 tab-active font-black">LEGAJO 360°</button>
    <button onclick="setTab(2)" id="t2" class="flex-1 p-4 opacity-50 font-black">FOTO INSTITUCIONAL (14)</button>
    <button onclick="setTab(3)" id="t3" class="flex-1 p-4 opacity-50 font-black">LISTA DE ESPERA</button>
    <button onclick="setTab(4)" id="t4" class="flex-1 p-4 opacity-50 font-black">SUPERVISIÓN METRICS</button>
</nav>

<main class="p-4 space-y-6">
    <section id="s1" class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="glass p-4 border-t-4 border-yellow-500 space-y-3">
                <h3 class="text-yellow-500 font-black flex justify-between">DATOS ALUMNO <i class="bi bi-mic-fill cursor-pointer" onclick="dictar('a_nom')"></i></h3>
                <input id="a_nom" class="input-titan" placeholder="APELLIDO Y NOMBRE">
                <div class="flex gap-2">
                    <input id="a_dni" class="input-titan" placeholder="DNI">
                    <input id="a_nac" class="input-titan" placeholder="NACIONALIDAD" value="ARGENTINA">
                </div>
                <div class="flex gap-2">
                    <input id="a_fec" type="date" class="input-titan" onchange="calcEdad(this.value)">
                    <input id="a_edad" class="input-titan" readonly placeholder="EDAD AL 30/6">
                </div>
                <select id="a_sala" class="input-titan font-bold text-yellow-500"></select>
                <div class="flex gap-2">
                    <input id="a_her" class="input-titan" placeholder="CANT. HERMANOS">
                    <select id="a_herj" class="input-titan"><option value="NO">¿HERMANOS EN JARDÍN? NO</option><option value="SI">SI</option></select>
                </div>
                <input id="a_dom" class="input-titan" placeholder="DOMICILIO REAL">
                <input id="a_tel" class="input-titan" placeholder="TELÉFONO CONTACTO">
                <textarea id="a_salud" class="input-titan h-16" placeholder="OBSERVACIONES MÉDICAS / ALERTAS"></textarea>
            </div>

            <div class="glass p-4 border-t-4 border-cyan-500 space-y-3">
                <h3 class="text-cyan-500 font-black flex justify-between">VÍNCULO MATERNO <i class="bi bi-mic-fill cursor-pointer" onclick="dictar('m_nom')"></i></h3>
                <input id="m_nom" class="input-titan" placeholder="NOMBRE COMPLETO">
                <div class="flex gap-2">
                    <input id="m_dni" class="input-titan" placeholder="DNI">
                    <input id="m_nac" class="input-titan" placeholder="NACIONALIDAD">
                </div>
                <input id="m_ocu" class="input-titan" placeholder="OCUPACIÓN">
                <select id="m_edu" class="input-titan edu-list"></select>
                <input id="m_tel" class="input-titan" placeholder="TELÉFONO">
                <div class="flex items-center gap-2">
                    <input id="m_dom_val" class="input-titan" placeholder="DOMICILIO">
                    <button onclick="copyDom('m')" class="bg-white/10 p-2 rounded text-[8px]">ESPEJO</button>
                </div>
                <label class="flex gap-2 items-center text-[9px] bg-white/5 p-2 rounded"><input type="checkbox" id="m_auh"> PERCIBE AUH / ASIGNACIÓN</label>
            </div>

            <div class="glass p-4 border-t-4 border-pink-500 space-y-3">
                <h3 class="text-pink-500 font-black flex justify-between">VÍNCULO PATERNO <i class="bi bi-mic-fill cursor-pointer" onclick="dictar('p_nom')"></i></h3>
                <input id="p_nom" class="input-titan" placeholder="NOMBRE COMPLETO">
                <div class="flex gap-2">
                    <input id="p_dni" class="input-titan" placeholder="DNI">
                    <input id="p_nac" class="input-titan" placeholder="NACIONALIDAD">
                </div>
                <input id="p_ocu" class="input-titan" placeholder="OCUPACIÓN">
                <select id="p_edu" class="input-titan edu-list"></select>
                <input id="p_tel" class="input-titan" placeholder="TELÉFONO">
                <div class="flex items-center gap-2">
                    <input id="p_dom_val" class="input-titan" placeholder="DOMICILIO">
                    <button onclick="copyDom('p')" class="bg-white/10 p-2 rounded text-[8px]">ESPEJO</button>
                </div>
                <button onclick="guardar(false)" class="w-full bg-yellow-500 text-black py-3 rounded font-black mt-2 hover:bg-yellow-400 transition">GRABAR MATRÍCULA</button>
            </div>
        </div>

        <div class="glass p-4 space-y-4">
            <h3 class="text-white font-black italic">RADAR INTELIGENTE</h3>
            <input type="text" id="find" onkeyup="buscar()" class="input-titan border-yellow-500" placeholder="🔍 DNI O APELLIDO...">
            <div id="lista_recientes" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
        </div>
    </section>

    <section id="s2" class="hidden space-y-6">
        <div id="grid-salas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4"></div>
        <div id="detalle-sala" class="glass p-6 border-2 border-yellow-500 hidden animate-pulse-slow">
            <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                <h2 id="titulo-sala" class="text-2xl font-black italic text-yellow-500"></h2>
                <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="text-red-500 font-black">CERRAR <i class="bi bi-x-lg"></i></button>
            </div>
            <div id="alumnos-sala" class="grid grid-cols-1 md:grid-cols-4 gap-3"></div>
        </div>
    </section>

    <section id="s4" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-center">
            <div class="glass p-4 border-l-4 border-yellow-500"><p class="opacity-50">MATRÍCULA TOTAL</p><h3 id="st_mat" class="text-3xl font-black">0</h3></div>
            <div class="glass p-4 border-l-4 border-emerald-500"><p class="opacity-50">COBERTURA AUH</p><h3 id="st_auh" class="text-3xl font-black">0</h3></div>
            <div class="glass p-4 border-l-4 border-cyan-500"><p class="opacity-50">POBLACIÓN EXTR.</p><h3 id="st_nac" class="text-3xl font-black">0</h3></div>
            <div class="glass p-4 border-l-4 border-red-500 alert-pulse"><p class="opacity-50">ALERTAS SALUD</p><h3 id="st_sal" class="text-3xl font-black">0</h3></div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass p-6"><canvas id="chartEdu"></canvas></div>
            <div class="glass p-6"><canvas id="chartSalas"></canvas></div>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('TITANIUM_ARCHITECT_DB')) || [];
    let wait = JSON.parse(localStorage.getItem('TITANIUM_ARCHITECT_WAIT')) || [];
    
    const SALAS_NOMBRES = ["ROSA","ROJA","NARANJA","CELESTE","VIOLETA","AMARILLA","AZUL"];
    const ESTUDIOS = ["SIN ESTUDIOS","PRIMARIA INCOMPLETA","PRIMARIA COMPLETA","SECUNDARIA INCOMPLETA","SECUNDARIA COMPLETA","TERCIARIA INCOMPLETA","TERCIARIA COMPLETA","UNIVERSITARIA INCOMPLETA","UNIVERSITARIA COMPLETA"];
    const COLORES = { "ROSA":"#ff69b4", "ROJA":"#ef4444", "NARANJA":"#f97316", "CELESTE":"#3b82f6", "VIOLETA":"#8b5cf6", "AMARILLA":"#eab308", "AZUL":"#1e3a8a" };

    function init() {
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleString(); }, 1000);
        const sl = document.getElementById('a_sala');
        SALAS_NOMBRES.forEach(s => { 
            sl.innerHTML += `<option value="${s} TM">${s} TM</option><option value="${s} TT">${s} TT</option>`; 
        });
        document.querySelectorAll('.edu-list').forEach(sel => {
            ESTUDIOS.forEach(e => { sel.innerHTML += `<option value="${e}">${e}</option>`; });
        });
        renderRecientes();
        actualizarMetricas();
    }

    function setTab(n) {
        [1,2,3,4].forEach(i => {
            document.getElementById('s'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('tab-active', i === n);
            document.getElementById('t'+i).style.opacity = i === n ? "1" : "0.5";
        });
        if(n === 2) renderFoto();
        if(n === 4) initCharts();
    }

    function copyDom(t) {
        document.getElementById(t+'_dom_val').value = document.getElementById('a_dom').value;
    }

    function calcEdad(f) {
        const n = new Date(f), r = new Date("2026-06-30");
        let e = r.getFullYear() - n.getFullYear();
        if (r < new Date(r.getFullYear(), n.getMonth(), n.getDate())) e--;
        document.getElementById('a_edad').value = e + " AÑOS";
    }

    function dictar(id) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return;
        const r = new Speech(); r.lang = 'es-AR';
        r.onstart = () => { document.getElementById(id).classList.add('mic-active'); };
        r.onresult = (e) => { 
            document.getElementById(id).value = e.results[0][0].transcript.toUpperCase();
            document.getElementById(id).classList.remove('mic-active');
        };
        r.start();
    }

    function guardar(isWait) {
        const item = {
            id: Date.now(),
            al: { nom: v('a_nom'), dni: v('a_dni'), nac: v('a_nac'), fec: v('a_fec'), edad: v('a_edad'), sala: v('a_sala'), her: v('a_her'), herj: v('a_herj'), dom: v('a_dom'), tel: v('a_tel'), salud: v('a_salud') },
            ma: { nom: v('m_nom'), dni: v('m_dni'), nac: v('m_nac'), ocu: v('m_ocu'), edu: v('m_edu'), tel: v('m_tel'), dom: v('m_dom_val'), auh: document.getElementById('m_auh').checked },
            pa: { nom: v('p_nom'), dni: v('p_dni'), nac: v('p_nac'), ocu: v('p_ocu'), edu: v('p_edu'), tel: v('p_tel'), dom: v('p_dom_val') }
        };
        if(!item.al.nom || !item.al.dni) return alert("COMPLETE DATOS CRÍTICOS");
        if(isWait) wait.push(item); else db.push(item);
        save();
        renderRecientes();
        actualizarMetricas();
        alert("REGISTRO EXITOSO EN BASE MASTER");
    }

    function renderFoto() {
        const grid = document.getElementById('grid-salas'); grid.innerHTML = "";
        ["TM","TT"].forEach(turno => {
            SALAS_NOMBRES.forEach(color => {
                const nombre = `${color} ${turno}`, fil = db.filter(x => x.al.sala === nombre);
                grid.innerHTML += `
                    <div class="glass p-4 sala-card" style="border-color:${COLORES[color]}" onclick="verSala('${nombre}')">
                        <p class="text-[8px] opacity-40">${turno}</p>
                        <h4 class="font-black" style="color:${COLORES[color]}">${color}</h4>
                        <div class="text-2xl font-black">${fil.length}<span class="text-xs opacity-20">/30</span></div>
                    </div>`;
            });
        });
    }

    function verSala(n) {
        const det = document.getElementById('detalle-sala'); det.classList.remove('hidden');
        document.getElementById('titulo-sala').innerText = "SALA " + n;
        const fil = db.filter(x => x.al.sala === n);
        document.getElementById('alumnos-sala').innerHTML = fil.map(a => `
            <div class="p-3 bg-white/5 border-l-4 border-yellow-500 rounded text-[9px] hover:bg-white/10 cursor-pointer" onclick="alert('Legajo 360: ${a.al.nom}')">
                <b class="text-white">${a.al.nom}</b><br>
                DNI: ${a.al.dni} <br>
                <span class="text-cyan-400">T: ${a.al.tel}</span>
            </div>`).join('') || "SALA VACÍA";
    }

    function exportarExcelDGCE() {
        const data = db.map(x => ({
            SALA: x.al.sala, ALUMNO: x.al.nom, DNI: x.al.dni, EDAD_30_06: x.al.edad, DOMICILIO: x.al.dom, SALUD: x.al.salud,
            MADRE: x.ma.nom, DNI_M: x.ma.dni, ESTUDIOS_M: x.ma.edu, AUH: x.ma.auh?"SI":"NO",
            PADRE: x.pa.nom, DNI_P: x.pa.dni, ESTUDIOS_P: x.pa.edu
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "MATRICULA");
        XLSX.writeFile(wb, "TITANIUM_SUPERVISION_DGCE.xlsx");
    }

    function importarInteligente(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            data.forEach(n => { if(!db.find(x => x.al.dni === n.al.dni)) db.push(n); });
            save(); location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    function initCharts() {
        const ctxE = document.getElementById('chartEdu').getContext('2d');
        new Chart(ctxE, { type: 'bar', data: { labels: ['Primaria','Secundaria','Terciaria','Univ.'], datasets:[{label:'Nivel Educativo Padres', data:[12,15,8,5], backgroundColor:['#facc15','#3b82f6','#ef4444','#10b981']}] }, options: { color:'#fff'} });
    }

    function v(id) { return document.getElementById(id).value.toUpperCase(); }
    function save() { localStorage.setItem('TITANIUM_ARCHITECT_DB', JSON.stringify(db)); localStorage.setItem('TITANIUM_ARCHITECT_WAIT', JSON.stringify(wait)); }
    function actualizarMetricas() {
        document.getElementById('st_mat').innerText = db.length;
        document.getElementById('st_auh').innerText = db.filter(x => x.ma.auh).length;
        document.getElementById('st_nac').innerText = db.filter(x => x.al.nac !== 'ARGENTINA').length;
        document.getElementById('st_sal').innerText = db.filter(x => x.al.salud.length > 5).length;
    }
    function renderRecientes() {
        document.getElementById('lista_recientes').innerHTML = db.slice(-10).reverse().map(a => `
            <div class="p-2 bg-white/5 border-l-2 border-yellow-500 text-[8px] flex justify-between items-center">
                <div><b>${a.al.nom}</b><br>${a.al.dni} | ${a.al.sala}</div>
            </div>`).join('');
    }
</script>
</body>
</html>
