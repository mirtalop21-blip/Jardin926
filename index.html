<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V23 | MASTER DGCE FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --accent: #facc15; --bg: #0d1117; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; }
        .glass { background: rgba(22, 27, 34, 0.98); border: 1px solid #30363d; border-radius: 8px; }
        .input-titan { background: #010409; border: 1px solid #30363d; padding: 10px; border-radius: 4px; color: #f0f6fc; width: 100%; transition: 0.3s; font-weight: bold; }
        .input-titan:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); outline: none; }
        .tab-active { border-bottom: 4px solid var(--accent); color: var(--accent); font-weight: 900; background: rgba(250,204,21,0.05); }
        .sala-card { transition: 0.3s; cursor: pointer; border-bottom: 6px solid; }
        .sala-card:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .color-ROSA { border-color: #ff69b4; } .color-ROJA { border-color: #ef4444; }
        .color-NARANJA { border-color: #f97316; } .color-CELESTE { border-color: #3b82f6; }
        .color-VIOLETA { border-color: #8b5cf6; } .color-AMARILLA { border-color: #eab308; }
        .color-AZUL { border-color: #1e3a8a; }
        .dictar-btn { color: #ef4444; cursor: pointer; transition: 0.2s; }
        .dictar-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body onload="init()">

<header class="glass sticky top-0 z-[100] p-4 flex justify-between items-center border-b border-yellow-500/40 bg-[#0d1117]">
    <div class="flex items-center gap-4">
        <h1 class="text-yellow-500 font-black text-2xl italic">TITANIUM V23 <span class="text-white text-xs">MASTER</span></h1>
        <div id="reloj" class="text-[9px] font-mono opacity-60"></div>
    </div>
    <div class="flex gap-4">
        <div class="bg-red-600/20 text-red-500 border border-red-500 px-3 py-1 rounded text-[8px] font-black animate-pulse"><i class="bi bi-mic-fill"></i> VOZ ACTIVA</div>
        <button onclick="exportarJson()" class="bg-blue-600 px-3 py-1 rounded text-[9px] font-bold">RESPALDO OMNI</button>
    </div>
</header>

<nav class="flex glass sticky top-[72px] z-[90] text-center bg-[#0d1117]">
    <button onclick="setTab(1)" id="t1" class="flex-1 p-4 tab-active font-black">LEGAJO 360°</button>
    <button onclick="setTab(2)" id="t2" class="flex-1 p-4 opacity-50 font-black">FOTO INSTITUCIONAL</button>
    <button onclick="setTab(3)" id="t3" class="flex-1 p-4 opacity-50 font-black">LISTA DE ESPERA (SCAN)</button>
    <button onclick="setTab(4)" id="t4" class="flex-1 p-4 opacity-50 font-black">SUPERVISIÓN EFICIENTE</button>
</nav>

<main class="p-4 space-y-6">
    <section id="s1" class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="glass p-4 border-t-4 border-yellow-500 space-y-3">
            <h3 class="text-yellow-500 font-black flex justify-between">ALUMNO <i class="bi bi-mic-fill dictar-btn" onclick="dictar('a_nom')"></i></h3>
            <input id="a_nom" class="input-titan" placeholder="APELLIDO Y NOMBRE">
            <div class="flex gap-2">
                <input id="a_dni" class="input-titan" placeholder="DNI">
                <input id="a_nac" class="input-titan" placeholder="NACIONALIDAD" value="ARGENTINA">
            </div>
            <div class="flex gap-2">
                <input id="a_fec" type="date" class="input-titan" onchange="calcEdad(this.value)">
                <input id="a_edad" class="input-titan w-1/2" readonly placeholder="EDAD 30/6">
            </div>
            <select id="a_sala" class="input-titan font-bold"></select>
            <div class="flex gap-2">
                <input id="a_her" class="input-titan" placeholder="HERMANOS CANT.">
                <input id="a_herj" class="input-titan" placeholder="EN JARDÍN (S/N)">
            </div>
            <div class="relative">
                <input id="a_dom" class="input-titan" placeholder="DOMICILIO ALUMNO">
                <i class="bi bi-mic-fill absolute right-3 top-3 text-red-500 text-[10px]" onclick="dictar('a_dom')"></i>
            </div>
            <textarea id="a_salud" class="input-titan h-14" placeholder="FICHA SALUD / ALERGIAS"></textarea>
            <button onclick="guardar(false)" class="w-full bg-emerald-600 py-3 rounded font-black shadow-lg">ALTA MATRÍCULA</button>
        </div>

        <div class="glass p-4 border-t-4 border-cyan-500 space-y-3">
            <h3 class="text-cyan-500 font-black flex justify-between">VÍNCULO MATERNO <i class="bi bi-mic-fill dictar-btn" onclick="dictar('m_nom')"></i></h3>
            <input id="m_nom" class="input-titan" placeholder="NOMBRE COMPLETO">
            <div class="flex gap-2">
                <input id="m_dni" class="input-titan" placeholder="DNI">
                <input id="m_nac" class="input-titan" placeholder="NACIONALIDAD">
            </div>
            <input id="m_ocu" class="input-titan" placeholder="OCUPACIÓN">
            <select id="m_edu" class="input-titan"></select>
            <input id="m_tel" class="input-titan" placeholder="TELÉFONO">
            <input id="m_dom_val" class="input-titan" placeholder="DOMICILIO MADRE">
            <div class="flex justify-between bg-white/5 p-2 rounded border border-white/10 italic text-[8px]">
                <label><input type="checkbox" id="m_auh"> TITULAR AUH</label>
                <label><input type="checkbox" id="m_dom" onchange="syncDom('m')"> MISMO DOMICILIO</label>
            </div>
        </div>

        <div class="glass p-4 border-t-4 border-pink-500 space-y-3">
            <h3 class="text-pink-500 font-black flex justify-between">VÍNCULO PATERNO <i class="bi bi-mic-fill dictar-btn" onclick="dictar('p_nom')"></i></h3>
            <input id="p_nom" class="input-titan" placeholder="NOMBRE COMPLETO">
            <div class="flex gap-2">
                <input id="p_dni" class="input-titan" placeholder="DNI">
                <input id="p_nac" class="input-titan" placeholder="NACIONALIDAD">
            </div>
            <input id="p_ocu" class="input-titan" placeholder="OCUPACIÓN">
            <select id="p_edu" class="input-titan"></select>
            <input id="p_tel" class="input-titan" placeholder="TELÉFONO">
            <input id="p_dom_val" class="input-titan" placeholder="DOMICILIO PADRE">
            <label class="block bg-white/5 p-2 rounded text-center text-[8px] italic border border-white/10">
                <input type="checkbox" id="p_dom" onchange="syncDom('p')"> MISMO DOMICILIO ALUMNO
            </label>
        </div>

        <div class="glass p-4 space-y-4">
            <input type="text" id="find" onkeyup="buscar()" class="input-titan border-yellow-500" placeholder="🔍 BUSCAR DNI O NOMBRE...">
            <div id="lista_recientes" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
        </div>
    </section>

    <section id="s2" class="hidden space-y-4">
        <div id="grid-salas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4"></div>
        <div id="detalle-sala" class="glass p-6 border-2 border-yellow-500 hidden">
            <div class="flex justify-between mb-4"><h2 id="titulo-sala" class="text-2xl font-black"></h2><button onclick="this.parentElement.parentElement.classList.add('hidden')" class="text-red-500 font-black">CERRAR X</button></div>
            <div id="alumnos-sala" class="grid grid-cols-1 md:grid-cols-4 gap-2"></div>
        </div>
    </section>

    <section id="s4" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 text-center">
            <div class="glass p-4 border-l-4 border-yellow-500"><p class="opacity-50 text-[8px]">MATRÍCULA</p><h3 id="st_mat" class="text-3xl font-black">0</h3></div>
            <div class="glass p-4 border-l-4 border-emerald-500"><p class="opacity-50 text-[8px]">VACANTES</p><h3 id="st_vac" class="text-3xl font-black">420</h3></div>
            <div class="glass p-4 border-l-4 border-cyan-500"><p class="opacity-50 text-[8px]">AUH</p><h3 id="st_auh" class="text-3xl font-black">0</h3></div>
            <div class="glass p-4 border-l-4 border-purple-500"><p class="opacity-50 text-[8px]">EXTRANJEROS</p><h3 id="st_nac" class="text-3xl font-black">0</h3></div>
        </div>
        <div class="flex justify-center gap-6 p-10 bg-white/5 rounded border border-white/10">
            <button onclick="exportarExcelDGCE()" class="bg-emerald-700 px-8 py-4 rounded font-black hover:bg-emerald-600 transition">📥 EXPORTAR EXCEL DGCE PRO</button>
            <label class="bg-blue-600 px-8 py-4 rounded font-black cursor-pointer hover:bg-blue-500 transition">🔗 IMPORTACIÓN INTELIGENTE <input type="file" class="hidden" onchange="importarInteligente(event)"></label>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('TITANIUM_V23_DB')) || [];
    let wait = JSON.parse(localStorage.getItem('TITANIUM_V23_WAIT')) || [];
    const SALAS = ["ROSA","ROJA","NARANJA","CELESTE","VIOLETA","AMARILLA","AZUL"];
    const ESTUDIOS = ["SIN ESTUDIOS","PRIMARIA COMPLETA","PRIMARIA INCOMPLETA","SECUNDARIA COMPLETA","SECUNDARIA INCOMPLETA","TERCIARIA COMPLETA","TERCIARIA INCOMPLETA","UNIVERSITARIA COMPLETA","UNIVERSITARIA INCOMPLETA"];

    function init() {
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleString(); }, 1000);
        const sl = document.getElementById('a_sala');
        SALAS.forEach(s => { 
            sl.innerHTML += `<option value="${s} TM">${s} TM</option><option value="${s} TT">${s} TT</option>`; 
        });
        document.querySelectorAll('.edu-list, #m_edu, #p_edu').forEach(sel => {
            ESTUDIOS.forEach(e => { sel.innerHTML += `<option value="${e}">${e}</option>`; });
        });
        renderRecientes();
        actualizarMetricas();
    }

    function setTab(n) {
        [1,2,3,4].forEach(i => {
            document.getElementById('s'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('tab-active', i === n);
            document.getElementById('t'+i).style.opacity = i === n ? "1" : "0.5";
        });
        if(n === 2) renderFoto();
    }

    // VOZ PROFESIONAL
    function dictar(id) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Navegador no compatible con voz");
        const r = new Speech();
        r.lang = 'es-AR';
        r.onstart = () => { document.getElementById(id).classList.add('border-red-500'); };
        r.onresult = (e) => { 
            document.getElementById(id).value = e.results[0][0].transcript.toUpperCase();
            document.getElementById(id).classList.remove('border-red-500');
        };
        r.start();
    }

    // EXPORTACIÓN EXCEL DE EXCELENCIA
    function exportarExcelDGCE() {
        if(db.length === 0) return alert("No hay datos para exportar");
        const data = db.map(x => ({
            "SALA": x.al.sala,
            "APELLIDO Y NOMBRE": x.al.nom,
            "DNI": x.al.dni,
            "NACIONALIDAD": x.al.nac,
            "FECHA NAC": x.al.fec,
            "EDAD 30-06": x.al.edad,
            "DOMICILIO ALUMNO": x.al.dom,
            "SALUD": x.al.salud,
            "MADRE": x.ma.nom,
            "DNI MADRE": x.ma.dni,
            "ESTUDIOS MADRE": x.ma.edu,
            "TEL MADRE": x.ma.tel,
            "AUH": x.ma.auh ? "SI" : "NO",
            "PADRE": x.pa.nom,
            "DNI PADRE": x.pa.dni,
            "ESTUDIOS PADRE": x.pa.edu,
            "TEL PADRE": x.pa.tel
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "MATRICULA_MASTER");
        XLSX.writeFile(wb, `DGCE_TITANIUM_V23_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // IMPORTACIÓN INTELIGENTE (JSON / RESPALDOS)
    function importarInteligente(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const importado = JSON.parse(ev.target.result);
                // Evitar duplicados por DNI
                importado.forEach(nuevo => {
                    if(!db.find(existente => existente.al.dni === nuevo.al.dni)) {
                        db.push(nuevo);
                    }
                });
                save();
                alert("Importación completada. Datos sincronizados sin duplicados.");
                location.reload();
            } catch(err) {
                alert("Error: El archivo no tiene el formato TITANIUM válido.");
            }
        };
        reader.readAsText(e.target.files[0]);
    }

    function syncDom(t) {
        if(document.getElementById(t+'_dom').checked) {
            document.getElementById(t+'_dom_val').value = document.getElementById('a_dom').value;
        }
    }

    function guardar(isWait) {
        const item = {
            id: Date.now(),
            al: { nom: v('a_nom'), dni: v('a_dni'), nac: v('a_nac'), fec: v('a_fec'), edad: v('a_edad'), sala: v('a_sala'), her: v('a_her'), herj: v('a_herj'), dom: v('a_dom'), salud: v('a_salud') },
            ma: { nom: v('m_nom'), dni: v('m_dni'), nac: v('m_nac'), ocu: v('m_ocu'), edu: v('m_edu'), tel: v('m_tel'), dom: v('m_dom_val'), auh: document.getElementById('m_auh').checked },
            pa: { nom: v('p_nom'), dni: v('p_dni'), nac: v('p_nac'), ocu: v('p_ocu'), edu: v('p_edu'), tel: v('p_tel'), dom: v('p_dom_val') }
        };
        if(!item.al.nom || !item.al.dni) return alert("DATOS BÁSICOS REQUERIDOS");
        if(isWait) wait.push(item); else db.push(item);
        save();
        alert("CARGA EXITOSA");
        renderRecientes();
        actualizarMetricas();
    }

    function v(id) { return document.getElementById(id).value.toUpperCase(); }
    function save() { 
        localStorage.setItem('TITANIUM_V23_DB', JSON.stringify(db)); 
        localStorage.setItem('TITANIUM_V23_WAIT', JSON.stringify(wait)); 
    }
    
    function calcEdad(f) {
        const n = new Date(f), r = new Date("2026-06-30");
        let e = r.getFullYear() - n.getFullYear();
        if (r < new Date(r.getFullYear(), n.getMonth(), n.getDate())) e--;
        document.getElementById('a_edad').value = e + " AÑOS";
    }

    function actualizarMetricas() {
        document.getElementById('st_mat').innerText = db.length;
        document.getElementById('st_vac').innerText = 420 - db.length;
        document.getElementById('st_auh').innerText = db.filter(x => x.ma.auh).length;
        document.getElementById('st_nac').innerText = db.filter(x => x.al.nac !== 'ARGENTINA').length;
    }

    function exportarJson() {
        const b = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download="TITANIUM_MASTER_BACKUP.json"; a.click();
    }

    function renderRecientes() {
        document.getElementById('lista_recientes').innerHTML = db.slice(-10).reverse().map(a => `
            <div class="p-2 bg-white/5 border-l-2 border-yellow-500 text-[9px] flex justify-between">
                <div><b>${a.al.nom}</b><br>${a.al.dni} | ${a.al.sala}</div>
            </div>`).join('');
    }

    function renderFoto() {
        const grid = document.getElementById('grid-salas'); grid.innerHTML = "";
        ["TM","TT"].forEach(turno => {
            SALAS.forEach(color => {
                const nombre = `${color} ${turno}`, cant = db.filter(x => x.al.sala === nombre).length;
                grid.innerHTML += `<div class="glass p-4 sala-card color-${color}" onclick="verSala('${nombre}')">
                    <p class="text-[8px] opacity-40">${turno}</p><h4 class="font-black">${color}</h4>
                    <div class="text-2xl font-black">${cant}<span class="text-xs opacity-20">/30</span></div></div>`;
            });
        });
    }

    function verSala(n) {
        document.getElementById('detalle-sala').classList.remove('hidden');
        document.getElementById('titulo-sala').innerText = "SALA: " + n;
        const fil = db.filter(x => x.al.sala === n);
        document.getElementById('alumnos-sala').innerHTML = fil.map(a => `<div class="p-2 bg-white/5 border-l-2 border-yellow-500 text-[9px]"><b>${a.al.nom}</b><br>DNI: ${a.al.dni}</div>`).join('') || "SIN CARGAS";
    }
</script>
</body>
</html>
