<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J926 PLATINUM - INGENIERÍA ESTRATÉGICA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(48, 54, 61, 1); border-radius: 20px; }
        .input-pro { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 10px; color: #fff; width: 100%; transition: 0.3s; }
        .input-pro:focus { border-color: #facc15; outline: none; box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .btn-tab { flex: 1; padding: 18px; text-align: center; font-weight: 900; cursor: pointer; border-bottom: 4px solid transparent; opacity: 0.5; transition: 0.4s; }
        .btn-tab.active { opacity: 1; color: #facc15; border-bottom-color: #facc15; background: rgba(250,204,21,0.05); }
        .mic-btn { color: #8b949e; cursor: pointer; transition: 0.2s; }
        .mic-btn:hover { color: #facc15; }
        .mic-active { color: #f85149 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body onload="init()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10 rounded-none">
    <div onclick="setTab(1)" id="tab1" class="btn-tab active">📥 LEGAJO COMPLETO</div>
    <div onclick="setTab(2)" id="tab2" class="btn-tab">🏫 FOTOGRAFÍA DE SALAS</div>
    <div onclick="setTab(3)" id="tab3" class="btn-tab">📊 SUPERVISIÓN PRO</div>
</nav>

<main class="p-4 max-w-[1600px] mx-auto space-y-6">
    
    <section id="sec1" class="space-y-6">
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="glass p-5 border-t-4 border-blue-600 space-y-3">
                <h3 class="text-blue-500 font-black italic underline">DATOS DEL ALUMNO/A</h3>
                <div class="relative"><input id="a_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i onclick="voice('a_n')" class="bi bi-mic-fill absolute right-4 top-3 mic-btn"></i></div>
                <div class="flex gap-2"><input id="a_d" class="input-pro" placeholder="DNI"><input id="a_nac" class="input-pro" value="ARGENTINA"></div>
                <div class="flex gap-2"><input id="a_f" type="date" class="input-pro" onchange="calcAge(this.value)"><input id="a_e" class="input-pro w-24" placeholder="EDAD 30/6" readonly></div>
                <select id="a_s" class="input-pro text-yellow-500 font-bold">
                    <option value="">SELECCIONAR SALA...</option>
                    <optgroup label="TURNO MAÑANA" id="tm_list"></optgroup>
                    <optgroup label="TURNO TARDE" id="tt_list"></optgroup>
                </select>
                <div class="flex gap-2 items-center text-[9px]">
                    <input id="a_h" class="input-pro w-24" placeholder="HERMANOS">
                    <label class="flex gap-1"><input type="checkbox" id="a_hj"> ¿HERM. EN JARDÍN?</label>
                </div>
                <input id="a_dom" class="input-pro" placeholder="DOMICILIO ALUMNO">
                <textarea id="a_salud" class="input-pro h-16" placeholder="ALERTAS MÉDICAS / SALUD"></textarea>
            </div>

            <div class="glass p-5 border-t-4 border-pink-600 space-y-4">
                <div class="space-y-2 pb-4 border-b border-white/5">
                    <h3 class="text-pink-500 font-black italic">MADRE</h3>
                    <div class="flex gap-2"><input id="m_n" class="input-pro" placeholder="NOMBRE COMPLETO"><input id="m_d" class="input-pro w-32" placeholder="DNI"></div>
                    <select id="m_edu" class="input-pro">
                        <option>SIN ESTUDIOS</option><option>PRIMARIA C/I</option><option>SECUNDARIA C/I</option><option>TERCIARIA C/I</option><option>UNIVERSITARIA C/I</option>
                    </select>
                    <div class="flex gap-2 items-center"><input id="m_t" class="input-pro" placeholder="TELÉFONO"><label class="text-[8px] flex gap-1"><input type="checkbox" id="m_auh"> AUH</label></div>
                </div>
                <div class="space-y-2">
                    <h3 class="text-emerald-500 font-black italic">PADRE</h3>
                    <div class="flex gap-2"><input id="p_n" class="input-pro" placeholder="NOMBRE COMPLETO"><input id="p_d" class="input-pro w-32" placeholder="DNI"></div>
                    <select id="p_edu" class="input-pro">
                        <option>SIN ESTUDIOS</option><option>PRIMARIA C/I</option><option>SECUNDARIA C/I</option><option>TERCIARIA C/I</option><option>UNIVERSITARIA C/I</option>
                    </select>
                    <div class="flex gap-2"><input id="p_t" class="input-pro" placeholder="TELÉFONO"><input id="p_o" class="input-pro" placeholder="OCUPACIÓN"></div>
                </div>
            </div>

            <div class="glass p-5 border-t-4 border-yellow-500 flex flex-col justify-between">
                <div>
                    <h3 class="text-yellow-500 font-black italic">ACCIONES</h3>
                    <input type="hidden" id="edit_id">
                    <button onclick="save()" class="w-full bg-yellow-500 text-black font-black p-4 rounded-xl mt-4 hover:bg-yellow-400">💾 GUARDAR E IMPACTAR</button>
                    <button onclick="clearForm()" class="w-full border border-white/10 p-2 rounded-xl mt-2 text-[8px]">LIMPIAR TODO</button>
                </div>
                <div class="mt-4">
                    <input type="text" id="search" onkeyup="renderTable()" class="input-pro border-yellow-500/30" placeholder="🔎 BUSCAR ALUMNO...">
                    <div class="overflow-y-auto max-h-40 mt-2"><table class="w-full text-left"><tbody id="mainTable"></tbody></table></div>
                </div>
            </div>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-6">
        <div id="gridSalas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4"></div>
        <div id="panelSala" class="glass p-8 hidden border-2 border-yellow-500/30">
            <div class="flex justify-between items-center mb-6">
                <h2 id="salaName" class="text-2xl font-black text-yellow-500 italic"></h2>
                <button onclick="closeSala()" class="text-red-500 border border-red-500 px-4 py-1 rounded-full text-[9px]">CERRAR</button>
            </div>
            <div id="listaAlumnos" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
    </section>

    <section id="sec3" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-center">
            <div class="glass p-6 border-b-4 border-blue-500"><p class="opacity-50">MATRÍCULA</p><h2 id="st_m" class="text-3xl font-black">0</h2></div>
            <div class="glass p-6 border-b-4 border-yellow-500"><p class="opacity-50">VACANTES</p><h2 id="st_v" class="text-3xl font-black">420</h2></div>
            <div class="glass p-6 border-b-4 border-pink-500"><p class="opacity-50">AUH TOTAL</p><h2 id="st_a" class="text-3xl font-black">0</h2></div>
            <div class="glass p-6 border-b-4 border-red-500"><p class="opacity-50">ALERTAS SALUD</p><h2 id="st_s" class="text-3xl font-black">0</h2></div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[400px]">
            <div class="glass p-6"><canvas id="chartEdu"></canvas></div>
            <div class="glass p-6"><canvas id="chartPob"></canvas></div>
        </div>
        <div class="glass p-10 border-2 border-dashed border-white/20 text-center space-y-4">
            <h3 class="font-black italic">IMPORTACIÓN Y BACKUP ESTRATÉGICO</h3>
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="exportData('json')" class="bg-blue-600 px-8 py-3 rounded-xl font-black">DESCARGAR BACKUP</button>
                <label class="bg-purple-600 px-8 py-3 rounded-xl font-black cursor-pointer">
                    IMPORTAR EXCEL / BACKUP
                    <input type="file" class="hidden" onchange="importFile(event)">
                </label>
            </div>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('J926_PLATINUM')) || [];
    const SALAS = ["ROSA","ROJA","NARANJA","CELESTE","VIOLETA","AMARILLA","AZUL"];

    function init() { populateSelectors(); renderTable(); renderGrid(); }

    function populateSelectors() {
        const tm = document.getElementById('tm_list'); const tt = document.getElementById('tt_list');
        SALAS.forEach(s => { tm.innerHTML += `<option value="${s} TM">${s} TM</option>`; tt.innerHTML += `<option value="${s} TT">${s} TT</option>`; });
    }

    function setTab(n) {
        [1,2,3].forEach(i => { document.getElementById('sec'+i).classList.toggle('hidden', i !== n); document.getElementById('tab'+i).classList.toggle('active', i === n); });
        if(n === 3) updateStats();
    }

    function voice(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR'; rec.start();
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
    }

    function save() {
        const id = document.getElementById('edit_id').value || Date.now();
        const data = {
            id: Number(id),
            a: { n: v('a_n'), d: v('a_d'), s: v('a_s'), e: v('a_e'), sld: v('a_salud'), h: v('a_h'), hj: document.getElementById('a_hj').checked },
            m: { n: v('m_n'), d: v('m_d'), edu: v('m_edu'), auh: document.getElementById('m_auh').checked },
            p: { n: v('p_n'), d: v('p_d'), edu: v('p_edu') }
        };
        db = db.filter(x => x.id !== data.id); db.push(data);
        localStorage.setItem('J926_PLATINUM', JSON.stringify(db)); alert("SISTEMA ACTUALIZADO"); location.reload();
    }

    function renderTable() {
        const q = document.getElementById('search').value.toUpperCase();
        document.getElementById('mainTable').innerHTML = db.filter(x => x.a.n.includes(q)).map(x => `
            <tr class="border-b border-white/5 cursor-pointer" onclick="edit(${x.id})">
                <td class="p-2 font-bold">${x.a.n}</td><td class="p-2 text-yellow-500">${x.a.s}</td>
            </tr>`).join('');
    }

    function renderGrid() {
        const grid = document.getElementById('gridSalas'); grid.innerHTML = "";
        ["TM","TT"].forEach(turno => {
            SALAS.forEach(s => {
                const name = `${s} ${turno}`; const count = db.filter(x => x.a.s === name).length;
                grid.innerHTML += `<div onclick="openSala('${name}')" class="glass p-4 border-l-4 border-yellow-500 cursor-pointer">
                    <p class="text-[7px] opacity-40">${name}</p><h4 class="text-xl font-black">${count}/30</h4></div>`;
            });
        });
    }

    function openSala(s) {
        document.getElementById('panelSala').classList.remove('hidden'); document.getElementById('salaName').innerText = s;
        document.getElementById('listaAlumnos').innerHTML = db.filter(x => x.a.s === s).map(x => `
            <div class="glass p-3 flex justify-between items-center ${x.a.sld?'border-red-500':''}">
                <p class="font-black">${x.a.n}</p><button onclick="edit(${x.id})" class="text-blue-400">EDITAR</button>
            </div>`).join('') || '<p>SALA VACÍA</p>';
    }

    function updateStats() {
        document.getElementById('st_m').innerText = db.length;
        document.getElementById('st_v').innerText = 420 - db.length;
        document.getElementById('st_a').innerText = db.filter(x => x.m.auh).length;
        document.getElementById('st_s').innerText = db.filter(x => x.a.sld).length;
        renderCharts();
    }

    function renderCharts() {
        if(window.ch1) window.ch1.destroy();
        const edu = {}; db.forEach(x => edu[x.m.edu] = (edu[x.m.edu]||0)+1);
        window.ch1 = new Chart(document.getElementById('chartEdu'), { type:'bar', data:{ labels:Object.keys(edu), datasets:[{label:'ESTUDIOS MADRE', data:Object.values(edu), backgroundColor:'#facc15'}]}, options:{responsive:true, maintainAspectRatio:false}});
    }

    function importFile(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            if(e.target.files[0].name.endsWith('.json')) db = JSON.parse(ev.target.result);
            else { /* Lógica para procesar Excel CSV si es necesario */ }
            localStorage.setItem('J926_PLATINUM', JSON.stringify(db)); location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    function exportData(type) {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="BACKUP_J926.json"; a.click();
    }

    function v(id) { return document.getElementById(id).value.toUpperCase().trim(); }
    function calcAge(f) { const birth = new Date(f); const limit = new Date("2026-06-30"); let age = limit.getFullYear() - birth.getFullYear(); if (limit.getMonth() < birth.getMonth() || (limit.getMonth() === birth.getMonth() && limit.getDate() < birth.getDate())) age--; document.getElementById('a_e').value = age + " AÑOS"; }
    function edit(id) { const x = db.find(i => i.id === id); document.getElementById('edit_id').value = x.id; document.getElementById('a_n').value = x.a.n; setTab(1); }
    function closeSala() { document.getElementById('panelSala').classList.add('hidden'); }
    function clearForm() { document.querySelectorAll('input').forEach(i => i.value=""); }
</script>
</body>
</html>
