<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA INTEGRAL JARDÍN 926</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #001f3f; --amarillo: #facc15; --rojo: #dc2626; --verde: #10b981; }
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #f1f5f9; margin: 0; }
        nav { background: var(--azul); display: flex; border-bottom: 5px solid black; position: sticky; top: 0; z-index: 100; }
        nav button { flex: 1; background: var(--azul); color: white; border: none; padding: 15px; cursor: pointer; font-weight: 900; font-size: 10px; }
        nav button.active { background: var(--amarillo); color: black; }
        .container { max-width: 1200px; margin: 15px auto; padding: 0 10px; }
        .card { background: white; border: 4px solid #000; padding: 20px; box-shadow: 8px 8px 0px #000; display: none; }
        .card.active { display: block; }
        .sub-header { background: #000; color: white; padding: 8px; margin-top: 15px; font-size: 13px; border-left: 10px solid var(--amarillo); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        input, select { border: 3px solid #000; padding: 10px; font-weight: 900; width: 100%; box-sizing: border-box; }
        .btn-mic { background: var(--rojo); color: white; border: 3px solid #000; padding: 10px; cursor: pointer; }
        .btn-principal { background: var(--amarillo); color: black; border: 4px solid #000; padding: 18px; width: 100%; font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #000; color: #fff; padding: 10px; }
        td { border: 2px solid #000; padding: 8px; font-weight: 900; text-align: center; }
    </style>
</head>
<body onload="iniciar()">

<nav>
    <button id="b1" class="active" onclick="tab(1)">1. MATRÍCULA</button>
    <button id="b2" onclick="tab(2)">2. ASISTENCIA</button>
    <button id="b3" onclick="tab(3)">3. SUPERVISIÓN</button>
</nav>

<div class="container">
    <section id="p1" class="card active">
        <div class="sub-header">DATOS DEL NIÑO/A</div>
        <div class="form-grid">
            <div><label>APELLIDO Y NOMBRE</label><input type="text" id="n"></div>
            <div><label>DNI</label><input type="number" id="d"></div>
            <div><label>SALA</label><select id="s"><option>SALA ROSA TM</option><option>SALA NARANJA TT</option></select></div>
        </div>
        <button onclick="guardar()" class="btn-principal">GUARDAR ALUMNO EN MATRÍCULA</button>
    </section>

    <section id="p3" class="card">
        <div style="background:var(--amarillo); padding:10px; border:3px solid #000; font-weight:900;">RESUMEN PARA INSPECCIÓN</div>
        <button onclick="descargar()" style="background:var(--verde); color:white; width:100%; padding:15px; border:3px solid #000; margin:10px 0; font-weight:900;">📊 DESCARGAR EXCEL COMPLETO</button>
        <div id="total"></div>
        <table>
            <thead><tr><th>ALUMNO</th><th>DNI</th><th>SALA</th><th>ACCIONES</th></tr></thead>
            <tbody id="tabla"></tbody>
        </table>
    </section>
</div>

<script>
    // ESTA ES TU LISTA DE 35 NIÑOS QUE YA QUEDA FIJA EN EL CÓDIGO
    const baseOriginal = [
        {n: "AGUILAR CURTIDO BELINDA ABIGAIL", d: "39312579", s: "SALA NARANJA TT"},
        {n: "AMARILLA SUAREZ YAMIR JORGE", d: "39649663", s: "SALA ROSA TM"},
        {n: "BAGLIETTO THIAN ELIEL", d: "38929058", s: "SALA ROSA TM"},
        {n: "BARBERIS SANTILLAN JUN PABLO", d: "39330738", s: "SALA ROSA TM"},
        {n: "BENITEZ CIELO ELUNEY", d: "39265375", s: "SALA NARANJA TT"},
        {n: "BENITEZ LUISANA VALENTINA", d: "39265376", s: "SALA NARANJA TT"},
        {n: "BOGDANOFF NAHOMI ANGELA", d: "39324326", s: "SALA NARANJA TT"},
        {n: "CABALLERO ABREGO RONALDO DANIEL", d: "39913429", s: "SALA ROSA TM"},
        {n: "CACERES ISABELLA VALERIA", d: "39185952", s: "SALA NARANJA TT"},
        {n: "CARRILLO QUISPE AARIA DAINERIS", d: "39496612", s: "SALA ROSA TM"},
        {n: "CENTURION RIOS LIAM CIRO", d: "39804726", s: "SALA NARANJA TT"},
        {n: "CHOQUE MAREA O MICAELA BRIANA", d: "39800326", s: "SALA ROSA TM"},
        {n: "ESCOBAR NICOLAS MAEL", d: "39608992", s: "SALA ROSA TM"},
        {n: "FARIA AS BLANCO FRANCESCO LIONEL", d: "39807066", s: "SALA ROSA TM"},
        {n: "FIGUEROA CATALEYA ANAHI", d: "39724820", s: "SALA ROSA TM"},
        {n: "GARCIA ROMA MARTINA", d: "39330893", s: "SALA ROSA TM"},
        {n: "GAUNA RAMIRO NAHUEL", d: "39311389", s: "SALA ROSA TM"},
        {n: "GOMEZ SANTIAGO ENZO", d: "39330781", s: "SALA ROSA TM"},
        {n: "JIMENEZ ROJAS JAZMIN TERESA", d: "39834209", s: "SALA ROSA TM"},
        {n: "LOZA ELISEO VALENTIN", d: "39387969", s: "SALA ROSA TM"},
        {n: "MONTES MAIRANA ADA ABIGAIL", d: "39311398", s: "SALA ROSA TM"},
        {n: "OJEDA ISABELLA GABRIELA", d: "39419122", s: "SALA ROSA TM"},
        {n: "QUISPE GUARACHI DAYLIN FLORENCIA", d: "39493677", s: "SALA ROSA TM"},
        {n: "RECALDE OVIEDO LUANA", d: "39499707", s: "SALA ROSA TM"},
        {n: "SALVATIERRA ROJAS ANA LIZ", d: "39648362", s: "SALA ROSA TM"},
        {n: "SANTALLA ROJAS GAEL ALEJANDRO", d: "39491004", s: "SALA ROSA TM"},
        {n: "SANTILLAN GAEL DARIO", d: "39319398", s: "SALA ROSA TM"},
        {n: "SAUCEDO VIDAL DESIDERIO", d: "39692803", s: "SALA ROSA TM"},
        {n: "SOSA AYNARA MAGALI", d: "39746733", s: "SALA ROSA TM"},
        {n: "TABOADA CAMILA MAITE", d: "39798190", s: "SALA ROSA TM"},
        {n: "TORRES COCA ANA LUJAN", d: "39696379", s: "SALA ROSA TM"},
        {n: "VALLEJOS HEREDIA AITANA EVELYN", d: "39697386", s: "SALA ROSA TM"},
        {n: "VELAZQUEZ ARCIENAGA JULIETA ISABEL", d: "39833187", s: "SALA ROSA TM"}
    ];

    let alumnos = JSON.parse(localStorage.getItem('MATRICULA_FINAL')) || baseOriginal;

    function iniciar() {
        localStorage.setItem('MATRICULA_FINAL', JSON.stringify(alumnos));
        render();
    }

    function tab(n) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById('p' + n).classList.add('active');
        if(n === 3) render();
    }

    function render() {
        const t = document.getElementById('tabla');
        t.innerHTML = "";
        alumnos.forEach((a, i) => {
            t.innerHTML += `<tr><td>${a.n}</td><td>${a.d}</td><td>${a.s}</td><td><button onclick="borrar(${i})" style="background:red; color:white; border:none;">X</button></td></tr>`;
        });
        document.getElementById('total').innerHTML = `<b>TOTAL MATRÍCULA: ${alumnos.length}</b>`;
    }

    function guardar() {
        const nuevo = { n: document.getElementById('n').value.toUpperCase(), d: document.getElementById('d').value, s: document.getElementById('s').value };
        if(!nuevo.n || !nuevo.d) return alert("COMPLETAR DATOS");
        alumnos.push(nuevo);
        localStorage.setItem('MATRICULA_FINAL', JSON.stringify(alumnos));
        alert("GUARDADO EXITOSO");
        document.getElementById('n').value = ""; document.getElementById('d').value = "";
    }

    function borrar(i) { if(confirm("¿ELIMINAR?")) { alumnos.splice(i,1); localStorage.setItem('MATRICULA_FINAL', JSON.stringify(alumnos)); render(); } }

    function descargar() {
        let csv = "\uFEFFALUMNO,DNI,SALA\n";
        alumnos.forEach(a => csv += `"${a.n}","${a.d}","${a.s}"\n`);
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = "MATRICULA_926.csv"; link.click();
    }
</script>
</body>
</html>
