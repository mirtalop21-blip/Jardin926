<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA INTEGRAL JARDÍN 926</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #e2e8f0; }
        .input-elite { width: 100%; border: 3px solid #000; padding: 10px; font-weight: 900; background: #fff; font-size: 13px; }
        .card-pro { border: 6px solid #000; background: white; padding: 25px; box-shadow: 12px 12px 0px #000; margin-bottom: 30px; }
        .btn-mic { background: #dc2626; color: white; padding: 8px 15px; border: 3px solid #000; font-weight: 900; cursor: pointer; }
        .nav-btn { flex: 1; background: #001f3f; color: white; padding: 18px; font-weight: 900; border-right: 3px solid #fff; transition: 0.3s; }
        .nav-btn.active { background: #facc15; color: #000; border-bottom: 8px solid #000; }
        label { display: block; font-size: 10px; font-weight: 900; margin-top: 10px; color: #1e293b; }
        th { background: #000; color: #fff; padding: 12px; font-size: 11px; }
        td { border: 2px solid #000; padding: 8px; font-size: 11px; font-weight: 900; text-align: center; }
        .alerta-asis { background: #fee2e2; border: 3px solid #ef4444 !important; }
    </style>
</head>
<body onload="iniciar()">

<nav class="flex sticky top-0 z-50 border-b-8 border-black">
    <button onclick="ver(1)" id="b1" class="nav-btn active">1. MATRÍCULA 🎤</button>
    <button onclick="ver(2)" id="b2" class="nav-btn">2. ASISTENCIA (30)</button>
    <button onclick="ver(3)" id="b3" class="nav-btn">3. SUPERVISIÓN 📊</button>
</nav>

<main class="max-w-[1600px] mx-auto p-4">
    
    <section id="s1" class="card-pro">
        <h2 class="bg-black text-white p-2 inline-block italic mb-6">REGISTRO DE LEGAJO INSTITUCIONAL</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="border-r-4 border-gray-200 pr-4">
                <p class="font-black bg-blue-100 p-1 text-center border-2 border-black">DATOS DEL NIÑO/A</p>
                <label>APELLIDO Y NOMBRE (🎤)</label>
                <div class="flex"><input type="text" id="n" class="input-elite"><button onclick="dictar('n')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label>DNI</label><input type="number" id="d" class="input-elite"></div>
                    <div><label>NACIONALIDAD</label><input type="text" id="nac" value="ARGENTINA" class="input-elite"></div>
                </div>
                <label>FECHA NACIMIENTO (EDAD AL 30/06)</label>
                <input type="date" id="f" class="input-elite">
                <label>SALA / SECCIÓN</label>
                <select id="sala" class="input-elite">
                    <option>SALA ROSA TM</option><option>SALA NARANJA TT</option>
                    <option>SALA VERDE TM</option><option>SALA AZUL TT</option>
                    <option>SALA ROJA TM</option><option>SALA CELESTE TT</option>
                </select>
                <label>DOMICILIO ALUMNO (🎤)</label>
                <div class="flex"><input type="text" id="dom" class="input-elite"><button onclick="dictar('dom')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label>HERMANOS</label><input type="number" id="her" class="input-elite"></div>
                    <div><label>¿EN EL JARDÍN?</label><select id="hj" class="input-elite"><option>NO</option><option>SÍ</option></select></div>
                </div>
                <label>SALUD / ALERGIAS (🎤)</label>
                <div class="flex"><input type="text" id="salud" class="input-elite"><button onclick="dictar('salud')" class="btn-mic">🎤</button></div>
            </div>

            <div class="border-r-4 border-gray-200 pr-4">
                <p class="font-black bg-red-100 p-1 text-center border-2 border-black">DATOS DE LA MADRE</p>
                <label>NOMBRE Y APELLIDO (🎤)</label>
                <div class="flex"><input type="text" id="mn" class="input-elite"><button onclick="dictar('mn')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label>DNI</label><input type="number" id="mdni" class="input-elite"></div>
                    <div><label>NACIONALIDAD</label><input type="text" id="mnac" class="input-elite"></div>
                </div>
                <label>OCUPACIÓN (🎤)</label>
                <input type="text" id="m_ocu" class="input-elite">
                <label>EDUCACIÓN</label>
                <select id="m_edu" class="input-elite">
                    <option>PRIMARIA COMPLETA</option><option>SECUNDARIA COMPLETA</option>
                    <option>UNIVERSIDAD COMPLETA</option><option>UNIVERSIDAD INCOMPLETA</option>
                </select>
                <label>TELÉFONO PROPIO</label><input type="text" id="mtel" class="input-elite">
                <label>DOMICILIO PROPIO (🎤)</label><input type="text" id="mdom" class="input-elite">
                <label>RECIBE AUH</label><select id="auh" class="input-elite"><option>SÍ</option><option>NO</option></select>
            </div>

            <div>
                <p class="font-black bg-green-100 p-1 text-center border-2 border-black">DATOS DEL PADRE</p>
                <label>NOMBRE Y APELLIDO (🎤)</label>
                <div class="flex"><input type="text" id="pn" class="input-elite"><button onclick="dictar('pn')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label>DNI</label><input type="number" id="pdni" class="input-elite"></div>
                    <div><label>NACIONALIDAD</label><input type="text" id="pnac" class="input-elite"></div>
                </div>
                <label>OCUPACIÓN (🎤)</label>
                <input type="text" id="p_ocu" class="input-elite">
                <label>EDUCACIÓN</label>
                <select id="p_edu" class="input-elite">
                    <option>SECUNDARIA COMPLETA</option><option>UNIVERSIDAD COMPLETA</option>
                    <option>UNIVERSIDAD INCOMPLETA</option>
                </select>
                <label>TELÉFONO PROPIO</label><input type="text" id="ptel" class="input-elite">
                <label>DOMICILIO PROPIO (🎤)</label><input type="text" id="pdom" class="input-elite">
                
                <button onclick="previa()" class="mt-10 w-full bg-blue-600 text-white p-6 border-4 border-black text-xl font-black shadow-[8px_8px_0px_#000]">VISTA PREVIA Y GUARDAR</button>
            </div>
        </div>
    </section>

    <section id="s2" class="card-pro hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">REGISTRO DIARIO (MAX 30 ALUMNOS)</h2>
            <select id="asis_sala" class="input-elite w-64" onchange="actualizarListaAsis()"><option>SALA ROSA TM</option><option>SALA NARANJA TT</option></select>
        </div>
        <div id="grillaAsis" class="grid grid-cols-2 md:grid-cols-5 gap-4">
            </div>
    </section>

    <section id="s3" class="card-pro hidden">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-black text-white p-4 border-4 border-black text-center">
                <p class="text-xs italic">MATRÍCULA TOTAL</p>
                <p id="totalAlum" class="text-5xl font-black">0</p>
            </div>
            <div class="md:col-span-3 border-4 border-black p-4 bg-white">
                <canvas id="graficoMat" height="80"></canvas>
            </div>
        </div>

        <div class="flex gap-4 mb-4">
            <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCADOR POR APELLIDO O DNI..." class="input-elite text-lg border-blue-900">
            <button onclick="descargarCSV()" class="bg-emerald-600 text-white px-6 border-4 border-black font-black">📊 EXCEL</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full bg-white">
                <thead>
                    <tr>
                        <th>ALUMNO / DNI</th>
                        <th>EDAD (30/06)</th>
                        <th>SALA</th>
                        <th>FAMILIA / CONTACTOS / AUH</th>
                        <th>GESTIÓN</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white border-[10px] border-blue-900 w-full max-w-4xl p-8 max-h-[90vh] overflow-y-auto">
        <h2 class="text-3xl font-black mb-6 border-b-8 border-black pb-2 italic">VERIFICACIÓN DE LEGAJO</h2>
        <div id="repaso" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm font-bold uppercase"></div>
        <div class="flex gap-6 mt-8">
            <button onclick="cerrarModal()" class="flex-1 bg-gray-500 text-white p-4 border-4 border-black font-black">CORREGIR</button>
            <button onclick="guardar()" class="flex-1 bg-green-600 text-white p-4 border-4 border-black font-black">CONFIRMAR Y ARCHIVAR</button>
        </div>
    </div>
</div>

<script>
    let alumnos = [];
    const db_inicial = [
        {n:"AMARILLA SUAREZ YAMIR JORGE", d:"39649663", f:"2021-04-15", sala:"SALA ROSA TM", dom:"FLORENCIO VARELA", auh:"SÍ", mtel:"11445566", ptel:"11998877"},
        {n:"BARBERIS SANTILLAN JUAN PABLO", d:"39330738", f:"2021-02-10", sala:"SALA ROSA TM", dom:"FLORENCIO VARELA", auh:"SÍ", mtel:"11223344", ptel:"11887766"},
        {n:"BAGLIETTO THIAN ELIEL", d:"38929058", f:"2021-08-20", sala:"SALA ROSA TM", dom:"FLORENCIO VARELA", auh:"SÍ", mtel:"11009988", ptel:"11776655"},
        {n:"BENITEZ CIELO ELUNEY", d:"39265375", f:"2021-04-10", sala:"SALA NARANJA TT", dom:"FLORENCIO VARELA", auh:"SÍ", mtel:"11554433", ptel:"11443322"}
        // Aquí se cargan los 35 restantes
    ];

    function iniciar() {
        const local = localStorage.getItem('J926_SISTEMA_V4');
        alumnos = local ? JSON.parse(local) : db_inicial;
        generarGrillaAsis();
        renderTabla();
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('s'+i).classList.toggle('hidden', i !== n);
            document.getElementById('b'+i).classList.toggle('active', i === n);
        });
        if(n === 3) renderTabla();
    }

    function calcularEdad(f) {
        if(!f) return "-";
        const n = new Date(f); const c = new Date(2026, 5, 30);
        let e = c.getFullYear() - n.getFullYear();
        if (c.getMonth() < n.getMonth() || (c.getMonth() === n.getMonth() && c.getDate() < n.getDate())) e--;
        return e + " AÑOS";
    }

    function generarGrillaAsis() {
        const g = document.getElementById('grillaAsis');
        g.innerHTML = "";
        for(let i=1; i<=30; i++) {
            g.innerHTML += `<div class="border-4 border-black p-2 bg-white flex flex-col items-center">
                <span class="text-[10px] font-black">ALUMNO ${i}</span>
                <button onclick="toggle(this)" class="w-full bg-green-500 text-white p-2 mt-1 border-2 border-black font-black text-xs">PRESENTE</button>
            </div>`;
        }
    }

    function toggle(b) {
        if(b.innerText === "PRESENTE") { b.innerText = "AUSENTE"; b.classList.replace('bg-green-500','bg-red-600'); }
        else { b.innerText = "PRESENTE"; b.classList.replace('bg-red-600','bg-green-500'); }
    }

    function previa() {
        const ids = ['n','d','f','sala','dom','her','mn','mtel','mdom','pn','ptel','pdom','auh'];
        let h = "";
        ids.forEach(id => {
            h += `<div class="p-2 border-2 border-black bg-gray-50"><b>${id.toUpperCase()}:</b><br>${document.getElementById(id).value.toUpperCase()}</div>`;
        });
        document.getElementById('repaso').innerHTML = h;
        document.getElementById('modal').classList.remove('hidden');
    }

    function guardar() {
        const a = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            f: document.getElementById('f').value,
            sala: document.getElementById('sala').value,
            dom: document.getElementById('dom').value,
            auh: document.getElementById('auh').value,
            mn: document.getElementById('mn').value,
            mtel: document.getElementById('mtel').value,
            pn: document.getElementById('pn').value,
            ptel: document.getElementById('ptel').value
        };
        alumnos = alumnos.filter(x => x.d !== a.d);
        alumnos.push(a);
        localStorage.setItem('J926_SISTEMA_V4', JSON.stringify(alumnos));
        cerrarModal();
        alert("REGISTRO EXITOSO ✅");
        ver(3);
    }

    function renderTabla() {
        const t = document.getElementById('cuerpoTabla');
        const b = document.getElementById('bus').value.toUpperCase();
        t.innerHTML = "";
        alumnos.forEach((a, i) => {
            if(a.n.includes(b) || a.d.includes(b)) {
                t.innerHTML += `<tr>
                    <td>${a.n}<br><span class="text-blue-700">DNI: ${a.d}</span></td>
                    <td>${calcularEdad(a.f)}</td>
                    <td>${a.sala}</td>
                    <td class="text-left text-[9px]">M: ${a.mn} (${a.mtel})<br>P: ${a.pn} (${a.ptel})<br>AUH: ${a.auh}</td>
                    <td><button onclick="eliminar(${i})" class="bg-red-600 text-white p-1 border-2 border-black text-[9px]">BORRAR</button></td>
                </tr>`;
            }
        });
        document.getElementById('totalAlum').innerText = alumnos.length;
        actualizarGrafico();
    }

    function eliminar(i) { if(confirm("¿ELIMINAR LEGAJO?")) { alumnos.splice(i,1); localStorage.setItem('J926_SISTEMA_V4', JSON.stringify(alumnos)); renderTabla(); } }

    function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }

    function dictar(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR'; rec.start();
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
    }

    function actualizarGrafico() {
        const ctx = document.getElementById('graficoMat').getContext('2d');
        const rosa = alumnos.filter(a => a.sala === 'SALA ROSA TM').length;
        const naranja = alumnos.filter(a => a.sala === 'SALA NARANJA TT').length;
        if(window.ch) window.ch.destroy();
        window.ch = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['ROSA TM', 'NARANJA TT'], datasets: [{ label: 'ALUMNOS', data: [rosa, naranja], backgroundColor: ['#f472b6','#fb923c'] }] }
        });
    }
</script>
</body>
</html>
