<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V22 | ARQUITECTURA MAESTRA DGCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --accent: #facc15; --bg: #0d1117; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; }
        .glass { background: rgba(22, 27, 34, 0.98); border: 1px solid #30363d; border-radius: 8px; }
        .input-titan { background: #010409; border: 1px solid #30363d; padding: 10px; border-radius: 4px; color: #f0f6fc; width: 100%; transition: 0.3s; }
        .input-titan:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); outline: none; }
        .tab-active { border-bottom: 4px solid var(--accent); color: var(--accent); font-weight: 900; background: rgba(250,204,21,0.05); }
        .sala-card { transition: 0.3s; cursor: pointer; border-bottom: 6px solid; position: relative; }
        .sala-card:hover { transform: translateY(-3px); filter: brightness(1.2); }
        .color-ROSA { border-color: #ff69b4; } .color-ROJA { border-color: #ef4444; }
        .color-NARANJA { border-color: #f97316; } .color-CELESTE { border-color: #3b82f6; }
        .color-VIOLETA { border-color: #8b5cf6; } .color-AMARILLA { border-color: #eab308; }
        .color-AZUL { border-color: #1e3a8a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body onload="init()">

<header class="glass sticky top-0 z-[100] p-4 flex justify-between items-center border-b border-yellow-500/40 bg-[#0d1117]">
    <div class="flex items-center gap-4">
        <h1 class="text-yellow-500 font-black text-2xl italic tracking-tighter">TITANIUM V22</h1>
        <div id="reloj" class="text-[9px] font-mono text-emerald-400"></div>
    </div>
    <div class="flex gap-4 items-center">
        <div class="bg-red-600 px-3 py-1 rounded text-[8px] font-black animate-pulse"><i class="bi bi-mic-fill"></i> VOZ PROFESIONAL</div>
        <button onclick="exportarJson()" class="bg-blue-600 px-4 py-1 rounded text-[9px] font-bold shadow-lg">RESPALDO OMNI (.JSON)</button>
    </div>
</header>

<nav class="flex glass sticky top-[72px] z-[90] text-center bg-[#0d1117] border-b border-white/5">
    <button onclick="setTab(1)" id="t1" class="flex-1 p-4 tab-active font-black">LEGAJO 360°</button>
    <button onclick="setTab(2)" id="t2" class="flex-1 p-4 opacity-50 font-black">FOTO INSTITUCIONAL</button>
    <button onclick="setTab(3)" id="t3" class="flex-1 p-4 opacity-50 font-black">LISTA DE ESPERA (SCAN)</button>
    <button onclick="setTab(4)" id="t4" class="flex-1 p-4 opacity-50 font-black">SUPERVISIÓN EFICIENTE</button>
</nav>

<main class="p-4 space-y-6">
    <section id="s1" class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="glass p-4 border-t-4 border-yellow-500 space-y-3">
            <h3 class="text-yellow-500 font-black flex justify-between">ALUMNO <i class="bi bi-mic-fill cursor-pointer" onclick="dictar('a_nom')"></i></h3>
            <input id="a_nom" class="input-titan" placeholder="APELLIDO Y NOMBRE">
            <div class="flex gap-2">
                <input id="a_dni" class="input-titan" placeholder="DNI">
                <input id="a_nac" class="input-titan" placeholder="NACIONALIDAD" value="ARGENTINA">
            </div>
            <div class="flex gap-2">
                <input id="a_fec" type="date" class="input-titan" onchange="calcEdad(this.value)">
                <input id="a_edad" class="input-titan w-1/2 font-black text-yellow-500" readonly placeholder="EDAD 30/6">
            </div>
            <select id="a_sala" class="input-titan font-bold text-yellow-500"></select>
            <div class="flex gap-2">
                <input id="a_her" class="input-titan" placeholder="HERMANOS (CANT)">
                <input id="a_herj" class="input-titan" placeholder="EN JARDÍN (S/N)">
            </div>
            <input id="a_dom" class="input-titan border-emerald-500/30" placeholder="DOMICILIO REAL ALUMNO">
            <textarea id="a_salud" class="input-titan h-14" placeholder="FICHA SALUD / ALERGIAS"></textarea>
            <button onclick="guardar(false)" class="w-full bg-emerald-600 py-3 rounded font-black shadow-xl">DAR DE ALTA</button>
        </div>

        <div class="glass p-4 border-t-4 border-cyan-500 space-y-3">
            <h3 class="text-cyan-500 font-black italic">MADRE</h3>
            <input id="m_nom" class="input-titan" placeholder="NOMBRE COMPLETO">
            <div class="flex gap-2">
                <input id="m_dni" class="input-titan" placeholder="DNI">
                <input id="m_nac" class="input-titan" placeholder="NACIONALIDAD">
            </div>
            <input id="m_ocu" class="input-titan" placeholder="OCUPACIÓN">
            <select id="m_edu" class="input-titan text-cyan-500"></select>
            <input id="m_tel" class="input-titan" placeholder="TELÉFONO">
            <input id="m_dom_val" class="input-titan" placeholder="DOMICILIO MADRE">
            <div class="flex justify-between bg-white/5 p-2 rounded border border-white/10 italic text-[8px]">
                <label class="cursor-pointer"><input type="checkbox" id="m_auh"> TITULAR AUH</label>
                <label class="cursor-pointer text-cyan-400"><input type="checkbox" id="m_dom_check" onchange="syncDom('m')"> MISMO DOMICILIO ALUMNO</label>
            </div>
        </div>

        <div class="glass p-4 border-t-4 border-pink-500 space-y-3">
            <h3 class="text-pink-500 font-black italic">PADRE</h3>
            <input id="p_nom" class="input-titan" placeholder="NOMBRE COMPLETO">
            <div class="flex gap-2">
                <input id="p_dni" class="input-titan" placeholder="DNI">
                <input id="p_nac" class="input-titan" placeholder="NACIONALIDAD">
            </div>
            <input id="p_ocu" class="input-titan" placeholder="OCUPACIÓN">
            <select id="p_edu" class="input-titan text-pink-500"></select>
            <input id="p_tel" class="input-titan" placeholder="TELÉFONO">
            <input id="p_dom_val" class="input-titan" placeholder="DOMICILIO PADRE">
            <label class="block bg-white/5 p-2 rounded text-center text-[8px] italic border border-white/10 cursor-pointer text-pink-400">
                <input type="checkbox" id="p_dom_check" onchange="syncDom('p')"> MISMO DOMICILIO ALUMNO
            </label>
        </div>

        <div class="glass p-4 flex flex-col gap-3">
            <input type="text" id="find" onkeyup="buscar()" class="input-titan border-yellow-500" placeholder="🔍 BUSCAR DNI O NOMBRE...">
            <div id="lista_recientes" class="space-y-2 overflow-y-auto max-h-[420px]"></div>
        </div>
    </section>

    <section id="s2" class="hidden space-y-4">
        <div id="grid-salas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4"></div>
        <div id="detalle-sala" class="glass p-6 border-2 border-yellow-500 hidden animate-in slide-in-from-bottom">
            <div class="flex justify-between items-center mb-4"><h2 id="titulo-sala" class="text-2xl font-black italic"></h2><button onclick="this.parentElement.parentElement.classList.add('hidden')" class="text-red-500 font-black">CERRAR X</button></div>
            <div id="alumnos-sala" class="grid grid-cols-1 md:grid-cols-4 gap-2"></div>
        </div>
    </section>

    <section id="s3" class="hidden space-y-6">
        <div class="glass p-10 text-center border-dashed border-2 border-purple-500/50">
            <h2 class="text-2xl font-black mb-4">CARPETA DE ASPIRANTES / SCAN DNI</h2>
            <div class="flex justify-center gap-4">
                <button onclick="guardar(true)" class="bg-purple-600 px-10 py-4 rounded font-black">CARGA MANUAL ASPIRANTE</button>
                <button onclick="alert('Cámara Activada - Escaneando DNI')" class="bg-white/10 px-10 py-4 rounded font-black italic"><i class="bi bi-camera-fill"></i> ACTIVAR SCANNER</button>
            </div>
        </div>
        <div id="lista_espera" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </section>

    <section id="s4" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 text-center">
            <div class="glass p-4 border-l-4 border-yellow-500"><p class="opacity-50">MATRÍCULA</p><h3 id="st_mat" class="text-3xl font-black">0</h3></div>
            <div class="glass p-4 border-l-4 border-emerald-500"><p class="opacity-50">VACANTES</p><h3 id="st_vac" class="text-3xl font-black">420</h3></div>
            <div class="glass p-4 border-l-4 border-red-500"><p class="opacity-50">BAJAS</p><h3 id="st_baj" class="text-3xl font-black">0</h3></div>
            <div class="glass p-4 border-l-4 border-cyan-500"><p class="opacity-50">AUH TOTAL</p><h3 id="st_auh" class="text-3xl font-black">0</h3></div>
            <div class="glass p-4 border-l-4 border-purple-500"><p class="opacity-50">EXTRANJEROS</p><h3 id="st_nac" class="text-3xl font-black">0</h3></div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="glass p-4"><canvas id="chartNac"></canvas></div>
            <div class="glass p-4"><canvas id="chartEdu"></canvas></div>
        </div>
        <div class="flex flex-col md:flex-row justify-center gap-6 p-10 bg-white/5 border border-white/10 rounded">
            <button onclick="exportarExcel()" class="bg-emerald-700 px-10 py-4 rounded font-black shadow-lg">📥 DESCARGAR PLANILLA SUPERVISIÓN (.XLS)</button>
            <label class="bg-blue-600 px-10 py-4 rounded font-black cursor-pointer shadow-lg">🔗 IMPORTAR HISTÓRICO (357 ALUMNOS) <input type="file" class="hidden" onchange="importar(event)"></label>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('TI_V22_PRO_DB')) || [];
    let wait = JSON.parse(localStorage.getItem('TI_V22_PRO_WAIT')) || [];
    
    const SALAS = ["ROSA","ROJA","NARANJA","CELESTE","VIOLETA","AMARILLA","AZUL"];
    const ESTUDIOS = [
        "PRIMARIA COMPLETA", "PRIMARIA INCOMPLETA", 
        "SECUNDARIA COMPLETA", "SECUNDARIA INCOMPLETA",
        "TERCIARIA COMPLETA", "TERCIARIA INCOMPLETA",
        "UNIVERSITARIA COMPLETA", "UNIVERSITARIA INCOMPLETA", "SIN ESTUDIOS"
    ];

    function init() {
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleString(); }, 1000);
        const s = document.getElementById('a_sala');
        SALAS.forEach(sala => {
            s.innerHTML += `<option value="${sala} TM">${sala} TM</option>`;
            s.innerHTML += `<option value="${sala} TT">${sala} TT</option>`;
        });
        const me = document.getElementById('m_edu'), pe = document.getElementById('p_edu');
        ESTUDIOS.forEach(e => {
            me.innerHTML += `<option value="${e}">${e}</option>`;
            pe.innerHTML += `<option value="${e}">${e}</option>`;
        });
        renderRecientes();
        actualizarMetricas();
    }

    function setTab(n) {
        [1,2,3,4].forEach(i => {
            document.getElementById('s'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('tab-active', i === n);
            document.getElementById('t'+i).style.opacity = i === n ? "1" : "0.5";
        });
        if(n === 2) renderFoto();
        if(n === 3) renderEspera();
        if(n === 4) initCharts();
    }

    function syncDom(t) {
        if(document.getElementById(t+'_dom_check').checked) {
            document.getElementById(t+'_dom_val').value = document.getElementById('a_dom').value;
        }
    }

    function guardar(isWait) {
        const item = {
            id: Date.now(),
            al: { nom: v('a_nom'), dni: v('a_dni'), nac: v('a_nac'), fec: v('a_fec'), edad: v('a_edad'), sala: v('a_sala'), her: v('a_her'), herj: v('a_herj'), dom: v('a_dom'), salud: v('a_salud') },
            ma: { nom: v('m_nom'), dni: v('m_dni'), nac: v('m_nac'), ocu: v('m_ocu'), edu: v('m_edu'), tel: v('m_tel'), dom: v('m_dom_val'), auh: document.getElementById('m_auh').checked },
            pa: { nom: v('p_nom'), dni: v('p_dni'), nac: v('p_nac'), ocu: v('p_ocu'), edu: v('p_edu'), tel: v('p_tel'), dom: v('p_dom_val') }
        };
        if(!item.al.nom || !item.al.dni) return alert("ERROR: DATOS DE ALUMNO INCOMPLETOS");
        if(isWait) wait.push(item); else db.push(item);
        save();
        location.reload();
    }

    function renderFoto() {
        const grid = document.getElementById('grid-salas'); grid.innerHTML = "";
        ["TM","TT"].forEach(turno => {
            SALAS.forEach(color => {
                const n = `${color} ${turno}`, cant = db.filter(x => x.al.sala === n).length;
                grid.innerHTML += `<div class="glass p-4 sala-card color-${color}" onclick="verSala('${n}')">
                    <p class="text-[8px] opacity-40">${turno}</p><h4 class="font-black">${color}</h4>
                    <div class="text-2xl font-black">${cant}<span class="text-xs opacity-20">/30</span></div></div>`;
            });
        });
    }

    function verSala(n) {
        const d = document.getElementById('detalle-sala'); d.classList.remove('hidden');
        document.getElementById('titulo-sala').innerText = "VISTA: " + n;
        const f = db.filter(x => x.al.sala === n);
        document.getElementById('alumnos-sala').innerHTML = f.map(a => `<div class="p-2 bg-white/5 border-l-2 border-yellow-500 text-[9px]"><b>${a.al.nom}</b><br>DNI: ${a.al.dni}</div>`).join('') || "SALA VACÍA";
    }

    function renderRecientes() {
        document.getElementById('lista_recientes').innerHTML = db.slice(-15).reverse().map(a => `
            <div class="p-2 bg-white/5 border-l-2 border-yellow-500 text-[9px] flex justify-between items-center group">
                <div><b>${a.al.nom}</b><br>${a.al.dni} | ${a.al.sala}</div>
                <i class="bi bi-pencil-square text-yellow-500 cursor-pointer opacity-0 group-hover:opacity-100 transition"></i>
            </div>`).join('');
    }

    function initCharts() {
        const ctxN = document.getElementById('chartNac').getContext('2d');
        const counts = {}; db.forEach(x => counts[x.al.nac] = (counts[x.al.nac] || 0) + 1);
        new Chart(ctxN, { type: 'pie', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor:['#facc15','#3b82f6','#ef4444','#10b981','#8b5cf6'] }] }, options: { plugins: { title: { display:true, text:'ORIGEN POBLACIONAL', color:'white'}}}});
    }

    function actualizarMetricas() {
        document.getElementById('st_mat').innerText = db.length;
        document.getElementById('st_vac').innerText = 420 - db.length;
        document.getElementById('st_auh').innerText = db.filter(x => x.ma.auh).length;
        document.getElementById('st_nac').innerText = db.filter(x => x.al.nac !== 'ARGENTINA').length;
    }

    function v(id) { return document.getElementById(id).value.toUpperCase(); }
    function save() { localStorage.setItem('TI_V22_PRO_DB', JSON.stringify(db)); localStorage.setItem('TI_V22_PRO_WAIT', JSON.stringify(wait)); }
    function calcEdad(f) {
        const n = new Date(f), r = new Date("2026-06-30");
        let e = r.getFullYear() - n.getFullYear();
        if (r < new Date(r.getFullYear(), n.getMonth(), n.getDate())) e--;
        document.getElementById('a_edad').value = e + " AÑOS";
    }
    function dictar(id) {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang='es-AR'; r.onresult=(e)=>{ document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); }; r.start();
    }
    function importar(e) {
        const fr = new FileReader();
        fr.onload = (ev) => { db = JSON.parse(ev.target.result); save(); location.reload(); };
        fr.readAsText(e.target.files[0]);
    }
    function exportarJson() {
        const b = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download="TITANIUM_V22_MASTER.json"; a.click();
    }
</script>
</body>
</html>
