<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J926 SISTEMA DE INSPECCIÓN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #000; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: #fff; width: 100%; font-size: 10px; }
        .nav-tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 900; opacity: 0.5; border-bottom: 3px solid transparent; }
        .nav-tab.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); background: linear-gradient(to top, rgba(250,204,21,0.1), transparent); }
        
        /* Colores Oficiales por Sala */
        .SALA-ROSA { border-left: 10px solid #f472b6; } .SALA-ROJA { border-left: 10px solid #ef4444; }
        .SALA-NARANJA { border-left: 10px solid #fb923c; } .SALA-CELESTE { border-left: 10px solid #38bdf8; }
        .SALA-VIOLETA { border-left: 10px solid #a855f7; } .SALA-AMARILLA { border-left: 10px solid #facc15; }
        .SALA-AZUL { border-left: 10px solid #2563eb; }

        .mic-active { color: #ef4444 !important; filter: drop-shadow(0 0 8px #ef4444); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="render()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10">
    <div onclick="tab(1)" id="t1" class="nav-tab active">📝 CARGA COMPLETA</div>
    <div onclick="tab(2)" id="t2" class="nav-tab">📸 FOTOGRAFÍA SALAS</div>
    <div onclick="tab(3)" id="t3" class="nav-tab">🛡️ SUPERVISIÓN</div>
</nav>

<main class="p-4 space-y-6">
    <section id="sec1" class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="glass p-5 rounded-3xl border-t-4 border-blue-500 space-y-3">
            <h3 class="text-blue-400 font-black italic">LEGAJO ALUMNO/A</h3>
            <div class="relative"><input id="a_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('a_n')"></i></div>
            <div class="flex gap-2">
                <input id="a_d" class="input-pro w-full" placeholder="DNI">
                <input id="a_nac" class="input-pro w-full" placeholder="NACIONALIDAD" value="ARGENTINA">
            </div>
            <div class="flex gap-2">
                <input id="a_f" type="date" class="input-pro w-full" onchange="calcAge(this.value)">
                <input id="a_e" class="input-pro w-24" placeholder="EDAD" readonly>
            </div>
            <select id="a_s" class="input-pro text-gold font-black">
                <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                <option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
            </select>
            <div class="relative"><input id="a_dom" class="input-pro" placeholder="DOMICILIO"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('a_dom')"></i></div>
            <div class="relative"><textarea id="a_salud" class="input-pro h-14" placeholder="SECCIÓN SALUD / ANTECEDENTES"></textarea><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('a_salud')"></i></div>
        </div>

        <div class="glass p-5 rounded-3xl border-t-4 border-rose-500 space-y-3">
            <h3 class="text-rose-400 font-black italic">DATOS MADRE</h3>
            <div class="relative"><input id="m_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('m_n')"></i></div>
            <div class="flex gap-2">
                <input id="m_d" class="input-pro" placeholder="DNI">
                <div class="flex-1 flex gap-1">
                    <select id="m_nac_opt" class="input-pro text-[7px]" onchange="syncNac('m')"><option value="OTRO">OTRO</option><option value="MISMO">MISMO NIÑO</option></select>
                    <input id="m_nac" class="input-pro" placeholder="NACIONALIDAD">
                </div>
            </div>
            <div class="flex gap-2">
                <select id="m_dom_opt" class="input-pro text-[7px]" onchange="toggleDom('m')"><option value="OTRO">OTRO</option><option value="MISMO">MISMO NIÑO</option></select>
                <input id="m_dom" class="input-pro w-full" placeholder="DOMICILIO">
            </div>
            <select id="m_edu" class="input-pro">
                <option>SIN ESTUDIOS</option><option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option><option>TERCIARIA COMPLETA</option>
                <option>TERCIARIA INCOMPLETA</option><option>UNIVERSITARIA COMPLETA</option><option>UNIVERSITARIA INCOMPLETA</option>
            </select>
            <div class="flex gap-2"><input id="m_ocu" class="input-pro w-full" placeholder="OCUPACIÓN"><input id="m_t" class="input-pro w-full" placeholder="TELÉFONO"></div>
        </div>

        <div class="glass p-5 rounded-3xl border-t-4 border-emerald-500 space-y-3">
            <h3 class="text-emerald-400 font-black italic">DATOS PADRE</h3>
            <div class="relative"><input id="p_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-4 top-3 cursor-pointer" onclick="voice('p_n')"></i></div>
            <div class="flex gap-2">
                <input id="p_d" class="input-pro" placeholder="DNI">
                <div class="flex-1 flex gap-1">
                    <select id="p_nac_opt" class="input-pro text-[7px]" onchange="syncNac('p')"><option value="OTRO">OTRO</option><option value="MISMO">MISMO NIÑO</option></select>
                    <input id="p_nac" class="input-pro" placeholder="NACIONALIDAD">
                </div>
            </div>
            <div class="flex gap-2">
                <select id="p_dom_opt" class="input-pro text-[7px]" onchange="toggleDom('p')"><option value="OTRO">OTRO</option><option value="MISMO">MISMO NIÑO</option></select>
                <input id="p_dom" class="input-pro w-full" placeholder="DOMICILIO">
            </div>
            <div class="flex gap-2"><input id="p_ocu" class="input-pro w-full" placeholder="OCUPACIÓN"><input id="p_t" class="input-pro w-full" placeholder="TELÉFONO"></div>
            <input type="hidden" id="edit_id">
            <button onclick="save()" class="w-full bg-gold text-black font-black py-4 rounded-xl shadow-xl hover:bg-yellow-500">💾 REGISTRAR LEGADO</button>
        </div>

        <div class="lg:col-span-3 glass p-4 rounded-2xl">
            <input type="text" id="search" onkeyup="renderTable()" class="input-pro border-gold/40" placeholder="🔎 BUSCADOR EFICIENTE: DNI O APELLIDO PARA EDITAR...">
            <div class="overflow-x-auto mt-4"><table class="w-full"><tbody id="mainTable"></tbody></table></div>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-4">
        <div class="flex justify-between items-center glass p-4 rounded-2xl">
            <h2 class="text-gold font-black italic">LIBRO DE REGISTRO DIARIO</h2>
            <input type="date" id="asisDate" class="bg-transparent border-b border-gold text-white" onchange="renderAsis()">
        </div>
        <div id="asisCards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3"></div>
        <div id="salaView" class="glass p-6 rounded-3xl hidden border-2 border-gold/20">
            <div class="flex justify-between items-center mb-6">
                <h3 id="currentSala" class="text-xl font-black italic text-gold"></h3>
                <button onclick="closeSala()" class="bg-rose-500/20 text-rose-500 px-4 py-2 rounded-lg font-bold">CERRAR X</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="studentList"></div>
        </div>
    </section>

    <section id="sec3" class="hidden space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl border-l-8 border-blue-500">
                <h4 class="font-black mb-2">📊 ANÁLISIS POBLACIONAL</h4>
                <div id="statsGlobal" class="space-y-1 text-[9px]"></div>
            </div>
            <div class="glass p-6 rounded-3xl border-l-8 border-gold">
                <h4 class="font-black mb-2">🏢 ESTATUS INSTITUCIONAL</h4>
                <div id="statsVacantes" class="text-xl font-black text-gold"></div>
            </div>
        </div>
        <div class="glass p-8 rounded-3xl text-center space-y-4">
            <h3 class="font-black">MOTOR DE DOCUMENTACIÓN PROFESIONAL</h3>
            <div class="flex flex-wrap gap-4 justify-center">
                <button onclick="exportJSON()" class="bg-blue-600 px-8 py-3 rounded-full font-black">EXPORTAR PARA OTRA PC</button>
                <button onclick="exportExcel()" class="bg-emerald-600 px-8 py-3 rounded-full font-black">DESCARGAR EXCEL INSPECCIÓN</button>
                <label class="bg-purple-600 px-8 py-3 rounded-full font-black cursor-pointer">LEER ARCHIVO COMPAÑERA
                    <input type="file" class="hidden" onchange="importJSON(event)">
                </label>
            </div>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('J926_INTEL')) || [];
    let asis = JSON.parse(localStorage.getItem('J926_ASIS_INTEL')) || {};
    const SALAS = ["SALA ROSA TM","SALA ROSA TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA CELESTE TM","SALA CELESTE TT","SALA VIOLETA TM","SALA VIOLETA TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT"];

    function tab(n) { [1,2,3].forEach(i => { document.getElementById('sec'+i).classList.toggle('hidden', i !== n); document.getElementById('t'+i).classList.toggle('active', i === n); }); }

    function voice(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = "es-AR";
        rec.onstart = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.add('mic-active');
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.onend = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.remove('mic-active');
        rec.start();
    }

    function toggleDom(p) { if(document.getElementById(p+'_dom_opt').value === 'MISMO') document.getElementById(p+'_dom').value = document.getElementById('a_dom').value; }
    function syncNac(p) { if(document.getElementById(p+'_nac_opt').value === 'MISMO') document.getElementById(p+'_nac').value = document.getElementById('a_nac').value; }

    function calcAge(f) {
        const limit = new Date("2026-06-30"), nac = new Date(f);
        let e = limit.getFullYear() - nac.getFullYear();
        if (limit.getMonth() < nac.getMonth() || (limit.getMonth() === nac.getMonth() && limit.getDate() < nac.getDate())) e--;
        document.getElementById('a_e').value = e + " AÑOS";
    }

    function save() {
        const id = document.getElementById('edit_id').value || Date.now();
        const record = {
            id: Number(id),
            a: { n: v('a_n'), d: v('a_d'), nac: v('a_nac'), f: v('a_f'), e: v('a_e'), s: v('a_s'), dom: v('a_dom'), salud: v('a_salud') },
            m: { n: v('m_n'), d: v('m_d'), nac: v('m_nac'), t: v('m_t'), dom: v('m_dom'), edu: v('m_edu'), ocu: v('m_ocu') },
            p: { n: v('p_n'), d: v('p_d'), nac: v('p_nac'), t: v('p_t'), dom: v('p_dom'), ocu: v('p_ocu') }
        };
        db = db.filter(x => x.id !== record.id); db.push(record);
        sync(); alert("LEGADO ACTUALIZADO EXITOSAMENTE"); clear();
    }

    function sync() { localStorage.setItem('J926_INTEL', JSON.stringify(db)); localStorage.setItem('J926_ASIS_INTEL', JSON.stringify(asis)); render(); }

    function render() {
        document.getElementById('asisCards').innerHTML = SALAS.map(s => {
            const count = db.filter(x => x.a.s === s).length;
            const colorClass = s.split(' ')[1];
            return `<div onclick="openSala('${s}')" class="glass p-4 rounded-2xl SALA-${colorClass} cursor-pointer hover:scale-105 transition shadow-lg">
                <p class="text-[7px] font-black opacity-70">${s}</p>
                <div class="flex justify-between items-end mt-2"><h4 class="text-sm font-black">${count}/30</h4><span class="text-gold text-[7px] font-bold">FOTOGRAFÍA</span></div>
            </div>`;
        }).join('');
        
        document.getElementById('statsVacantes').innerText = (420 - db.length) + " VACANTES TOTALES";
        renderTable();
    }

    function openSala(sala) {
        document.getElementById('salaView').classList.remove('hidden');
        document.getElementById('currentSala').innerText = "VISTA INSTITUCIONAL: " + sala;
        const students = db.filter(x => x.a.s === sala).sort((a,b) => a.a.n.localeCompare(b.a.n));
        const date = document.getElementById('asisDate').value || new Date().toISOString().split('T')[0];
        
        document.getElementById('studentList').innerHTML = students.map(x => {
            const state = (asis[date] && asis[date][x.id]) || '';
            return `<div class="glass p-4 rounded-2xl border border-white/5 shadow-inner">
                <div class="flex justify-between mb-2">
                    <span class="font-black text-[9px] text-blue-400">${x.a.n}</span>
                    <span class="text-[7px] opacity-40">${x.a.d}</span>
                </div>
                <p class="text-[7px] mb-2 opacity-60">SALUD: ${x.a.salud || 'SIN DATOS'}</p>
                <div class="flex gap-1">
                    <button onclick="mark('${date}',${x.id},'P')" class="flex-1 py-2 rounded-lg ${state==='P'?'bg-emerald-500':'bg-white/5'}">P</button>
                    <button onclick="mark('${date}',${x.id},'A')" class="flex-1 py-2 rounded-lg ${state==='A'?'bg-rose-500':'bg-white/5'}">A</button>
                    <button onclick="edit(${x.id})" class="bg-gold/20 text-gold px-3 rounded-lg"><i class="bi bi-pencil"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    function mark(date, id, val) { if(!asis[date]) asis[date]={}; asis[date][id]=val; sync(); openSala(document.getElementById('currentSala').innerText.replace("VISTA INSTITUCIONAL: ","")); }

    function renderTable() {
        const q = document.getElementById('search').value.toUpperCase();
        document.getElementById('mainTable').innerHTML = db.filter(x => x.a.d.includes(q) || x.a.n.includes(q)).map(x => `
            <tr class="border-b border-white/5 hover:bg-white/5">
                <td class="p-3 font-black text-[9px]">${x.a.n} <span class="text-gold ml-2">${x.a.s}</span></td>
                <td class="p-3 text-right"><button onclick="edit(${x.id})" class="text-blue-400">EDITAR LEGADO</button></td>
            </tr>
        `).join('');
    }

    function edit(id) {
        const x = db.find(i => i.id === id); if(!x) return;
        document.getElementById('edit_id').value = x.id;
        Object.keys(x.a).forEach(k => { if(document.getElementById('a_'+k)) document.getElementById('a_'+k).value = x.a[k]; });
        Object.keys(x.m).forEach(k => { if(document.getElementById('m_'+k)) document.getElementById('m_'+k).value = x.m[k]; });
        Object.keys(x.p).forEach(k => { if(document.getElementById('p_'+k)) document.getElementById('p_'+k).value = x.p[k]; });
        tab(1); closeSala();
    }

    function exportJSON() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:'application/json'}));
        a.download = "J926_NUCLEO_DATA.json"; a.click();
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { db = JSON.parse(ev.target.result); sync(); alert("DATOS FUSIONADOS"); };
        reader.readAsText(e.target.files[0]);
    }

    function exportExcel() {
        let csv = "\ufeffINFORME INSTITUCIONAL JARDIN 926\nSALA;ALUMNO;DNI;SALUD;MADRE;TEL MADRE;PADRE;TEL PADRE;DOMICILIO\n";
        db.sort((a,b) => a.a.s.localeCompare(b.a.s)).forEach(x => {
            csv += `${x.a.s};${x.a.n};${x.a.d};${x.a.salud};${x.m.n};${x.m.t};${x.p.n};${x.p.t};${x.a.dom}\n`;
        });
        const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); a.download="DOCUMENTO_PROFESIONAL_INSPECCION.csv"; a.click();
    }

    function v(id) { return document.getElementById(id).value.toUpperCase().trim(); }
    function clear() { document.querySelectorAll('input, textarea').forEach(i => { if(!['a_s','a_nac','m_nac_opt','p_nac_opt','m_dom_opt','p_dom_opt','m_edu'].includes(i.id)) i.value=""; }); }
    function closeSala() { document.getElementById('salaView').classList.add('hidden'); }
</script>
</body>
</html>
