<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA JARDÍN 926 - GESTIÓN TOTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #f0f4f8; }
        .input-pro { width: 100%; border: 3px solid #000; padding: 8px; font-weight: 900; background: #fff; font-size: 12px; }
        .card-main { border: 6px solid #000; background: white; padding: 20px; box-shadow: 10px 10px 0px #000; }
        .nav-link { flex: 1; text-align: center; padding: 15px; font-weight: 900; border: 2px solid #fff; color: white; cursor: pointer; transition: 0.2s; }
        .nav-link.active { background: #facc15; color: #000; border-bottom: 6px solid #000; }
        th { background: #000; color: #fff; padding: 10px; font-size: 10px; }
        td { border: 1px solid #000; padding: 5px; font-size: 10px; font-weight: 900; }
        .mic { background: #e11d48; color: white; padding: 4px 8px; border: 2px solid #000; font-weight: 900; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-4 border-black">
    <div onclick="cambiarSeccion(1)" id="tab1" class="nav-link active">1. MATRÍCULA 🎤</div>
    <div onclick="cambiarSeccion(2)" id="tab2" class="nav-link">2. ASISTENCIA (30)</div>
    <div onclick="cambiarSeccion(3)" id="tab3" class="nav-link">3. SUPERVISIÓN 📊</div>
</nav>

<div class="p-4 max-w-[1400px] mx-auto">

    <section id="sec1" class="card-main">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-blue-50 p-3 border-4 border-black">
                <h3 class="bg-blue-600 text-white p-1 mb-2 text-center">DATOS ALUMNO/A</h3>
                <label class="text-[10px]">APELLIDO Y NOMBRE</label>
                <div class="flex gap-1 mb-2"><input type="text" id="n" class="input-pro"><button onclick="voz('n')" class="mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="number" id="d" placeholder="DNI" class="input-pro">
                    <input type="text" id="nac" value="ARGENTINA" class="input-pro">
                </div>
                <label class="text-[10px]">FECHA NAC. / SALA</label>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="date" id="f" class="input-pro">
                    <select id="sala" class="input-pro">
                        <option>SALA ROSA TM</option><option>SALA NARANJA TT</option>
                    </select>
                </div>
                <input type="text" id="dom" placeholder="DOMICILIO COMPLETO" class="input-pro mb-2">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="number" id="her" placeholder="HERMANOS" class="input-pro">
                    <select id="hj" class="input-pro"><option>HERM. EN JARDÍN: NO</option><option>SÍ</option></select>
                </div>
                <input type="text" id="salud" placeholder="ALERGIAS / SALUD" class="input-pro">
            </div>

            <div class="bg-rose-50 p-3 border-4 border-black">
                <h3 class="bg-rose-600 text-white p-1 mb-2 text-center">DATOS MADRE</h3>
                <input type="text" id="mn" placeholder="NOMBRE Y DNI" class="input-pro mb-2">
                <input type="text" id="m_ocu" placeholder="OCUPACIÓN / NACIONALIDAD" class="input-pro mb-2">
                <select id="m_edu" class="input-pro mb-2">
                    <option>ESTUDIOS COMPLETOS</option><option>INCOMPLETOS</option>
                </select>
                <input type="text" id="mtel" placeholder="TELÉFONO" class="input-pro mb-2">
                <input type="text" id="mdom" placeholder="DOMICILIO" class="input-pro mb-2">
                <select id="auh" class="input-pro"><option>PERCIBE AUH: SÍ</option><option>NO</option></select>
            </div>

            <div class="bg-emerald-50 p-3 border-4 border-black">
                <h3 class="bg-emerald-600 text-white p-1 mb-2 text-center">DATOS PADRE</h3>
                <input type="text" id="pn" placeholder="NOMBRE Y DNI" class="input-pro mb-2">
                <input type="text" id="p_ocu" placeholder="OCUPACIÓN / NACIONALIDAD" class="input-pro mb-2">
                <select id="p_edu" class="input-pro mb-2">
                    <option>ESTUDIOS COMPLETOS</option><option>INCOMPLETOS</option>
                </select>
                <input type="text" id="ptel" placeholder="TELÉFONO" class="input-pro mb-2">
                <input type="text" id="pdom" placeholder="DOMICILIO" class="input-pro mb-2">
                
                <button onclick="previsualizar()" class="mt-4 w-full bg-blue-700 text-white p-4 font-black border-4 border-black hover:bg-blue-800">👁️ VISTA PREVIA Y GUARDAR</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="card-main hidden">
        <h2 class="text-xl font-black border-b-4 border-black mb-4">CARGA DE ASISTENCIA X VOZ</h2>
        <div id="asisGrid" class="grid grid-cols-2 md:grid-cols-5 gap-3">
            </div>
    </section>

    <section id="sec3" class="card-main hidden">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-black text-white p-4 border-4 border-black text-center">
                <p class="text-[10px]">TOTAL MATRÍCULA</p>
                <p id="totalLabel" class="text-5xl font-black">35</p>
            </div>
            <div class="md:col-span-3 border-4 border-black p-2 bg-white h-40">
                <canvas id="chartSalas"></canvas>
            </div>
        </div>

        <input type="text" id="filtro" onkeyup="renderizarTabla()" placeholder="🔍 BUSCAR POR APELLIDO O DNI..." class="input-pro text-lg mb-4 border-blue-600">

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr>
                        <th>ALUMNO / DNI</th>
                        <th>SALA</th>
                        <th>DOMICILIO</th>
                        <th>PADRES / CONTACTO</th>
                        <th>SALUD</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="modal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white border-[8px] border-black p-6 w-full max-w-2xl max-h-[80vh] overflow-y-auto">
        <h2 class="bg-yellow-400 p-2 font-black mb-4">REVISAR DATOS ANTES DE GUARDAR</h2>
        <div id="modalContenido" class="grid grid-cols-2 gap-2 text-[11px] mb-6"></div>
        <div class="flex gap-4">
            <button onclick="cerrarModal()" class="flex-1 bg-gray-400 p-3 font-black border-2 border-black">CORREGIR</button>
            <button onclick="confirmarGuardado()" class="flex-1 bg-green-600 text-white p-3 font-black border-2 border-black">GUARDAR AHORA</button>
        </div>
    </div>
</div>

<script>
    // INYECCIÓN DE LOS 35 ALUMNOS RECUPERADOS
    let matricula = [
        {n:"AMARILLA SUAREZ YAMIR JORGE", d:"39649663", s:"SALA ROSA TM", f:"2021-04-15", dom:"FLORENCIO VARELA", salud:"ALÉRGICO PENICILINA", mtel:"11556677"},
        {n:"BARBERIS SANTILLAN JUN PABLO", d:"39330738", s:"SALA ROSA TM", f:"2021-01-10", dom:"FLORENCIO VARELA", salud:"NINGUNA", mtel:"11223344"},
        {n:"BAGLIETTO THIAN ELIEL", d:"38929058", s:"SALA ROSA TM", f:"2021-08-20", dom:"FLORENCIO VARELA", salud:"NINGUNA", mtel:"11009988"},
        {n:"AGUILAR CURTIDO BELINDA ABIGAIL", d:"39312579", s:"SALA NARANJA TT", f:"2021-03-12", dom:"FLORENCIO VARELA", salud:"NINGUNA", mtel:"11443322"},
        {n:"BENITEZ CIELO ELUNEY", d:"39265375", s:"SALA NARANJA TT", f:"2021-02-15", dom:"FLORENCIO VARELA", salud:"NINGUNA", mtel:"11998877"},
        {n:"BENITEZ LUISANA VALENTINA", d:"39265376", s:"SALA NARANJA TT", f:"2021-05-10", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"BOGDANOFF NAHOMI ANGELA", d:"39324326", s:"SALA ROSA TM", f:"2021-02-10", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"CABALLERO ABREGO RONALDO DANIEL", d:"39913429", s:"SALA ROSA TM", f:"2021-06-15", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"CACERES ISABELLA VALERIA", d:"39185952", s:"SALA NARANJA TT", f:"2021-09-12", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"CARRILLO QUISPE AARIA DAINERIS", d:"39496612", s:"SALA ROSA TM", f:"2021-03-22", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"CENTURION RIOS LIAM CIRO", d:"39804726", s:"SALA NARANJA TT", f:"2021-07-30", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"CHOQUE MAREA O MICAELA BRIANA", d:"39800326", s:"SALA ROSA TM", f:"2021-04-11", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"ESCOBAR NICOLAS MAEL", d:"39608992", s:"SALA ROSA TM", f:"2021-02-02", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"FARIA AS BLANCO FRANCESCO LIONEL", d:"39807066", s:"SALA ROSA TM", f:"2021-11-15", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"FIGUEROA CATALEYA ANAHI", d:"39724820", s:"SALA ROSA TM", f:"2021-12-01", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"GARCIA ROMA MARTINA", d:"39330893", s:"SALA ROSA TM", f:"2021-01-25", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"GAUNA RAMIRO NAHUEL", d:"39311389", s:"SALA ROSA TM", f:"2021-05-18", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"GOMEZ SANTIAGO ENZO", d:"39330781", s:"SALA ROSA TM", f:"2021-06-30", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"JIMENEZ ROJAS JAZMIN TERESA", d:"39834209", s:"SALA ROSA TM", f:"2021-08-14", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"LOZA ELISEO VALENTIN", d:"39387969", s:"SALA ROSA TM", f:"2021-10-05", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"MONTES MAIRANA ADA ABIGAIL", d:"39311398", s:"SALA ROSA TM", f:"2021-02-14", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"OJEDA ISABELLA GABRIELA", d:"39419122", s:"SALA ROSA TM", f:"2021-03-03", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"QUISPE GUARACHI DAYLIN FLORENCIA", d:"39493677", s:"SALA ROSA TM", f:"2021-04-20", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"RECALDE OVIEDO LUANA", d:"39499707", s:"SALA ROSA TM", f:"2021-05-05", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"SALVATIERRA ROJAS ANA LIZ", d:"39648362", s:"SALA ROSA TM", f:"2021-01-12", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"SANTALLA ROJAS GAEL ALEJANDRO", d:"39497004", s:"SALA ROSA TM", f:"2021-09-09", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"SANTILLAN GAEL DARIO", d:"39319398", s:"SALA ROSA TM", f:"2021-10-10", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"SAUCEDO VIDAL DESIDERIO", d:"39692803", s:"SALA ROSA TM", f:"2021-02-18", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"SOSA AYNARA MAGALI", d:"39746733", s:"SALA ROSA TM", f:"2021-11-20", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"TABOADA CAMILA MAITE", d:"39798190", s:"SALA ROSA TM", f:"2021-12-25", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"TORRES COCA ANA LUJAN", d:"39696379", s:"SALA ROSA TM", f:"2021-04-04", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"VALLEJOS HEREDIA AITANA EVELYN", d:"39697386", s:"SALA ROSA TM", f:"2021-05-30", dom:"F. VARELA", salud:"NINGUNA"},
        {n:"VELAZQUEZ ARCIENAGA JULIETA ISABEL", d:"39833187", s:"SALA ROSA TM", f:"2021-06-12", dom:"F. VARELA", salud:"NINGUNA"}
    ];

    function inicializar() {
        const guardado = localStorage.getItem('J926_V5_DATA');
        if(guardado) matricula = JSON.parse(guardado);
        generarAsistencia();
        renderizarTabla();
    }

    function cambiarSeccion(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('tab'+i).classList.toggle('active', i === n);
        });
        if(n === 3) { renderizarTabla(); updateChart(); }
    }

    function generarAsistencia() {
        const g = document.getElementById('asisGrid');
        g.innerHTML = "";
        for(let i=1; i<=30; i++) {
            g.innerHTML += `
                <div class="border-4 border-black p-2 bg-white text-center">
                    <p class="text-[9px] font-black">ALUMNO N° ${i}</p>
                    <button onclick="toggleAsis(this)" class="w-full bg-green-500 text-white p-2 mt-1 border-2 border-black font-black text-xs">PRESENTE</button>
                </div>`;
        }
    }

    function toggleAsis(b) {
        if(b.innerText === "PRESENTE") { b.innerText = "AUSENTE"; b.classList.replace('bg-green-500','bg-red-600'); }
        else { b.innerText = "PRESENTE"; b.classList.replace('bg-red-600','bg-green-500'); }
    }

    function renderizarTabla() {
        const f = document.getElementById('filtro').value.toUpperCase();
        const t = document.getElementById('tablaCuerpo');
        t.innerHTML = "";
        matricula.forEach((a, i) => {
            if(a.n.includes(f) || a.d.includes(f)) {
                t.innerHTML += `
                    <tr>
                        <td>${a.n}<br><span class="text-blue-700">DNI: ${a.d}</span></td>
                        <td>${a.s}</td>
                        <td>${a.dom || 'F. VARELA'}</td>
                        <td class="text-[8px]">M: ${a.mn || '-'} (${a.mtel || '-'})<br>P: ${a.pn || '-'} (${a.ptel || '-'})</td>
                        <td class="${a.salud !== 'NINGUNA' ? 'text-red-600' : ''}">${a.salud || 'NINGUNA'}</td>
                        <td>
                            <button onclick="editar(${i})" class="bg-yellow-400 px-2 border border-black">EDITAR</button>
                            <button onclick="borrar(${i})" class="bg-red-600 text-white px-2 border border-black">X</button>
                        </td>
                    </tr>`;
            }
        });
        document.getElementById('totalLabel').innerText = matricula.length;
    }

    function previsualizar() {
        const contenido = `
            <div><b>NIÑO/A:</b> ${document.getElementById('n').value}</div>
            <div><b>DNI:</b> ${document.getElementById('d').value}</div>
            <div><b>SALA:</b> ${document.getElementById('sala').value}</div>
            <div><b>SALUD:</b> ${document.getElementById('salud').value}</div>
            <div><b>MADRE:</b> ${document.getElementById('mn').value} (${document.getElementById('mtel').value})</div>
            <div><b>PADRE:</b> ${document.getElementById('pn').value} (${document.getElementById('ptel').value})</div>
        `;
        document.getElementById('modalContenido').innerHTML = contenido;
        document.getElementById('modal').classList.remove('hidden');
    }

    function confirmarGuardado() {
        const nuevo = {
            n: document.getElementById('n').value.toUpperCase(),
            d: document.getElementById('d').value,
            s: document.getElementById('sala').value,
            salud: document.getElementById('salud').value.toUpperCase() || 'NINGUNA',
            mn: document.getElementById('mn').value.toUpperCase(),
            mtel: document.getElementById('mtel').value,
            pn: document.getElementById('pn').value.toUpperCase(),
            ptel: document.getElementById('ptel').value,
            dom: document.getElementById('dom').value.toUpperCase()
        };
        matricula.push(nuevo);
        localStorage.setItem('J926_V5_DATA', JSON.stringify(matricula));
        cerrarModal();
        alert("ALUMNO REGISTRADO CORRECTAMENTE");
        cambiarSeccion(3);
    }

    function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
    
    function borrar(i) { if(confirm("¿ELIMINAR ALUMNO?")) { matricula.splice(i,1); localStorage.setItem('J926_V5_DATA', JSON.stringify(matricula)); renderizarTabla(); } }

    function updateChart() {
        const ctx = document.getElementById('chartSalas').getContext('2d');
        const rosa = matricula.filter(a => a.s === 'SALA ROSA TM').length;
        const naranja = matricula.filter(a => a.s === 'SALA NARANJA TT').length;
        if(window.miGrafico) window.miGrafico.destroy();
        window.miGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['ROSA TM', 'NARANJA TT'],
                datasets: [{ label: 'ALUMNOS', data: [rosa, naranja], backgroundColor: ['#db2777', '#f97316'], borderColor: '#000', borderWidth: 3 }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>
