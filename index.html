        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
            <div style="background:#fff; border:3px solid #000; padding:10px;">
                <canvas id="chartSalas"></canvas>
            </div>
            <div>
                <button onclick="exportarExcel()" class="btn-principal" style="margin-top:0;">📊 DESCARGAR EXCEL COMPLETO</button>
                <button onclick="copiaSeguridad()" class="btn-principal" style="background:var(--azul);">💾 EXPORTAR PARA OTRA PC</button>
                <input type="file" id="importFile" onchange="importarDatos(event)" style="display:none">
                <button onclick="document.getElementById('importFile').click()" class="btn-principal" style="background:gray;">📂 IMPORTAR DE OTRA PC</button>
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table id="tablaTotal">
                <thead>
                    <tr><th>ALUMNO</th><th>DNI</th><th>EDAD 30/6</th><th>SALA</th><th>DOMICILIO</th><th>FAMILIA</th><th>AUH</th><th>ACCIÓN</th></tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="modal">
    <div class="modal-body">
        <h2 style="background:#000; color:#fff; padding:10px; margin:0;">VERIFICAR Y CORREGIR</h2>
        <div id="formEdicion" class="form-grid" style="margin-top:15px;"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('modal').style.display='none'" class="btn-principal" style="background:gray;">VOLVER</button>
            <button onclick="confirmar()" class="btn-principal">✅ GRABAR ALUMNO</button>
        </div>
    </div>
</div>

<script>
    let db = [];
    const LLAVE = 'J926_MATRICULA_UNIFICADA';

    function ver(n) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
        document.getElementById('b'+n).classList.add('active');
        if(n === 3) { renderTabla(); renderGrafico(); }
    }

    function dictar(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR';
        rec.start();
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
    }

    function calcularEdad(fec) {
        if(!fec) return "-";
        let nac = new Date(fec);
        let corte = new Date(2026, 5, 30);
        let edad = corte.getFullYear() - nac.getFullYear();
        if (corte.getMonth() < nac.getMonth() || (corte.getMonth() === nac.getMonth() && corte.getDate() < nac.getDate())) edad--;
        return edad + " AÑOS";
    }

    function revisarYEditar() {
        const campos = ['n','d','f','nac','sala','dom','h_c','h_j','p_n','p_o','p_e','m_n','m_o','m_e','tel','auh'];
        let html = '';
        campos.forEach(id => {
            let val = document.getElementById(id).value;
            html += `<div class="campo"><label>${id.toUpperCase()}</label><input type="text" id="ed_${id}" value="${val.toUpperCase()}"></div>`;
        });
        document.getElementById('formEdicion').innerHTML = html;
        document.getElementById('modal').style.display = 'block';
    }

    function confirmar() {
        const alu = {};
        ['n','d','f','nac','sala','dom','h_c','h_j','p_n','p_o','p_e','m_n','m_o','m_e','tel','auh'].forEach(id => {
            alu[id] = document.getElementById('ed_'+id).value.toUpperCase();
        });
        db.push(alu);
        localStorage.setItem(LLAVE, JSON.stringify(db));
        document.getElementById('modal').style.display = 'none';
        alert("ALUMNO AGREGADO ✅");
        location.reload();
    }

    function renderTabla() {
        const t = document.getElementById('cuerpoTabla');
        t.innerHTML = "";
        db.forEach((a, i) => {
            t.innerHTML += `<tr>
                <td>${a.n}</td><td>${a.d}</td><td>${calcularEdad(a.f)}</td><td>${a.sala}</td><td>${a.dom}</td>
                <td><small>P: ${a.p_n} (${a.p_e})<br>M: ${a.m_n} (${a.m_e})</small></td><td>${a.auh}</td>
                <td><button onclick="borrar(${i})" style="background:red; color:white; border:none; padding:5px;">❌</button></td>
            </tr>`;
        });
    }

    function renderGrafico() {
        const ctx = document.getElementById('chartSalas').getContext('2d');
        const c = {};
        db.forEach(a => c[a.sala] = (c[a.sala] || 0) + 1);
        if(window.mCh) window.mCh.destroy();
        window.mCh = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.keys(c), datasets: [{ label: 'ALUMNOS', data: Object.values(c), backgroundColor: '#001f3f' }] }
        });
    }

    function exportarExcel() {
        let csv = "\uFEFFALUMNO,DNI,EDAD_30_6,SALA,DOMICILIO,PADRE,ESTUDIOS_P,MADRE,ESTUDIOS_M,TEL,AUH\n";
        db.forEach(a => {
            csv += `"${a.n}","${a.d}","${calcularEdad(a.f)}","${a.sala}","${a.dom}","${a.p_n}","${a.p_e}","${a.m_n}","${a.m_e}","${a.tel}","${a.auh}"\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'MATRICULA_JARDIN_926.csv';
        link.click();
    }

    function copiaSeguridad() {
        const b = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'RESPALDO_926.json';
        a.click();
    }

    function importarDatos(e) {
        const fr = new FileReader();
        fr.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem(LLAVE, JSON.stringify(db));
            alert("DATOS IMPORTADOS EXITOSAMENTE");
            location.reload();
        };
        fr.readAsText(e.target.files[0]);
    }

    function borrar(i) { if(confirm("¿ELIMINAR?")) { db.splice(i,1); localStorage.setItem(LLAVE, JSON.stringify(db)); renderTabla(); } }

    function iniciarApp() {
        const local = localStorage.getItem(LLAVE);
        if(local) db = JSON.parse(local);
        renderTabla();
    }
</script>
</body>
</html>
