<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA J926 - GESTIÓN ESTRATÉGICA NIVEL SUPERIOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #0f172a; color: #fff; }
        .card-pro { background: #fff; color: #000; border: 6px solid #000; box-shadow: 12px 12px 0px #facc15; padding: 20px; }
        .input-pro { width: 100%; border: 3px solid #000; padding: 6px; font-weight: 900; background: #fff; font-size: 11px; margin-bottom: 3px; }
        .nav-link { flex: 1; text-align: center; padding: 15px; font-weight: 900; cursor: pointer; border: 2px solid #fff; }
        .nav-link.active { background: #facc15; color: #000; border-bottom: 8px solid #000; }
        .btn-mic { background: #ef4444; color: white; border: 2px solid #000; padding: 1px 6px; font-size: 12px; }
        th { background: #1e293b; color: #facc15; padding: 8px; font-size: 10px; border: 1px solid #000; text-align: center; }
        td { border: 1px solid #000; padding: 4px; font-size: 10px; font-weight: 900; background: #fff; color: #000; text-align: center; }
        .presente { background: #22c55e !important; border: 4px solid #14532d !important; color: white !important; }
        .ausente { background: #ef4444 !important; border: 4px solid #7f1d1d !important; color: white !important; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-4 border-yellow-400">
    <div onclick="ver(1)" id="t1" class="nav-link active">1. MATRÍCULA DETALLADA 🎤</div>
    <div onclick="ver(2)" id="t2" class="nav-link bg-emerald-700">2. ASISTENCIA MÁXIMA 📋</div>
    <div onclick="ver(3)" id="t3" class="nav-link bg-blue-700">3. SUPERVISIÓN NIVEL MÁXIMO 📊</div>
</nav>

<main class="p-4">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="border-r-4 border-black pr-4">
                <p class="bg-blue-800 text-white p-1 text-center font-black mb-2 italic">DATOS DEL ALUMNO/A</p>
                <label class="text-[9px]">APELLIDO Y NOMBRE</label>
                <div class="flex gap-1"><input id="n" class="input-pro"><button onclick="voz('n')" class="btn-mic">🎤</button></div>
                <div class="grid grid-cols-2 gap-1">
                    <div><label class="text-[9px]">DNI</label><input id="d" class="input-pro"></div>
                    <div><label class="text-[9px]">NACIONALIDAD</label><input id="nac" value="ARGENTINA" class="input-pro"></div>
                </div>
                <div class="grid grid-cols-2 gap-1">
                    <div><label class="text-[9px]">FECHA NAC.</label><input id="f" type="date" class="input-pro"></div>
                    <div><label class="text-[9px]">EDAD AL 30/06</label><input id="e" class="input-pro"></div>
                </div>
                <label class="text-[9px]">SALA (SELECCIONE UNA DE LAS 14)</label>
                <select id="sala" class="input-pro bg-yellow-50 font-black">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA VERDE TM</option><option>SALA VERDE TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
                </select>
                <div class="grid grid-cols-2 gap-1">
                    <div><label class="text-[9px]">HERMANOS (CANT.)</label><input id="her" class="input-pro"></div>
                    <div><label class="text-[9px]">¿EN EL JARDÍN?</label>
                        <select id="her_j" class="input-pro"><option>NO</option><option>SÍ</option></select>
                    </div>
                </div>
                <label class="text-[9px]">DOMICILIO</label><input id="adom" class="input-pro">
                <label class="text-[9px]">SALUD / OBSERVACIONES</label><input id="salud" class="input-pro">
            </div>

            <div class="border-r-4 border-black pr-4">
                <p class="bg-rose-700 text-white p-1 text-center font-black mb-2 italic">DATOS DE LA MADRE</p>
                <label class="text-[9px]">NOMBRE COMPLETO</label><input id="mn" class="input-pro">
                <div class="grid grid-cols-2 gap-1">
                    <div><label class="text-[9px]">DNI</label><input id="mdni" class="input-pro"></div>
                    <div><label class="text-[9px]">NACIONALIDAD</label><input id="mnac" value="ARGENTINA" class="input-pro"></div>
                </div>
                <label class="text-[9px]">OCUPACIÓN / TRABAJO</label><input id="m_ocu" class="input-pro">
                <label class="text-[9px]">ESTUDIOS ALCANZADOS</label>
                <select id="m_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIA COMPLETA</option><option>TERCIARIA INCOMPLETA</option>
                    <option>UNIVERSIDAD COMPLETA</option><option>UNIVERSIDAD INCOMPLETA</option>
                </select>
                <div class="grid grid-cols-2 gap-1">
                    <div><label class="text-[9px]">TELÉFONO</label><input id="mtel" class="input-pro"></div>
                    <div><label class="text-[9px]">PERCIBE AUH</label>
                        <select id="auh" class="input-pro bg-blue-100"><option>SÍ</option><option>NO</option></select>
                    </div>
                </div>
                <label class="text-[9px]">DOMICILIO MADRE</label><input id="mdom" class="input-pro">
            </div>

            <div>
                <p class="bg-emerald-800 text-white p-1 text-center font-black mb-2 italic">DATOS DEL PADRE</p>
                <label class="text-[9px]">NOMBRE COMPLETO</label><input id="pn" class="input-pro">
                <div class="grid grid-cols-2 gap-1">
                    <div><label class="text-[9px]">DNI</label><input id="pdni" class="input-pro"></div>
                    <div><label class="text-[9px]">NACIONALIDAD</label><input id="pnac" value="ARGENTINA" class="input-pro"></div>
                </div>
                <label class="text-[9px]">OCUPACIÓN / TRABAJO</label><input id="p_ocu" class="input-pro">
                <label class="text-[9px]">ESTUDIOS ALCANZADOS</label>
                <select id="p_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIA COMPLETA</option><option>TERCIARIA INCOMPLETA</option>
                    <option>UNIVERSIDAD COMPLETA</option><option>UNIVERSIDAD INCOMPLETA</option>
                </select>
                <label class="text-[9px]">TELÉFONO PADRE</label><input id="ptel" class="input-pro">
                <label class="text-[9px]">DOMICILIO PADRE</label><input id="pdom" class="input-pro">
                
                <button onclick="lanzarPrevia()" class="w-full mt-4 bg-yellow-400 p-6 border-4 border-black font-black text-xl shadow-[8px_8px_0px_#000] hover:scale-95 transition-transform">💾 VISTA PREVIA Y GUARDAR</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="card-pro hidden">
        <div id="asisBar" class="bg-black text-yellow-400 p-3 text-center font-black mb-4 border-2 border-white italic text-lg shadow-lg"></div>
        <div id="asisGrid" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-7 gap-3"></div>
    </section>

    <section id="sec3" class="card-pro hidden">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-black text-white p-4 border-4 border-yellow-400 text-center">
                <p class="text-[10px] tracking-widest">MATRÍCULA TOTAL J926</p>
                <p id="countMat" class="text-7xl font-black text-yellow-400">0</p>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="exportarExcelOficial()" class="bg-green-700 text-white p-4 border-2 border-black font-black text-sm shadow-md">📊 DESCARGAR EXCEL OFICIAL</button>
                <button onclick="hacerRespaldo()" class="bg-blue-700 text-white p-3 border-2 border-black font-black text-xs">💾 RESPALDO PARA OTRA PC</button>
            </div>
            <div class="bg-slate-100 p-3 border-2 border-dashed border-black text-center">
                <p class="font-bold text-[10px] mb-2">IMPORTAR RESPALDO:</p>
                <input type="file" onchange="cargarRespaldo(event)" class="text-[9px] w-full">
            </div>
        </div>
        
        <input type="text" id="mainBus" onkeyup="renderSupervisión()" placeholder="🔍 BUSCAR POR DNI O APELLIDO DEL ALUMNO..." class="w-full p-5 border-4 border-black mb-4 text-2xl font-black italic bg-yellow-50 text-black">
        
        <div class="overflow-x-auto border-2 border-black shadow-xl">
            <table class="w-full border-collapse">
                <thead class="sticky top-0 z-10">
                    <tr>
                        <th>ALUMNO / DNI</th>
                        <th>SALA (14)</th>
                        <th>TELÉFONOS</th>
                        <th>AUH</th>
                        <th>ACCIÓN</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="modalCheck" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white border-[10px] border-black p-8 w-full max-w-6xl text-black overflow-y-auto max-h-[90vh]">
        <h2 class="text-4xl font-black mb-6 italic underline text-red-700">REVISIÓN FINAL DE DATOS</h2>
        <div id="checkContent" class="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs font-black uppercase"></div>
        <div class="flex gap-6 mt-8">
            <button onclick="cerrarModal()" class="flex-1 bg-gray-600 text-white p-6 font-black border-4 border-black text-xl">VOLVER A EDITAR</button>
            <button onclick="confirmarYGuardar()" class="flex-1 bg-green-600 text-white p-6 font-black border-4 border-black text-2xl shadow-[6px_6px_0px_#000]">TODO CORRECTO: GUARDAR</button>
        </div>
    </div>
</div>

<script>
    let db = [];
    let currentEdit = null;

    // Listado precargado de los 35 alumnos detectados en las capturas
    const alumnosBase = ["AGUILAR CURTIDO BELINDA ABIGAIL", "AMARILLA SUAREZ YAMIR JORGE", "BAGLIETTO THIAN ELIEL", "BARBERIS SANTILLAN JUAN PABLO", "BENITEZ CIELO ELUNEY", "BENITEZ LUISANA VALENTINA", "BOGDANOFF NAHOMI ANGELA", "CABALLERO ABREGO RONALDO DANIEL", "CACERES ISABELLA VALERIA", "CARRILLO QUISPE AARIA DAINERIS", "CENTURION RIOS LIAM CIRO", "CHOQUE MAREA O MICAELA BRIANA", "ESCOBAR NICOLAS MAEL", "FARIAS BLANCO FRANCESCO", "FIGUEROA CATALEYA ANAHI", "GARCIA ROMA MARTINA", "GAUNA RAMIRO NAHUEL", "GOMEZ SANTIAGO ENZO", "JIMENEZ ROJAS JAZMIN", "LOZA ELISEO VALENTIN", "MONTES MAIRANA ADA ABIGAIL", "OJEDA ISABELLA GABRIELA", "QUISPE GUARACHI DAYLIN", "RECALDE OVIEDO LUANA", "SALVATIERRA ROJAS ANA LIZ", "SANTALLA ROJAS GAEL", "SANTILLAN GAEL DARIO", "SAUCEDO VIDAL DESIDERIO", "SOSA AYNARA MAGALI", "TABOADA CAMILA MAITE", "TORRES COCA ANA LUJAN", "VALLEJOS HEREDIA AITANA", "VELAZQUEZ ARCIENAGA JULIETA", "ZARATE MATEO", "LOPEZ BENJAMIN"];

    function inicializar() {
        const data = localStorage.getItem('J926_SISTEMA_SUPERIOR_MAX');
        if (data) {
            db = JSON.parse(data);
        } else {
            db = alumnosBase.map(nombre => ({
                n: nombre, d: "", nac: "ARGENTINA", f: "", e: "", sala: "SALA ROSA TM",
                her: "0", her_j: "NO", adom: "", salud: "NINGUNA",
                mn: "", mdni: "", mnac: "ARGENTINA", m_ocu: "", m_est: "SECUNDARIA COMPLETA", mtel: "", auh: "SÍ", mdom: "",
                pn: "", pdni: "", pnac: "ARGENTINA", p_ocu: "", p_est: "SECUNDARIA COMPLETA", ptel: "", pdom: "",
                presente: true
            }));
        }
        renderSupervisión();
        renderAsistencia();
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
    }

    function voz(id) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-AR';
        recognition.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        recognition.start();
    }

    function lanzarPrevia() {
        const ids = ['n','d','nac','f','e','sala','her','her_j','adom','salud','mn','mdni','mnac','m_ocu','m_est','mtel','auh','mdom','pn','pdni','pnac','p_ocu','p_est','ptel','pdom'];
        let html = "<div class='bg-blue-50 p-4 border-2 border-black'><p class='text-blue-900 underline mb-2'>DATOS ALUMNO/A</p>";
        ids.slice(0,10).forEach(id => html += `<p>${id.toUpperCase()}: ${document.getElementById(id).value}</p>`);
        html += "</div><div class='bg-rose-50 p-4 border-2 border-black'><p class='text-rose-900 underline mb-2'>DATOS MADRE</p>";
        ids.slice(10,18).forEach(id => html += `<p>${id.toUpperCase()}: ${document.getElementById(id).value}</p>`);
        html += "</div><div class='bg-emerald-50 p-4 border-2 border-black'><p class='text-emerald-900 underline mb-2'>DATOS PADRE</p>";
        ids.slice(18).forEach(id => html += `<p>${id.toUpperCase()}: ${document.getElementById(id).value}</p>`);
        html += "</div>";
        document.getElementById('checkContent').innerHTML = html;
        document.getElementById('modalCheck').classList.remove('hidden');
    }

    function cerrarModal() { document.getElementById('modalCheck').classList.add('hidden'); }

    function confirmarYGuardar() {
        const ids = ['n','d','nac','f','e','sala','her','her_j','adom','salud','mn','mdni','mnac','m_ocu','m_est','mtel','auh','mdom','pn','pdni','pnac','p_ocu','p_est','ptel','pdom'];
        const item = { presente: true };
        ids.forEach(id => item[id] = document.getElementById(id).value.toUpperCase());
        
        if (currentEdit !== null) db[currentEdit] = item;
        else db.push(item);

        localStorage.setItem('J926_SISTEMA_SUPERIOR_MAX', JSON.stringify(db));
        currentEdit = null;
        cerrarModal();
        renderSupervisión();
        renderAsistencia();
        alert("REGISTRO GUARDADO CON ÉXITO");
        // Resetear campos (excepto nacionalidad por comodidad)
        document.querySelectorAll('input').forEach(i => { if(!['nac','mnac','pnac'].includes(i.id)) i.value = ""; });
    }

    function editarAlumno(i) {
        const a = db[i];
        currentEdit = i;
        const ids = ['n','d','nac','f','e','sala','her','her_j','adom','salud','mn','mdni','mnac','m_ocu','m_est','mtel','auh','mdom','pn','pdni','pnac','p_ocu','p_est','ptel','pdom'];
        ids.forEach(id => document.getElementById(id).value = a[id] || "");
        ver(1);
    }

    function renderSupervisión() {
        const bus = document.getElementById('mainBus').value.toUpperCase();
        const t = document.getElementById('tablaCuerpo');
        t.innerHTML = "";
        db.forEach((a, i) => {
            if (a.n.includes(bus) || a.d.includes(bus)) {
                t.innerHTML += `<tr>
                    <td><b>${a.n}</b><br><span class="text-blue-700 text-[9px]">DNI: ${a.d}</span></td>
                    <td>${a.sala}</td>
                    <td>M: ${a.mtel}<br>P: ${a.ptel}</td>
                    <td>${a.auh}</td>
                    <td><button onclick="editarAlumno(${i})" class="bg-yellow-400 p-2 border-2 border-black font-black w-full text-[10px]">EDITAR / CARGAR</button></td>
                </tr>`;
            }
        });
        document.getElementById('countMat').innerText = db.length;
    }

    function renderAsistencia() {
        const grid = document.getElementById('asisGrid');
        grid.innerHTML = "";
        let presentes = 0;
        db.forEach((a, i) => {
            if(a.presente) presentes++;
            grid.innerHTML += `<div onclick="toggleAsis(${i})" class="p-3 border-4 cursor-pointer text-[10px] font-black text-center shadow-md transition-all ${a.presente ? 'presente' : 'ausente'}">
                ${a.n.split(' ')[0]} ${a.n.split(' ')[1] || ''}<br>${a.presente ? 'PRESENTE' : 'AUSENTE'}
            </div>`;
        });
        document.getElementById('asisBar').innerText = `ESTADÍSTICA DIARIA: ${presentes} PRESENTES DE ${db.length} ALUMNOS`;
    }

    function toggleAsis(i) { db[i].presente = !db[i].presente; renderAsistencia(); }

    function exportarExcelOficial() {
        let csv = "ALUMNO;DNI;SALA;EDAD_30_06;NACIONALIDAD;DOMICILIO;MADRE;TEL_M;ESTUDIOS_M;AUH;PADRE;TEL_P;ESTUDIOS_P\n";
        db.forEach(a => {
            csv += `${a.n};${a.d};${a.sala};${a.e};${a.nac};${a.adom};${a.mn};${a.mtel};${a.m_est};${a.auh};${a.pn};${a.ptel};${a.p_est}\n`;
        });
        const blob = new Blob(["\ufeff"+csv], {type: 'text/csv;charset=utf-8;'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `SUPERVISION_J926_NIVEL_SUPERIOR.csv`;
        link.click();
    }

    function hacerRespaldo() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `RESPALDO_J926_SISTEMA.json`;
        link.click();
    }

    function cargarRespaldo(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            db = JSON.parse(event.target.result);
            localStorage.setItem('J926_SISTEMA_SUPERIOR_MAX', JSON.stringify(db));
            renderSupervisión(); renderAsistencia();
            alert("RESPALDO CARGADO CORRECTAMENTE");
        };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
