<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM V22 | TOTAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --accent: #facc15; --bg: #010409; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 8px; }
        .glass { background: rgba(13, 17, 23, 0.98); backdrop-filter: blur(20px); border: 1px solid #30363d; border-radius: 8px; }
        .input-titan { background: #0d1117; border: 1px solid #30363d; padding: 10px; border-radius: 4px; color: #f0f6fc; width: 100%; font-size: 8px; }
        .btn-nav { flex: 1; padding: 16px; font-weight: 900; cursor: pointer; border-bottom: 4px solid transparent; opacity: 0.5; text-align: center; }
        .btn-nav.active { opacity: 1; color: var(--accent); border-bottom-color: var(--accent); }
        .sala-card { border-left: 10px solid; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<div id="lock-screen" class="fixed inset-0 z-[10000] bg-black flex flex-col items-center justify-center p-6 text-center">
    <div class="glass p-10 border-2 border-yellow-500 max-w-md w-full">
        <h2 class="text-yellow-500 text-2xl font-black mb-4 italic">TITANIUM V22<br><span class="text-white text-xs text-xs">SISTEMA BLINDADO</span></h2>
        <input id="key-input" type="text" class="input-titan mb-4 text-center text-lg text-yellow-500" placeholder="CÓDIGO DE LICENCIA">
        <button onclick="activarApp()" class="w-full bg-yellow-500 text-black py-4 font-black rounded">ACTIVAR ACCESO</button>
        <p class="mt-4 text-[7px] opacity-40">DISEÑADO PARA SUPERVISIÓN E INSTITUCIONES DE ALTA MATRÍCULA</p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <header class="glass rounded-none border-b border-yellow-500/40 p-3 flex justify-between items-center sticky top-0 z-[900]">
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500 text-black px-2 py-1 font-black rounded text-[10px]">V22</div>
            <h1 class="text-yellow-500 font-black tracking-widest text-xs">TITANIUM TOTAL ARCHITECT</h1>
        </div>
        <div id="reloj" class="text-yellow-500 font-mono text-[10px]"></div>
    </header>

    <nav class="flex glass rounded-none border-b border-white/10 sticky top-[46px] z-[800]">
        <div onclick="setTab(1)" id="t1" class="btn-nav active">LEGAJO 360°</div>
        <div onclick="setTab(2)" id="t2" class="btn-nav">LISTA ESPERA</div>
        <div onclick="setTab(3)" id="t3" class="btn-nav">FOTO INST.</div>
        <div onclick="setTab(4)" id="t4" class="btn-nav">SUPERVISIÓN</div>
    </nav>

    <main class="p-4 space-y-4">
        <section id="s1" class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="glass p-3 border-t-4 border-yellow-500 space-y-2">
                <h3 class="text-yellow-500 font-black italic">DATOS ALUMNO</h3>
                <input id="a_nom" class="input-titan" placeholder="APELLIDO Y NOMBRE">
                <input id="a_dni" class="input-titan" placeholder="DNI">
                <input id="a_nac" class="input-titan" placeholder="NACIONALIDAD">
                <input id="a_fec" type="date" class="input-titan" onchange="calcEdad(this.value)">
                <input id="a_edad" class="input-titan" readonly placeholder="EDAD AL 30/6">
                <select id="a_sala" class="input-titan font-black text-yellow-500"></select>
                <input id="a_dom" class="input-titan" placeholder="DOMICILIO">
                <button onclick="save(false)" class="w-full bg-emerald-600 py-4 mt-2 font-black rounded">GUARDAR ALTA</button>
            </div>
            </section>

        <section id="s3" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4" id="foto_grid"></section>

        <section id="s4" class="hidden space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-center">
                <div class="glass p-4 border-t-2 border-yellow-500"><p class="text-[6px]">MATRÍCULA</p><h4 id="m_total" class="text-3xl font-black">0</h4></div>
                <div class="glass p-4 border-t-2 border-green-500"><p class="text-[6px]">VACANTES</p><h4 id="m_vac" class="text-3xl font-black">0</h4></div>
            </div>
            <div class="glass p-10 flex flex-col items-center gap-4">
                <h3 class="font-black italic">GESTIÓN DE ARCHIVOS INSTITUCIONALES</h3>
                <div class="flex gap-4">
                    <button onclick="exportar()" class="bg-blue-600 px-6 py-3 rounded font-black">BACKUP V22</button>
                    <label class="bg-emerald-600 px-6 py-3 rounded font-black cursor-pointer">
                        IMPORTAR ARCHIVO VIEJO <input type="file" class="hidden" onchange="importarInteligente(event)">
                    </label>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('TITANIUM_V22_DB')) || [];
    let wait = JSON.parse(localStorage.getItem('TITANIUM_V22_WAIT')) || [];

    function init() {
        if(localStorage.getItem('TITANIUM_V22_AUTH') === 'TRUE') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
        renderSalas();
        actualizarMetricas();
    }

    function activarApp() {
        const key = document.getElementById('key-input').value.toUpperCase();
        if(key === "J926-PRO-2026") {
            localStorage.setItem('TITANIUM_V22_AUTH', 'TRUE');
            location.reload();
        } else { alert("CLAVE INCORRECTA"); }
    }

    function importarInteligente(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const raw = JSON.parse(e.target.result);
                // Si el archivo es de la versión vieja, la data está en .db o es el array directo
                const cleanData = raw.db ? raw.db : (Array.isArray(raw) ? raw : []);
                
                if(cleanData.length > 0) {
                    db = cleanData;
                    localStorage.setItem('TITANIUM_V22_DB', JSON.stringify(db));
                    alert("✅ ÉXITO: " + db.length + " ALUMNOS VINCULADOS A TITANIUM V22");
                    location.reload();
                }
            } catch(err) { alert("ERROR AL LEER ARCHIVO"); }
        };
        reader.readAsText(file);
    }

    // Funciones de navegación y renderizado...
    function setTab(n) {
        [1,2,3,4].forEach(i => document.getElementById('s'+i).classList.toggle('hidden', i !== n));
        [1,2,3,4].forEach(i => document.getElementById('t'+i).classList.toggle('active', i === n));
    }

    function actualizarMetricas() {
        document.getElementById('m_total').innerText = db.length;
        document.getElementById('m_vac').innerText = 420 - db.length;
    }

    function exportar() {
        const blob = new Blob([JSON.stringify({db, wait})], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="BACKUP_TITANIUM_V22.json"; a.click();
    }
</script>
</body>
</html>
