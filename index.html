<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA JARDÍN 926 - ELITE V5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #001f3f; --amarillo: #facc15; --rojo: #dc2626; --verde: #16a34a; --gris: #f1f5f9; }
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: var(--gris); margin: 0; font-size: 11px; font-weight: 900; }
        nav { background: var(--azul); display: flex; border-bottom: 5px solid #000; position: sticky; top: 0; z-index: 100; }
        nav button { flex: 1; background: var(--azul); color: white; border: none; padding: 15px; cursor: pointer; font-weight: 900; border-right: 1px solid #334155; font-size: 10px; }
        nav button.active { background: var(--amarillo); color: #000; }
        .container { max-width: 1400px; margin: 15px auto; padding: 0 10px; }
        .card { background: white; border: 3px solid #000; padding: 20px; box-shadow: 7px 7px 0px #000; margin-bottom: 20px; display: none; }
        .card.active { display: block; }
        .header-seccion { background: var(--azul); color: white; padding: 10px; margin-bottom: 15px; border-left: 10px solid var(--amarillo); font-size: 14px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
        .grupo-titulo { grid-column: 1 / -1; background: #000; color: #fff; padding: 8px; margin-top: 15px; border-left: 5px solid var(--rojo); }
        .campo { display: flex; flex-direction: column; }
        .input-mic { display: flex; gap: 4px; }
        input, select { border: 2px solid #000; padding: 8px; font-weight: 900; background: #fff; font-size: 12px; text-transform: uppercase; width: 100%; box-sizing: border-box;}
        .btn-mic { background: var(--rojo); color: white; border: 2px solid #000; padding: 0 10px; cursor: pointer; border-radius: 4px; }
        .btn-accion { background: var(--verde); color: white; border: 4px solid #000; padding: 15px; width: 100%; font-size: 16px; cursor: pointer; font-weight: 900; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border: 3px solid #000; }
        th { background: #000; color: #fff; padding: 10px; font-size: 10px; }
        td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 10px; vertical-align: top; }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal-body { background: white; border: 5px solid #000; width: 95%; max-width: 1000px; margin: 10px auto; padding: 20px; }
        #buscador { background: #fffbe6; padding: 15px; border: 3px solid #000; width: 100%; font-size: 16px; margin-bottom: 15px; }
    </style>
</head>
<body onload="iniciar()">

<nav>
    <button id="b1" class="active" onclick="ver(1)">1. MATRÍCULA 🎤</button>
    <button id="b2" onclick="ver(2)">2. ASISTENCIA</button>
    <button id="b3" onclick="ver(3)">3. SUPERVISIÓN / EXCEL 📊</button>
</nav>

<div class="container">
    <section id="s1" class="card active">
        <div class="header-seccion">CARGA DE LEGAJO INSTITUCIONAL 🎤</div>
        <div class="form-grid" id="formCarga">
            <div class="grupo-titulo">DATOS DEL ALUMNO/A</div>
            <div class="campo"><label>APELLIDO Y NOMBRE</label><div class="input-mic"><input type="text" id="n"><button onclick="dictar('n')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>DNI</label><input type="number" id="d"></div>
            <div class="campo"><label>FECHA NACIMIENTO</label><input type="date" id="f"></div>
            <div class="campo"><label>NACIONALIDAD</label><div class="input-mic"><input type="text" id="nac" value="ARGENTINA"><button onclick="dictar('nac')" class="btn-mic">🎤</button></div></div>
            <div class="campo">
                <label>SALA (14 SALAS)</label>
                <select id="sala">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option>
                    <option>SALA VERDE TM</option><option>SALA VERDE TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
                    <option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA TURQUESA TM</option><option>SALA TURQUESA TT</option>
                </select>
            </div>
            <div class="campo"><label>DOMICILIO</label><div class="input-mic"><input type="text" id="m_dom"><button onclick="dictar('m_dom')" class="btn-mic">🎤</button></div></div>
            
            <div class="grupo-titulo">DATOS DE LOS PADRES</div>
            <div class="campo"><label>MADRE: NOMBRE Y DNI</label><div class="input-mic"><input type="text" id="m_n"><button onclick="dictar('m_n')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>MADRE: ESTUDIOS</label><select id="m_e"><option>SECUNDARIO COMPLETO</option><option>SECUNDARIO INCOMPLETO</option><option>PRIMARIO COMPLETO</option><option>PRIMARIO INCOMPLETO</option></select></div>
            <div class="campo"><label>TELÉFONO MADRE</label><input type="text" id="m_t"></div>
            
            <div class="campo"><label>PADRE: NOMBRE Y DNI</label><div class="input-mic"><input type="text" id="p_n"><button onclick="dictar('p_n')" class="btn-mic">🎤</button></div></div>
            <div class="campo"><label>PADRE: ESTUDIOS</label><select id="p_e"><option>SECUNDARIO COMPLETO</option><option>SECUNDARIO INCOMPLETO</option><option>PRIMARIO COMPLETO</option><option>PRIMARIO INCOMPLETO</option></select></div>
            
            <div class="grupo-titulo">OTROS</div>
            <div class="campo"><label>RECIBE AUH</label><select id="auh"><option>SÍ</option><option>NO</option></select></div>
        </div>
        <button onclick="previa()" class="btn-accion">👁️ VISTA PREVIA Y GUARDAR</button>
    </section>

    <section id="s2" class="card">
        <div class="header-seccion">ASISTENCIA DIARIA</div>
        <div id="listaAsis">Cargue alumnos para ver la lista de asistencia.</div>
    </section>

    <section id="s3" class="card">
        <div class="header-seccion" style="display:flex; justify-content:space-between;">
            <span>RESUMEN PARA INSPECCIÓN 📊</span>
            <span id="totalTxt">MATRÍCULA: 0</span>
        </div>
        <input type="text" id="buscador" placeholder="🔍 BUSCAR POR APELLIDO O DNI..." onkeyup="renderTabla()">
        <button onclick="descargarExcel()" class="btn-accion" style="background:var(--azul);">📊 DESCARGAR EXCEL COMPLETO</button>
        <div style="overflow-x:auto;">
            <table id="tablaPrincipal">
                <thead>
                    <tr>
                        <th>ALUMNO / DNI</th>
                        <th>EDAD</th>
                        <th>SALA</th>
                        <th>DOMICILIO</th>
                        <th>FAMILIA</th>
                        <th>AUH</th>
                        <th>ACCIÓN</th>
                    </tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="modal">
    <div class="modal-body">
        <h2>REVISAR DATOS ANTES DE GUARDAR</h2>
        <div id="edicion" class="form-grid"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="document.getElementById('modal').style.display='none'" class="btn-accion" style="background:gray;">EDITAR</button>
            <button onclick="guardar()" class="btn-accion">✅ CONFIRMAR Y GUARDAR</button>
        </div>
    </div>
</div>

<script>
    let alumnos = [];
    const CAMPOS = ['n','d','f','nac','sala','m_dom','m_n','m_e','m_t','p_n','p_e','auh'];

    function ver(n) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
        document.getElementById('b'+n).classList.add('active');
        if(n === 3) renderTabla();
    }

    function dictar(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-AR'; rec.start();
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
    }

    function calcularEdad(f) {
        if(!f) return "-";
        let n = new Date(f); let c = new Date(2026, 5, 30);
        let e = c.getFullYear() - n.getFullYear();
        if (c.getMonth() < n.getMonth() || (c.getMonth() === n.getMonth() && c.getDate() < n.getDate())) e--;
        return e + " AÑOS";
    }

    function previa() {
        let h = '';
        CAMPOS.forEach(id => {
            let v = document.getElementById(id).value;
            h += `<div class="campo"><label>${id.toUpperCase()}</label><input type="text" id="mod_${id}" value="${v.toUpperCase()}"></div>`;
        });
        document.getElementById('edicion').innerHTML = h;
        document.getElementById('modal').style.display = 'block';
    }

    function guardar() {
        let a = {};
        CAMPOS.forEach(id => { a[id] = document.getElementById('mod_'+id).value.toUpperCase(); });
        alumnos.push(a);
        localStorage.setItem('J926_SISTEMA_V5', JSON.stringify(alumnos));
        document.getElementById('modal').style.display = 'none';
        alert("ALUMNO GUARDADO ✅");
        renderTabla();
        ver(3);
    }

    function renderTabla() {
        const t = document.getElementById('cuerpo');
        const bus = document.getElementById('buscador').value.toUpperCase();
        t.innerHTML = "";
        
        alumnos.forEach((a, i) => {
            if (a.n.includes(bus) || a.d.toString().includes(bus)) {
                t.innerHTML += `<tr>
                    <td><b>${a.n}</b><br>DNI: ${a.d}</td>
                    <td>${calcularEdad(a.f)}</td>
                    <td>${a.sala}</td>
                    <td>${a.m_dom || '-'}</td>
                    <td style="text-align:left; font-size:9px">
                        M: ${a.m_n || '-'} (${a.m_e})<br>
                        P: ${a.p_n || '-'} (${a.p_e})<br>
                        TEL: ${a.m_t || '-'}
                    </td>
                    <td>${a.auh}</td>
                    <td><button onclick="borrar(${i})" style="background:red; color:white; border:none; padding:5px;">BORRAR</button></td>
                </tr>`;
            }
        });
        document.getElementById('totalTxt').innerText = "TOTAL MATRÍCULA: " + alumnos.length;
    }

    function borrar(i) { if(confirm("¿ELIMINAR?")) { alumnos.splice(i,1); localStorage.setItem('J926_SISTEMA_V5', JSON.stringify(alumnos)); renderTabla(); } }

    function iniciar() {
        // BUSCADOR DE DATOS EN TODAS LAS VERSIONES ANTERIORES
        const v5 = localStorage.getItem('J926_SISTEMA_V5');
        const v4 = localStorage.getItem('J926_DATA_ELITE');
        const v3 = localStorage.getItem('J926_SISTEMA_V4');
        const v2 = localStorage.getItem('J926_FINAL_V3');
        const v1 = localStorage.getItem('MATRICULA_V2_FINAL');

        let base = v5 || v4 || v3 || v2 || v1;

        if(base) {
            alumnos = JSON.parse(base);
            // Asegurar que si los datos vienen de versión vieja, se adapten
            alumnos = alumnos.map(a => ({
                n: a.n || a.nombre || "",
                d: a.d || a.dni || "",
                f: a.f || a.fecha || "",
                nac: a.nac || "ARGENTINA",
                sala: a.sala || "SALA ROSA TM",
                m_dom: a.m_dom || a.dom || "",
                m_n: a.m_n || "",
                m_e: a.m_e || "SECUNDARIO COMPLETO",
                m_t: a.m_t || a.tel || "",
                p_n: a.p_n || "",
                p_e: a.p_e || "SECUNDARIO COMPLETO",
                auh: a.auh || "SÍ"
            }));
            localStorage.setItem('J926_SISTEMA_V5', JSON.stringify(alumnos));
        }
        renderTabla();
    }

    function descargarExcel() {
        let csv = "\uFEFFALUMNO,DNI,EDAD,SALA,DOMICILIO,MADRE,PADRE,AUH\n";
        alumnos.forEach(a => {
            csv += `"${a.n}","${a.d}","${calcularEdad(a.f)}","${a.sala}","${a.m_dom}","${a.m_n}","${a.p_n}","${a.auh}"\n`;
        });
        const b = new Blob([csv], {type: 'text/csv;charset=utf-8'});
        const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = 'MATRICULA_926.csv'; l.click();
    }
</script>
</body>
</html>
