<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ESTRATÉGICO J926 - GESTIÓN TOTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: #0f172a; color: #fff; }
        .card-pro { background: #fff; color: #000; border: 6px solid #000; box-shadow: 12px 12px 0px #facc15; padding: 20px; }
        .input-pro { width: 100%; border: 2px solid #000; padding: 5px; font-weight: 900; background: #fff; font-size: 11px; margin-bottom: 2px; }
        .nav-link { flex: 1; text-align: center; padding: 15px; font-weight: 900; cursor: pointer; border: 2px solid #fff; }
        .nav-link.active { background: #facc15; color: #000; border-bottom: 8px solid #000; }
        th { background: #000; color: #facc15; padding: 8px; font-size: 10px; border: 1px solid #444; }
        td { border: 1px solid #000; padding: 4px; font-size: 10px; font-weight: 900; background: #fff; color: #000; text-align: center; }
        .presente { background: #22c55e !important; color: white !important; }
        .ausente { background: #ef4444 !important; color: white !important; }
        .stat-card { background: #000; color: #facc15; border: 2px solid #facc15; padding: 5px; text-align: center; font-size: 10px; }
    </style>
</head>
<body onload="inicializar()">

<nav class="flex sticky top-0 z-50 bg-slate-900 border-b-4 border-yellow-400">
    <div onclick="ver(1)" id="t1" class="nav-link active">1. MATRÍCULA ESTRATÉGICA 🎤</div>
    <div onclick="ver(2)" id="t2" class="nav-link bg-emerald-700">2. ASISTENCIA / VISTA PREVIA 📋</div>
    <div onclick="ver(3)" id="t3" class="nav-link bg-blue-700">3. SUPERVISIÓN Y ESTADÍSTICA 📊</div>
</nav>

<main class="p-4">
    <section id="sec1" class="card-pro">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="border-r-2 border-black pr-2">
                <p class="bg-blue-800 text-white p-1 text-center font-black mb-2 italic">DATOS ALUMNO/A</p>
                <input id="n" placeholder="NOMBRE COMPLETO" class="input-pro">
                <div class="grid grid-cols-2 gap-1">
                    <input id="d" placeholder="DNI" class="input-pro">
                    <input id="nac" value="ARGENTINA" class="input-pro">
                </div>
                <div class="grid grid-cols-2 gap-1">
                    <input id="f" type="date" class="input-pro" onchange="calcularSalaAutomática(this.value)">
                    <input id="e" placeholder="EDAD AL 30/6" class="input-pro" readonly>
                </div>
                <select id="sala" class="input-pro bg-yellow-50 font-black">
                    <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                    <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                    <option>SALA VERDE TM</option><option>SALA VERDE TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                    <option>SALA AZUL TM</option><option>SALA AZUL TT</option><option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option>
                </select>
                <input id="adom" placeholder="DOMICILIO" class="input-pro">
                <input id="salud" placeholder="OBSERVACIONES SALUD" class="input-pro">
            </div>

            <div class="border-r-2 border-black pr-2">
                <p class="bg-rose-700 text-white p-1 text-center font-black mb-2 italic">DATOS MADRE</p>
                <input id="mn" placeholder="NOMBRE MADRE" class="input-pro">
                <input id="mdni" placeholder="DNI MADRE" class="input-pro">
                <select id="m_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIO COMPLETO</option><option>TERCIARIO INCOMPLETO</option>
                    <option>UNIVERSITARIO COMPLETO</option><option>UNIVERSITARIO INCOMPLETO</option>
                </select>
                <div class="grid grid-cols-2 gap-1">
                    <input id="mtel" placeholder="TELÉFONO" class="input-pro">
                    <select id="auh" class="input-pro bg-blue-100 font-bold"><option>SÍ AUH</option><option>NO AUH</option></select>
                </div>
                <input id="m_ocu" placeholder="OCUPACIÓN" class="input-pro">
            </div>

            <div>
                <p class="bg-emerald-800 text-white p-1 text-center font-black mb-2 italic">DATOS PADRE</p>
                <input id="pn" placeholder="NOMBRE PADRE" class="input-pro">
                <input id="pdni" placeholder="DNI PADRE" class="input-pro">
                <select id="p_est" class="input-pro">
                    <option>PRIMARIA COMPLETA</option><option>PRIMARIA INCOMPLETA</option>
                    <option>SECUNDARIA COMPLETA</option><option>SECUNDARIA INCOMPLETA</option>
                    <option>TERCIARIO COMPLETO</option><option>TERCIARIO INCOMPLETO</option>
                    <option>UNIVERSITARIO COMPLETO</option><option>UNIVERSITARIO INCOMPLETO</option>
                </select>
                <input id="ptel" placeholder="TELÉFONO" class="input-pro">
                <input id="p_ocu" placeholder="OCUPACIÓN" class="input-pro">
                <button onclick="guardar()" class="w-full mt-4 bg-yellow-400 p-4 border-4 border-black font-black text-lg shadow-[4px_4px_0px_#000]">💾 GUARDAR Y LIMPIAR</button>
            </div>
        </div>
    </section>

    <section id="sec2" class="card-pro hidden">
        <div id="asisBar" class="bg-black text-yellow-400 p-2 text-center font-black mb-4 border-2 border-white italic"></div>
        <div class="mb-4">
            <select id="filtroSalaAsis" onchange="renderAsistencia()" class="w-full p-2 border-2 border-black bg-yellow-50 font-bold">
                <option value="TODAS">VER TODAS LAS SALAS</option>
                <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                <option>SALA VERDE TM</option><option>SALA VERDE TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                <option>SALA AZUL TM</option><option>SALA AZUL TT</option><option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option>
            </select>
        </div>
        <div id="asisGrid" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-7 gap-2"></div>
    </section>

    <section id="sec3" class="card-pro hidden">
        <p class="text-[10px] font-black mb-1">CANTIDAD CARGADA POR SALA:</p>
        <div id="statsGrid" class="grid grid-cols-3 md:grid-cols-7 gap-1 mb-6"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 border-t-4 border-black pt-4">
            <div class="bg-slate-900 text-white p-3 border-2 border-black">
                <p class="text-red-500 font-black text-xs mb-1 italic">CARGA MASIVA EXCEL (COPIAR/PEGAR)</p>
                <textarea id="masivoInput" placeholder="NOMBRE [TAB] DNI [TAB] SALA" class="w-full h-20 text-black p-1 text-[9px] font-mono"></textarea>
                <button onclick="procesarMasivo()" class="w-full bg-red-600 text-white p-1 font-black text-[10px]">📥 IMPACTAR EXCEL</button>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="descargarExcelEstrategico()" class="bg-green-700 text-white p-3 border-2 border-black font-black text-xs hover:bg-green-600">📊 DESCARGAR EXCEL SUPERVISIÓN</button>
                <div class="grid grid-cols-2 gap-1">
                    <button onclick="respaldo()" class="bg-blue-700 text-white p-2 border-2 border-black font-black text-[9px]">💾 EXPORTAR BACKUP</button>
                    <input type="file" onchange="importar(event)" class="text-[9px] bg-white text-black p-1 border-2 border-black">
                </div>
            </div>
        </div>
        
        <input type="text" id="bus" onkeyup="renderTabla()" placeholder="🔍 BUSCAR POR APELLIDO O DNI..." class="w-full p-3 border-4 border-black mb-4 text-xl font-black italic bg-yellow-50 text-black">
        
        <div class="overflow-x-auto border-2 border-black max-h-[400px]">
            <table class="w-full">
                <thead class="sticky top-0"><tr><th>ALUMNO / DNI</th><th>SALA</th><th>CONTACTOS</th><th>ACCIÓN</th></tr></thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let db = [];
    let editIdx = null;
    const listaSalas = ["SALA ROSA TM", "SALA ROSA TT", "SALA ROJA TM", "SALA ROJA TT", "SALA NARANJA TM", "SALA NARANJA TT", "SALA CELESTE TM", "SALA CELESTE TT", "SALA VERDE TM", "SALA VERDE TT", "SALA AMARILLA TM", "SALA AMARILLA TT", "SALA AZUL TM", "SALA AZUL TT", "SALA VIOLETA TM", "SALA VIOLETA TT"];

    function inicializar() {
        const data = localStorage.getItem('J926_MASTER_ESTRATEGICO');
        if (data) db = JSON.parse(data);
        actualizarTodo();
    }

    function calcularSalaAutomática(fecha) {
        if(!fecha) return;
        const hoy = new Date("2026-06-30");
        const cumple = new Date(fecha);
        let edad = hoy.getFullYear() - cumple.getFullYear();
        const m = hoy.getMonth() - cumple.getMonth();
        if (m < 0 || (m === 0 && hoy.getDate() < cumple.getDate())) edad--;
        
        document.getElementById('e').value = edad + " AÑOS";
        
        const s = document.getElementById('sala');
        if(edad === 2) s.value = "SALA ROSA TM";
        else if(edad === 3) s.value = "SALA VERDE TM";
        else if(edad === 4) s.value = "SALA NARANJA TM";
        else if(edad === 5) s.value = "SALA AZUL TM";
    }

    function ver(n) {
        [1,2,3].forEach(i => {
            document.getElementById('sec'+i).classList.toggle('hidden', i !== n);
            document.getElementById('t'+i).classList.toggle('active', i === n);
        });
        if(n === 3) renderStats();
    }

    function guardar() {
        const ids = ['n','d','nac','f','e','sala','adom','salud','mn','mdni','m_est','mtel','auh','m_ocu','pn','pdni','p_est','ptel','p_ocu'];
        const obj = { presente: true };
        ids.forEach(id => obj[id] = document.getElementById(id).value.toUpperCase());
        
        if(editIdx !== null) db[editIdx] = obj; else db.push(obj);
        
        localStorage.setItem('J926_MASTER_ESTRATEGICO', JSON.stringify(db));
        
        // LIMPIEZA AUTOMÁTICA
        ids.forEach(id => {
            if(id !== 'nac' && id !== 'm_est' && id !== 'p_est' && id !== 'auh') document.getElementById(id).value = "";
        });
        
        editIdx = null; actualizarTodo(); alert("✅ GUARDADO EXITOSO");
    }

    function editar(i) {
        const a = db[i]; editIdx = i;
        const ids = ['n','d','nac','f','e','sala','adom','salud','mn','mdni','m_est','mtel','auh','m_ocu','pn','pdni','p_est','ptel','p_ocu'];
        ids.forEach(id => document.getElementById(id).value = a[id] || "");
        ver(1);
    }

    function renderTabla() {
        const bus = document.getElementById('bus').value.toUpperCase();
        const t = document.getElementById('tablaCuerpo'); t.innerHTML = "";
        db.forEach((a, i) => {
            if(a.n.includes(bus) || a.d.includes(bus)) {
                t.innerHTML += `<tr><td><b>${a.n}</b><br><small>DNI: ${a.d}</small></td><td>${a.sala}</td><td>M:${a.mtel}<br>P:${a.ptel}</td>
                <td><button onclick="editar(${i})" class="bg-yellow-400 p-1 border-2 border-black font-black w-full text-[9px]">EDITAR</button></td></tr>`;
            }
        });
    }

    function renderStats() {
        const g = document.getElementById('statsGrid'); g.innerHTML = "";
        listaSalas.forEach(s => {
            const cant = db.filter(a => a.sala === s).length;
            g.innerHTML += `<div class="stat-card"><b>${s.replace("SALA ","")}</b><br><span class="text-white text-lg">${cant}</span></div>`;
        });
    }

    function renderAsistencia() {
        const filtro = document.getElementById('filtroSalaAsis').value;
        const g = document.getElementById('asisGrid'); g.innerHTML = "";
        let p = 0;
        db.forEach((a, i) => {
            if (filtro === "TODAS" || a.sala === filtro) {
                if(a.presente) p++;
                g.innerHTML += `<div onclick="toggleAsis(${i})" class="p-2 border-2 cursor-pointer text-[9px] font-black text-center ${a.presente ? 'presente' : 'ausente'}">
                    ${a.n.split(' ')[0]}<br>${a.sala.replace("SALA ","")}
                </div>`;
            }
        });
        document.getElementById('asisBar').innerText = `VISTA FILTRADA: ${p} PRESENTES`;
    }

    function toggleAsis(i) { db[i].presente = !db[i].presente; renderAsistencia(); actualizarTodo(); }

    function actualizarTodo() {
        localStorage.setItem('J926_MASTER_ESTRATEGICO', JSON.stringify(db));
        renderTabla(); renderAsistencia(); renderStats();
    }

    function descargarExcelEstrategico() {
        let csv = "\ufeffAPELLIDO Y NOMBRE;DNI;SALA;EDAD;FECHA NAC;SALUD;AUH;DOMICILIO;MADRE;TEL MADRE;ESTUDIOS M;PADRE;TEL PADRE;ESTUDIOS P\n";
        db.forEach(a => { csv += `${a.n};${a.d};${a.sala};${a.e};${a.f};${a.salud};${a.auh};${a.adom};${a.mn};${a.mtel};${a.m_est};${a.pn};${a.ptel};${a.p_est}\n`; });
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = "SUPERVISION_J926_COMPLETO.csv"; l.click();
    }

    function respaldo() {
        const b = new Blob([JSON.stringify(db)], {type:'application/json'});
        const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = "BACKUP_J926.json"; l.click();
    }

    function importar(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            db = JSON.parse(ev.target.result); actualizarTodo(); alert("✅ DATOS IMPORTADOS CORRECTAMENTE");
        };
        r.readAsText(e.target.files[0]);
    }

    function procesarMasivo() {
        const texto = document.getElementById('masivoInput').value;
        const filas = texto.split('\n');
        filas.forEach(fila => {
            const cols = fila.split('\t');
            if(cols.length >= 2) {
                db.push({ n: cols[0].toUpperCase(), d: cols[1], sala: cols[2] || "SALA ROSA TM", presente: true });
            }
        });
        actualizarTodo(); alert("✅ CARGA MASIVA EXITOSA");
    }
</script>
</body>
</html>
