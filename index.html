<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J926 PLATINUM - REGISTRO PROFESIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gold: #facc15; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 10px; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #000; border: 1px solid #334155; padding: 10px; border-radius: 6px; color: #fff; width: 100%; font-size: 10px; }
        .nav-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: 900; opacity: 0.5; border-bottom: 3px solid transparent; }
        .nav-tab.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); }
        
        /* Colores de Sala Estilo Registro */
        .SALA-ROSA { border-left: 8px solid #f472b6; } .SALA-ROJA { border-left: 8px solid #ef4444; }
        .SALA-NARANJA { border-left: 8px solid #fb923c; } .SALA-CELESTE { border-left: 8px solid #38bdf8; }
        .SALA-VIOLETA { border-left: 8px solid #a855f7; } .SALA-AMARILLA { border-left: 8px solid #facc15; }
        .SALA-AZUL { border-left: 8px solid #2563eb; }

        .mic-active { color: #ef4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body onload="render()">

<nav class="flex sticky top-0 z-50 glass border-b border-white/10">
    <div onclick="tab(1)" id="t1" class="nav-tab active">📝 REGISTRO</div>
    <div onclick="tab(2)" id="t2" class="nav-tab">📅 ASISTENCIA</div>
    <div onclick="tab(3)" id="t3" class="nav-tab">🛡️ SUPERVISIÓN</div>
</nav>

<main class="p-4 space-y-4">
    <section id="sec1" class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="glass p-5 rounded-2xl border-t-4 border-blue-500 space-y-2">
            <h3 class="text-blue-400 font-black italic">LEGAJO ALUMNO/A</h3>
            <div class="relative"><input id="a_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer" onclick="voice('a_n')"></i></div>
            <div class="flex gap-2"><input id="a_d" class="input-pro" placeholder="DNI"><input id="a_nac" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA"></div>
            <div class="flex gap-2"><input id="a_f" type="date" class="input-pro" onchange="calcAge(this.value)"><input id="a_e" class="input-pro" placeholder="EDAD" readonly></div>
            <select id="a_s" class="input-pro text-gold font-bold">
                <option>SALA ROSA TM</option><option>SALA ROSA TT</option><option>SALA ROJA TM</option><option>SALA ROJA TT</option>
                <option>SALA NARANJA TM</option><option>SALA NARANJA TT</option><option>SALA CELESTE TM</option><option>SALA CELESTE TT</option>
                <option>SALA VIOLETA TM</option><option>SALA VIOLETA TT</option><option>SALA AMARILLA TM</option><option>SALA AMARILLA TT</option>
                <option>SALA AZUL TM</option><option>SALA AZUL TT</option>
            </select>
            <div class="relative"><input id="a_dom" class="input-pro" placeholder="DOMICILIO"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer" onclick="voice('a_dom')"></i></div>
            <textarea id="a_sal" class="input-pro h-14" placeholder="ANTECEDENTES DE SALUD"></textarea>
        </div>

        <div class="glass p-5 rounded-2xl border-t-4 border-rose-500 space-y-2">
            <div class="flex justify-between items-center"><h3 class="text-rose-400 font-black italic">MADRE</h3><button onclick="copyDom('m')" class="text-[7px] bg-rose-500/20 px-2 py-1 rounded">MISMO DOMICILIO</button></div>
            <div class="relative"><input id="m_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer" onclick="voice('m_n')"></i></div>
            <div class="flex gap-2"><input id="m_d" class="input-pro" placeholder="DNI"><input id="m_nac" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA"></div>
            <select id="m_edu" class="input-pro">
                <option>SIN ESTUDIOS</option><option>PRIMARIA COMPLETA/INC</option><option>SECUNDARIA COMPLETA/INC</option><option>TERCIARIA COMPLETA/INC</option><option>UNIVERSITARIA COMPLETA/INC</option>
            </select>
            <div class="flex gap-2"><input id="m_ocu" class="input-pro" placeholder="OCUPACIÓN"><select id="m_auh" class="input-pro"><option value="NO">AUH: NO</option><option value="SI">AUH: SI</option></select></div>
            <input id="m_dom" class="input-pro" placeholder="DOMICILIO (O PULSAR CLONAR)">
        </div>

        <div class="glass p-5 rounded-2xl border-t-4 border-emerald-500 space-y-2">
            <div class="flex justify-between items-center"><h3 class="text-emerald-400 font-black italic">PADRE</h3><button onclick="copyDom('p')" class="text-[7px] bg-emerald-500/20 px-2 py-1 rounded">MISMO DOMICILIO</button></div>
            <div class="relative"><input id="p_n" class="input-pro" placeholder="APELLIDO Y NOMBRE"><i class="bi bi-mic-fill absolute right-3 top-3 cursor-pointer" onclick="voice('p_n')"></i></div>
            <div class="flex gap-2"><input id="p_d" class="input-pro" placeholder="DNI"><input id="p_nac" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA"></div>
            <input id="p_ocu" class="input-pro" placeholder="OCUPACIÓN">
            <input id="p_dom" class="input-pro" placeholder="DOMICILIO">
            <input type="hidden" id="edit_id">
            <button onclick="save()" id="btnSave" class="w-full bg-gold text-black font-black py-4 rounded-xl mt-2 shadow-lg">💾 IMPACTAR EN REGISTRO</button>
        </div>
    </section>

    <section id="sec2" class="hidden space-y-4">
        <div class="flex justify-between items-center glass p-4 rounded-xl">
            <h2 class="font-black italic text-gold">LIBRO DE REGISTRO DIARIO</h2>
            <input type="date" id="asisDate" class="bg-transparent border-b border-gold text-white font-bold" onchange="renderAsis()">
        </div>
        <div id="asisCards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2"></div>
        <div id="asisList" class="glass p-5 rounded-2xl hidden">
            <h3 id="currentSala" class="text-xl font-black mb-4"></h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2" id="studentList"></div>
        </div>
    </section>

    <section id="sec3" class="hidden space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-2xl border-l-8 border-blue-600">
                <h3 class="font-black italic mb-2">INGENIERÍA DE LECTURA EXCEL</h3>
                <input type="file" id="excelInput" onchange="readExcel(event)" class="text-[8px] mb-2">
                <button onclick="exportExcel()" class="w-full bg-emerald-600 p-2 rounded font-bold">EXPORTAR DOCUMENTO PROFESIONAL</button>
            </div>
            <div class="glass p-6 rounded-2xl border-l-8 border-gold">
                <h3 class="font-black italic mb-2">ESTATUS INSTITUCIONAL</h3>
                <div id="instStats" class="text-[9px] space-y-1"></div>
            </div>
        </div>
        <div class="glass p-5 rounded-2xl">
            <input type="text" id="search" onkeyup="renderTable()" class="input-pro mb-4 border-gold/30" placeholder="🔎 BUSCADOR DE INGENIERÍA POR DNI...">
            <table class="w-full">
                <tbody id="mainTable"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('J926_DB')) || [];
    let asis = JSON.parse(localStorage.getItem('J926_ASIS')) || {};
    const SALAS = ["SALA ROSA TM","SALA ROSA TT","SALA ROJA TM","SALA ROJA TT","SALA NARANJA TM","SALA NARANJA TT","SALA CELESTE TM","SALA CELESTE TT","SALA VIOLETA TM","SALA VIOLETA TT","SALA AMARILLA TM","SALA AMARILLA TT","SALA AZUL TM","SALA AZUL TT"];

    function tab(n) { [1,2,3].forEach(i => { document.getElementById('sec'+i).classList.toggle('hidden', i !== n); document.getElementById('t'+i).classList.toggle('active', i === n); }); }

    function voice(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = "es-AR";
        rec.onstart = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.add('mic-active');
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript.toUpperCase(); };
        rec.onend = () => document.querySelector(`[onclick="voice('${id}')"]`).classList.remove('mic-active');
        rec.start();
    }

    function copyDom(prefix) { document.getElementById(prefix+'_dom').value = document.getElementById('a_dom').value; }

    function calcAge(f) {
        const limit = new Date("2026-06-30"), nac = new Date(f);
        let e = limit.getFullYear() - nac.getFullYear();
        if (limit.getMonth() < nac.getMonth() || (limit.getMonth() === nac.getMonth() && limit.getDate() < nac.getDate())) e--;
        document.getElementById('a_e').value = e + " AÑOS";
    }

    function save() {
        const id = document.getElementById('edit_id').value || Date.now();
        const record = {
            id: Number(id),
            a: { n: v('a_n'), d: v('a_d'), nac: v('a_nac'), f: v('a_f'), e: v('a_e'), s: v('a_s'), dom: v('a_dom'), sal: v('a_sal') },
            m: { n: v('m_n'), d: v('m_d'), nac: v('m_nac'), edu: v('m_edu'), ocu: v('m_ocu'), auh: v('m_auh'), dom: v('m_dom') },
            p: { n: v('p_n'), d: v('p_d'), nac: v('p_nac'), ocu: v('p_ocu'), dom: v('p_dom') }
        };
        db = db.filter(x => x.id !== record.id); db.push(record);
        sync(); alert("REGISTRADO"); clear();
    }

    function sync() { localStorage.setItem('J926_DB', JSON.stringify(db)); localStorage.setItem('J926_ASIS', JSON.stringify(asis)); render(); }

    function render() {
        const grid = document.getElementById('asisCards');
        grid.innerHTML = SALAS.map(s => {
            const count = db.filter(x => x.a.s === s).length;
            const colorClass = s.split(' ')[1];
            return `<div onclick="openAsis('${s}')" class="glass p-3 rounded-xl card-sala SALA-${colorClass} cursor-pointer hover:scale-105 transition">
                <p class="text-[7px] opacity-60">${s}</p>
                <div class="flex justify-between items-center"><h4 class="text-xs font-black">${count}/30</h4><span class="text-gold text-[7px]">${30-count} VAC</span></div>
            </div>`;
        }).join('');
        renderTable();
        updateStats();
    }

    function openAsis(sala) {
        document.getElementById('asisList').classList.remove('hidden');
        document.getElementById('currentSala').innerText = sala;
        const students = db.filter(x => x.a.s === sala).sort((a,b) => a.a.n.localeCompare(b.a.n));
        const date = document.getElementById('asisDate').value || new Date().toISOString().split('T')[0];
        
        document.getElementById('studentList').innerHTML = students.map(x => {
            const state = (asis[date] && asis[date][x.id]) || '';
            return `<div class="glass p-3 rounded-xl flex justify-between items-center">
                <span class="font-bold text-[9px]">${x.a.n}</span>
                <div class="flex gap-2">
                    <button onclick="mark('${date}', ${x.id}, 'P')" class="px-3 py-1 rounded ${state==='P'?'bg-emerald-500':'bg-white/10'}">P</button>
                    <button onclick="mark('${date}', ${x.id}, 'A')" class="px-3 py-1 rounded ${state==='A'?'bg-rose-500':'bg-white/10'}">A</button>
                </div>
            </div>`;
        }).join('');
    }

    function mark(date, id, val) { if(!asis[date]) asis[date]={}; asis[date][id]=val; sync(); openAsis(document.getElementById('currentSala').innerText); }

    function renderTable() {
        const q = document.getElementById('search').value.toUpperCase();
        document.getElementById('mainTable').innerHTML = db.filter(x => x.a.d.includes(q) || x.a.n.includes(q)).map(x => `
            <tr class="border-b border-white/5">
                <td class="p-2 font-black text-blue-400">${x.a.n}<br><span class="opacity-40 text-[7px]">${x.a.d} | ${x.a.s}</span></td>
                <td class="p-2 text-right"><button onclick="edit(${x.id})" class="text-gold"><i class="bi bi-pencil-square"></i></button></td>
            </tr>
        `).join('');
    }

    function edit(id) {
        const x = db.find(i => i.id === id); if(!x) return;
        document.getElementById('edit_id').value = x.id;
        Object.keys(x.a).forEach(k => { if(document.getElementById('a_'+k)) document.getElementById('a_'+k).value = x.a[k]; });
        Object.keys(x.m).forEach(k => { if(document.getElementById('m_'+k)) document.getElementById('m_'+k).value = x.m[k]; });
        Object.keys(x.p).forEach(k => { if(document.getElementById('p_'+k)) document.getElementById('p_'+k).value = x.p[k]; });
        tab(1);
    }

    function readExcel(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            db = data; sync(); alert("INGENIERÍA DE DATOS CARGADA");
        };
        reader.readAsText(e.target.files[0]);
    }

    function exportExcel() {
        let csv = "\ufeffALUMNO;DNI;SALA;DOMICILIO;MADRE;PADRE\n";
        db.forEach(x => csv += `${x.a.n};${x.a.d};${x.a.s};${x.a.dom};${x.m.n};${x.p.n}\n`);
        const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); a.download="INFORME_SUPERVISOR_926.csv"; a.click();
    }

    function v(id) { return document.getElementById(id).value.toUpperCase().trim(); }
    function clear() { document.querySelectorAll('input, textarea').forEach(i => { if(!['a_s','a_nac','m_nac','p_nac','m_edu'].includes(i.id)) i.value=""; }); }
</script>
</body>
</html>
