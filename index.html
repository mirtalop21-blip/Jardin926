<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM V23 MASTER | DGCE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; text-transform: uppercase; font-size: 11px; }
        .glass { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; }
        .input-pro { background: #010409; border: 1px solid #30363d; padding: 10px; border-radius: 4px; color: white; width: 100%; font-weight: bold; }
        .input-pro:focus { border-color: #facc15; outline: none; }
        .btn-sala { transition: 0.3s; cursor: pointer; border-bottom: 4px solid transparent; }
        .card-alumno { border-left: 4px solid #facc15; background: #161b22; transition: 0.2s; cursor: pointer; }
        .card-alumno:hover { transform: scale(1.02); background: #21262d; }
    </style>
</head>
<body>

<header class="p-4 glass flex justify-between items-center border-b border-yellow-500">
    <div class="flex items-center gap-3">
        <i class="bi bi-shield-shaded text-yellow-500 text-3xl"></i>
        <div>
            <h1 class="text-xl font-black italic">TITANIUM V23 <span class="text-yellow-500">MASTER</span></h1>
            <p class="text-[8px] opacity-60 tracking-widest">SISTEMA ÚNICO INSTITUCIONAL | DGCE</p>
        </div>
    </div>
    <div class="flex gap-2">
        <button onclick="exportarExcel()" class="bg-green-600 px-4 py-2 rounded font-bold text-[10px]"><i class="bi bi-file-earmark-excel"></i> EXPORTAR DGCE</button>
        <button onclick="respaldoJSON()" class="bg-blue-600 px-4 py-2 rounded font-bold text-[10px]">BACKUP OMNI</button>
    </div>
</header>

<main class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-6">
    <section class="glass p-4 space-y-4">
        <h2 class="text-yellow-500 font-black border-b border-white/10 pb-2 italic">I. LEGAJO 360° - DATOS ALUMNO</h2>
        <div class="grid grid-cols-2 gap-2">
            <input id="a_apellido" class="input-pro" placeholder="APELLIDO">
            <input id="a_nombre" class="input-pro" placeholder="NOMBRE">
            <input id="a_dni" class="input-pro" placeholder="DNI">
            <input id="a_nacionalidad" class="input-pro" placeholder="NACIONALIDAD" value="ARGENTINA">
            <input id="a_fec_nac" type="date" class="input-pro" onchange="calcularEdad(this.value)">
            <div id="display_edad" class="bg-yellow-500 text-black p-2 rounded font-black flex items-center justify-center">EDAD AL 30/06: --</div>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <input id="a_domicilio" class="input-pro" placeholder="DOMICILIO REAL">
            <input id="a_tel" class="input-pro" placeholder="TELÉFONO CONTACTO">
            <input id="a_hermanos" type="number" class="input-pro" placeholder="CANT. HERMANOS">
            <select id="a_her_jar" class="input-pro">
                <option value="NO">¿HERMANOS EN EL JARDÍN? NO</option>
                <option value="SI">¿HERMANOS EN EL JARDÍN? SI</option>
            </select>
        </div>
        <select id="a_sala" class="input-pro border-yellow-500 text-yellow-500">
            <option value="ROSA">SALA ROSA</option><option value="ROJA">SALA ROJA</option>
            <option value="NARANJA">SALA NARANJA</option><option value="CELESTE">SALA CELESTE</option>
            <option value="VIOLETA">SALA VIOLETA</option><option value="AMARILLA">SALA AMARILLA</option>
            <option value="AZUL">SALA AZUL</option>
        </select>

        <h2 class="text-cyan-400 font-black border-b border-white/10 pb-2 italic mt-6">II. VÍNCULOS Y ESCOLARIDAD</h2>
        <div class="p-3 bg-white/5 rounded space-y-2">
            <p class="text-cyan-400 font-bold text-[9px]">DATOS MADRE / TUTORA</p>
            <div class="grid grid-cols-2 gap-2">
                <input id="m_nom" class="input-pro" placeholder="NOMBRE Y APELLIDO">
                <input id="m_dni" class="input-pro" placeholder="DNI">
                <input id="m_nac" class="input-pro" placeholder="NACIONALIDAD">
                <input id="m_tel" class="input-pro" placeholder="TELÉFONO">
                <input id="m_ocu" class="input-pro" placeholder="OCUPACIÓN">
                <select id="m_auh" class="input-pro"><option value="NO">RECIBE AUH: NO</option><option value="SI">RECIBE AUH: SI</option></select>
            </div>
            <select id="m_edu" class="input-pro edu-select"></select>
            <div class="flex gap-2 items-center">
                <input id="m_dom" class="input-pro" placeholder="DOMICILIO MADRE">
                <button onclick="copiarDom('m')" class="bg-white/10 p-2 rounded text-[8px]">IGUAL ALUMNO</button>
            </div>
        </div>
        <div class="p-3 bg-white/5 rounded space-y-2">
            <p class="text-pink-400 font-bold text-[9px]">DATOS PADRE / TUTOR</p>
            <div class="grid grid-cols-2 gap-2">
                <input id="p_nom" class="input-pro" placeholder="NOMBRE Y APELLIDO">
                <input id="p_dni" class="input-pro" placeholder="DNI">
            </div>
            <select id="p_edu" class="input-pro edu-select"></select>
            <div class="flex gap-2 items-center">
                <input id="p_dom" class="input-pro" placeholder="DOMICILIO PADRE">
                <button onclick="copiarDom('p')" class="bg-white/10 p-2 rounded text-[8px]">IGUAL ALUMNO</button>
            </div>
        </div>

        <button onclick="guardarLegajo()" class="w-full bg-green-600 p-4 rounded font-black text-lg shadow-lg hover:bg-green-500 transition">GUARDAR LEGAJO COMPLETO</button>
    </section>

    <section class="space-y-4">
        <div class="glass p-4">
            <h2 class="text-yellow-500 font-black mb-3 italic">RADAR DE MATRÍCULA POR SALA</h2>
            <div id="botones-salas" class="flex flex-wrap gap-2"></div>
            <input type="text" id="buscador" onkeyup="filtrarRadar()" class="input-pro mt-4" placeholder="BUSCAR POR APELLIDO O DNI...">
        </div>
        
        <div id="contenedor-tarjetas" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </section>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('TITANIUM_DB')) || [];
    const SALAS = ["ROSA", "ROJA", "NARANJA", "CELESTE", "VIOLETA", "AMARILLA", "AZUL"];
    const ESTUDIOS = ["SIN ESTUDIOS", "PRIMARIA INCOMPLETA", "PRIMARIA COMPLETA", "SECUNDARIA INCOMPLETA", "SECUNDARIA COMPLETA", "TERCIARIO INCOMPLETO", "TERCIARIO COMPLETO", "UNIVERSITARIO INCOMPLETO", "UNIVERSITARIO COMPLETO"];

    function init() {
        const eduSelectors = document.querySelectorAll('.edu-select');
        eduSelectors.forEach(sel => {
            ESTUDIOS.forEach(e => sel.innerHTML += `<option value="${e}">${e}</option>`);
        });

        const sContainer = document.getElementById('botones-salas');
        SALAS.forEach(s => {
            sContainer.innerHTML += `<button onclick="renderRadar('${s}')" class="btn-sala bg-white/5 px-3 py-2 rounded font-bold text-[9px] hover:bg-yellow-500 hover:text-black">${s}</button>`;
        });
        renderRadar('ROSA');
    }

    function calcularEdad(fecha) {
        const nac = new Date(fecha);
        const corte = new Date(new Date().getFullYear(), 5, 30);
        let edad = corte.getFullYear() - nac.getFullYear();
        if (corte < new Date(corte.getFullYear(), nac.getMonth(), nac.getDate())) edad--;
        document.getElementById('display_edad').innerText = `EDAD AL 30/06: ${edad} AÑOS`;
        return edad;
    }

    function copiarDom(tipo) {
        document.getElementById(tipo + '_dom').value = document.getElementById('a_domicilio').value;
    }

    function guardarLegajo() {
        const alumno = {
            apellido: document.getElementById('a_apellido').value,
            nombre: document.getElementById('a_nombre').value,
            dni: document.getElementById('a_dni').value,
            sala: document.getElementById('a_sala').value,
            auh: document.getElementById('m_auh').value,
            // ... resto de campos
        };
        db.push(alumno);
        localStorage.setItem('TITANIUM_DB', JSON.stringify(db));
        alert("LEGAJO GUARDADO");
        renderRadar(alumno.sala);
    }

    function renderRadar(sala) {
        const cont = document.getElementById('contenedor-tarjetas');
        const filtrados = db.filter(a => a.sala === sala);
        cont.innerHTML = filtrados.map(a => `
            <div class="card-alumno p-4 rounded shadow-xl">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-black text-white text-sm">${a.apellido}, ${a.nombre}</h3>
                        <p class="text-yellow-500 font-bold text-[10px]">DNI: ${a.dni}</p>
                    </div>
                    <span class="bg-green-500/20 text-green-400 px-2 py-1 rounded text-[8px]">AUH: ${a.auh}</span>
                </div>
                <div class="mt-3 flex gap-2">
                    <button class="bg-blue-500 text-white px-2 py-1 rounded text-[9px]">EDITAR</button>
                    <button class="bg-white/10 text-white px-2 py-1 rounded text-[9px]">VER LEGAJO 360</button>
                </div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
